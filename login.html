<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — 로그인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--navy2:#0e1f38;
  --teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --bg:#F5F4F0;--white:#fff;
  --text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.12);--border-md:rgba(28,43,69,0.22);
  --red:#e24b4a;--red-light:#fcebeb;
  --gold:#f1b500;
  --shadow-md:0 8px 32px rgba(0,0,0,0.14);
}
body{
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(160deg,var(--navy2) 0%,#142244 50%,#1e3a6a 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;position:relative;overflow:hidden;
}
body::before{content:'';position:absolute;right:-100px;top:-100px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(42,127,111,0.15) 0%,transparent 70%);pointer-events:none;}
body::after{content:'';position:absolute;left:-80px;bottom:-80px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(41,82,163,0.1) 0%,transparent 70%);pointer-events:none;}

/* 상단 로고 */
.top-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;text-decoration:none;}
.tl-icon{width:36px;height:36px;background:var(--teal-mid);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}
.tl-name{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;}

.card{background:var(--white);border-radius:20px;width:100%;max-width:400px;padding:34px 32px 28px;box-shadow:var(--shadow-md);position:relative;z-index:1;}

/* 탭 */
.tabs{display:flex;gap:0;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:24px;}
.tab{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-light);font-family:inherit;transition:all 0.2s;text-align:center;}
.tab.act{background:var(--white);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1);}

/* 입력 */
.field{margin-bottom:14px;}
.field-label{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.4px;}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border-md);border-radius:10px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border-color 0.2s;background:var(--bg);}
.form-input:focus{border-color:var(--teal-mid);background:var(--white);}
.pw-wrap{position:relative;}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-light);}

/* 플랜 선택 (회원가입) */
.plan-select{display:flex;gap:8px;margin-bottom:14px;}
.plan-btn{flex:1;padding:10px 6px;border-radius:10px;border:1.5px solid var(--border-md);background:var(--bg);cursor:pointer;font-family:inherit;text-align:center;transition:all 0.2s;}
.plan-btn:hover{border-color:var(--teal-mid);}
.plan-btn.act{border-color:var(--teal-mid);background:var(--teal-light);}
.plan-btn.pro-btn.act{border-color:var(--gold);background:#fef9e7;}
.plan-icon{font-size:20px;display:block;margin-bottom:3px;}
.plan-name{font-size:12px;font-weight:700;color:var(--text);}
.plan-desc{font-size:10px;color:var(--text-light);margin-top:1px;}

/* 제출 버튼 */
.submit-btn{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,var(--teal) 0%,var(--teal-mid) 100%);color:#fff;border:none;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;transition:all 0.2s;margin-top:4px;}
.submit-btn:hover{opacity:.9;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}

.forgot-wrap{text-align:right;margin-bottom:2px;}
.forgot{font-size:12px;color:var(--teal-mid);background:none;border:none;cursor:pointer;font-family:inherit;}

/* 에러 */
.error-msg{font-size:13px;color:var(--red);background:var(--red-light);border-radius:8px;padding:10px 12px;margin-bottom:12px;display:none;}
.error-msg.show{display:block;}

/* 성공 */
.success-box{text-align:center;padding:20px 0 10px;display:none;}
.success-box.show{display:block;}
.success-icon{font-size:44px;margin-bottom:10px;}
.success-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px;}
.success-desc{font-size:13px;color:var(--text-muted);line-height:1.6;}

/* 비밀번호 찾기 폼 */
.forgot-form{display:none;}
.forgot-form.show{display:block;}
.back-btn{font-size:13px;color:var(--teal-mid);background:none;border:none;cursor:pointer;font-family:inherit;margin-bottom:16px;display:flex;align-items:center;gap:4px;}

.divider{text-align:center;margin:6px 0 14px;font-size:12px;color:var(--text-light);}
.back-link{text-align:center;margin-top:16px;font-size:13px;color:rgba(255,255,255,0.6);}
.back-link a{color:#fff;font-weight:600;text-decoration:none;}
</style>
</head>
<body>

<a href="/" class="top-logo">
  <div class="tl-icon">LW</div>
  <span class="tl-name">LinguaWalk</span>
</a>

<div class="card">

  <!-- 탭 -->
  <div class="tabs" id="tabs">
    <button class="tab act" id="tab-login" onclick="switchTab('login')">로그인</button>
    <button class="tab" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <!-- 로그인 폼 -->
  <div id="form-login">
    <div class="field">
      <label class="field-label">이메일</label>
      <input type="email" class="form-input" id="login-email" placeholder="example@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label class="field-label">비밀번호</label>
      <div class="pw-wrap">
        <input type="password" class="form-input" id="login-pw" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <button type="button" class="pw-toggle" onclick="togglePw('login-pw',this)">👁</button>
      </div>
    </div>
    <div class="forgot-wrap">
      <button class="forgot" onclick="showForgot()">비밀번호 찾기</button>
    </div>
    <button class="submit-btn" id="login-btn" onclick="doLogin()">로그인</button>
  </div>

  <!-- 회원가입 폼 -->
  <div id="form-signup" style="display:none;">
    <div class="field">
      <label class="field-label">이름</label>
      <input type="text" class="form-input" id="signup-name" placeholder="홍길동">
    </div>
    <div class="field">
      <label class="field-label">이메일</label>
      <input type="email" class="form-input" id="signup-email" placeholder="example@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label class="field-label">비밀번호 (8자 이상)</label>
      <div class="pw-wrap">
        <input type="password" class="form-input" id="signup-pw" placeholder="••••••••" autocomplete="new-password">
        <button type="button" class="pw-toggle" onclick="togglePw('signup-pw',this)">👁</button>
      </div>
    </div>
    <div class="field">
      <label class="field-label">비밀번호 확인</label>
      <input type="password" class="form-input" id="signup-pw2" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter')doSignup()">
    </div>

    <!-- 플랜 선택 -->
    <div class="field">
      <label class="field-label">플랜 선택</label>
      <div class="plan-select">
        <button class="plan-btn act" id="plan-free" onclick="selectPlan('free')">
          <span class="plan-icon">🎓</span>
          <div class="plan-name">Free</div>
          <div class="plan-desc">무료</div>
        </button>
        <button class="plan-btn pro-btn" id="plan-pro" onclick="selectPlan('pro')">
          <span class="plan-icon">⭐</span>
          <div class="plan-name">Pro</div>
          <div class="plan-desc">프리미엄</div>
        </button>
      </div>
    </div>

    <button class="submit-btn" id="signup-btn" onclick="doSignup()">회원가입</button>
  </div>

  <!-- 비밀번호 찾기 -->
  <div class="forgot-form" id="forgot-form">
    <button class="back-btn" onclick="hideForgot()">← 돌아가기</button>
    <div class="field">
      <label class="field-label">가입한 이메일 주소</label>
      <input type="email" class="form-input" id="forgot-email" placeholder="example@email.com">
    </div>
    <button class="submit-btn" onclick="doForgot()">재설정 메일 발송</button>
    <div class="success-box" id="forgot-success">
      <div class="success-icon">📬</div>
      <div class="success-title">메일을 발송했습니다</div>
      <div class="success-desc">입력하신 이메일로 비밀번호 재설정 링크를 보냈습니다. 메일함을 확인해 주세요.</div>
    </div>
  </div>

</div>

<div class="back-link">
  <a href="/">← LinguaWalk 홈으로</a>
</div>

<script type="module">
import { initializeApp }  from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getAuth, onAuthStateChanged,
         signInWithEmailAndPassword,
         createUserWithEmailAndPassword,
         sendPasswordResetEmail }
  from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc }
  from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const app = initializeApp({
  apiKey:            "AIzaSyB3OWQRy6AgDSrtjDXBclFxfV4mqhzWp-w",
  authDomain:        "linguawalk.firebaseapp.com",
  projectId:         "linguawalk",
  storageBucket:     "linguawalk.firebasestorage.app",
  messagingSenderId: "558390764757",
  appId:             "1:558390764757:web:e6b26210045669dc686e5c"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// 이미 로그인된 경우 바로 리디렉트
onAuthStateChanged(auth, async (user) => {
  if (!user) return;
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    const data = snap.exists() ? snap.data() : { role: 'user', plan: 'free' };
    const role = data.role || 'user';
    localStorage.setItem('lw-user', JSON.stringify({
      uid: user.uid, email: user.email,
      name: data.name || user.displayName || '',
      role, plan: data.plan || 'free'
    }));
    if (role === 'admin') location.href = '/admin.html';
    else location.href = '/mypage.html';
  } catch(e) {
    location.href = '/mypage.html';
  }
});

// 전역으로 내보내기
window._fb = { auth, db, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, doc, setDoc, getDoc };
</script>

<script>
var currentPlan = 'free';

function showErr(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 5000);
}
function clearErr() { document.getElementById('error-msg').classList.remove('show'); }

function switchTab(tab) {
  clearErr();
  document.getElementById('tab-login').classList.toggle('act', tab==='login');
  document.getElementById('tab-signup').classList.toggle('act', tab==='signup');
  document.getElementById('form-login').style.display  = tab==='login'  ? '' : 'none';
  document.getElementById('form-signup').style.display = tab==='signup' ? '' : 'none';
  document.getElementById('forgot-form').classList.remove('show');
  document.getElementById('tabs').style.display = '';
}

function togglePw(id, btn) {
  var inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type='text'; btn.textContent='🙈'; }
  else { inp.type='password'; btn.textContent='👁'; }
}

function selectPlan(p) {
  currentPlan = p;
  document.getElementById('plan-free').classList.toggle('act', p==='free');
  document.getElementById('plan-pro').classList.toggle('act', p==='pro');
}

function showForgot() {
  document.getElementById('form-login').style.display = 'none';
  document.getElementById('tabs').style.display = 'none';
  document.getElementById('forgot-form').classList.add('show');
}
function hideForgot() {
  document.getElementById('forgot-form').classList.remove('show');
  document.getElementById('forgot-success').classList.remove('show');
  document.getElementById('tabs').style.display = '';
  document.getElementById('form-login').style.display = '';
}

async function doLogin() {
  clearErr();
  var email = document.getElementById('login-email').value.trim();
  var pw    = document.getElementById('login-pw').value;
  if (!email || !pw) { showErr('이메일과 비밀번호를 입력해 주세요.'); return; }
  var btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = '로그인 중…';
  try {
    await window._fb.signInWithEmailAndPassword(window._fb.auth, email, pw);
    // onAuthStateChanged에서 리디렉트 처리
  } catch(e) {
    var msg = '이메일 또는 비밀번호가 올바르지 않습니다.';
    if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-email') msg = '등록되지 않은 이메일 주소입니다.';
    if (e.code === 'auth/too-many-requests') msg = '로그인 시도가 너무 많습니다. 잠시 후 다시 시도해 주세요.';
    showErr(msg);
    btn.disabled = false; btn.textContent = '로그인';
  }
}

async function doSignup() {
  clearErr();
  var name  = document.getElementById('signup-name').value.trim();
  var email = document.getElementById('signup-email').value.trim();
  var pw    = document.getElementById('signup-pw').value;
  var pw2   = document.getElementById('signup-pw2').value;
  if (!name)  { showErr('이름을 입력해 주세요.'); return; }
  if (!email) { showErr('이메일을 입력해 주세요.'); return; }
  if (pw.length < 8) { showErr('비밀번호는 8자 이상이어야 합니다.'); return; }
  if (pw !== pw2)    { showErr('비밀번호가 일치하지 않습니다.'); return; }
  var btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = '가입 중…';
  try {
    var cred = await window._fb.createUserWithEmailAndPassword(window._fb.auth, email, pw);
    var uid  = cred.user.uid;
    await window._fb.setDoc(window._fb.doc(window._fb.db, 'users', uid), {
      name: name, email: email,
      role: 'user',
      plan: currentPlan,
      createdAt: new Date().toISOString()
    });
    // onAuthStateChanged에서 리디렉트
  } catch(e) {
    var msg2 = '회원가입 중 오류가 발생했습니다.';
    if (e.code === 'auth/email-already-in-use') msg2 = '이미 사용 중인 이메일입니다. 로그인 탭을 이용해 주세요.';
    if (e.code === 'auth/invalid-email')       msg2 = '이메일 형식이 올바르지 않습니다.';
    if (e.code === 'auth/weak-password')       msg2 = '비밀번호가 너무 간단합니다. 8자 이상으로 입력해 주세요.';
    showErr(msg2);
    btn.disabled = false; btn.textContent = '회원가입';
  }
}

async function doForgot() {
  var email = document.getElementById('forgot-email').value.trim();
  if (!email) { showErr('이메일을 입력해 주세요.'); return; }
  try {
    await window._fb.sendPasswordResetEmail(window._fb.auth, email);
    document.getElementById('forgot-success').classList.add('show');
  } catch(e) {
    showErr('이메일 발송에 실패했습니다. 이메일을 다시 확인해 주세요.');
  }
}
</script>
</body>
</html>
