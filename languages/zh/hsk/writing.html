<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — HSK 写作</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --zh:#c0392b;--zh-dark:#7f1a12;--zh-light:#fdf0ef;
  --purple:#7c3aed;--purple-light:#ede9fe;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --green:#16a34a;--green-light:#dcfce7;
  --red:#e24b4a;--red-light:#fee2e2;
  --amber:#b45309;--amber-light:#fef3c7;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:820px;margin:0 auto;padding:28px 5% 80px;}

.hero{background:linear-gradient(135deg,#4c1d95 0%,var(--purple) 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}

/* 파트 탭 */
.part-tabs{display:flex;background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:4px;margin-bottom:16px;gap:3px;}
.ptab{flex:1;padding:9px 8px;border-radius:9px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-family:inherit;transition:all 0.2s;text-align:center;white-space:nowrap;}
.ptab:hover{color:var(--purple);}
.ptab.act{background:var(--purple);color:#fff;}

.part-info{background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px;}
.pi-title{font-size:13px;font-weight:600;color:var(--purple);margin-bottom:6px;}
.pi-desc{font-size:12px;color:var(--text-muted);line-height:1.65;}
.pi-tip{margin-top:8px;padding:8px 12px;background:var(--purple-light);border-radius:8px;font-size:12px;color:var(--purple);}

.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:120px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}

.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--purple);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:#6d28d9;}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}

.loading{padding:40px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:16px;display:none;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

.card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.card-head{padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:600;color:var(--text);}
.card-body{padding:18px;}

/* 어순 배열 (第1部分) */
.arrange-prompt{font-size:15px;color:var(--text);line-height:1.8;padding:14px;background:var(--bg);border-radius:10px;margin-bottom:14px;border-left:3px solid var(--purple);}
.arrange-pinyin{font-size:12px;color:var(--text-muted);font-style:italic;margin-top:4px;}
.word-pool{display:flex;gap:8px;flex-wrap:wrap;padding:14px;background:var(--bg);border-radius:10px;border:1.5px dashed var(--border-md);min-height:52px;margin-bottom:10px;}
.word-chip{padding:6px 14px;border-radius:20px;background:var(--white);border:1.5px solid var(--border-md);font-size:13px;cursor:pointer;transition:all 0.2s;user-select:none;}
.word-chip:hover{border-color:var(--purple);background:var(--purple-light);color:var(--purple);}
.word-chip.placed{opacity:.4;pointer-events:none;}
.sentence-area{min-height:48px;padding:12px 14px;background:var(--white);border-radius:10px;border:1.5px solid var(--border-md);display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
.placed-chip{padding:5px 12px;border-radius:16px;background:var(--purple);color:#fff;font-size:13px;cursor:pointer;transition:all 0.2s;}
.placed-chip:hover{background:#6d28d9;}
.arr-result{padding:10px 14px;border-radius:8px;font-size:13px;display:none;line-height:1.6;margin-top:8px;}
.arr-result.correct{background:var(--green-light);color:#166534;}
.arr-result.wrong{background:var(--red-light);color:#991b1b;}
.arr-improved-pinyin{font-size:11px;font-style:italic;color:var(--teal-mid);margin-top:4px;}
.ctrl-btns{display:flex;gap:8px;}
.ctrl-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);transition:all 0.2s;}
.ctrl-btn.primary{background:var(--purple);color:#fff;border-color:var(--purple);}
.ctrl-btn.primary:hover{background:#6d28d9;}

/* 작문 (第2部分) */
.prompt-box{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:14px;}
.pb-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--purple);margin-bottom:8px;}
.pb-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin-bottom:8px;line-height:1.4;}
.pb-pinyin{font-size:12px;color:var(--zh);font-style:italic;margin-bottom:10px;}
.pb-instruction{font-size:13px;color:var(--text-muted);line-height:1.7;padding:10px 14px;background:var(--bg);border-radius:8px;border-left:3px solid var(--purple);margin-bottom:12px;}
.pb-keywords{display:flex;gap:6px;flex-wrap:wrap;}
.kw-tag{padding:4px 12px;border-radius:16px;font-size:12px;background:var(--amber-light);color:var(--amber);font-weight:500;}
.pb-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.pb-meta-item{font-size:11px;padding:3px 10px;border-radius:8px;background:var(--purple-light);color:var(--purple);font-weight:500;}
.writing-textarea{width:100%;min-height:160px;padding:14px;border:0.5px solid var(--border-md);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);line-height:1.8;resize:vertical;outline:none;background:var(--bg);}
.writing-textarea:focus{border-color:var(--purple);}
.writing-textarea::placeholder{color:var(--text-light);}
.char-bar{height:4px;background:var(--border);border-radius:4px;margin-top:8px;overflow:hidden;}
.char-fill{height:100%;background:linear-gradient(90deg,var(--purple),#a78bfa);border-radius:4px;transition:width 0.3s;}
.word-count{font-size:12px;color:var(--text-muted);margin-top:4px;}
.word-count span{font-weight:700;color:var(--purple);}
.submit-btn{margin-top:12px;width:100%;padding:12px;border-radius:10px;background:var(--purple);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;transition:all 0.2s;}
.submit-btn:hover{background:#6d28d9;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}

/* 피드백 */
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:0.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.score-item{padding:14px 6px;text-align:center;border-right:0.5px solid var(--border);}
.score-item:last-child{border-right:none;}
.score-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--purple);line-height:1;}
.score-label{font-size:9px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.3px;}
.fb-section{padding:12px 0;border-bottom:0.5px solid var(--border);}
.fb-section:last-child{border-bottom:none;}
.fb-label{font-size:11px;font-weight:700;color:var(--text);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.fb-content{font-size:13px;color:var(--text-muted);line-height:1.65;}
.improved-box{background:var(--green-light);border-radius:8px;padding:14px;font-size:13px;color:#166534;line-height:1.85;white-space:pre-line;}
.improved-pinyin{font-size:12px;color:var(--teal-mid);font-style:italic;margin-top:6px;}

/* 점수 */
.score-bar{display:flex;align-items:center;gap:12px;background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:none;}
.sb-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--purple);}
.sb-bar{flex:1;height:6px;background:var(--bg);border-radius:6px;overflow:hidden;}
.sb-fill{height:100%;background:linear-gradient(90deg,#4c1d95,var(--purple));border-radius:6px;transition:width 0.3s;}

.score-card{background:linear-gradient(135deg,#4c1d95,var(--purple));border-radius:14px;padding:24px;text-align:center;margin-bottom:20px;display:none;color:#fff;}
.sc-score{font-family:'DM Serif Display',serif;font-size:52px;line-height:1;margin-bottom:6px;}
.sc-pct{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:10px;}
.sc-msg{font-size:13px;color:#fcd34d;font-weight:500;}

.action-btns{display:flex;gap:10px;display:none;}
.act-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);transition:all 0.2s;text-decoration:none;text-align:center;}
.act-btn.primary{background:var(--purple);color:#fff;border-color:var(--purple);}
.act-btn.primary:hover{background:#6d28d9;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.4s ease forwards;}
</style>
</head>
<body>

<nav>
  <a href="../../index.html" class="nav-logo">
    <div class="nav-lm">LW</div>
    <span class="nav-lt">LinguaWalk</span>
  </a>
  <div class="nav-sep"></div>
  <span class="nav-page">📝 HSK 写作</span>
  <div class="nav-space"></div>
  <a href="index.html" class="nav-back" data-ko="← HSK" data-zh="← HSK">← HSK</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('ko')" id="btn-ko">한국어</button>
    <button class="lbtn" onclick="setLang('zh')" id="btn-zh">中文</button>
  </div>
</nav>

<div class="main fade-in">
  <div class="hero">
    <div class="hero-tag" data-ko="HSK · 写作 연습" data-zh="HSK · 写作练习">HSK · 写作 연습</div>
    <div class="hero-title" data-ko="✍️ HSK 写作 (쓰기)" data-zh="✍️ HSK 写作">✍️ HSK 写作 (쓰기)</div>
    <div class="hero-desc" data-ko="HSK 3~6급 쓰기 영역 완전 대비. 第1部分 어순 배열 + 第2部分 작문으로 구성됩니다." data-zh="HSK 3-6级写作全面备考。第1部分语序排列 + 第2部分写作。">HSK 3~6급 쓰기 영역 — 어순 배열 + 작문</div>
    <div class="hero-badges">
      <span class="hero-badge">HSK 3~6</span>
      <span class="hero-badge" data-ko="第1部分 — 어순 배열" data-zh="第1部分 — 语序排列">第1部分 — 어순 배열</span>
      <span class="hero-badge" data-ko="第2部分 — 작문" data-zh="第2部分 — 写作">第2部分 — 写作</span>
      <span class="hero-badge">拼音</span>
    </div>
  </div>

  <!-- 파트 탭 -->
  <div class="part-tabs">
    <button class="ptab act" onclick="selectPart('arrange',this)" data-ko="🔀 第1部分 어순 배열" data-zh="🔀 第1部分 语序排列">🔀 第1部分 어순 배열</button>
    <button class="ptab" onclick="selectPart('essay',this)" data-ko="✍️ 第2部分 작문" data-zh="✍️ 第2部分 写作">✍️ 第2部分 작문</button>
  </div>

  <div class="part-info" id="part-info"></div>

  <div class="settings-row">
    <div class="setting-item">
      <div class="si-label" data-ko="HSK 급수" data-zh="HSK级别">HSK 급수</div>
      <select class="si-select" id="sel-level">
        <option value="3">HSK 3급 (B1)</option>
        <option value="4" selected>HSK 4급 (B2)</option>
        <option value="5">HSK 5급 (C1)</option>
        <option value="6">HSK 6급 (C2)</option>
      </select>
    </div>
    <div class="setting-item" id="count-wrap">
      <div class="si-label" data-ko="문제 수" data-zh="题目数">문제 수</div>
      <select class="si-select" id="sel-count">
        <option value="3" selected>3</option>
        <option value="5">5</option>
        <option value="8">8</option>
      </select>
    </div>
  </div>

  <button class="gen-btn" id="gen-btn" onclick="generate()">
    🤖 <span data-ko="문제 생성" data-zh="生成题目">문제 생성</span>
  </button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div id="loading-text" style="font-size:14px;color:var(--text-muted);">생성 중...</div>
  </div>

  <div class="score-bar" id="score-bar">
    <div><div class="sb-num" id="sb-num">0 / 0</div><div style="font-size:11px;color:var(--text-muted);" data-ko="정답" data-zh="正确">정답</div></div>
    <div class="sb-bar"><div class="sb-fill" id="sb-fill" style="width:0%"></div></div>
  </div>

  <div id="content-area"></div>

  <div class="score-card" id="score-card">
    <div class="sc-score" id="sc-score"></div>
    <div class="sc-pct" id="sc-pct"></div>
    <div class="sc-msg" id="sc-msg"></div>
  </div>

  <div class="action-btns" id="action-btns">
    <button class="act-btn primary" onclick="generate()" data-ko="🔄 새 문제" data-zh="🔄 新题目">🔄 새 문제</button>
    <a href="index.html" class="act-btn" data-ko="← HSK 홈" data-zh="← HSK首页">← HSK 홈</a>
  </div>
</div>

<script>
let lang='ko', currentPart='arrange';
let isLoading=false, correct=0, answered=0, total=0;

const PART_INFO={
  arrange:{
    ko:'第1部分 — 语序排列: 제시된 단어들을 올바른 어순으로 배열해 완성된 문장을 만드세요. HSK 쓰기의 핵심 유형입니다.',
    zh:'第1部分 — 语序排列: 将给出的词语排列成正确的句子。这是HSK写作的核心题型。',
    tipKo:'💡 중국어 기본 어순: 主语 + 时间/地点状语 + 副词 + 动词 + 宾语. 부사는 반드시 동사 앞에.',
    tipZh:'💡 基本语序: 主语+时间/地点状语+副词+动词+宾语。副词必须在动词前。'
  },
  essay:{
    ko:'第2部分 — 写作: 주어진 사진·단어·주제를 보고 지정된 글자 수로 작문하세요. AI가 채점합니다.',
    zh:'第2部分 — 写作: 根据给出的图片・词语・主题，按指定字数写作。AI评分。',
    tipKo:'💡 서론-본론-결론 구조를 지키고, HSK 급수에 맞는 어휘와 문형을 사용하세요.',
    tipZh:'💡 遵守引言-正文-结语结构，使用符合HSK级别的词汇和句型。'
  }
};

function selectPart(id,btn){
  currentPart=id;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('act'));
  btn.classList.add('act');
  renderPartInfo();
  resetContent();
  document.getElementById('count-wrap').style.display=id==='arrange'?'block':'none';
}

function renderPartInfo(){
  const info=PART_INFO[currentPart];
  document.getElementById('part-info').innerHTML=`
    <div class="pi-title">${lang==='ko'?info.ko.split(':')[0]:info.zh.split(':')[0]}</div>
    <div class="pi-desc">${lang==='ko'?info.ko.split(':').slice(1).join(':'):info.zh.split(':').slice(1).join(':')}</div>
    <div class="pi-tip">${lang==='ko'?info.tipKo:info.tipZh}</div>`;
}

function resetContent(){
  document.getElementById('content-area').innerHTML='';
  document.getElementById('score-card').style.display='none';
  document.getElementById('action-btns').style.display='none';
  document.getElementById('score-bar').style.display='none';
  correct=0; answered=0; total=0;
}

async function callClaude(prompt,maxTok){
  const r=await fetch('/api/claude',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:maxTok||1500,
      messages:[{role:'user',content:prompt}]})});
  const d=await r.json();
  const raw=d.content?.[0]?.text||'';
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

async function generate(){
  if(isLoading) return;
  isLoading=true; resetContent();
  document.getElementById('gen-btn').disabled=true;
  document.getElementById('loading').style.display='block';
  document.getElementById('loading-text').textContent=lang==='ko'?'🤖 문제 생성 중…':'🤖 生成题目中…';
  const level=document.getElementById('sel-level').value;
  const count=parseInt(document.getElementById('sel-count').value)||3;

  try{
    let data;
    if(currentPart==='arrange'){
      data=await callClaude(promptArrange(level,count),1500);
      total=data.sentences.length;
      document.getElementById('loading').style.display='none';
      renderArrange(data.sentences);
      document.getElementById('score-bar').style.display='flex';
    } else {
      data=await callClaude(promptEssay(level),1000);
      document.getElementById('loading').style.display='none';
      renderEssay(data,level);
    }
    updateScore();
    document.getElementById('action-btns').style.display='flex';
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('content-area').innerHTML=`<div style="padding:24px;text-align:center;color:var(--red)">⚠️ ${lang==='ko'?'생성 실패':'生成失败'}<br><small>${e.message}</small></div>`;
    console.error(e);
  }
  isLoading=false;
  document.getElementById('gen-btn').disabled=false;
}

// ── 프롬프트 ─────────────────────────────────────────────────────────
function promptArrange(level,count){
  return `请生成${count}道HSK ${level}级写作第1部分（语序排列）题目。
ONLY return valid JSON (no markdown, single-line strings):
{"sentences":[{"id":1,"words":["词1","词2","词3","词4","词5"],"correct_order":[0,2,1,4,3],"answer":"正确句子","pinyin":"句子拼音","explanation_ko":"어순 해설 (한국어): 왜 이 순서인지"}]}
words数组的词语必须打乱顺序(不能按correct_order排列)。correct_order是words的正确索引。单行字符串。`;
}

function promptEssay(level){
  const charMap={3:'60-80',4:'80-120',5:'120-180',6:'150-250'};
  const chars=charMap[level]||'80-120';
  return `请生成1道HSK ${level}级写作第2部分题目。
ONLY return valid JSON (no markdown, single-line strings):
{"title":"作文题目","title_pinyin":"题目拼音","instruction":"作文要求 (中文1-2句)","keywords":["关键词1","关键词2","关键词3"],"char_limit":"${chars}字","time_limit":"约15分钟","tips":["写作提示1","写作提示2","写作提示3"]}
ALL content in Chinese. Single-line strings.`;
}

// ── 어순 배열 렌더 ────────────────────────────────────────────────────
function renderArrange(sentences){
  const area=document.getElementById('content-area');
  area.innerHTML='';
  sentences.forEach((s,si)=>{
    const card=document.createElement('div'); card.className='card fade-in';
    const head=document.createElement('div'); head.className='card-head';
    head.innerHTML=`<span class="card-title">${lang==='ko'?'第'+(si+1)+'题 — 어순 배열':'第'+(si+1)+'题 — 语序排列'}</span>`;
    const body=document.createElement('div'); body.className='card-body';

    // 섞인 단어
    let placed=[];
    const poolDiv=document.createElement('div'); poolDiv.className='word-pool'; poolDiv.id='pool-'+si;
    const sentDiv=document.createElement('div'); sentDiv.className='sentence-area'; sentDiv.id='sent-'+si;
    const emptyHint=document.createElement('span');
    emptyHint.style.cssText='font-size:12px;color:var(--text-light);';
    emptyHint.textContent=lang==='ko'?'단어를 클릭해서 문장을 완성하세요':'点击词语组成句子';
    sentDiv.appendChild(emptyHint);

    s.words.forEach((w,i)=>{
      const chip=document.createElement('span'); chip.className='word-chip'; chip.textContent=w; chip.id='chip-'+si+'-'+i;
      chip.dataset.origIdx=i;
      chip.addEventListener('click',()=>{
        if(chip.classList.contains('placed')) return;
        chip.classList.add('placed');
        placed.push({w,origIdx:parseInt(chip.dataset.origIdx),chipId:chip.id});
        if(sentDiv.querySelector('span[style]')) sentDiv.querySelector('span[style]').remove();
        const pc=document.createElement('span'); pc.className='placed-chip'; pc.textContent=w;
        pc.addEventListener('click',()=>{
          const idx=placed.findIndex(p=>p.chipId===chip.id);
          if(idx>=0) placed.splice(idx,1);
          pc.remove(); chip.classList.remove('placed');
          if(placed.length===0){ sentDiv.appendChild(emptyHint); }
        });
        sentDiv.appendChild(pc);
      });
      poolDiv.appendChild(chip);
    });

    const resultDiv=document.createElement('div'); resultDiv.className='arr-result'; resultDiv.id='arr-res-'+si;
    const ctrlBtns=document.createElement('div'); ctrlBtns.className='ctrl-btns';
    const checkBtn=document.createElement('button'); checkBtn.className='ctrl-btn primary';
    checkBtn.textContent=lang==='ko'?'확인 →':'确认 →';
    checkBtn.addEventListener('click',()=>{
      if(placed.length!==s.words.length){
        alert(lang==='ko'?'모든 단어를 배열해 주세요.':'请排列所有词语。'); return;
      }
      const userOrder=placed.map(p=>p.origIdx);
      const isOk=JSON.stringify(userOrder)===JSON.stringify(s.correct_order);
      resultDiv.style.display='block';
      resultDiv.className='arr-result '+(isOk?'correct':'wrong');
      resultDiv.innerHTML=`${isOk?'✅':'❌'} ${lang==='ko'?(isOk?'정답!':'오답. 정답:'):(isOk?'正确!':'错误。正确答案:')} <strong>${s.answer}</strong><div class="arr-improved-pinyin">${s.pinyin||''}</div>${!isOk&&s.explanation_ko?`<div style="margin-top:6px;font-size:12px;">${s.explanation_ko}</div>`:''}`;
      checkBtn.disabled=true;
      answered++; if(isOk) correct++;
      updateScore();
      if(answered>=total) setTimeout(showResult,600);
    });
    const resetBtn=document.createElement('button'); resetBtn.className='ctrl-btn';
    resetBtn.textContent=lang==='ko'?'초기화':'重置';
    resetBtn.addEventListener('click',()=>{
      placed=[]; sentDiv.innerHTML=''; sentDiv.appendChild(emptyHint);
      poolDiv.querySelectorAll('.word-chip').forEach(c=>c.classList.remove('placed'));
      resultDiv.style.display='none'; checkBtn.disabled=false;
    });
    ctrlBtns.append(checkBtn,resetBtn);
    const arrangeLabel=document.createElement('div');
    arrangeLabel.style.cssText='font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:8px;';
    arrangeLabel.textContent=lang==='ko'?'단어를 클릭해서 올바른 문장을 만드세요':'点击词语组成正确句子';
    body.append(arrangeLabel,poolDiv,sentDiv,ctrlBtns,resultDiv);
    card.append(head,body);
    area.appendChild(card);
  });
}

// ── 작문 렌더 ─────────────────────────────────────────────────────────
function renderEssay(data,level){
  const area=document.getElementById('content-area');
  area.innerHTML='';
  // 주제 카드
  const promptBox=document.createElement('div'); promptBox.className='prompt-box fade-in';
  promptBox.innerHTML=`
    <div class="pb-label">✍️ 第2部分 — 写作题目</div>
    <div class="pb-title">${data.title}</div>
    <div class="pb-pinyin">${data.title_pinyin||''}</div>
    <div class="pb-instruction">${data.instruction}</div>
    <div class="pb-keywords">${(data.keywords||[]).map(k=>`<span class="kw-tag">📌 ${k}</span>`).join('')}</div>
    <div class="pb-meta">
      <span class="pb-meta-item">📝 ${data.char_limit}</span>
      <span class="pb-meta-item">⏱ ${data.time_limit}</span>
      <span class="pb-meta-item">HSK ${level}</span>
    </div>`;

  // 쓰기 카드
  const writeCard=document.createElement('div'); writeCard.className='card fade-in';
  const wHead=document.createElement('div'); wHead.className='card-head';
  const wTitle=document.createElement('div'); wTitle.className='card-title'; wTitle.textContent='✏️ 请用中文写作';
  const wc=document.createElement('div'); wc.className='word-count'; wc.innerHTML='字数: <span id="cc">0</span>';
  wHead.append(wTitle,wc);
  const wBody=document.createElement('div'); wBody.className='card-body';
  const charTarget=parseInt((data.char_limit||'80-120').split('-')[1]||120);
  const ta=document.createElement('textarea'); ta.className='writing-textarea'; ta.id='essay-area';
  ta.placeholder='在这里用中文写作…';
  ta.addEventListener('input',()=>{
    const cnt=ta.value.replace(/\s/g,'').length;
    document.getElementById('cc').textContent=cnt;
    document.getElementById('char-fill').style.width=Math.min(100,(cnt/charTarget)*100)+'%';
  });
  const charBar=document.createElement('div'); charBar.className='char-bar';
  charBar.innerHTML='<div class="char-fill" id="char-fill" style="width:0%"></div>';
  const submitBtn=document.createElement('button'); submitBtn.className='submit-btn'; submitBtn.id='submit-btn';
  submitBtn.textContent='✓ 提交并获取AI反馈';
  submitBtn.addEventListener('click',()=>submitEssay(data,level));
  wBody.append(ta,charBar,submitBtn);
  writeCard.append(wHead,wBody);

  // 힌트 카드
  const hintCard=document.createElement('div'); hintCard.className='card fade-in';
  hintCard.innerHTML=`<div class="card-head"><div class="card-title">💡 写作提示</div></div>
    <div class="card-body">${(data.tips||[]).map(t=>`<div style="font-size:12px;padding:7px 12px;background:var(--purple-light);color:var(--purple);border-radius:8px;margin-bottom:6px;line-height:1.5;">💡 ${t}</div>`).join('')}</div>`;

  const fbSection=document.createElement('div'); fbSection.id='feedback-section';
  area.append(promptBox,writeCard,hintCard,fbSection);
  total=1;
}

async function submitEssay(promptData,level){
  const text=document.getElementById('essay-area').value.trim();
  if(text.replace(/\s/g,'').length<5){
    alert(lang==='ko'?'최소 5자 이상 중국어로 작성해 주세요.':'请至少用5个中文字写作。'); return;
  }
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;
  btn.textContent=lang==='ko'?'⏳ AI 피드백 생성 중...':'⏳ 生成AI反馈中...';
  const fb=document.getElementById('feedback-section');
  fb.innerHTML=`<div style="text-align:center;padding:24px;background:var(--white);border:0.5px solid var(--border);border-radius:14px;"><div style="font-size:24px;margin-bottom:8px;">⏳</div><div style="font-size:14px;color:var(--text-muted);">${lang==='ko'?'AI 채점 중…':'AI评分中…'}</div></div>`;

  const prompt=`你是HSK ${level}级写作评分老师，请评估以下作文。
题目: "${promptData.title}"
要求: "${promptData.instruction}"
学生作文: "${text}"
ONLY return valid JSON (no markdown, single-line strings):
{"overall_score":7,"content_score":7,"language_score":7,"structure_score":7,"vocab_score":7,"strengths_zh":"优点(中文)","grammar_zh":"语法反馈(中文)","vocab_zh":"词汇反馈(中文)","structure_zh":"结构反馈(中文)","improved_zh":"改善后全文(中文)","improved_pinyin":"改善后拼音"}
10分满分，鼓励语气。`;

  try{
    const res=await fetch('/api/claude',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1200,
        messages:[{role:'user',content:prompt}]})});
    const d=await res.json();
    const raw=d.content?.[0]?.text||'';
    const r=JSON.parse(raw.replace(/```json|```/g,'').trim());
    fb.innerHTML=`
      <div class="card fade-in">
        <div class="card-head"><span class="card-title">🤖 AI反馈</span></div>
        <div class="card-body">
          <div class="score-grid">
            <div class="score-item"><div class="score-num">${r.overall_score}</div><div class="score-label">${lang==='ko'?'총합':'总分'}</div></div>
            <div class="score-item"><div class="score-num">${r.content_score}</div><div class="score-label">${lang==='ko'?'내용':'内容'}</div></div>
            <div class="score-item"><div class="score-num">${r.language_score}</div><div class="score-label">${lang==='ko'?'언어':'语言'}</div></div>
            <div class="score-item"><div class="score-num">${r.structure_score}</div><div class="score-label">${lang==='ko'?'구조':'结构'}</div></div>
            <div class="score-item"><div class="score-num">${r.vocab_score}</div><div class="score-label">${lang==='ko'?'어휘':'词汇'}</div></div>
          </div>
          <div style="padding:0;">
            <div class="fb-section"><div class="fb-label">✅ ${lang==='ko'?'잘한 점':'优点'}</div><div class="fb-content">${r.strengths_zh}</div></div>
            <div class="fb-section"><div class="fb-label">📝 ${lang==='ko'?'문법':'语法'}</div><div class="fb-content">${r.grammar_zh}</div></div>
            <div class="fb-section"><div class="fb-label">📚 ${lang==='ko'?'어휘':'词汇'}</div><div class="fb-content">${r.vocab_zh}</div></div>
            <div class="fb-section"><div class="fb-label">🏗 ${lang==='ko'?'구조':'结构'}</div><div class="fb-content">${r.structure_zh}</div></div>
            <div class="fb-section">
              <div class="fb-label">✨ ${lang==='ko'?'개선된 작문':'改善后的作文'}</div>
              <div class="improved-box">${r.improved_zh}</div>
              <div class="improved-pinyin">${r.improved_pinyin||''}</div>
            </div>
          </div>
        </div>
      </div>`;
    answered=1; correct=Math.round(r.overall_score/10);
    updateScore();
  }catch(e){
    fb.innerHTML=`<div style="padding:16px;color:var(--red)">⚠️ ${lang==='ko'?'피드백 생성 실패':'反馈生成失败'}</div>`;
    console.error(e);
  }
  btn.disabled=false;
  btn.textContent='✓ 提交并获取AI反馈';
}

function updateScore(){
  const fill=document.getElementById('sb-fill');
  const num=document.getElementById('sb-num');
  if(fill) fill.style.width=`${total>0?(answered/total)*100:0}%`;
  if(num) num.textContent=`${correct} / ${total}`;
}

function showResult(){
  const pct=Math.round(correct/total*100);
  const sc=document.getElementById('score-card'); sc.style.display='block';
  document.getElementById('sc-score').textContent=`${correct}/${total}`;
  document.getElementById('sc-pct').textContent=`${pct}%`;
  document.getElementById('sc-msg').textContent=
    pct>=80?(lang==='ko'?'🎉 훌륭합니다!':'🎉 太棒了！'):
    pct>=60?(lang==='ko'?'👍 잘 하셨습니다!':'👍 做得不错！'):
    (lang==='ko'?'💪 계속 연습!':'💪 继续加油！');
  sc.scrollIntoView({behavior:'smooth',block:'center'});
}

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-ko][data-zh]').forEach(el=>{
    const t=l==='ko'?el.getAttribute('data-ko'):el.getAttribute('data-zh');
    if(t) el.innerHTML=t;
  });
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  document.getElementById('btn-zh').classList.toggle('act',l==='zh');
  renderPartInfo();
}

(function(){
  setLang('ko');
  renderPartInfo();
  const lv=new URLSearchParams(location.search).get('level');
  if(lv&&['3','4','5','6'].includes(lv)) document.getElementById('sel-level').value=lv;
})();
</script>
