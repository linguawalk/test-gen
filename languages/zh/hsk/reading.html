<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — HSK 阅读</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --zh:#c0392b;--zh-dark:#7f1a12;--zh-light:#fdf0ef;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --green:#16a34a;--green-light:#dcfce7;
  --red:#e24b4a;--red-light:#fee2e2;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:860px;margin:0 auto;padding:28px 5% 80px;}

.hero{background:linear-gradient(135deg,var(--zh-dark) 0%,var(--zh) 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.h-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}

.part-tabs{display:flex;background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:4px;margin-bottom:16px;gap:3px;}
.ptab{flex:1;padding:9px 8px;border-radius:9px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-family:inherit;transition:all 0.2s;text-align:center;white-space:nowrap;}
.ptab:hover{color:var(--zh);}
.ptab.act{background:var(--zh);color:#fff;}

.part-info{background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px;}
.pi-title{font-size:13px;font-weight:600;color:var(--zh);margin-bottom:6px;}
.pi-desc{font-size:12px;color:var(--text-muted);line-height:1.65;}
.pi-tip{margin-top:8px;padding:8px 12px;background:var(--zh-light);border-radius:8px;font-size:12px;color:var(--zh);}

.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:120px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}

.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--zh);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:var(--zh-dark);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}

.loading{padding:40px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:16px;display:none;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--zh);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

.card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.card-head{padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-title{font-size:13px;font-weight:600;color:var(--text);}
.card-body{padding:18px;}

/* 문장 배열 */
.arrange-area{margin-bottom:14px;}
.arrange-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:8px;}
.word-pool{display:flex;gap:8px;flex-wrap:wrap;padding:14px;background:var(--bg);border-radius:10px;border:0.5px dashed var(--border-md);min-height:52px;margin-bottom:10px;}
.word-chip{padding:6px 14px;border-radius:20px;background:var(--white);border:1.5px solid var(--border-md);font-size:13px;cursor:pointer;transition:all 0.2s;user-select:none;}
.word-chip:hover{border-color:var(--zh);background:var(--zh-light);color:var(--zh);}
.word-chip.placed{background:var(--zh-light);border-color:var(--zh);color:var(--zh);}
.sentence-area{min-height:48px;padding:12px 14px;background:var(--white);border-radius:10px;border:1.5px solid var(--border-md);display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.placed-chip{padding:5px 12px;border-radius:16px;background:var(--zh);color:#fff;font-size:13px;cursor:pointer;transition:all 0.2s;}
.placed-chip:hover{background:var(--zh-dark);}
.arrange-btns{display:flex;gap:8px;margin-top:10px;}
.arr-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);transition:all 0.2s;}
.arr-btn.primary{background:var(--zh);color:#fff;border-color:var(--zh);}
.arr-result{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px;display:none;line-height:1.6;}
.arr-result.correct{background:var(--green-light);color:#166534;}
.arr-result.wrong{background:var(--red-light);color:#991b1b;}

/* 拼音 토글 */
.pinyin-toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.toggle-btn{padding:4px 14px;border-radius:16px;font-size:11px;font-weight:600;border:0.5px solid var(--border-md);background:transparent;cursor:pointer;font-family:inherit;transition:all 0.2s;color:var(--text-muted);}
.toggle-btn.act{background:var(--zh);color:#fff;border-color:var(--zh);}
.passage-body{font-size:15px;line-height:2.4;color:var(--text);white-space:pre-line;}
.char-ruby{display:inline-flex;flex-direction:column;align-items:center;margin:0 1px;}
.char-pinyin{font-size:10px;color:var(--zh);line-height:1.2;font-style:italic;opacity:0;transition:opacity 0.2s;}
.char-pinyin.show{opacity:1;}
.char-hanzi{font-size:15px;line-height:1.4;}

/* 문제 */
.q-item{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px;}
.q-item:last-child{margin-bottom:0;}
.q-num{font-size:10px;font-weight:700;color:var(--zh);letter-spacing:.5px;margin-bottom:6px;}
.q-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.6;}
.q-opts{display:flex;flex-direction:column;gap:6px;}
.q-opt{padding:9px 14px;border-radius:8px;border:1.5px solid var(--border-md);background:var(--white);cursor:pointer;font-size:13px;color:var(--text);transition:all 0.2s;text-align:left;font-family:inherit;display:flex;align-items:center;gap:10px;line-height:1.5;}
.q-opt:hover:not(:disabled){border-color:var(--zh);background:var(--zh-light);}
.q-opt.correct{border-color:var(--green);background:var(--green-light);color:#166534;font-weight:500;}
.q-opt.wrong{border-color:var(--red);background:var(--red-light);color:#991b1b;}
.q-opt-ltr{width:24px;height:24px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-muted);flex-shrink:0;}
.q-opt.correct .q-opt-ltr{background:var(--green);color:#fff;}
.q-opt.wrong .q-opt-ltr{background:var(--red);color:#fff;}
.q-feedback{margin-top:8px;font-size:12px;padding:8px 12px;border-radius:7px;display:none;line-height:1.5;}
.q-feedback.show.correct{display:block;background:var(--green-light);color:#166534;}
.q-feedback.show.wrong{display:block;background:var(--red-light);color:#991b1b;}

/* 빈칸 채우기 */
.fill-sentence{font-size:16px;line-height:2.2;color:var(--text);margin-bottom:14px;padding:12px 14px;background:var(--bg);border-radius:10px;}
.blank{display:inline-block;width:72px;border-bottom:2px solid var(--zh);text-align:center;vertical-align:middle;color:var(--zh);font-weight:700;margin:0 4px;}

/* 점수 */
.score-bar{display:flex;align-items:center;gap:12px;background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:none;}
.sb-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--zh);}
.sb-bar{flex:1;height:6px;background:var(--bg);border-radius:6px;overflow:hidden;}
.sb-fill{height:100%;background:linear-gradient(90deg,var(--zh-dark),var(--zh));border-radius:6px;transition:width 0.3s;}
.score-card{background:linear-gradient(135deg,var(--zh-dark),var(--zh));border-radius:14px;padding:24px;text-align:center;margin-bottom:20px;display:none;color:#fff;}
.sc-score{font-family:'DM Serif Display',serif;font-size:52px;line-height:1;margin-bottom:6px;}
.sc-pct{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:10px;}
.sc-msg{font-size:13px;color:#fcd34d;font-weight:500;}
.action-btns{display:flex;gap:10px;display:none;}
.act-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);transition:all 0.2s;text-decoration:none;text-align:center;}
.act-btn.primary{background:var(--zh);color:#fff;border-color:var(--zh);}
.act-btn.primary:hover{background:var(--zh-dark);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.4s ease forwards;}
</style>
</head>
<body>

<nav>
  <a href="../../index.html" class="nav-logo">
    <div class="nav-lm">LW</div>
    <span class="nav-lt">LinguaWalk</span>
  </a>
  <div class="nav-sep"></div>
  <span class="nav-page">📝 HSK 阅读</span>
  <div class="nav-space"></div>
  <a href="index.html" class="nav-back" data-ko="← HSK" data-zh="← HSK">← HSK</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('ko')" id="btn-ko">한국어</button>
    <button class="lbtn" onclick="setLang('zh')" id="btn-zh">中文</button>
  </div>
</nav>

<div class="main fade-in">
  <div class="hero">
    <div class="hero-tag" data-ko="HSK · 阅读 연습" data-zh="HSK · 阅读练习">HSK · 阅读 연습</div>
    <div class="hero-title" data-ko="📖 HSK 阅读" data-zh="📖 HSK 阅读">📖 HSK 阅读</div>
    <div class="hero-desc" data-ko="词汇·语法 → 句子排列 → 阅读理解 3단계로 HSK 阅读 영역을 완전 대비하세요." data-zh="词汇·语法 → 句子排列 → 阅读理解三步，完全备考HSK阅读。">词汇·语法 → 句子排列 → 阅读理解 3단계 완전 대비</div>
    <div class="hero-badges">
      <span class="h-badge">HSK 1~6</span>
      <span class="h-badge" data-ko="词汇·语法" data-zh="词汇·语法">词汇·语法</span>
      <span class="h-badge" data-ko="句子排列" data-zh="句子排列">句子排列</span>
      <span class="h-badge" data-ko="阅读理解" data-zh="阅读理解">阅读理解</span>
      <span class="h-badge">拼音</span>
    </div>
  </div>

  <div class="part-tabs">
    <button class="ptab act" onclick="selectPart('vocab',this)" data-ko="📚 词汇·语法" data-zh="📚 词汇·语法">📚 词汇·语法</button>
    <button class="ptab" onclick="selectPart('arrange',this)" data-ko="🔀 句子排列" data-zh="🔀 句子排列">🔀 句子排列</button>
    <button class="ptab" onclick="selectPart('reading-s',this)" data-ko="📄 短文阅读" data-zh="📄 短文阅读">📄 短文阅读</button>
    <button class="ptab" onclick="selectPart('reading-l',this)" data-ko="📃 长文阅读" data-zh="📃 长文阅读">📃 长文阅读</button>
  </div>

  <div class="part-info" id="part-info"></div>

  <div class="settings-row">
    <div class="setting-item">
      <div class="si-label" data-ko="HSK 급수" data-zh="HSK级别">HSK 급수</div>
      <select class="si-select" id="sel-level">
        <option value="1">HSK 1급 (A1)</option>
        <option value="2">HSK 2급 (A2)</option>
        <option value="3">HSK 3급 (B1)</option>
        <option value="4" selected>HSK 4급 (B2)</option>
        <option value="5">HSK 5급 (C1)</option>
        <option value="6">HSK 6급 (C2)</option>
      </select>
    </div>
    <div class="setting-item" id="q-count-wrap">
      <div class="si-label" data-ko="문제 수" data-zh="题目数">문제 수</div>
      <select class="si-select" id="sel-count">
        <option value="5" selected>5</option>
        <option value="8">8</option>
        <option value="10">10</option>
      </select>
    </div>
  </div>

  <button class="gen-btn" id="gen-btn" onclick="generate()">
    🤖 <span data-ko="문제 생성" data-zh="生成题目">문제 생성</span>
  </button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div id="loading-text" style="font-size:14px;color:var(--text-muted);">생성 중...</div>
  </div>

  <div class="score-bar" id="score-bar">
    <div><div class="sb-num" id="sb-num">0 / 0</div><div style="font-size:11px;color:var(--text-muted);" data-ko="정답" data-zh="正确">정답</div></div>
    <div class="sb-bar"><div class="sb-fill" id="sb-fill" style="width:0%"></div></div>
  </div>

  <div id="content-area"></div>

  <div class="score-card" id="score-card">
    <div class="sc-score" id="sc-score"></div>
    <div class="sc-pct" id="sc-pct"></div>
    <div class="sc-msg" id="sc-msg"></div>
  </div>

  <div class="action-btns" id="action-btns">
    <button class="act-btn primary" onclick="generate()" data-ko="🔄 새 문제" data-zh="🔄 新题目">🔄 새 문제</button>
    <a href="index.html" class="act-btn" data-ko="← HSK 홈" data-zh="← HSK首页">← HSK 홈</a>
  </div>
</div>

<script>
let lang='ko', currentPart='vocab';
let isLoading=false, correct=0, answered=0, total=0;
let showPinyin=false;
const LETTERS=['A','B','C','D'];

const PART_INFO={
  vocab:{
    ko:'词汇·语法: 빈칸에 알맞은 단어·어법 항목을 선택하는 문제입니다. HSK 급수별 필수 어휘 포함.',
    zh:'词汇·语法: 选择填入空格的正确词语或语法项目。含各级别必备词汇。',
    tipKo:'💡 앞뒤 문맥을 보고 품사와 의미를 파악하세요.',
    tipZh:'💡 结合上下文判断词性和含义。'
  },
  arrange:{
    ko:'句子排列: 제시된 단어들을 올바른 순서로 배열하여 완성된 문장을 만드세요.',
    zh:'句子排列: 将给出的词语排列成正确的句子顺序。',
    tipKo:'💡 중국어 어순 기본: 主语 + 状语 + 动词 + 宾语. 时间·地点 부사어가 동사 앞에 옵니다.',
    tipZh:'💡 中文基本语序: 主语+状语+动词+宾语。时间・地点状语放在动词前。'
  },
  'reading-s':{
    ko:'短文阅读: 짧은 지문(50~150字)을 읽고 내용을 이해하는 문제입니다.',
    zh:'短文阅读: 阅读短文（50~150字），理解文章内容。',
    tipKo:'💡 질문을 먼저 읽고 핵심 정보(육하원칙)를 찾으세요.',
    tipZh:'💡 先读问题，找关键信息（五个W一个H）。'
  },
  'reading-l':{
    ko:'长文阅读: 긴 지문(150~400字)을 읽고 주제·세부내용·추론 문제에 답합니다.',
    zh:'长文阅读: 阅读长文（150~400字），回答主旨・细节・推断题。',
    tipKo:'💡 단락별 주제문을 파악하세요. 첫 문장과 마지막 문장이 핵심인 경우가 많습니다.',
    tipZh:'💡 把握每段主题句。第一句和最后一句通常是关键。'
  }
};

function selectPart(id,btn){
  currentPart=id;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('act'));
  btn.classList.add('act');
  renderPartInfo();
  resetContent();
  const qw=document.getElementById('q-count-wrap');
  qw.style.display=(id==='reading-s'||id==='reading-l'||id==='arrange')?'none':'block';
}

function renderPartInfo(){
  const info=PART_INFO[currentPart];
  document.getElementById('part-info').innerHTML=`
    <div class="pi-title">${lang==='ko'?info.ko.split(':')[0]:info.zh.split(':')[0]}</div>
    <div class="pi-desc">${lang==='ko'?info.ko.split(':').slice(1).join(':'):info.zh.split(':').slice(1).join(':')}</div>
    <div class="pi-tip">${lang==='ko'?info.tipKo:info.tipZh}</div>`;
}

function resetContent(){
  document.getElementById('content-area').innerHTML='';
  document.getElementById('score-card').style.display='none';
  document.getElementById('action-btns').style.display='none';
  document.getElementById('score-bar').style.display='none';
  correct=0; answered=0; total=0; showPinyin=false;
}

async function callClaude(prompt,maxTok){
  const r=await fetch('/api/claude',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:maxTok||1500,
      messages:[{role:'user',content:prompt}]})});
  const d=await r.json();
  const raw=d.content?.[0]?.text||'';
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

async function generate(){
  if(isLoading) return;
  isLoading=true; resetContent();
  document.getElementById('gen-btn').disabled=true;
  document.getElementById('loading').style.display='block';
  const level=document.getElementById('sel-level').value;
  const count=parseInt(document.getElementById('sel-count').value)||5;

  try{
    let data;
    if(currentPart==='vocab'){
      data=await callClaude(promptVocab(level,count),1500);
      total=data.items.length;
      document.getElementById('loading').style.display='none';
      renderVocab(data.items);
    } else if(currentPart==='arrange'){
      data=await callClaude(promptArrange(level),1000);
      total=data.sentences.length;
      document.getElementById('loading').style.display='none';
      renderArrange(data.sentences);
    } else {
      data=await callClaude(promptReading(level,currentPart),2000);
      total=data.questions.length;
      document.getElementById('loading').style.display='none';
      renderReading(data);
    }
    document.getElementById('score-bar').style.display='flex';
    updateScore();
    document.getElementById('action-btns').style.display='flex';
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('content-area').innerHTML=`<div style="padding:24px;text-align:center;color:var(--red)">⚠️ ${lang==='ko'?'생성 실패':'生成失败'}<br><small>${e.message}</small></div>`;
    console.error(e);
  }
  isLoading=false;
  document.getElementById('gen-btn').disabled=false;
}

// ── 프롬프트 ─────────────────────────────────────────────────────────
function promptVocab(level,count){
  return `请生成${count}道HSK ${level}级阅读第1部分（词汇·语法填空）题目。
ONLY return valid JSON (no markdown, single-line strings):
{"items":[{"id":1,"sentence":"带___空格的中文句子","choices":["A. 词语","B. 词语","C. 词语","D. 词语"],"answer":0,"explanation_ko":"왜 A가 정답인지 한국어 해설"}]}
HSK ${level}级词汇。句子用___表示空格。answer 0-based，位置不同。4个选项。单行字符串。`;
}

function promptArrange(level){
  return `请生成3道HSK ${level}级阅读第2部分（句子排列）题目。
ONLY return valid JSON (no markdown, single-line strings):
{"sentences":[{"id":1,"words":["词1","词2","词3","词4","词5"],"correct_order":[0,1,2,3,4],"answer":"正确的句子","pinyin":"句子拼音","explanation_ko":"어순 해설 한국어"}]}
words里的词语打乱顺序。correct_order是words数组的正确索引顺序。单行字符串。`;
}

function promptReading(level,type){
  const isShort=type==='reading-s';
  const chars={short:{1:'40-70',2:'60-90',3:'80-120',4:'100-160',5:'140-200',6:'180-260'},
                long:{3:'150-220',4:'200-300',5:'280-400',6:'350-500'}}[isShort?'short':'long'][level]||'100-200';
  const qCount=isShort?3:4;
  return `请生成1套HSK ${level}级${isShort?'短文':'长文'}阅读题目。字数: ${chars}字。
ONLY return valid JSON (no markdown, single-line strings):
{"title":"文章标题","level":"${level}","char_count":150,"passage":"中文文章 (一行)","passage_pinyin":"全文拼音 (空格分词)","questions":[{"id":1,"text":"问题","choices":["A. 选项","B. 选项","C. 选项","D. 选项"],"answer":0,"explanation_ko":"한국어 해설"}]}
包含${qCount}道问题。HSK ${level}级自然中文。answer 0-based，位置不同。单行字符串。`;
}

// ── 词汇·语法 렌더 ────────────────────────────────────────────────────
function renderVocab(items){
  const card=document.createElement('div'); card.className='card fade-in';
  const head=document.createElement('div'); head.className='card-head';
  head.innerHTML=`<span class="card-title">${lang==='ko'?'词汇·语法 문제':'词汇·语法题'} (${items.length}${lang==='ko'?'문제':'题'})</span>`;
  const body=document.createElement('div'); body.className='card-body';
  items.forEach(item=>{
    const qDiv=document.createElement('div'); qDiv.className='q-item';
    const qNum=document.createElement('div'); qNum.className='q-num'; qNum.textContent='第'+item.id+'题';
    const sentence=document.createElement('div'); sentence.className='fill-sentence';
    sentence.innerHTML=item.sentence.replace('___','<span class="blank">（　）</span>');
    const opts=document.createElement('div'); opts.className='q-opts';
    item.choices.forEach((c,i)=>{
      const btn=document.createElement('button'); btn.className='q-opt';
      btn.innerHTML=`<span class="q-opt-ltr">${LETTERS[i]}</span><span>${c}</span>`;
      btn.addEventListener('click',()=>answerQ(item.id,i,btn,item.answer,item.explanation_ko,opts));
      opts.appendChild(btn);
    });
    const fb=document.createElement('div'); fb.className='q-feedback'; fb.id='fb-v-'+item.id;
    qDiv.append(qNum,sentence,opts,fb);
    body.appendChild(qDiv);
  });
  card.append(head,body);
  document.getElementById('content-area').appendChild(card);
}

// ── 句子排列 렌더 ────────────────────────────────────────────────────
function renderArrange(sentences){
  const area=document.getElementById('content-area');
  sentences.forEach((s,si)=>{
    const card=document.createElement('div'); card.className='card fade-in';
    const head=document.createElement('div'); head.className='card-head';
    head.innerHTML=`<span class="card-title">${lang==='ko'?'第'+s.id+'题 — 문장 배열':'第'+s.id+'题 — 句子排列'}</span>`;
    const body=document.createElement('div'); body.className='card-body';
    // 섞인 단어들
    const shuffled=[...s.words].map((w,i)=>({w,origIdx:i})).sort(()=>Math.random()-.5);
    let placed=[];
    const poolDiv=document.createElement('div'); poolDiv.className='word-pool';
    poolDiv.id='pool-'+si;
    const sentDiv=document.createElement('div'); sentDiv.className='sentence-area';
    sentDiv.id='sent-'+si;
    // 단어 칩 생성
    shuffled.forEach((item,i)=>{
      const chip=document.createElement('span'); chip.className='word-chip'; chip.textContent=item.w;
      chip.dataset.idx=item.origIdx; chip.id='chip-'+si+'-'+i;
      chip.addEventListener('click',()=>{
        if(chip.classList.contains('placed')) return;
        chip.classList.add('placed');
        placed.push({w:item.w,origIdx:item.origIdx,chipId:chip.id});
        const pc=document.createElement('span'); pc.className='placed-chip'; pc.textContent=item.w;
        pc.addEventListener('click',()=>{
          const idx=placed.findIndex(p=>p.chipId===chip.id);
          if(idx>=0) placed.splice(idx,1);
          pc.remove();
          chip.classList.remove('placed');
        });
        sentDiv.appendChild(pc);
      });
      poolDiv.appendChild(chip);
    });
    const resultDiv=document.createElement('div'); resultDiv.className='arr-result'; resultDiv.id='arr-res-'+si;
    const btns=document.createElement('div'); btns.className='arrange-btns';
    const checkBtn=document.createElement('button'); checkBtn.className='arr-btn primary';
    checkBtn.textContent=lang==='ko'?'확인 →':'确认 →';
    checkBtn.addEventListener('click',()=>{
      if(placed.length!==s.words.length){
        alert(lang==='ko'?'모든 단어를 배열해 주세요.':'请排列所有词语。'); return;
      }
      const userOrder=placed.map(p=>p.origIdx);
      const isOk=JSON.stringify(userOrder)===JSON.stringify(s.correct_order);
      resultDiv.style.display='block';
      resultDiv.className='arr-result '+(isOk?'correct':'wrong');
      resultDiv.innerHTML=isOk
        ?`✅ ${lang==='ko'?'정답':'正确'}! <strong>${s.answer}</strong><br><span style="font-size:11px;font-style:italic;color:var(--teal-mid);">${s.pinyin||''}</span>`
        :`❌ ${lang==='ko'?'오답. 정답:':'错误。正确答案:'} <strong>${s.answer}</strong><br><span style="font-size:11px;font-style:italic;color:var(--teal-mid);">${s.pinyin||''}</span><br><small>${s.explanation_ko||''}</small>`;
      checkBtn.disabled=true;
      answered++; if(isOk) correct++;
      updateScore();
      if(answered>=total) setTimeout(showResult,600);
    });
    const resetBtn=document.createElement('button'); resetBtn.className='arr-btn';
    resetBtn.textContent=lang==='ko'?'초기화':'重置';
    resetBtn.addEventListener('click',()=>{
      placed=[]; sentDiv.innerHTML='';
      poolDiv.querySelectorAll('.word-chip').forEach(c=>c.classList.remove('placed'));
      resultDiv.style.display='none'; checkBtn.disabled=false;
    });
    btns.append(checkBtn,resetBtn);
    const arrangeLabel=document.createElement('div'); arrangeLabel.className='arrange-label';
    arrangeLabel.textContent=lang==='ko'?'단어를 클릭해서 문장을 완성하세요':'点击词语组成句子';
    body.append(arrangeLabel,poolDiv,sentDiv,btns,resultDiv);
    card.append(head,body);
    area.appendChild(card);
  });
}

// ── 阅读理解 렌더 ─────────────────────────────────────────────────────
function renderReading(data){
  const area=document.getElementById('content-area');
  // 지문 카드
  const passCard=document.createElement('div'); passCard.className='card fade-in';
  const pHead=document.createElement('div'); pHead.className='card-head';
  pHead.innerHTML=`
    <span class="card-title">${lang==='ko'?'읽기 지문':'阅读文章'}</span>
    <div style="display:flex;gap:6px;align-items:center;">
      <span style="font-size:11px;padding:3px 10px;border-radius:8px;background:var(--zh-light);color:var(--zh);font-weight:600;">HSK ${data.level}</span>
      <span style="font-size:11px;padding:3px 10px;border-radius:8px;background:var(--bg);color:var(--text-muted);border:0.5px solid var(--border);">~${data.char_count}字</span>
    </div>`;
  const pBody=document.createElement('div'); pBody.className='card-body';
  const titleEl=document.createElement('div');
  titleEl.style.cssText='font-family:"DM Serif Display",serif;font-size:20px;color:var(--text);margin-bottom:12px;';
  titleEl.textContent=data.title;
  // 拼音 토글
  const pinyinRow=document.createElement('div'); pinyinRow.className='pinyin-toggle-row';
  const pinyinLabel=document.createElement('span'); pinyinLabel.style.cssText='font-size:12px;color:var(--text-muted);';
  pinyinLabel.textContent=lang==='ko'?'拼音 표시:':'显示拼音:';
  const pinyinBtn=document.createElement('button'); pinyinBtn.className='toggle-btn'; pinyinBtn.id='pinyin-toggle';
  pinyinBtn.textContent=lang==='ko'?'拼音 OFF':'拼音 关';
  pinyinBtn.addEventListener('click',()=>{
    showPinyin=!showPinyin;
    document.querySelectorAll('.char-pinyin').forEach(el=>el.classList.toggle('show',showPinyin));
    pinyinBtn.classList.toggle('act',showPinyin);
    pinyinBtn.textContent=showPinyin?(lang==='ko'?'拼音 ON':'拼音 开'):(lang==='ko'?'拼音 OFF':'拼音 关');
  });
  pinyinRow.append(pinyinLabel,pinyinBtn);
  // 지문 — 문자별 拼音
  const passageEl=document.createElement('div'); passageEl.className='passage-body';
  const pinyins=(data.passage_pinyin||'').split(' ');
  let pIdx=0;
  data.passage.split('').forEach(ch=>{
    if(ch===' '||ch==='\n'){ passageEl.appendChild(document.createTextNode(ch)); }
    else{
      const wrap=document.createElement('span'); wrap.className='char-ruby';
      const py=document.createElement('span'); py.className='char-pinyin'; py.textContent=pinyins[pIdx]||'';
      const hz=document.createElement('span'); hz.className='char-hanzi'; hz.textContent=ch;
      wrap.append(py,hz); passageEl.appendChild(wrap); pIdx++;
    }
  });
  pBody.append(titleEl,pinyinRow,passageEl);
  passCard.append(pHead,pBody);
  // 문제 카드
  const qCard=document.createElement('div'); qCard.className='card fade-in';
  const qHead=document.createElement('div'); qHead.className='card-head';
  qHead.innerHTML=`<span class="card-title">${lang==='ko'?'이해도 문제':'理解度测验'} (${data.questions.length}${lang==='ko'?'문제':'题'})</span>`;
  const qBody=document.createElement('div'); qBody.className='card-body';
  data.questions.forEach((q,i)=>{
    const qDiv=document.createElement('div'); qDiv.className='q-item';
    const qNum=document.createElement('div'); qNum.className='q-num'; qNum.textContent='第'+(i+1)+'题';
    const qTxt=document.createElement('div'); qTxt.className='q-text'; qTxt.textContent=q.text;
    const opts=document.createElement('div'); opts.className='q-opts';
    q.choices.forEach((c,ci)=>{
      const btn=document.createElement('button'); btn.className='q-opt';
      btn.innerHTML=`<span class="q-opt-ltr">${LETTERS[ci]}</span><span>${c}</span>`;
      btn.addEventListener('click',()=>answerQ(q.id,ci,btn,q.answer,q.explanation_ko,opts));
      opts.appendChild(btn);
    });
    const fb=document.createElement('div'); fb.className='q-feedback'; fb.id='fb-r-'+q.id;
    qDiv.append(qNum,qTxt,opts,fb); qBody.appendChild(qDiv);
  });
  qCard.append(qHead,qBody);
  area.append(passCard,qCard);
}

// ── 공통 ─────────────────────────────────────────────────────────────
function answerQ(qId,idx,btn,answer,expl,optsEl){
  const opts=optsEl?.querySelectorAll('.q-opt'); if(!opts||opts[0]?.disabled) return;
  opts.forEach(b=>b.disabled=true);
  opts[answer].classList.add('correct');
  if(idx!==answer) btn.classList.add('wrong');
  const qItem=btn.closest('.q-item');
  const fb=qItem?.querySelector('.q-feedback');
  if(fb){ fb.textContent=expl||''; fb.className='q-feedback show '+(idx===answer?'correct':'wrong'); }
  answered++; if(idx===answer) correct++;
  updateScore();
  if(answered>=total) setTimeout(showResult,600);
}

function updateScore(){
  const fill=document.getElementById('sb-fill');
  const num=document.getElementById('sb-num');
  if(fill) fill.style.width=`${total>0?(answered/total)*100:0}%`;
  if(num) num.textContent=`${correct} / ${total}`;
}

function showResult(){
  const pct=Math.round(correct/total*100);
  const sc=document.getElementById('score-card'); sc.style.display='block';
  document.getElementById('sc-score').textContent=`${correct}/${total}`;
  document.getElementById('sc-pct').textContent=`${pct}%`;
  document.getElementById('sc-msg').textContent=
    pct>=80?(lang==='ko'?'🎉 훌륭합니다!':'🎉 太棒了！'):
    pct>=60?(lang==='ko'?'👍 잘 하셨습니다!':'👍 做得不错！'):
    (lang==='ko'?'💪 계속 연습!':'💪 继续加油！');
  sc.scrollIntoView({behavior:'smooth',block:'center'});
}

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-ko][data-zh]').forEach(el=>{
    const t=l==='ko'?el.getAttribute('data-ko'):el.getAttribute('data-zh');
    if(t) el.innerHTML=t;
  });
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  document.getElementById('btn-zh').classList.toggle('act',l==='zh');
  renderPartInfo();
}

(function(){
  setLang('ko');
  renderPartInfo();
  const lv=new URLSearchParams(location.search).get('level');
  if(lv) document.getElementById('sel-level').value=lv;
})();
</script>
