<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — General 中文 — 写作</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --zh:#c0392b;--zh-dark:#7f1a12;--zh-light:#fdf0ef;
  --purple:#7c3aed;--purple-light:#ede9fe;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --green:#16a34a;--green-light:#dcfce7;
  --red:#e24b4a;--red-light:#fee2e2;
  --amber:#b45309;--amber-light:#fef3c7;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:820px;margin:0 auto;padding:28px 5% 80px;}

.hero{background:linear-gradient(135deg,#4c1d95 0%,var(--purple) 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}

.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:130px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}

.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--purple);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:#6d28d9;}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}

.prompt-box{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:22px 24px;margin-bottom:14px;}
.pb-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--purple);margin-bottom:10px;}
.pb-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);margin-bottom:10px;line-height:1.4;}
.pb-pinyin{font-size:13px;color:var(--zh);font-style:italic;margin-bottom:10px;}
.pb-instruction{font-size:14px;color:var(--text-muted);line-height:1.7;margin-bottom:14px;padding:12px 14px;background:var(--bg);border-radius:8px;border-left:3px solid var(--purple);}
.pb-meta{display:flex;gap:8px;flex-wrap:wrap;}
.pb-meta-item{font-size:11px;padding:3px 10px;border-radius:8px;background:var(--purple-light);color:var(--purple);font-weight:500;}

.card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.card-head{padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:600;color:var(--text);}
.card-body{padding:18px;}

.word-count{font-size:12px;color:var(--text-muted);}
.word-count span{font-weight:700;color:var(--purple);}
.writing-textarea{width:100%;min-height:180px;padding:14px;border:0.5px solid var(--border-md);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);line-height:1.8;resize:vertical;outline:none;background:var(--bg);transition:border-color 0.2s;}
.writing-textarea:focus{border-color:var(--purple);}
.writing-textarea::placeholder{color:var(--text-light);}
.char-bar{height:4px;background:var(--border);border-radius:4px;margin-top:8px;overflow:hidden;}
.char-fill{height:100%;background:linear-gradient(90deg,var(--purple),#a78bfa);border-radius:4px;transition:width 0.3s;}
.submit-btn{margin-top:14px;width:100%;padding:12px;border-radius:10px;background:var(--purple);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;transition:all 0.2s;}
.submit-btn:hover{background:#6d28d9;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}

.tips-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.tip-item{font-size:12px;padding:7px 12px;background:var(--purple-light);color:var(--purple);border-radius:8px;line-height:1.5;}
.phrase-tag{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--amber-light);color:var(--amber);display:inline-block;margin:3px;}
.outline-item{display:flex;gap:8px;margin-bottom:5px;font-size:13px;color:var(--text-muted);}
.outline-num{color:var(--purple);font-weight:700;flex-shrink:0;}

/* 피드백 */
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:0.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
.score-item{padding:14px 6px;text-align:center;border-right:0.5px solid var(--border);}
.score-item:last-child{border-right:none;}
.score-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--purple);line-height:1;}
.score-label{font-size:9px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.3px;}
.fb-section{padding:12px 0;border-bottom:0.5px solid var(--border);}
.fb-section:last-child{border-bottom:none;}
.fb-label{font-size:11px;font-weight:700;color:var(--text);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.fb-content{font-size:13px;color:var(--text-muted);line-height:1.65;}
.improved-box{background:var(--green-light);border-radius:8px;padding:14px;font-size:13px;color:#166534;line-height:1.85;white-space:pre-line;}
.improved-pinyin{font-size:12px;color:var(--teal-mid);font-style:italic;margin-top:6px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.3s ease forwards;}
</style>
</head>
<body>

<nav>
  <a href="../../index.html" class="nav-logo">
    <div class="nav-lm">LW</div>
    <span class="nav-lt">LinguaWalk</span>
  </a>
  <div class="nav-sep"></div>
  <span class="nav-page" data-ko="General 중국어 · 쓰기" data-zh="通用中文 · 写作">General 중국어 · 쓰기</span>
  <div class="nav-space"></div>
  <a href="../../index.html" class="nav-back" data-ko="← General 홈" data-zh="← 通用首页">← General 홈</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('ko')" id="btn-ko">한국어</button>
    <button class="lbtn" onclick="setLang('zh')" id="btn-zh">中文</button>
  </div>
</nav>

<div class="main">
  <div class="hero fade-in">
    <div class="hero-tag" data-ko="GENERAL 중국어 · 쓰기" data-zh="通用中文 · 写作练习">GENERAL 중국어 · 쓰기</div>
    <div class="hero-title" data-ko="✍️ 중국어 쓰기 연습" data-zh="✍️ 中文写作练习">✍️ 중국어 쓰기 연습</div>
    <div class="hero-desc" data-ko="AI가 생성한 주제로 중국어 작문을 연습하세요. 어법·어휘·구조에 대한 AI 피드백을 받을 수 있습니다." data-zh="用AI生成的主题练习中文写作。获取语法・词汇・结构的AI反馈。">AI가 생성한 주제로 중국어 작문을 연습하세요.</div>
    <div class="hero-badges">
      <span class="hero-badge">A1 ~ C2</span>
      <span class="hero-badge" data-ko="🤖 AI 채점" data-zh="🤖 AI评分">🤖 AI 채점</span>
      <span class="hero-badge" data-ko="상세 피드백" data-zh="详细反馈">상세 피드백</span>
      <span class="hero-badge" data-ko="拼音 개선 답안" data-zh="拼音改善示例">拼音 개선 답안</span>
    </div>
  </div>

  <div class="settings-row fade-in">
    <div class="setting-item">
      <div class="si-label" data-ko="레벨" data-zh="级别">레벨</div>
      <select class="si-select" id="sel-level">
        <option value="A1">A1 (HSK 1급)</option>
        <option value="A2" selected>A2 (HSK 1~2급)</option>
        <option value="B1">B1 (HSK 3급)</option>
        <option value="B2">B2 (HSK 4급)</option>
        <option value="C1">C1 (HSK 5급)</option>
        <option value="C2">C2 (HSK 6급)</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-ko="유형" data-zh="类型">유형</div>
      <select class="si-select" id="sel-type">
        <option value="日记" data-ko="일기" data-zh="日记">일기 / 日记</option>
        <option value="邮件" data-ko="이메일" data-zh="邮件">이메일 / 邮件</option>
        <option value="观点文" data-ko="의견문" data-zh="观点文">의견문 / 观点文</option>
        <option value="说明文" data-ko="설명문" data-zh="说明文">설명문 / 说明文</option>
        <option value="故事" data-ko="이야기" data-zh="故事">이야기 / 故事</option>
        <option value="自我介绍" data-ko="자기소개" data-zh="自我介绍">자기소개 / 自我介绍</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-ko="글자 수" data-zh="字数">글자 수</div>
      <select class="si-select" id="sel-chars">
        <option value="30-60" data-ko="30-60자" data-zh="30-60字">30-60자</option>
        <option value="60-100" selected data-ko="60-100자" data-zh="60-100字">60-100자</option>
        <option value="100-180" data-ko="100-180자" data-zh="100-180字">100-180자</option>
        <option value="180-300" data-ko="180-300자" data-zh="180-300字">180-300자</option>
      </select>
    </div>
  </div>

  <button class="gen-btn fade-in" id="gen-btn" onclick="generate()">
    🤖 <span data-ko="쓰기 주제 생성" data-zh="生成写作主题">쓰기 주제 생성</span>
  </button>

  <div id="content-area"></div>
</div>

<script>
let lang='ko', currentPrompt=null;

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-ko][data-zh]').forEach(el=>{
    const t=l==='ko'?el.getAttribute('data-ko'):el.getAttribute('data-zh');
    if(t) el.innerHTML=t;
  });
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  document.getElementById('btn-zh').classList.toggle('act',l==='zh');
}

async function generate(){
  const level=document.getElementById('sel-level').value;
  const type=document.getElementById('sel-type').value;
  const chars=document.getElementById('sel-chars').value;
  const btn=document.getElementById('gen-btn');
  btn.disabled=true;
  btn.innerHTML='⏳ <span>'+(lang==='ko'?'생성 중...':'生成中...')+'</span>';
  document.getElementById('content-area').innerHTML='';

  const hskLevel={A1:'HSK1',A2:'HSK1-2',B1:'HSK3',B2:'HSK4',C1:'HSK5',C2:'HSK6'}[level]||level;

  const prompt=`중국어 작문 주제를 생성해주세요.
레벨: ${level} (${hskLevel}) / 유형: ${type} / 글자 수: ${chars}자

ONLY return valid JSON (no markdown, single-line strings):
{
  "title": "作文标题 (中文)",
  "title_pinyin": "标题拼音",
  "instruction": "作文指示 (中文1-2句)",
  "char_limit": "${chars}字",
  "time_limit": "10〜15分钟",
  "tips": ["中文提示1","中文提示2","中文提示3"],
  "useful_phrases": ["有用表达1","有用表达2","有用表达3","有用表达4"],
  "sample_outline": ["开头","主体1","主体2","结尾"]
}
ALL content must be in Chinese. Single-line strings only.`;

  try{
    const res=await fetch('/api/claude',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:800,
        messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=data.content?.[0]?.text||'';
    currentPrompt=JSON.parse(raw.replace(/```json|```/g,'').trim());
    currentPrompt.level=level; currentPrompt.type=type; currentPrompt.hskLevel=hskLevel;
    renderWriting();
  }catch(e){
    document.getElementById('content-area').innerHTML=`<div style="text-align:center;padding:24px;color:var(--red)">⚠️ ${lang==='ko'?'생성 실패':'生成失败'}<br><small>${e.message}</small></div>`;
    console.error(e);
  }
  btn.disabled=false;
  btn.innerHTML='🔄 <span>'+(lang==='ko'?'새 주제':'新主题')+'</span>';
}

function renderWriting(){
  const p=currentPrompt;
  const area=document.getElementById('content-area');
  area.innerHTML='';

  // 주제 카드
  const promptBox=document.createElement('div'); promptBox.className='prompt-box fade-in';
  promptBox.innerHTML=`
    <div class="pb-label">✍️ 写作主题</div>
    <div class="pb-title">${p.title}</div>
    <div class="pb-pinyin">${p.title_pinyin||''}</div>
    <div class="pb-instruction">${p.instruction}</div>
    <div class="pb-meta">
      <span class="pb-meta-item">📝 ${p.char_limit}</span>
      <span class="pb-meta-item">⏱ ${p.time_limit}</span>
      <span class="pb-meta-item">📊 ${p.level} (${p.hskLevel})</span>
      <span class="pb-meta-item">${p.type}</span>
    </div>`;

  // 작성 카드
  const writeCard=document.createElement('div'); writeCard.className='card fade-in';
  const wHead=document.createElement('div'); wHead.className='card-head';
  const wTitle=document.createElement('div'); wTitle.className='card-title';
  wTitle.textContent='✏️ 请用中文写作';
  const wcDiv=document.createElement('div'); wcDiv.className='word-count';
  wcDiv.innerHTML='字数: <span id="cc">0</span>';
  wHead.append(wTitle,wcDiv);
  const wBody=document.createElement('div'); wBody.className='card-body';
  const charTarget=parseInt((p.char_limit||'60-100').split('-')[1]||100);
  const ta=document.createElement('textarea');
  ta.className='writing-textarea'; ta.id='writing-area';
  ta.placeholder='在这里用中文写作…';
  ta.addEventListener('input',()=>countChars(charTarget));
  const charBar=document.createElement('div'); charBar.className='char-bar';
  charBar.innerHTML='<div class="char-fill" id="char-fill" style="width:0%"></div>';
  const submitBtn=document.createElement('button');
  submitBtn.className='submit-btn'; submitBtn.id='submit-btn';
  submitBtn.textContent='✓ 提交并获取AI反馈';
  submitBtn.addEventListener('click',submitWriting);
  wBody.append(ta,charBar,submitBtn);
  writeCard.append(wHead,wBody);

  // 도움말 카드
  const helpCard=document.createElement('div'); helpCard.className='card fade-in';
  const hHead=document.createElement('div'); hHead.className='card-head';
  hHead.innerHTML='<div class="card-title">💡 提示・有用表达</div>';
  const hBody=document.createElement('div'); hBody.className='card-body';
  const tipsDiv=document.createElement('div'); tipsDiv.className='tips-grid';
  (p.tips||[]).forEach(t=>{
    const d=document.createElement('div'); d.className='tip-item'; d.textContent='💡 '+t;
    tipsDiv.appendChild(d);
  });
  const phLabel=document.createElement('div');
  phLabel.style.cssText='font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-light);margin:12px 0 6px;';
  phLabel.textContent='有用表达';
  const phDiv=document.createElement('div');
  (p.useful_phrases||[]).forEach(ph=>{
    const s=document.createElement('span'); s.className='phrase-tag'; s.textContent=ph;
    phDiv.appendChild(s);
  });
  const outLabel=document.createElement('div');
  outLabel.style.cssText='font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-light);margin:12px 0 6px;';
  outLabel.textContent='结构示例';
  const outDiv=document.createElement('div');
  (p.sample_outline||[]).forEach((s,i)=>{
    const d=document.createElement('div'); d.className='outline-item';
    d.innerHTML=`<span class="outline-num">${i+1}.</span><span>${s}</span>`;
    outDiv.appendChild(d);
  });
  hBody.append(tipsDiv,phLabel,phDiv,outLabel,outDiv);
  helpCard.append(hHead,hBody);

  const fbSection=document.createElement('div'); fbSection.id='feedback-section';
  area.append(promptBox,writeCard,helpCard,fbSection);
}

function countChars(target){
  const txt=document.getElementById('writing-area').value;
  const count=txt.replace(/\s/g,'').length;
  const cc=document.getElementById('cc');
  const fill=document.getElementById('char-fill');
  if(cc) cc.textContent=count;
  if(fill) fill.style.width=Math.min(100,(count/target)*100)+'%';
}

async function submitWriting(){
  const text=document.getElementById('writing-area').value.trim();
  if(text.replace(/\s/g,'').length<5){
    alert(lang==='ko'?'최소 5자 이상 중국어로 작성해 주세요.':'请至少用5个中文字写作。');
    return;
  }
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;
  btn.textContent=lang==='ko'?'⏳ AI 피드백 생성 중...':'⏳ 生成AI反馈中...';

  const fb=document.getElementById('feedback-section');
  fb.innerHTML=`<div style="text-align:center;padding:24px;background:var(--white);border:0.5px solid var(--border);border-radius:14px;"><div style="font-size:24px;margin-bottom:8px;">⏳</div><div style="color:var(--text-muted);font-size:14px;">${lang==='ko'?'AI 피드백 생성 중…':'生成AI反馈中…'}</div></div>`;

  const prompt=`你是中文写作老师，请评估学生的写作。

主题: "${currentPrompt.title}"
要求: "${currentPrompt.instruction}"
级别: ${currentPrompt.level} (${currentPrompt.hskLevel})
学生写作: "${text}"

ONLY return valid JSON (no markdown, single-line strings):
{
  "overall_score": 7,
  "grammar_score": 7,
  "vocabulary_score": 7,
  "structure_score": 7,
  "content_score": 7,
  "strengths_zh": "优点 (中文2句)",
  "grammar_zh": "语法点评和修改 (中文)",
  "vocabulary_zh": "词汇反馈 (中文)",
  "structure_zh": "结构反馈 (中文)",
  "improved_zh": "改善后的全文 (中文)",
  "improved_pinyin": "改善后全文的拼音"
}
10分满分。用鼓励的语气评价。`;

  try{
    const res=await fetch('/api/claude',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1500,
        messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=data.content?.[0]?.text||'';
    const result=JSON.parse(raw.replace(/```json|```/g,'').trim());

    fb.innerHTML=`
      <div class="card fade-in">
        <div class="card-head"><span class="card-title">🤖 AI反馈</span></div>
        <div class="card-body">
          <div class="score-grid">
            <div class="score-item"><div class="score-num">${result.overall_score}</div><div class="score-label">${lang==='ko'?'종합':'总分'}</div></div>
            <div class="score-item"><div class="score-num">${result.grammar_score}</div><div class="score-label">${lang==='ko'?'문법':'语法'}</div></div>
            <div class="score-item"><div class="score-num">${result.vocabulary_score}</div><div class="score-label">${lang==='ko'?'어휘':'词汇'}</div></div>
            <div class="score-item"><div class="score-num">${result.structure_score}</div><div class="score-label">${lang==='ko'?'구조':'结构'}</div></div>
            <div class="score-item"><div class="score-num">${result.content_score}</div><div class="score-label">${lang==='ko'?'내용':'内容'}</div></div>
          </div>
          <div class="card-body" style="padding:0;">
            <div class="fb-section"><div class="fb-label">✅ ${lang==='ko'?'잘한 점':'优点'}</div><div class="fb-content">${result.strengths_zh}</div></div>
            <div class="fb-section"><div class="fb-label">📝 ${lang==='ko'?'문법':'语法'}</div><div class="fb-content">${result.grammar_zh}</div></div>
            <div class="fb-section"><div class="fb-label">📚 ${lang==='ko'?'어휘':'词汇'}</div><div class="fb-content">${result.vocabulary_zh}</div></div>
            <div class="fb-section"><div class="fb-label">🏗 ${lang==='ko'?'구조':'结构'}</div><div class="fb-content">${result.structure_zh}</div></div>
            <div class="fb-section">
              <div class="fb-label">✨ ${lang==='ko'?'개선된 작문':'改善后的写作'}</div>
              <div class="improved-box">${result.improved_zh}</div>
              <div class="improved-pinyin">${result.improved_pinyin||''}</div>
            </div>
          </div>
          <button onclick="generate()" style="margin-top:16px;width:100%;padding:12px;border-radius:10px;background:var(--purple);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;">🔄 ${lang==='ko'?'새 주제로 연습':'换新主题练习'}</button>
        </div>
      </div>`;
  }catch(e){
    fb.innerHTML=`<div style="padding:16px;color:var(--red)">⚠️ ${lang==='ko'?'피드백 생성 실패':'反馈生成失败'}</div>`;
    console.error(e);
  }
  btn.disabled=false;
  btn.textContent='✓ 提交并获取AI反馈';
}

(function(){ setLang('ko'); })();
</script>
</body>
</html>
