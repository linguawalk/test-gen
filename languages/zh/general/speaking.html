<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — General 中文 — 口语</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --zh:#c0392b;--zh-dark:#7f1a12;--zh-light:#fdf0ef;
  --pink:#db2777;--pink-light:#fce7f3;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --green:#16a34a;--green-light:#dcfce7;
  --red:#e24b4a;--red-light:#fee2e2;
  --orange:#ea580c;--orange-light:#fff7ed;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:820px;margin:0 auto;padding:28px 5% 80px;}

.hero{background:linear-gradient(135deg,#7c1d6f 0%,var(--pink) 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}

.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:130px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}

.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--pink);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:#be185d;}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}

/* 질문 카드 */
.q-display{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:22px 24px;margin-bottom:14px;}
.qd-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--pink);margin-bottom:10px;}
.qd-question{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);line-height:1.5;margin-bottom:8px;}
.qd-pinyin{font-size:14px;color:var(--zh);font-style:italic;margin-bottom:14px;}
.qd-tips{display:flex;flex-direction:column;gap:6px;}
.qd-tip{font-size:12px;padding:7px 12px;background:var(--pink-light);color:var(--pink);border-radius:8px;line-height:1.5;}

/* 성조 가이드 */
.tone-guide{background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px;}
.tg-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:10px;}
.tone-pills{display:flex;gap:8px;flex-wrap:wrap;}
.tone-pill{padding:5px 14px;border-radius:20px;font-size:13px;font-weight:600;}
.t1{background:#dbeafe;color:#1d4ed8;}
.t2{background:#dcfce7;color:#166534;}
.t3{background:#fef3c7;color:#92400e;}
.t4{background:#fee2e2;color:#991b1b;}
.t5{background:var(--bg);color:var(--text-muted);border:0.5px solid var(--border);}

/* 준비 타이머 */
.prep-bar{background:var(--orange-light);border:0.5px solid rgba(234,88,12,0.2);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.prep-icon{font-size:20px;}
.prep-text{font-size:13px;font-weight:500;color:var(--orange);flex:1;}
.prep-num{font-family:'DM Serif Display',serif;font-size:28px;color:var(--orange);min-width:40px;text-align:center;}

/* 타이머 */
.timer-bar{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.timer-num{font-family:'DM Serif Display',serif;font-size:32px;color:var(--pink);min-width:48px;text-align:center;transition:color 0.3s;}
.timer-num.warn{color:var(--red);}
.timer-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
.timer-prog{height:6px;background:var(--bg);border-radius:6px;overflow:hidden;}
.timer-fill{height:100%;background:linear-gradient(90deg,#be185d,var(--pink));border-radius:6px;transition:width 0.5s;}

/* 녹음 */
.record-area{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:22px;margin-bottom:14px;text-align:center;}
.rec-btn{width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;font-size:28px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;transition:all 0.3s;}
.rec-btn.idle{background:var(--pink-light);color:var(--pink);}
.rec-btn.idle:hover{background:var(--pink);color:#fff;transform:scale(1.05);}
.rec-btn.recording{background:var(--red);color:#fff;animation:pulse-rec 1s infinite;}
@keyframes pulse-rec{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.rec-status{font-size:13px;color:var(--text-muted);margin-bottom:10px;}
.rec-transcript{font-size:13px;color:var(--text);line-height:1.65;background:var(--bg);border-radius:8px;padding:10px 14px;min-height:52px;text-align:left;border:0.5px solid var(--border);}
.submit-btn{margin-top:14px;padding:11px 28px;border-radius:9px;background:var(--pink);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all 0.2s;}
.submit-btn:hover{background:#be185d;}

/* 참고 */
.card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.card-head{padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:600;color:var(--text);}
.card-body{padding:18px;}
.show-sample-btn{font-size:12px;color:var(--pink);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600;}
.sample-box{background:var(--bg);border-radius:8px;padding:14px;margin-top:10px;display:none;}
.sb-title{font-size:11px;font-weight:700;color:var(--pink);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.sb-text{font-size:13px;color:var(--text);line-height:1.75;}
.sb-pinyin{font-size:12px;color:var(--zh);font-style:italic;margin-top:6px;}
.phrase-tag{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--pink-light);color:var(--pink);display:inline-block;margin:3px;}

/* 피드백 */
.feedback-card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;display:none;}
.fc-score{display:flex;gap:0;border-bottom:0.5px solid var(--border);}
.fc-score-item{flex:1;padding:14px 6px;text-align:center;border-right:0.5px solid var(--border);}
.fc-score-item:last-child{border-right:none;}
.fc-score-num{font-family:'DM Serif Display',serif;font-size:24px;color:var(--pink);line-height:1;}
.fc-score-label{font-size:9px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.3px;}
.fc-section{padding:14px 18px;border-bottom:0.5px solid var(--border);}
.fc-section:last-child{border-bottom:none;}
.fc-section-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px;}
.fc-text{font-size:13px;color:var(--text-muted);line-height:1.65;}
.fc-improved{background:var(--green-light);border-radius:8px;padding:12px;font-size:13px;color:#166534;line-height:1.85;}
.fc-pinyin{font-size:12px;color:var(--zh);font-style:italic;margin-top:4px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.3s ease forwards;}
</style>
</head>
<body>

<nav>
  <a href="../../index.html" class="nav-logo">
    <div class="nav-lm">LW</div>
    <span class="nav-lt">LinguaWalk</span>
  </a>
  <div class="nav-sep"></div>
  <span class="nav-page" data-ko="General 중국어 · 말하기" data-zh="通用中文 · 口语">General 중국어 · 말하기</span>
  <div class="nav-space"></div>
  <a href="../../index.html" class="nav-back" data-ko="← General 홈" data-zh="← 通用首页">← General 홈</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('ko')" id="btn-ko">한국어</button>
    <button class="lbtn" onclick="setLang('zh')" id="btn-zh">中文</button>
  </div>
</nav>

<div class="main">
  <div class="hero fade-in">
    <div class="hero-tag" data-ko="GENERAL 중국어 · 말하기" data-zh="通用中文 · 口语练习">GENERAL 중국어 · 말하기</div>
    <div class="hero-title" data-ko="🗣️ 중국어 말하기 연습" data-zh="🗣️ 中文口语练习">🗣️ 중국어 말하기 연습</div>
    <div class="hero-desc" data-ko="AI가 생성한 질문에 중국어로 답하세요. 발음·성조·유창성에 대한 AI 피드백을 받을 수 있습니다." data-zh="用中文回答AI生成的问题。获取发音・声调・流利度的AI反馈。">AI가 생성한 질문에 중국어로 답하세요.</div>
    <div class="hero-badges">
      <span class="hero-badge">A1 ~ C2</span>
      <span class="hero-badge" data-ko="🎙 음성 녹음" data-zh="🎙 语音录音">🎙 음성 녹음</span>
      <span class="hero-badge" data-ko="성조 피드백" data-zh="声调反馈">성조 피드백</span>
      <span class="hero-badge" data-ko="拼音 모범 답안" data-zh="拼音示范回答">拼音 모범 답안</span>
    </div>
  </div>

  <div class="settings-row fade-in">
    <div class="setting-item">
      <div class="si-label" data-ko="레벨" data-zh="级别">레벨</div>
      <select class="si-select" id="sel-level">
        <option value="A1">A1 (HSK 1급)</option>
        <option value="A2" selected>A2 (HSK 1~2급)</option>
        <option value="B1">B1 (HSK 3급)</option>
        <option value="B2">B2 (HSK 4급)</option>
        <option value="C1">C1 (HSK 5급)</option>
        <option value="C2">C2 (HSK 6급)</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-ko="유형" data-zh="类型">유형</div>
      <select class="si-select" id="sel-type">
        <option value="自我介绍" data-ko="자기소개" data-zh="自我介绍">자기소개 / 自我介绍</option>
        <option value="日常对话" data-ko="일상 대화" data-zh="日常对话">일상 대화 / 日常对话</option>
        <option value="发表意见" data-ko="의견 말하기" data-zh="发表意见">의견 / 发表意见</option>
        <option value="讲述经历" data-ko="경험 이야기" data-zh="讲述经历">경험 / 讲述经历</option>
        <option value="角色扮演" data-ko="롤플레이" data-zh="角色扮演">롤플레이 / 角色扮演</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-ko="답변 시간" data-zh="回答时间">답변 시간</div>
      <select class="si-select" id="sel-time">
        <option value="30" data-ko="30초" data-zh="30秒">30초</option>
        <option value="60" selected data-ko="1분" data-zh="1分钟">1분</option>
        <option value="90" data-ko="1분 30초" data-zh="1分30秒">1분 30초</option>
        <option value="120" data-ko="2분" data-zh="2分钟">2분</option>
      </select>
    </div>
  </div>

  <button class="gen-btn fade-in" id="gen-btn" onclick="generate()">
    🤖 <span data-ko="말하기 질문 생성" data-zh="生成口语问题">말하기 질문 생성</span>
  </button>

  <!-- 성조 가이드 (항상 표시) -->
  <div class="tone-guide fade-in">
    <div class="tg-title" data-ko="중국어 4성조 참고" data-zh="中文四声参考">중국어 4성조 참고</div>
    <div class="tone-pills">
      <span class="tone-pill t1">1성 ā — 高平調</span>
      <span class="tone-pill t2">2성 á — 上升調</span>
      <span class="tone-pill t3">3성 ǎ — 下降上升</span>
      <span class="tone-pill t4">4성 à — 下降調</span>
      <span class="tone-pill t5">경성 a — 輕聲</span>
    </div>
  </div>

  <div id="content-area"></div>
</div>

<script>
let lang='ko', currentQ=null;
let mediaRecorder=null, audioChunks=[], transcript='';
let timerInterval=null, prepInterval=null, timeLeft=60;

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-ko][data-zh]').forEach(el=>{
    const t=l==='ko'?el.getAttribute('data-ko'):el.getAttribute('data-zh');
    if(t) el.innerHTML=t;
  });
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  document.getElementById('btn-zh').classList.toggle('act',l==='zh');
}

async function generate(){
  const level=document.getElementById('sel-level').value;
  const type=document.getElementById('sel-type').value;
  const time=parseInt(document.getElementById('sel-time').value);
  const btn=document.getElementById('gen-btn');
  btn.disabled=true;
  btn.innerHTML='⏳ <span>'+(lang==='ko'?'생성 중...':'生成中...')+'</span>';
  document.getElementById('content-area').innerHTML='';
  clearInterval(timerInterval); clearInterval(prepInterval);

  const hskLevel={A1:'HSK1',A2:'HSK1-2',B1:'HSK3',B2:'HSK4',C1:'HSK5',C2:'HSK6'}[level]||level;
  const wordTarget=Math.round(time/1.2);

  const prompt=`중국어 말하기 연습 질문을 생성해주세요.
레벨: ${level} (${hskLevel}) / 유형: ${type}

ONLY return valid JSON (no markdown, single-line strings):
{
  "question_zh": "中文问题 (${hskLevel}水平)",
  "question_pinyin": "问题的拼音",
  "tips": ["中文提示1","中文提示2","中文提示3"],
  "sample_answer": "模范回答 (${wordTarget}字以内，${hskLevel}水平)",
  "sample_pinyin": "模范回答的拼音",
  "key_phrases": ["关键词1","关键词2","关键词3","关键词4"],
  "preparation_time": 15
}
ALL content in Chinese. Single-line strings only.`;

  try{
    const res=await fetch('/api/claude',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:800,
        messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=data.content?.[0]?.text||'';
    currentQ=JSON.parse(raw.replace(/```json|```/g,'').trim());
    timeLeft=time;
    renderSpeaking();
  }catch(e){
    document.getElementById('content-area').innerHTML=`<div style="text-align:center;padding:24px;color:var(--red)">⚠️ ${lang==='ko'?'생성 실패':'生成失败'}<br><small>${e.message}</small></div>`;
    console.error(e);
  }
  btn.disabled=false;
  btn.innerHTML='🔄 <span>'+(lang==='ko'?'새 질문':'新问题')+'</span>';
}

function renderSpeaking(){
  const q=currentQ;
  const area=document.getElementById('content-area');
  area.innerHTML='';

  // 질문 카드 (중국어만)
  const qCard=document.createElement('div'); qCard.className='q-display fade-in';
  qCard.innerHTML=`
    <div class="qd-label">💬 请用中文回答</div>
    <div class="qd-question">${q.question_zh}</div>
    <div class="qd-pinyin">${q.question_pinyin}</div>
    <div class="qd-tips">
      ${(q.tips||[]).map(t=>`<div class="qd-tip">💡 ${t}</div>`).join('')}
    </div>`;

  // 준비 타이머
  const prepBar=document.createElement('div'); prepBar.className='prep-bar fade-in'; prepBar.id='prep-bar';
  prepBar.innerHTML=`<div class="prep-icon">⏱️</div><div class="prep-text">准备时间 — 整理思路</div><div class="prep-num" id="prep-num">${q.preparation_time||15}</div>`;

  // 답변 타이머
  const timerBar=document.createElement('div'); timerBar.className='timer-bar fade-in'; timerBar.id='timer-bar'; timerBar.style.display='none';
  timerBar.innerHTML=`<div class="timer-num" id="timer-num">${timeLeft}</div><div style="flex:1;"><div class="timer-label">剩余回答时间</div><div class="timer-prog"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div></div>`;

  // 녹음
  const recArea=document.createElement('div'); recArea.className='record-area fade-in';
  const recBtn=document.createElement('button'); recBtn.className='rec-btn idle'; recBtn.id='rec-btn'; recBtn.textContent='🎙';
  recBtn.addEventListener('click',toggleRecord);
  const recStatus=document.createElement('div'); recStatus.className='rec-status'; recStatus.id='rec-status';
  recStatus.textContent='🎙 点击按钮开始录音';
  const recTranscript=document.createElement('div'); recTranscript.className='rec-transcript'; recTranscript.id='rec-transcript';
  recTranscript.textContent='(语音将在此处显示)';
  const submitBtn=document.createElement('button'); submitBtn.className='submit-btn';
  submitBtn.textContent='✓ 提交并获取AI反馈';
  submitBtn.addEventListener('click',submitSpeech);
  recArea.append(recBtn,recStatus,recTranscript,submitBtn);

  // 참고 표현
  const phCard=document.createElement('div'); phCard.className='card fade-in';
  const phHead=document.createElement('div'); phHead.className='card-head';
  const phTitle=document.createElement('div'); phTitle.className='card-title'; phTitle.textContent='关键词汇';
  const sampleBtn=document.createElement('button'); sampleBtn.className='show-sample-btn';
  sampleBtn.textContent=lang==='ko'?'模范回答 보기':'查看模范回答';
  sampleBtn.addEventListener('click',()=>{
    const sb=document.getElementById('sample-box');
    const isOpen=sb.style.display!=='none';
    sb.style.display=isOpen?'none':'block';
    sampleBtn.textContent=isOpen?(lang==='ko'?'模范回答 보기':'查看模范回答'):(lang==='ko'?'숨기기':'隐藏');
  });
  phHead.append(phTitle,sampleBtn);
  const phBody=document.createElement('div'); phBody.className='card-body';
  phBody.innerHTML=`
    <div style="margin-bottom:12px;">${(q.key_phrases||[]).map(p=>`<span class="phrase-tag">${p}</span>`).join('')}</div>
    <div class="sample-box" id="sample-box">
      <div class="sb-title">📝 模范回答</div>
      <div class="sb-text">${q.sample_answer}</div>
      <div class="sb-pinyin">${q.sample_pinyin||''}</div>
    </div>`;
  phCard.append(phHead,phBody);

  // 피드백
  const fbCard=document.createElement('div'); fbCard.className='feedback-card'; fbCard.id='feedback-card';

  area.append(qCard,prepBar,timerBar,recArea,phCard,fbCard);

  // 준비 타이머 시작
  let prepLeft=q.preparation_time||15;
  prepInterval=setInterval(()=>{
    prepLeft--;
    const el=document.getElementById('prep-num');
    if(el) el.textContent=prepLeft;
    if(prepLeft<=0){
      clearInterval(prepInterval);
      const pb=document.getElementById('prep-bar');
      if(pb) pb.style.display='none';
      const tb=document.getElementById('timer-bar');
      if(tb) tb.style.display='flex';
    }
  },1000);
}

async function toggleRecord(){
  if(!mediaRecorder||mediaRecorder.state==='inactive') await startRecord();
  else stopRecord();
}

async function startRecord(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(stream);
    audioChunks=[]; transcript='';
    const btn=document.getElementById('rec-btn');
    const status=document.getElementById('rec-status');
    btn.className='rec-btn recording'; btn.textContent='⏹';
    status.textContent='🔴 录音中… (再次点击停止)';

    // 음성 인식 중국어
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(SR){
      const rec=new SR();
      rec.lang='zh-CN'; rec.continuous=true; rec.interimResults=true;
      rec.onresult=e=>{
        let t='';
        for(let i=0;i<e.results.length;i++) t+=e.results[i][0].transcript;
        transcript=t;
        const el=document.getElementById('rec-transcript');
        if(el) el.textContent=t||'...';
      };
      rec.onerror=()=>{};
      rec.start();
      window._speechRec=rec;
    }

    const total=timeLeft; let elapsed=0;
    timerInterval=setInterval(()=>{
      elapsed++;
      const rem=total-elapsed;
      const numEl=document.getElementById('timer-num');
      const fillEl=document.getElementById('timer-fill');
      if(numEl){ numEl.textContent=rem; numEl.className='timer-num'+(rem<=10?' warn':''); }
      if(fillEl) fillEl.style.width=`${(rem/total)*100}%`;
      if(rem<=0) stopRecord();
    },1000);
    mediaRecorder.start();
  }catch(e){
    alert(lang==='ko'?'마이크 접근 권한이 필요합니다.':'需要麦克风访问权限。');
  }
}

function stopRecord(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive'){
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t=>t.stop());
  }
  if(window._speechRec){try{window._speechRec.stop();}catch(e){}}
  clearInterval(timerInterval);
  const btn=document.getElementById('rec-btn');
  const status=document.getElementById('rec-status');
  if(btn){btn.className='rec-btn idle';btn.textContent='🔄';}
  if(status) status.textContent=lang==='ko'?'✅ 녹음 완료. 제출하거나 다시 녹음하세요.':'✅ 录音完成。提交或重新录音。';
}

async function submitSpeech(){
  const t=transcript||document.getElementById('rec-transcript')?.textContent||'';
  if(!t||t.length<2||t.includes('语音将在')){
    alert(lang==='ko'?'먼저 중국어로 답변을 녹음해 주세요.':'请先用中文录制回答。');
    return;
  }
  const fc=document.getElementById('feedback-card');
  fc.style.display='block';
  fc.innerHTML=`<div style="text-align:center;padding:28px;"><div style="font-size:28px;margin-bottom:10px;">⏳</div><div style="font-size:14px;color:var(--text-muted);">${lang==='ko'?'AI 피드백 생성 중…':'生成AI反馈中…'}</div></div>`;

  const level=document.getElementById('sel-level').value;
  const prompt=`请评估以下中文口语回答。

问题: "${currentQ.question_zh}"
学习者回答: "${t}"
学习者级别: ${level}
模范回答: "${currentQ.sample_answer}"

ONLY return valid JSON (no markdown, single-line strings):
{
  "overall_score": 7,
  "pronunciation_score": 7,
  "tone_score": 7,
  "fluency_score": 7,
  "grammar_score": 7,
  "strengths_zh": "优点 (中文)",
  "tone_feedback_zh": "声调具体反馈 (中文, 指出哪些词声调需改善)",
  "improvements_zh": "改善点 (中文)",
  "corrected_zh": "改善后的回答 (中文)",
  "corrected_pinyin": "改善后回答的拼音"
}
10分满分。请用鼓励的语气评价。`;

  try{
    const res=await fetch('/api/claude',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:900,
        messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=data.content?.[0]?.text||'';
    const fb=JSON.parse(raw.replace(/```json|```/g,'').trim());

    fc.innerHTML=`
      <div class="fc-score">
        <div class="fc-score-item"><div class="fc-score-num">${fb.overall_score}</div><div class="fc-score-label">${lang==='ko'?'종합':'总分'}</div></div>
        <div class="fc-score-item"><div class="fc-score-num">${fb.pronunciation_score}</div><div class="fc-score-label">${lang==='ko'?'발음':'发音'}</div></div>
        <div class="fc-score-item"><div class="fc-score-num">${fb.tone_score}</div><div class="fc-score-label">${lang==='ko'?'성조':'声调'}</div></div>
        <div class="fc-score-item"><div class="fc-score-num">${fb.fluency_score}</div><div class="fc-score-label">${lang==='ko'?'유창성':'流利度'}</div></div>
        <div class="fc-score-item"><div class="fc-score-num">${fb.grammar_score}</div><div class="fc-score-label">${lang==='ko'?'문법':'语法'}</div></div>
      </div>
      <div class="fc-section"><div class="fc-section-title">✅ ${lang==='ko'?'잘한 점':'优点'}</div><div class="fc-text">${fb.strengths_zh}</div></div>
      <div class="fc-section"><div class="fc-section-title">🎵 ${lang==='ko'?'성조 피드백':'声调反馈'}</div><div class="fc-text">${fb.tone_feedback_zh}</div></div>
      <div class="fc-section"><div class="fc-section-title">📈 ${lang==='ko'?'개선할 점':'改善点'}</div><div class="fc-text">${fb.improvements_zh}</div></div>
      <div class="fc-section">
        <div class="fc-section-title">📝 ${lang==='ko'?'개선된 답변':'改善后的回答'}</div>
        <div class="fc-improved">${fb.corrected_zh}</div>
        <div class="fc-pinyin">${fb.corrected_pinyin||''}</div>
      </div>`;
  }catch(e){
    fc.innerHTML=`<div style="padding:16px;color:var(--red)">⚠️ ${lang==='ko'?'피드백 생성 실패':'反馈生成失败'}</div>`;
    console.error(e);
  }
}

(function(){ setLang('ko'); })();
</script>
