<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — DELE Comprensión auditiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --es:#c60b1e;--es-dark:#8b0013;--es-light:#fdf0f1;--es-gold:#f1b500;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --green:#16a34a;--green-light:#dcfce7;--red:#e24b4a;--red-light:#fee2e2;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:820px;margin:0 auto;padding:28px 5% 80px;}
.hero{background:linear-gradient(135deg,var(--es-dark) 0%,var(--es) 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}
.hero-badge.gold{background:rgba(241,181,0,0.2);color:var(--es-gold);border-color:rgba(241,181,0,0.3);}
.ex-tabs{display:flex;background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:4px;margin-bottom:16px;gap:3px;overflow-x:auto;}
.etab{flex:1;padding:9px 8px;border-radius:9px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-family:inherit;transition:all 0.2s;text-align:center;white-space:nowrap;}
.etab:hover{color:var(--es);}
.etab.act{background:var(--es);color:#fff;}
.ex-info{background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px;}
.ei-title{font-size:13px;font-weight:600;color:var(--es);margin-bottom:6px;}
.ei-desc{font-size:12px;color:var(--text-muted);line-height:1.65;}
.ei-tip{margin-top:8px;padding:8px 12px;background:var(--es-light);border-radius:8px;font-size:12px;color:var(--es);}
.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:120px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}
.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--es);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:var(--es-dark);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}
.loading{padding:40px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:16px;display:none;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--es);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.audio-card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:14px;}
.ac-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px;}
.ac-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.ac-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--es-light);color:var(--es);font-weight:600;}
.player-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border-radius:10px;border:0.5px solid var(--border);margin-bottom:10px;}
.play-btn{width:36px;height:36px;border-radius:50%;background:var(--es);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.play-btn:hover{background:var(--es-dark);}
.play-btn svg{width:14px;height:14px;fill:#fff;}
.player-info{flex:1;}
.player-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
.player-bar{height:5px;background:var(--border);border-radius:5px;overflow:hidden;}
.player-fill{height:100%;background:linear-gradient(90deg,var(--es-dark),var(--es));border-radius:5px;width:0%;transition:width 0.1s;}
.speed-btn{padding:3px 9px;border-radius:7px;border:0.5px solid var(--border-md);background:transparent;font-size:11px;font-weight:600;color:var(--text-muted);cursor:pointer;font-family:inherit;flex-shrink:0;}
.speed-btn:hover{background:var(--es-light);color:var(--es);border-color:var(--es);}
.script-toggle{font-size:11px;color:var(--es);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600;padding:6px 0;display:block;}
.script-wrap{display:none;margin-top:8px;padding:10px 14px;background:var(--bg);border-radius:8px;font-size:13px;color:var(--text);line-height:1.8;}
.script-wrap.open{display:block;}
.script-line{display:flex;gap:8px;padding:4px 6px;border-radius:4px;cursor:pointer;}
.script-line:hover{background:var(--es-light);}
.script-line.act{background:var(--es-light);}
.sl-spk{font-size:10px;font-weight:700;color:var(--es);min-width:46px;padding-top:2px;text-transform:uppercase;}
.sl-txt{font-size:13px;color:var(--text);line-height:1.65;flex:1;}
.q-section{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:14px;}
.q-item{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px;}
.q-item:last-child{margin-bottom:0;}
.q-num{font-size:10px;font-weight:700;color:var(--es);letter-spacing:.5px;margin-bottom:6px;}
.q-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.6;}
.q-opts{display:flex;flex-direction:column;gap:6px;}
.q-opt{padding:9px 14px;border-radius:8px;border:1.5px solid var(--border-md);background:var(--white);cursor:pointer;font-size:13px;color:var(--text);transition:all 0.2s;text-align:left;font-family:inherit;display:flex;align-items:center;gap:10px;line-height:1.5;}
.q-opt:hover:not(:disabled){border-color:var(--es);background:var(--es-light);}
.q-opt.correct{border-color:var(--green);background:var(--green-light);color:#166534;font-weight:500;}
.q-opt.wrong{border-color:var(--red);background:var(--red-light);color:#991b1b;}
.q-opt-ltr{width:24px;height:24px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-muted);flex-shrink:0;}
.q-opt.correct .q-opt-ltr{background:var(--green);color:#fff;}
.q-opt.wrong .q-opt-ltr{background:var(--red);color:#fff;}
.q-feedback{margin-top:8px;font-size:12px;padding:8px 12px;border-radius:7px;display:none;line-height:1.5;}
.q-feedback.show.correct{display:block;background:var(--green-light);color:#166534;}
.q-feedback.show.wrong{display:block;background:var(--red-light);color:#991b1b;}
.score-bar{display:flex;align-items:center;gap:12px;background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:none;}
.sb-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--es);}
.sb-bar{flex:1;height:6px;background:var(--bg);border-radius:6px;overflow:hidden;}
.sb-fill{height:100%;background:linear-gradient(90deg,var(--es-dark),var(--es));border-radius:6px;transition:width 0.3s;}
.score-card{background:linear-gradient(135deg,var(--es-dark),var(--es));border-radius:14px;padding:24px;text-align:center;margin-bottom:20px;display:none;color:#fff;}
.sc-score{font-family:'DM Serif Display',serif;font-size:52px;line-height:1;margin-bottom:6px;}
.sc-pct{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:10px;}
.sc-msg{font-size:13px;color:var(--es-gold);font-weight:500;}
.action-btns{display:flex;gap:10px;display:none;}
.act-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);transition:all 0.2s;text-decoration:none;text-align:center;}
.act-btn.primary{background:var(--es);color:#fff;border-color:var(--es);}
.act-btn.primary:hover{background:var(--es-dark);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.4s ease forwards;}
</style>
</head>
<body>
<nav>
  <a href="../../index.html" class="nav-logo"><div class="nav-lm">LW</div><span class="nav-lt">LinguaWalk</span></a>
  <div class="nav-sep"></div>
  <span class="nav-page">📜 DELE — Comprensión auditiva</span>
  <div class="nav-space"></div>
  <a href="index.html" class="nav-back" data-ko="← DELE" data-es="← DELE">← DELE</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('ko')" id="btn-ko">한국어</button>
    <button class="lbtn" onclick="setLang('es')" id="btn-es">Español</button>
  </div>
</nav>
<div class="main fade-in">
  <div class="hero">
    <div class="hero-tag" data-ko="DELE · 듣기 연습" data-es="DELE · Comprensión auditiva">DELE · 듣기 연습</div>
    <div class="hero-title" data-ko="🎧 DELE Comprensión auditiva" data-es="🎧 DELE Comprensión auditiva">🎧 DELE Comprensión auditiva</div>
    <div class="hero-desc" data-ko="DELE 실제 형식 — 대화·방송·발표를 듣고 이해도 문제에 답하세요." data-es="Formato real DELE — Escuche diálogos, emisiones y conferencias y responda preguntas.">DELE 실제 형식 — 대화·방송·발표 이해.</div>
    <div class="hero-badges">
      <span class="hero-badge">A1 ~ C2</span>
      <span class="hero-badge" data-ko="Tarea 1 — 대화" data-es="Tarea 1 — Diálogo">Tarea 1 — 대화</span>
      <span class="hero-badge" data-ko="Tarea 2 — 방송" data-es="Tarea 2 — Emisión">Tarea 2 — 방송</span>
      <span class="hero-badge" data-ko="Tarea 3 — 발표" data-es="Tarea 3 — Conferencia">Tarea 3 — 발표</span>
      <span class="hero-badge gold">DELE</span>
    </div>
  </div>
  <div class="ex-tabs">
    <button class="etab act" onclick="selectEx('t1',this)" data-ko="Tarea 1 대화" data-es="Tarea 1 Diálogo">Tarea 1</button>
    <button class="etab" onclick="selectEx('t2',this)" data-ko="Tarea 2 방송" data-es="Tarea 2 Emisión">Tarea 2</button>
    <button class="etab" onclick="selectEx('t3',this)" data-ko="Tarea 3 발표" data-es="Tarea 3 Conferencia">Tarea 3</button>
  </div>
  <div class="ex-info" id="ex-info"></div>
  <div class="settings-row">
    <div class="setting-item">
      <div class="si-label" data-ko="레벨" data-es="Nivel">레벨</div>
      <select class="si-select" id="sel-level">
        <option value="A1">A1</option><option value="A2">A2</option>
        <option value="B1" selected>B1</option><option value="B2">B2</option>
        <option value="C1">C1</option><option value="C2">C2</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-ko="음성 속도" data-es="Velocidad">음성 속도</div>
      <select class="si-select" id="sel-speed">
        <option value="0.7" data-ko="느리게 (0.7x)" data-es="Lento">느리게 (0.7x)</option>
        <option value="0.9" selected data-ko="보통 (0.9x)" data-es="Normal">보통 (0.9x)</option>
        <option value="1.1" data-ko="빠르게 (1.1x)" data-es="Rápido">빠르게 (1.1x)</option>
      </select>
    </div>
  </div>
  <button class="gen-btn" id="gen-btn" onclick="generate()">
    🤖 <span data-ko="DELE 듣기 문제 생성" data-es="Generar ejercicio DELE auditivo">DELE 듣기 문제 생성</span>
  </button>
  <div class="loading" id="loading"><div class="spinner"></div><div id="loading-text" style="font-size:14px;color:var(--text-muted);">생성 중...</div></div>
  <div class="score-bar" id="score-bar">
    <div><div class="sb-num" id="sb-num">0 / 0</div><div style="font-size:11px;color:var(--text-muted);" data-ko="정답" data-es="Correctas">정답</div></div>
    <div class="sb-bar"><div class="sb-fill" id="sb-fill" style="width:0%"></div></div>
  </div>
  <div id="content-area"></div>
  <div class="score-card" id="score-card">
    <div class="sc-score" id="sc-score"></div>
    <div class="sc-pct" id="sc-pct"></div>
    <div class="sc-msg" id="sc-msg"></div>
  </div>
  <div class="action-btns" id="action-btns">
    <button class="act-btn primary" onclick="generate()" data-ko="🔄 새 문제" data-es="🔄 Nuevo ejercicio">🔄 새 문제</button>
    <a href="index.html" class="act-btn" data-ko="← DELE 홈" data-es="← DELE">← DELE 홈</a>
  </div>
</div>
<script>
var lang='ko', currentEx='t1', ttsActive=false;
var correct=0, answered=0, total=0;
var SPEEDS=[0.7,0.8,0.9,1.0,1.1,1.2];
var LETTERS=['A','B','C','D'];
var EX_INFO={
  t1:{ko:'Tarea 1 — Dialogos: 짧은 대화를 듣고 질문에 알맞은 답을 고릅니다. 실제 DELE 첫 번째 영역입니다.',es:'Tarea 1 — Diálogos: Escuche conversaciones breves y elija la respuesta correcta. Es la primera tarea real del DELE.',tipKo:'💡 대화의 핵심 정보(장소·시간·목적)에 집중하세요. 두 번 들을 수 있습니다.',tipEs:'💡 Concéntrese en la información clave. Puede escuchar dos veces.'},
  t2:{ko:'Tarea 2 — Emisiones: 라디오 방송·공지·광고를 듣고 구체적 정보를 파악합니다.',es:'Tarea 2 — Emisiones: Escuche emisiones de radio, anuncios o publicidades e identifique información concreta.',tipKo:'💡 질문을 먼저 읽어 어떤 정보를 들어야 하는지 파악하세요. 숫자·날짜에 집중하세요.',tipEs:'💡 Lea primero las preguntas. Preste especial atención a números y fechas.'},
  t3:{ko:'Tarea 3 — Conferencias: 강의·발표를 듣고 주제·논점·화자 의견을 파악합니다. B2 이상.',es:'Tarea 3 — Conferencias: Escuche conferencias o presentaciones y comprenda el tema, los argumentos y la opinión. Desde B2.',tipKo:'💡 화자의 전반적인 태도를 파악하고 핵심 논점에 집중하세요.',tipEs:'💡 Identifique la actitud general del hablante y concéntrese en los argumentos principales.'}
};
function selectEx(id,btn){stopTTS();currentEx=id;document.querySelectorAll('.etab').forEach(function(t){t.classList.remove('act');});btn.classList.add('act');renderExInfo();resetContent();}
function renderExInfo(){var info=EX_INFO[currentEx];document.getElementById('ex-info').innerHTML='<div class="ei-title">'+(lang==='ko'?info.ko.split(':')[0]:info.es.split(':')[0])+'</div><div class="ei-desc">'+(lang==='ko'?info.ko.split(':').slice(1).join(':'):info.es.split(':').slice(1).join(':'))+'</div><div class="ei-tip">'+(lang==='ko'?info.tipKo:info.tipEs)+'</div>';}
function resetContent(){stopTTS();document.getElementById('content-area').innerHTML='';document.getElementById('score-card').style.display='none';document.getElementById('action-btns').style.display='none';document.getElementById('score-bar').style.display='none';correct=0;answered=0;total=0;}
async function callClaude(p,t){var r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:t||1500,messages:[{role:'user',content:p}]})});var d=await r.json();var raw=d.content?.[0]?.text||'';var s=raw.replace(/```json|```/g,'').trim();var fi=s.indexOf('{');var li=s.lastIndexOf('}');if(fi!==-1&&li!==-1)s=s.slice(fi,li+1);return JSON.parse(s);}
async function generate(){if(document.getElementById('gen-btn').disabled)return;resetContent();document.getElementById('gen-btn').disabled=true;document.getElementById('loading').style.display='block';document.getElementById('loading-text').textContent=lang==='ko'?'🤖 문제 생성 중…':'🤖 Generando ejercicio…';var level=document.getElementById('sel-level').value;var speed=parseFloat(document.getElementById('sel-speed').value);var dele='DELE '+level;var exTypes={t1:'short dialogue (2-4 exchanges) at '+dele+' level',t2:'radio announcement or advertisement at '+dele+' level',t3:'lecture or formal presentation at '+dele+' level (longer)'};var qCounts={t1:3,t2:3,t3:4};var prompt='Generate a '+dele+' Spanish listening exercise.\nType: '+exTypes[currentEx]+'\n\nReturn ONLY valid JSON object (no markdown, no backticks, single-line strings):\n{"tarea":"'+currentEx+'","level":"'+level+'","context":"Descripcion en espanol","script":[{"speaker":"A","line":"Frase en espanol"},{"speaker":"B","line":"Respuesta en espanol"}],"questions":[{"id":1,"text":"Pregunta en espanol?","choices":["A. Opcion","B. Opcion","C. Opcion","D. Opcion"],"answer":0,"explanation_ko":"Korean explanation"}]}\nscript: natural Spanish at '+level+' level, min 4 lines. questions: '+qCounts[currentEx]+' questions, answers 0-based varying. All Spanish. Single-line strings.';
try{var data=await callClaude(prompt,1500);total=(data.questions||[]).length;document.getElementById('loading').style.display='none';document.getElementById('content-area').appendChild(makeCard(data,speed,dele));document.getElementById('score-bar').style.display='flex';document.getElementById('action-btns').style.display='flex';updateScore();}catch(e){document.getElementById('loading').style.display='none';document.getElementById('content-area').innerHTML='<div style="padding:24px;text-align:center;color:var(--red)">⚠️ '+(lang==='ko'?'생성 실패':'Error')+'<br><small>'+e.message+'</small></div>';console.error(e);}
document.getElementById('gen-btn').disabled=false;}
function makeCard(data,speed,dele){var wrap=document.createElement('div');var ac=document.createElement('div');ac.className='audio-card fade-in';var acHead=document.createElement('div');acHead.className='ac-header';acHead.innerHTML='<div class="ac-title">🎧 <span>'+dele+'</span> <span class="ac-badge">'+(data.tarea||'').toUpperCase()+'</span></div><div style="font-size:11px;color:var(--text-muted);">'+(data.context||'')+'</div>';var pr=makePlayerRow('main',speed,function(){playScript(data.script,speed);});var togBtn=document.createElement('button');togBtn.className='script-toggle';togBtn.textContent=lang==='ko'?'📄 스크립트 보기':'📄 Ver transcripción';var scriptWrap=document.createElement('div');scriptWrap.className='script-wrap';scriptWrap.id='script-main';(data.script||[]).forEach(function(l,i){var row=document.createElement('div');row.className='script-line';row.id='sl-'+i;row.innerHTML='<span class="sl-spk">'+l.speaker+'</span><span class="sl-txt">'+l.line+'</span>';row.addEventListener('click',function(){stopTTS();playScript(data.script.slice(i),speed);});scriptWrap.appendChild(row);});togBtn.addEventListener('click',function(){var open=scriptWrap.classList.toggle('open');togBtn.textContent=open?(lang==='ko'?'🙈 숨기기':'🙈 Ocultar'):(lang==='ko'?'📄 스크립트 보기':'📄 Ver transcripción');});ac.append(acHead,pr,togBtn,scriptWrap);var qSec=document.createElement('div');qSec.className='q-section fade-in';(data.questions||[]).forEach(function(q){var qDiv=document.createElement('div');qDiv.className='q-item';var qNum=document.createElement('div');qNum.className='q-num';qNum.textContent='Pregunta '+q.id;var qTxt=document.createElement('div');qTxt.className='q-text';qTxt.textContent=q.text;var opts=document.createElement('div');opts.className='q-opts';opts.id='opts-'+q.id;(q.choices||[]).forEach(function(c,i){var btn=document.createElement('button');btn.className='q-opt';btn.innerHTML='<span class="q-opt-ltr">'+LETTERS[i]+'</span><span>'+c+'</span>';btn.addEventListener('click',function(){answerQ(q.id,i,btn,q.answer,q.explanation_ko,opts);});opts.appendChild(btn);});var fb=document.createElement('div');fb.className='q-feedback';fb.id='fb-'+q.id;qDiv.append(qNum,qTxt,opts,fb);qSec.appendChild(qDiv);});wrap.append(ac,qSec);return wrap;}
function makePlayerRow(id,speed,onPlay){var pr=document.createElement('div');pr.className='player-row';var pbtn=document.createElement('button');pbtn.className='play-btn';pbtn.innerHTML='<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';pbtn.addEventListener('click',onPlay);var pInfo=document.createElement('div');pInfo.className='player-info';pInfo.innerHTML='<div class="player-label">'+(lang==='ko'?'▶ 버튼을 눌러 음성을 들으세요':'▶ Haga clic para escuchar')+'</div><div class="player-bar"><div class="player-fill" id="pfill-'+id+'"></div></div>';var spdBtn=document.createElement('button');spdBtn.className='speed-btn';spdBtn.id='pspd-'+id;spdBtn.textContent=speed+'x';spdBtn.addEventListener('click',function(){cycleSpeed('pspd-'+id);});pr.append(pbtn,pInfo,spdBtn);return pr;}
function playScript(lines,speed){stopTTS();var spd=parseFloat(document.getElementById('pspd-main')?.textContent)||speed;playLine(lines,0,spd);}
function playLine(lines,idx,spd){if(idx>=lines.length){ttsActive=false;hlLine(-1);return;}hlLine(idx);var fill=document.getElementById('pfill-main');if(fill)fill.style.width=(idx/lines.length*100)+'%';var vs=speechSynthesis.getVoices();var esv=vs.filter(function(v){return v.lang.startsWith('es');});var u=new SpeechSynthesisUtterance(lines[idx].line);u.lang='es-ES';u.rate=spd;if(esv.length>1)u.voice=esv[idx%esv.length];else if(esv.length)u.voice=esv[0];u.onend=function(){if(ttsActive)playLine(lines,idx+1,spd);};speechSynthesis.speak(u);ttsActive=true;}
function hlLine(idx){document.querySelectorAll('[id^="sl-"]').forEach(function(e){e.classList.remove('act');});if(idx>=0){var e=document.getElementById('sl-'+idx);if(e)e.classList.add('act');}}
function answerQ(qId,idx,btn,answer,expl,optsEl){var opts=optsEl?.querySelectorAll('.q-opt');if(!opts||opts[0]?.disabled)return;opts.forEach(function(b){b.disabled=true;});opts[answer].classList.add('correct');if(idx!==answer)btn.classList.add('wrong');var qItem=btn.closest('.q-item');var fb=qItem?.querySelector('.q-feedback');if(fb){fb.textContent=expl||'';fb.className='q-feedback show '+(idx===answer?'correct':'wrong');}answered++;if(idx===answer)correct++;updateScore();if(answered>=total)setTimeout(showResult,600);}
function stopTTS(){speechSynthesis.cancel();ttsActive=false;}
function cycleSpeed(btnId){var btn=document.getElementById(btnId);if(!btn)return;var cur=parseFloat(btn.textContent);var i=SPEEDS.indexOf(cur);btn.textContent=SPEEDS[(i+1)%SPEEDS.length]+'x';}
function updateScore(){var fill=document.getElementById('sb-fill');var num=document.getElementById('sb-num');if(fill)fill.style.width=(total>0?(answered/total)*100:0)+'%';if(num)num.textContent=correct+' / '+total;}
function showResult(){var pct=Math.round(correct/total*100);var sc=document.getElementById('score-card');sc.style.display='block';document.getElementById('sc-score').textContent=correct+'/'+total;document.getElementById('sc-pct').textContent=pct+'%';document.getElementById('sc-msg').textContent=pct>=80?'🎉 ¡Excelente!':pct>=60?'👍 ¡Bien hecho!':'💪 ¡Sigue practicando!';sc.scrollIntoView({behavior:'smooth',block:'center'});}
function setLang(l){lang=l;document.querySelectorAll('[data-ko][data-es]').forEach(function(el){var t=l==='ko'?el.getAttribute('data-ko'):el.getAttribute('data-es');if(t)el.innerHTML=t;});document.getElementById('btn-ko').classList.toggle('act',l==='ko');document.getElementById('btn-es').classList.toggle('act',l==='es');renderExInfo();}
(function(){setLang('ko');renderExInfo();var lv=new URLSearchParams(location.search).get('level');if(lv)document.getElementById('sel-level').value=lv;})();
</script>
</body>
