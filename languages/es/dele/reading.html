<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--es:#c60b1e;--es-dark:#8b0013;--es-light:#fdf0f1;--es-gold:#f1b500;--bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;--border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);--green:#16a34a;--green-light:#dcfce7;--red:#e24b4a;--red-light:#fee2e2;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}.nav-lt{font-size:16px;font-weight:600;color:#fff;}.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}.nav-space{flex:1;}.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:860px;margin:0 auto;padding:28px 5% 80px;}
.hero{background:linear-gradient(135deg,var(--es-dark) 0%,var(--es) 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:6px;}.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}.hero-badge.gold{background:rgba(241,181,0,0.2);color:var(--es-gold);border-color:rgba(241,181,0,0.3);}
.ex-tabs{display:flex;background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:4px;margin-bottom:16px;gap:3px;}.etab{flex:1;padding:9px 8px;border-radius:9px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-family:inherit;transition:all 0.2s;text-align:center;white-space:nowrap;}.etab:hover{color:var(--es);}.etab.act{background:var(--es);color:#fff;}
.ex-info{background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px;}.ei-title{font-size:13px;font-weight:600;color:var(--es);margin-bottom:6px;}.ei-desc{font-size:12px;color:var(--text-muted);line-height:1.65;}.ei-tip{margin-top:8px;padding:8px 12px;background:var(--es-light);border-radius:8px;font-size:12px;color:var(--es);}
.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:120px;}.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}
.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--es);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}.gen-btn:hover{background:var(--es-dark);}.gen-btn:disabled{opacity:.5;cursor:not-allowed;}
.loading{padding:40px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:16px;display:none;}.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--es);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}@keyframes spin{to{transform:rotate(360deg)}}
.card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}.card-head{padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}.card-title{font-size:13px;font-weight:600;color:var(--text);}.card-body{padding:20px;}
.pm-badge{font-size:11px;padding:3px 10px;border-radius:8px;font-weight:600;}.pm-level{background:var(--es-light);color:var(--es);}.pm-type{background:#e1f5ee;color:#2A7F6F;}.pm-words{background:var(--bg);color:var(--text-muted);border:0.5px solid var(--border);}
.passage-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin-bottom:12px;line-height:1.4;}.passage-body{font-size:15px;line-height:2.0;color:var(--text);white-space:pre-line;}
.vf-item{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px;}.vf-stmt{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.6;}.vf-btns{display:flex;gap:10px;}.vf-btn{flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--border-md);background:var(--white);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all 0.2s;}.vf-btn:hover:not(:disabled){border-color:var(--es);background:var(--es-light);color:var(--es);}.vf-v{color:var(--green);}.vf-f{color:var(--red);}.vf-btn.correct{border-color:var(--green);background:var(--green-light);color:var(--green);}.vf-btn.wrong{border-color:var(--red);background:var(--red-light);color:var(--red);}
.q-item{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px;}.q-item:last-child{margin-bottom:0;}.q-num{font-size:10px;font-weight:700;color:var(--es);letter-spacing:.5px;margin-bottom:6px;}.q-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.6;}.q-opts{display:flex;flex-direction:column;gap:6px;}.q-opt{padding:9px 14px;border-radius:8px;border:1.5px solid var(--border-md);background:var(--white);cursor:pointer;font-size:13px;color:var(--text);transition:all 0.2s;text-align:left;font-family:inherit;display:flex;align-items:center;gap:10px;line-height:1.5;}.q-opt:hover:not(:disabled){border-color:var(--es);background:var(--es-light);}.q-opt.correct{border-color:var(--green);background:var(--green-light);color:#166534;font-weight:500;}.q-opt.wrong{border-color:var(--red);background:var(--red-light);color:#991b1b;}.q-opt-ltr{width:24px;height:24px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-muted);flex-shrink:0;}.q-opt.correct .q-opt-ltr{background:var(--green);color:#fff;}.q-opt.wrong .q-opt-ltr{background:var(--red);color:#fff;}.q-feedback{margin-top:8px;font-size:12px;padding:8px 12px;border-radius:7px;display:none;line-height:1.5;}.q-feedback.show.correct{display:block;background:var(--green-light);color:#166534;}.q-feedback.show.wrong{display:block;background:var(--red-light);color:#991b1b;}
.score-bar{display:flex;align-items:center;gap:12px;background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:none;}.sb-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--es);}.sb-bar{flex:1;height:6px;background:var(--bg);border-radius:6px;overflow:hidden;}.sb-fill{height:100%;background:linear-gradient(90deg,var(--es-dark),var(--es));border-radius:6px;transition:width 0.3s;}
.score-card{background:linear-gradient(135deg,var(--es-dark),var(--es));border-radius:14px;padding:24px;text-align:center;margin-bottom:20px;display:none;color:#fff;}.sc-score{font-family:'DM Serif Display',serif;font-size:52px;line-height:1;margin-bottom:6px;}.sc-pct{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:10px;}.sc-msg{font-size:13px;color:var(--es-gold);font-weight:500;}
.action-btns{display:flex;gap:10px;display:none;}.act-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);transition:all 0.2s;text-decoration:none;text-align:center;}.act-btn.primary{background:var(--es);color:#fff;border-color:var(--es);}.act-btn.primary:hover{background:var(--es-dark);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeUp 0.4s ease forwards;}
</style></head><body>
<nav>
  <a href="../../index.html" class="nav-logo"><div class="nav-lm">LW</div><span class="nav-lt">LinguaWalk</span></a>
  <div class="nav-sep"></div><span class="nav-page">📜 DELE — Comprensión de lectura</span>

  <div class="lang-sw"><button class="lbtn act" onclick="setLang('ko')" id="btn-ko">한국어</button><button class="lbtn" onclick="setLang('es')" id="btn-es">Español</button></div>
</nav>
<div class="main fade-in">
  <div class="hero">
    <div class="hero-tag" data-ko="DELE · 읽기 연습" data-es="DELE · Comprensión de lectura">DELE · 읽기 연습</div>
    <div class="hero-title" data-ko="📖 DELE Comprensión de lectura" data-es="📖 DELE Comprensión de lectura">📖 DELE Comprensión de lectura</div>
    <div class="hero-desc" data-ko="DELE 실제 형식 — 실용 문서·기사·장문을 읽고 이해도 문제에 답하세요." data-es="Formato real DELE — Lea documentos prácticos, artículos y textos largos.">DELE 실제 형식.</div>
    <div class="hero-badges">
      <span class="hero-badge">A1 ~ C2</span>
      <span class="hero-badge" data-ko="Tarea 1 — 실용문서" data-es="Tarea 1 — Documento">Tarea 1</span>
      <span class="hero-badge" data-ko="Tarea 2 — 기사 + V/F" data-es="Tarea 2 — Artículo + V/F">Tarea 2</span>
      <span class="hero-badge" data-ko="Tarea 3 — 장문" data-es="Tarea 3 — Texto largo">Tarea 3</span>
      <span class="hero-badge gold">DELE</span>
    </div>
  </div>
  <div class="ex-tabs">
    <button class="etab act" onclick="selectEx('t1',this)" data-ko="Tarea 1 실용" data-es="Tarea 1 Documento">Tarea 1</button>
    <button class="etab" onclick="selectEx('t2',this)" data-ko="Tarea 2 기사" data-es="Tarea 2 Artículo">Tarea 2</button>
    <button class="etab" onclick="selectEx('t3',this)" data-ko="Tarea 3 장문" data-es="Tarea 3 Texto">Tarea 3</button>
  </div>
  <div class="ex-info" id="ex-info"></div>
  <div class="settings-row">
    <div class="setting-item"><div class="si-label" data-ko="레벨" data-es="Nivel">레벨</div>
      <select class="si-select" id="sel-level"><option value="A1">A1</option><option value="A2">A2</option><option value="B1" selected>B1</option><option value="B2">B2</option><option value="C1">C1</option><option value="C2">C2</option></select>
    </div>
  </div>
  <button class="gen-btn" id="gen-btn" onclick="generate()">🤖 <span data-ko="DELE 읽기 문제 생성" data-es="Generar ejercicio DELE de lectura">DELE 읽기 문제 생성</span></button>
  <div class="loading" id="loading"><div class="spinner"></div><div id="loading-text" style="font-size:14px;color:var(--text-muted);">생성 중...</div></div>
  <div class="score-bar" id="score-bar"><div><div class="sb-num" id="sb-num">0 / 0</div><div style="font-size:11px;color:var(--text-muted);" data-ko="정답" data-es="Correctas">정답</div></div><div class="sb-bar"><div class="sb-fill" id="sb-fill" style="width:0%"></div></div></div>
  <div id="content-area"></div>
  <div class="score-card" id="score-card"><div class="sc-score" id="sc-score"></div><div class="sc-pct" id="sc-pct"></div><div class="sc-msg" id="sc-msg"></div></div>
  <div class="action-btns" id="action-btns">
    <button class="act-btn primary" onclick="generate()" data-ko="🔄 새 문제" data-es="🔄 Nuevo ejercicio">🔄 새 문제</button>
    <a href="index.html" class="act-btn" data-ko="← DELE 홈" data-es="← DELE">← DELE 홈</a>
  </div>
</div>
<script>
var lang='ko', currentEx='t1', correct=0, answered=0, total=0;
var LETTERS=['A','B','C','D'];
var EX_INFO={
  t1:{ko:'Tarea 1 — Textos practicos: 광고·공지·안내문 등 실용 문서에서 특정 정보를 찾습니다.',es:'Tarea 1 — Textos prácticos: Encuentre información específica en documentos cotidianos como anuncios, avisos o guías.',tipKo:'💡 질문에서 요구하는 정보만 찾으세요 (Skimming/Scanning).',tipEs:'💡 Busque solo la información requerida en las preguntas (Skimming/Scanning).'},
  t2:{ko:'Tarea 2 — Articulos: 신문·잡지 기사를 읽고 주제·내용·필자 의견을 파악합니다. Verdadero/Falso 포함.',es:'Tarea 2 — Artículos: Lea artículos de prensa y comprenda el tema, los hechos y la opinión del autor. Incluye Verdadero/Falso.',tipKo:'💡 첫 문단과 마지막 문단에 핵심 내용이 있습니다. V/F에서는 원문과 정확히 비교하세요.',tipEs:'💡 El primer y último párrafo contienen las ideas clave. En V/F, compare exactamente con el texto original.'},
  t3:{ko:'Tarea 3 — Texto argumentativo: 긴 글을 읽고 주제·논점·세부내용에 답합니다. B2 이상.',es:'Tarea 3 — Texto argumentativo: Lea un texto largo y responda sobre tema, argumentos y detalles. Desde B2.',tipKo:'💡 각 단락의 주제문을 파악하고 필자의 전반적 입장을 정리하세요.',tipEs:'💡 Identifique la idea principal de cada párrafo y la postura general del autor.'}
};
function selectEx(id,btn){currentEx=id;document.querySelectorAll('.etab').forEach(function(t){t.classList.remove('act');});btn.classList.add('act');renderExInfo();resetContent();}
function renderExInfo(){var info=EX_INFO[currentEx];document.getElementById('ex-info').innerHTML='<div class="ei-title">'+(lang==='ko'?info.ko.split(':')[0]:info.es.split(':')[0])+'</div><div class="ei-desc">'+(lang==='ko'?info.ko.split(':').slice(1).join(':'):info.es.split(':').slice(1).join(':')+'</div><div class="ei-tip">'+(lang==='ko'?info.tipKo:info.tipEs)+'</div>');}
function resetContent(){document.getElementById('content-area').innerHTML='';document.getElementById('score-card').style.display='none';document.getElementById('action-btns').style.display='none';document.getElementById('score-bar').style.display='none';correct=0;answered=0;total=0;}
async function generate(){if(document.getElementById('gen-btn').disabled)return;resetContent();document.getElementById('gen-btn').disabled=true;document.getElementById('loading').style.display='block';var level=document.getElementById('sel-level').value;var dele='DELE '+level;var docTypes={t1:{type:'practical document (advertisement, notice or schedule)',words:'80-150',hasVF:false},t2:{type:'newspaper or magazine article',words:'150-280',hasVF:true},t3:{type:'argumentative or informative text',words:'280-500',hasVF:false}};var dt=docTypes[currentEx];var qCount={t1:4,t2:3,t3:4}[currentEx]||3;var vfPart=dt.hasVF?',"verdadero_falso":[{"id":1,"statement":"Afirmacion en espanol.","answer":true,"explanation_ko":"Korean explanation"},{"id":2,"statement":"Afirmacion.","answer":false,"explanation_ko":"Korean explanation"}]':'';
var prompt='Generate a '+dele+' Spanish reading exercise.\nType: '+dt.type+' at '+level+' level. Words: '+dt.words+'.\n\nReturn ONLY valid JSON (no markdown, no backticks, single-line strings):\n{"level":"'+level+'","dele":"'+dele+'","doc_type":"'+dt.type+'","title":"Titulo en espanol","word_count":150,"passage":"Texto completo en espanol (una linea)","questions":[{"id":1,"text":"Pregunta en espanol?","choices":["A. Opcion","B. Opcion","C. Opcion","D. Opcion"],"answer":0,"explanation_ko":"Korean explanation"}]'+vfPart+'}\nquestions: '+qCount+' questions, answers 0-based varying. All Spanish. Single-line strings.';
try{var res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:2000,messages:[{role:'user',content:prompt}]})});var d=await res.json();var raw=d.content?.[0]?.text||'';var s=raw.replace(/```json|```/g,'').trim();var fi=s.indexOf('{');var li=s.lastIndexOf('}');if(fi!==-1&&li!==-1)s=s.slice(fi,li+1);var data=JSON.parse(s);total=(data.questions||[]).length+(data.verdadero_falso||[]).length;document.getElementById('loading').style.display='none';renderReading(data);document.getElementById('score-bar').style.display='flex';document.getElementById('action-btns').style.display='flex';updateScore();}catch(e){document.getElementById('loading').style.display='none';document.getElementById('content-area').innerHTML='<div style="padding:24px;text-align:center;color:var(--red)">⚠️ '+(lang==='ko'?'생성 실패':'Error')+'<br><small>'+e.message+'</small></div>';console.error(e);}
document.getElementById('gen-btn').disabled=false;}
function renderReading(data){var area=document.getElementById('content-area');var passCard=document.createElement('div');passCard.className='card fade-in';var pHead=document.createElement('div');pHead.className='card-head';pHead.innerHTML='<span class="card-title">'+(lang==='ko'?'읽기 지문':'Texto de lectura')+'</span><div style="display:flex;gap:6px;"><span class="pm-badge pm-level">'+(data.dele||'')+'</span><span class="pm-badge pm-type">'+(data.doc_type||'')+'</span><span class="pm-badge pm-words">~'+(data.word_count||'?')+' palabras</span></div>';var pBody=document.createElement('div');pBody.className='card-body';var titleEl=document.createElement('div');titleEl.className='passage-title';titleEl.textContent=data.title||'';
var passEl=document.createElement('div');passEl.className='passage-body';passEl.textContent=data.passage||'';
pBody.append(titleEl,passEl);passCard.append(pHead,pBody);
var qCard=document.createElement('div');qCard.className='card fade-in';var qHead=document.createElement('div');qHead.className='card-head';var qCount=(data.questions||[]).length+(data.verdadero_falso||[]).length;qHead.innerHTML='<span class="card-title">'+(lang==='ko'?'이해도 문제':'Preguntas')+' ('+qCount+')</span>';var qBody=document.createElement('div');qBody.className='card-body';
(data.questions||[]).forEach(function(q){var qDiv=document.createElement('div');qDiv.className='q-item';var qNum=document.createElement('div');qNum.className='q-num';qNum.textContent='Pregunta '+q.id;var qTxt=document.createElement('div');qTxt.className='q-text';qTxt.textContent=q.text;var opts=document.createElement('div');opts.className='q-opts';opts.id='opts-q-'+q.id;(q.choices||[]).forEach(function(c,i){var btn=document.createElement('button');btn.className='q-opt';btn.innerHTML='<span class="q-opt-ltr">'+LETTERS[i]+'</span><span>'+c+'</span>';btn.addEventListener('click',function(){answerQ(q.id,i,btn,q.answer,q.explanation_ko,opts);});opts.appendChild(btn);});var fb=document.createElement('div');fb.className='q-feedback';fb.id='fb-q-'+q.id;qDiv.append(qNum,qTxt,opts,fb);qBody.appendChild(qDiv);});
if((data.verdadero_falso||[]).length){var vfLabel=document.createElement('div');vfLabel.style.cssText='font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin:14px 0 8px;';vfLabel.textContent='Verdadero o Falso?';qBody.appendChild(vfLabel);(data.verdadero_falso||[]).forEach(function(vf){var vfDiv=document.createElement('div');vfDiv.className='vf-item';var stmt=document.createElement('div');stmt.className='vf-stmt';stmt.textContent=vf.statement;var btns=document.createElement('div');btns.className='vf-btns';var vBtn=document.createElement('button');vBtn.className='vf-btn vf-v';vBtn.textContent='✓ Verdadero';var fBtn=document.createElement('button');fBtn.className='vf-btn vf-f';fBtn.textContent='✗ Falso';function handleVF(chosen){[vBtn,fBtn].forEach(function(b){b.disabled=true;});var isC=(chosen===vf.answer);if(chosen){vBtn.classList.add(isC?'correct':'wrong');fBtn.classList.add(isC?'':'correct');}else{fBtn.classList.add(isC?'correct':'wrong');vBtn.classList.add(isC?'':'correct');}var fb=document.getElementById('fb-vf-'+vf.id);if(fb){fb.textContent=vf.explanation_ko||'';}fb.className='q-feedback show '+(isC?'correct':'wrong');answered++;if(isC)correct++;updateScore();if(answered>=total)setTimeout(showResult,600);}vBtn.addEventListener('click',function(){handleVF(true);});fBtn.addEventListener('click',function(){handleVF(false);});btns.append(vBtn,fBtn);var fb=document.createElement('div');fb.className='q-feedback';fb.id='fb-vf-'+vf.id;vfDiv.append(stmt,btns,fb);qBody.appendChild(vfDiv);});}
qCard.append(qHead,qBody);area.append(passCard,qCard);}
function answerQ(qId,idx,btn,answer,expl,optsEl){var opts=optsEl?.querySelectorAll('.q-opt');if(!opts||opts[0]?.disabled)return;opts.forEach(function(b){b.disabled=true;});opts[answer].classList.add('correct');if(idx!==answer)btn.classList.add('wrong');var qItem=btn.closest('.q-item');var fb=qItem?.querySelector('.q-feedback');if(fb){fb.textContent=expl||'';}fb.className='q-feedback show '+(idx===answer?'correct':'wrong');answered++;if(idx===answer)correct++;updateScore();if(answered>=total)setTimeout(showResult,600);}
function updateScore(){var fill=document.getElementById('sb-fill');var num=document.getElementById('sb-num');if(fill)fill.style.width=(total>0?(answered/total)*100:0)+'%';if(num)num.textContent=correct+' / '+total;}
function showResult(){var pct=Math.round(correct/total*100);var sc=document.getElementById('score-card');sc.style.display='block';document.getElementById('sc-score').textContent=correct+'/'+total;document.getElementById('sc-pct').textContent=pct+'%';document.getElementById('sc-msg').textContent=pct>=80?'🎉 ¡Excelente!':pct>=60?'👍 ¡Bien hecho!':'💪 ¡Sigue practicando!';sc.scrollIntoView({behavior:'smooth',block:'center'});}
function setLang(l){lang=l;document.querySelectorAll('[data-ko][data-es]').forEach(function(el){var t=l==='ko'?el.getAttribute('data-ko'):el.getAttribute('data-es');if(t)el.innerHTML=t;});document.getElementById('btn-ko').classList.toggle('act',l==='ko');document.getElementById('btn-es').classList.toggle('act',l==='es');renderExInfo();}
(function(){setLang('ko');renderExInfo();var lv=new URLSearchParams(location.search).get('level');if(lv)document.getElementById('sel-level').value=lv;})();
