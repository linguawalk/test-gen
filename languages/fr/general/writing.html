<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — General Français — Expression écrite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --fr:#1a4fa3;--fr-dark:#0d2d6b;--fr-light:#e8eef8;
  --purple:#7c3aed;--purple-light:#ede9fe;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --green:#16a34a;--green-light:#dcfce7;
  --red:#e24b4a;--red-light:#fee2e2;
  --amber:#b45309;--amber-light:#fef3c7;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:820px;margin:0 auto;padding:28px 5% 80px;}

.hero{background:linear-gradient(135deg,#4c1d95 0%,var(--purple) 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}

.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:130px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}

.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--purple);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:#6d28d9;}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}

.prompt-box{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:22px 24px;margin-bottom:14px;}
.pb-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--purple);margin-bottom:10px;}
.pb-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);margin-bottom:10px;line-height:1.4;}
.pb-instruction{font-size:14px;color:var(--text-muted);line-height:1.7;margin-bottom:14px;padding:12px 14px;background:var(--bg);border-radius:8px;border-left:3px solid var(--purple);}
.pb-meta{display:flex;gap:8px;flex-wrap:wrap;}
.pb-meta-item{font-size:11px;padding:3px 10px;border-radius:8px;background:var(--purple-light);color:var(--purple);font-weight:500;}

.card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.card-head{padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:600;color:var(--text);}
.card-body{padding:18px;}

.word-count{font-size:12px;color:var(--text-muted);}
.word-count span{font-weight:700;color:var(--purple);}
.writing-textarea{width:100%;min-height:200px;padding:14px;border:0.5px solid var(--border-md);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);line-height:1.8;resize:vertical;outline:none;background:var(--bg);transition:border-color 0.2s;}
.writing-textarea:focus{border-color:var(--purple);}
.writing-textarea::placeholder{color:var(--text-light);}
.word-bar{height:4px;background:var(--border);border-radius:4px;margin-top:8px;overflow:hidden;}
.word-fill{height:100%;background:linear-gradient(90deg,var(--purple),#a78bfa);border-radius:4px;transition:width 0.3s;}
.submit-btn{margin-top:14px;width:100%;padding:12px;border-radius:10px;background:var(--purple);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;transition:all 0.2s;}
.submit-btn:hover{background:#6d28d9;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}

.tips-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.tip-item{font-size:12px;padding:7px 12px;background:var(--purple-light);color:var(--purple);border-radius:8px;line-height:1.5;}
.phrase-tag{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--amber-light);color:var(--amber);display:inline-block;margin:3px;}
.outline-item{display:flex;gap:8px;margin-bottom:5px;font-size:13px;color:var(--text-muted);}
.outline-num{color:var(--purple);font-weight:700;flex-shrink:0;}

/* 피드백 */
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);border:0.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
.score-item{padding:14px 6px;text-align:center;border-right:0.5px solid var(--border);}
.score-item:last-child{border-right:none;}
.score-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--purple);line-height:1;}
.score-label{font-size:9px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.3px;}
.fb-section{padding:12px 0;border-bottom:0.5px solid var(--border);}
.fb-section:last-child{border-bottom:none;}
.fb-label{font-size:11px;font-weight:700;color:var(--text);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.fb-content{font-size:13px;color:var(--text-muted);line-height:1.65;}
.improved-box{background:var(--green-light);border-radius:8px;padding:14px;font-size:13px;color:#166534;line-height:1.85;white-space:pre-line;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.3s ease forwards;}
</style>
</head>
<body>

<nav>
  <a href="../../index.html" class="nav-logo">
    <div class="nav-lm">LW</div>
    <span class="nav-lt">LinguaWalk</span>
  </a>
  <div class="nav-sep"></div>
  <span class="nav-page" data-ko="General 프랑스어 · 쓰기" data-fr="Français Général · Expression écrite">General 프랑스어 · 쓰기</span>
  <div class="nav-space"></div>
  <a href="../../index.html" class="nav-back" data-ko="← General 홈" data-fr="← Accueil">← General 홈</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('ko')" id="btn-ko">한국어</button>
    <button class="lbtn" onclick="setLang('fr')" id="btn-fr">Français</button>
  </div>
</nav>

<div class="main">
  <div class="hero fade-in">
    <div class="hero-tag" data-ko="GENERAL 프랑스어 · 쓰기" data-fr="FRANÇAIS GÉNÉRAL · EXPRESSION ÉCRITE">GENERAL 프랑스어 · 쓰기</div>
    <div class="hero-title" data-ko="✍️ 프랑스어 쓰기 연습" data-fr="✍️ Expression écrite en français">✍️ 프랑스어 쓰기 연습</div>
    <div class="hero-desc" data-ko="AI가 생성한 주제로 프랑스어 작문을 연습하세요. 과제달성도·어법·어휘·구조·논리에 대한 AI 피드백을 받을 수 있습니다." data-fr="Entraînez-vous à l'expression écrite avec des sujets générés par IA. Obtenez un retour IA sur la réalisation de la tâche, la grammaire, le vocabulaire, la structure et la cohérence.">AI가 생성한 주제로 프랑스어 작문을 연습하세요.</div>
    <div class="hero-badges">
      <span class="hero-badge">A1 ~ C2</span>
      <span class="hero-badge" data-ko="🤖 AI 채점 5항목" data-fr="🤖 5 critères d'évaluation">🤖 AI 채점 5항목</span>
      <span class="hero-badge" data-ko="DELF 형식" data-fr="Format DELF">DELF 형식</span>
      <span class="hero-badge" data-ko="모범 답안 제공" data-fr="Exemple de réponse">모범 답안</span>
    </div>
  </div>

  <div class="settings-row fade-in">
    <div class="setting-item">
      <div class="si-label" data-ko="레벨" data-fr="Niveau">레벨</div>
      <select class="si-select" id="sel-level">
        <option value="A1">A1 (Débutant)</option>
        <option value="A2" selected>A2 (Élémentaire)</option>
        <option value="B1">B1 (Intermédiaire)</option>
        <option value="B2">B2 (Avancé)</option>
        <option value="C1">C1 (Maîtrise)</option>
        <option value="C2">C2 (Maîtrise complète)</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-ko="유형" data-fr="Type">유형</div>
      <select class="si-select" id="sel-type">
        <option value="lettre informelle">편지 (비공식) / Lettre informelle</option>
        <option value="lettre formelle">편지 (공식) / Lettre formelle</option>
        <option value="article ou essai">에세이 / Article</option>
        <option value="message ou courriel">이메일 / Courriel</option>
        <option value="description">묘사문 / Description</option>
        <option value="résumé">요약 / Résumé</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-ko="단어 수" data-fr="Nombre de mots">단어 수</div>
      <select class="si-select" id="sel-words">
        <option value="40-60">40-60 mots</option>
        <option value="60-100" selected>60-100 mots</option>
        <option value="100-160">100-160 mots</option>
        <option value="160-250">160-250 mots</option>
      </select>
    </div>
  </div>

  <button class="gen-btn fade-in" id="gen-btn" onclick="generate()">
    🤖 <span data-ko="쓰기 주제 생성" data-fr="Générer un sujet d'écriture">쓰기 주제 생성</span>
  </button>

  <div id="content-area"></div>
</div>

<script>
let lang='ko', currentPrompt=null;

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-ko][data-fr]').forEach(el=>{
    const t=l==='ko'?el.getAttribute('data-ko'):el.getAttribute('data-fr');
    if(t) el.innerHTML=t;
  });
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  document.getElementById('btn-fr').classList.toggle('act',l==='fr');
}

async function generate(){
  const level=document.getElementById('sel-level').value;
  const type=document.getElementById('sel-type').value;
  const words=document.getElementById('sel-words').value;
  const btn=document.getElementById('gen-btn');
  btn.disabled=true;
  btn.innerHTML='⏳ <span>'+(lang==='ko'?'생성 중...':'Génération...')+'</span>';
  document.getElementById('content-area').innerHTML='';

  const delf={A1:'DELF A1',A2:'DELF A2',B1:'DELF B1',B2:'DELF B2',C1:'DALF C1',C2:'DALF C2'}[level]||level;

  const prompt=`Génère un sujet d'expression écrite en français pour le niveau ${level} CEFR (${delf}).
Type de texte: ${type} / Nombre de mots cibles: ${words}

Return ONLY valid JSON (no markdown, single-line strings):
{
  "title": "Titre du sujet en français",
  "instruction": "Consigne en français (1-2 phrases claires)",
  "word_limit": "${words} mots",
  "time_limit": "20-25 minutes",
  "tips": ["Conseil de rédaction 1 en français","Conseil 2","Conseil 3"],
  "useful_phrases": ["expression utile 1","expression 2","expression 3","expression 4"],
  "sample_outline": ["Introduction","Développement 1","Développement 2","Conclusion"]
}
ALL content in French. Single-line strings only.`;

  try{
    const res=await fetch('/api/claude',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:800,
        messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=data.content?.[0]?.text||'';
    currentPrompt=JSON.parse(raw.replace(/```json|```/g,'').trim());
    currentPrompt.level=level; currentPrompt.type=type; currentPrompt.delf=delf;
    renderWriting();
  }catch(e){
    document.getElementById('content-area').innerHTML=`<div style="text-align:center;padding:24px;color:var(--red)">⚠️ ${lang==='ko'?'생성 실패':'Échec'}<br><small>${e.message}</small></div>`;
    console.error(e);
  }
  btn.disabled=false;
  btn.innerHTML='🔄 <span>'+(lang==='ko'?'새 주제':'Nouveau sujet')+'</span>';
}

function renderWriting(){
  const p=currentPrompt;
  const area=document.getElementById('content-area');
  area.innerHTML='';

  // 주제 카드
  const promptBox=document.createElement('div'); promptBox.className='prompt-box fade-in';
  promptBox.innerHTML=`
    <div class="pb-label">✍️ ${lang==='ko'?'작문 주제':'Sujet d\'expression écrite'}</div>
    <div class="pb-title">${p.title}</div>
    <div class="pb-instruction">${p.instruction}</div>
    <div class="pb-meta">
      <span class="pb-meta-item">📝 ${p.word_limit}</span>
      <span class="pb-meta-item">⏱ ${p.time_limit}</span>
      <span class="pb-meta-item">${p.delf}</span>
      <span class="pb-meta-item">${p.type}</span>
    </div>`;

  // 쓰기 카드
  const writeCard=document.createElement('div'); writeCard.className='card fade-in';
  const wHead=document.createElement('div'); wHead.className='card-head';
  const wTitle=document.createElement('div'); wTitle.className='card-title';
  wTitle.textContent=lang==='ko'?'✏️ 프랑스어로 작성하세요':'✏️ Écrivez en français';
  const wc=document.createElement('div'); wc.className='word-count';
  wc.innerHTML=(lang==='ko'?'단어 수':'Mots')+': <span id="wc">0</span>';
  wHead.append(wTitle,wc);
  const wBody=document.createElement('div'); wBody.className='card-body';
  const wordTarget=parseInt((p.word_limit||'60-100').split('-')[1]||100);
  const ta=document.createElement('textarea'); ta.className='writing-textarea'; ta.id='writing-area';
  ta.placeholder=lang==='ko'?'여기에 프랑스어로 작성하세요…':'Écrivez votre texte en français ici…';
  ta.addEventListener('input',()=>{
    const wcount=ta.value.trim().split(/\s+/).filter(w=>w.length>0).length;
    document.getElementById('wc').textContent=wcount;
    document.getElementById('word-fill').style.width=Math.min(100,(wcount/wordTarget)*100)+'%';
  });
  const wordBar=document.createElement('div'); wordBar.className='word-bar';
  wordBar.innerHTML='<div class="word-fill" id="word-fill" style="width:0%"></div>';
  const submitBtn=document.createElement('button'); submitBtn.className='submit-btn'; submitBtn.id='submit-btn';
  submitBtn.textContent=lang==='ko'?'✓ 제출하고 AI 피드백 받기':'✓ Soumettre et obtenir un retour IA';
  submitBtn.addEventListener('click',submitWriting);
  wBody.append(ta,wordBar,submitBtn);
  writeCard.append(wHead,wBody);

  // 도움말 카드
  const helpCard=document.createElement('div'); helpCard.className='card fade-in';
  const hHead=document.createElement('div'); hHead.className='card-head';
  hHead.innerHTML=`<div class="card-title">${lang==='ko'?'💡 작성 팁 & 유용한 표현':'💡 Conseils & Expressions utiles'}</div>`;
  const hBody=document.createElement('div'); hBody.className='card-body';
  const tipsDiv=document.createElement('div'); tipsDiv.className='tips-grid';
  (p.tips||[]).forEach(t=>{
    const d=document.createElement('div'); d.className='tip-item'; d.textContent='💡 '+t;
    tipsDiv.appendChild(d);
  });
  const phLabel=document.createElement('div');
  phLabel.style.cssText='font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-light);margin:12px 0 6px;';
  phLabel.textContent=lang==='ko'?'유용한 표현':'Expressions utiles';
  const phDiv=document.createElement('div');
  (p.useful_phrases||[]).forEach(ph=>{
    const s=document.createElement('span'); s.className='phrase-tag'; s.textContent=ph;
    phDiv.appendChild(s);
  });
  const outLabel=document.createElement('div');
  outLabel.style.cssText='font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-light);margin:12px 0 6px;';
  outLabel.textContent=lang==='ko'?'구조 예시':'Structure suggérée';
  const outDiv=document.createElement('div');
  (p.sample_outline||[]).forEach((s,i)=>{
    const d=document.createElement('div'); d.className='outline-item';
    d.innerHTML=`<span class="outline-num">${i+1}.</span><span>${s}</span>`;
    outDiv.appendChild(d);
  });
  hBody.append(tipsDiv,phLabel,phDiv,outLabel,outDiv);
  helpCard.append(hHead,hBody);

  const fbSection=document.createElement('div'); fbSection.id='feedback-section';
  area.append(promptBox,writeCard,helpCard,fbSection);
}

async function submitWriting(){
  const text=document.getElementById('writing-area').value.trim();
  const wordCount=text.split(/\s+/).filter(w=>w.length>0).length;
  if(wordCount<5){
    alert(lang==='ko'?'최소 5단어 이상 프랑스어로 작성해 주세요.':'Veuillez écrire au moins 5 mots en français.');
    return;
  }
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;
  btn.textContent=lang==='ko'?'⏳ AI 피드백 생성 중...':'⏳ Génération du retour IA...';
  const fb=document.getElementById('feedback-section');
  fb.innerHTML=`<div style="text-align:center;padding:24px;background:var(--white);border:0.5px solid var(--border);border-radius:14px;">
    <div style="font-size:24px;margin-bottom:8px;">⏳</div>
    <div style="color:var(--text-muted);font-size:14px;">${lang==='ko'?'AI 채점 중…':'Évaluation en cours…'}</div></div>`;

  const prompt=`Tu es un correcteur d'examens DELF/DALF. Évalue ce texte écrit en français.

Sujet: "${currentPrompt.title}"
Consigne: "${currentPrompt.instruction}"
Niveau: ${currentPrompt.level} (${currentPrompt.delf})
Texte de l'apprenant: "${text}"

Return ONLY valid JSON (no markdown, single-line strings):
{
  "task_score": 7,
  "grammar_score": 7,
  "vocabulary_score": 7,
  "structure_score": 7,
  "coherence_score": 7,
  "strengths_fr": "Points positifs (en français)",
  "grammar_fr": "Retour sur la grammaire (en français)",
  "vocabulary_fr": "Retour sur le vocabulaire (en français)",
  "structure_fr": "Retour sur la structure (en français)",
  "improved_fr": "Version améliorée complète du texte (en français)"
}
Note sur 10. Ton encourageant. Tout en français.`;

  try{
    const res=await fetch('/api/claude',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1500,
        messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=data.content?.[0]?.text||'';
    const r=JSON.parse(raw.replace(/```json|```/g,'').trim());
    const overall=Math.round((r.task_score+r.grammar_score+r.vocabulary_score+r.structure_score+r.coherence_score)/5);

    fb.innerHTML=`
      <div class="card fade-in">

            <div class="score-item"><div class="score-num">${r.grammar_score}</div><div class="score-label">${lang==='ko'?'문법':'Grammaire'}</div></div>
            <div class="score-item"><div class="score-num">${r.vocabulary_score}</div><div class="score-label">${lang==='ko'?'어휘':'Vocabulaire'}</div></div>
            <div class="score-item"><div class="score-num">${r.structure_score}</div><div class="score-label">${lang==='ko'?'구조':'Structure'}</div></div>
          </div>
          <div>
            <div class="fb-section"><div class="fb-label">✅ ${lang==='ko'?'잘한 점':'Points positifs'}</div><div class="fb-content">${r.strengths_fr}</div></div>
            <div class="fb-section"><div class="fb-label">📝 ${lang==='ko'?'문법':'Grammaire'}</div><div class="fb-content">${r.grammar_fr}</div></div>
            <div class="fb-section"><div class="fb-label">📚 ${lang==='ko'?'어휘':'Vocabulaire'}</div><div class="fb-content">${r.vocabulary_fr}</div></div>
            <div class="fb-section"><div class="fb-label">🏗 ${lang==='ko'?'구조·논리':'Structure'}</div><div class="fb-content">${r.structure_fr}</div></div>
            <div class="fb-section">
              <div class="fb-label">✨ ${lang==='ko'?'개선된 작문':'Version améliorée'}</div>
              <div class="improved-box">${r.improved_fr}</div>

          </div>
          <button onclick="generate()" style="margin-top:16px;width:100%;padding:12px;border-radius:10px;background:var(--purple);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;">
            🔄 ${lang==='ko'?'새 주제로 연습':'Pratiquer avec un nouveau sujet'}
          </button>
        </div>
      </div>`;
  }catch(e){
    fb.innerHTML=`<div style="padding:16px;color:var(--red)">⚠️ ${lang==='ko'?'피드백 생성 실패':'Échec de l\'évaluation'}</div>`;
    console.error(e);
  }
  btn.disabled=false;
  btn.textContent=lang==='ko'?'✓ 제출하고 AI 피드백 받기':'✓ Soumettre et obtenir un retour IA';
}

(function(){ setLang('ko'); })();
</script>
