<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — General Français — Écoute</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --fr:#1a4fa3;--fr-dark:#0d2d6b;--fr-light:#e8eef8;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --green:#16a34a;--green-light:#dcfce7;
  --red:#e24b4a;--red-light:#fee2e2;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:820px;margin:0 auto;padding:28px 5% 80px;}

.hero{background:linear-gradient(135deg,var(--fr-dark) 0%,var(--fr) 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}

.part-tabs{display:flex;background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:4px;margin-bottom:16px;gap:4px;}
.ptab{flex:1;padding:9px 10px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-family:inherit;transition:all 0.2s;text-align:center;}
.ptab:hover{color:var(--fr);}
.ptab.act{background:var(--fr);color:#fff;}

.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:120px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}

.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--fr);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:var(--fr-dark);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}

.loading{padding:40px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:16px;display:none;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--fr);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

.photo-card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.photo-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#dde3ee;overflow:hidden;}
.photo-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity 0.4s;}
.photo-loading{position:absolute;inset:0;background:rgba(28,43,69,0.55);display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;font-size:12px;}
.photo-loading.hidden{display:none;}
.ph-spin{width:28px;height:28px;border:2.5px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;}
.photo-cap{padding:9px 16px;background:var(--fr-light);font-size:12px;color:var(--fr);}

.audio-card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:14px;}
.ac-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px;}
.ac-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.ac-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--fr-light);color:var(--fr);font-weight:600;}
.player-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border-radius:10px;border:0.5px solid var(--border);}
.play-btn{width:40px;height:40px;border-radius:50%;background:var(--fr);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.play-btn:hover{background:var(--fr-dark);}
.play-btn svg{width:16px;height:16px;fill:#fff;}
.player-info{flex:1;}
.player-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
.player-bar{height:5px;background:var(--border);border-radius:5px;overflow:hidden;}
.player-fill{height:100%;background:linear-gradient(90deg,var(--fr-dark),var(--fr));border-radius:5px;width:0%;transition:width 0.1s;}
.speed-btn{padding:3px 9px;border-radius:7px;border:0.5px solid var(--border-md);background:transparent;font-size:11px;font-weight:600;color:var(--text-muted);cursor:pointer;font-family:inherit;flex-shrink:0;}
.speed-btn:hover{background:var(--fr-light);color:var(--fr);border-color:var(--fr);}

.choices-section{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:16px;}
.choices-locked{opacity:0.25;pointer-events:none;filter:blur(2px);transition:all 0.4s;}
.p1-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.p1-btn{height:60px;border-radius:12px;border:2px solid var(--border-md);background:var(--white);cursor:pointer;font-family:'DM Serif Display',serif;font-size:24px;font-weight:700;color:var(--text-muted);transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.p1-btn:hover:not(:disabled){border-color:var(--fr);background:var(--fr-light);color:var(--fr);}
.p1-btn.playing{border-color:var(--fr);background:var(--fr-light);color:var(--fr);animation:pulse-btn 0.6s infinite alternate;}
@keyframes pulse-btn{from{transform:scale(1)}to{transform:scale(1.06)}}
.p1-btn.correct{border-color:var(--green);background:var(--green-light);color:var(--green);}
.p1-btn.wrong{border-color:var(--red);background:var(--red-light);color:var(--red);}

.q-item{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px;}
.q-item:last-child{margin-bottom:0;}
.q-num{font-size:10px;font-weight:700;color:var(--fr);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.q-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.5;}
.q-opts{display:flex;flex-direction:column;gap:7px;}
.q-opt{padding:9px 14px;border-radius:8px;border:1.5px solid var(--border-md);background:var(--white);cursor:pointer;font-size:13px;color:var(--text);transition:all 0.2s;text-align:left;font-family:inherit;display:flex;align-items:center;gap:10px;}
.q-opt:hover:not(:disabled){border-color:var(--fr);background:var(--fr-light);}
.q-opt.correct{border-color:var(--green);background:var(--green-light);color:#166534;font-weight:500;}
.q-opt.wrong{border-color:var(--red);background:var(--red-light);color:#991b1b;}
.q-opt-ltr{width:24px;height:24px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-muted);flex-shrink:0;}
.q-opt.correct .q-opt-ltr{background:var(--green);color:#fff;}
.q-opt.wrong .q-opt-ltr{background:var(--red);color:#fff;}
.q-feedback{margin-top:8px;font-size:12px;padding:8px 12px;border-radius:7px;display:none;line-height:1.5;}
.q-feedback.show{display:block;}
.q-feedback.correct{background:var(--green-light);color:#166534;}
.q-feedback.wrong{background:var(--red-light);color:#991b1b;}

.script-wrap{margin-top:10px;border-top:0.5px solid var(--border);padding-top:10px;display:none;}
.script-wrap.open{display:block;}
.script-toggle{font-size:11px;color:var(--fr);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600;padding:4px 0;margin-bottom:8px;}
.script-line{display:flex;gap:8px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:background 0.15s;}
.script-line:hover{background:var(--fr-light);}
.script-line.act{background:var(--fr-light);}
.sl-spk{font-size:10px;font-weight:700;color:var(--fr);min-width:46px;padding-top:2px;text-transform:uppercase;}
.sl-txt{font-size:13px;color:var(--text);line-height:1.65;flex:1;}

.score-card{background:linear-gradient(135deg,var(--fr-dark),var(--fr));border-radius:14px;padding:24px;text-align:center;margin-bottom:20px;display:none;}
.sc-score{font-family:'DM Serif Display',serif;font-size:52px;color:#fff;line-height:1;margin-bottom:6px;}
.sc-pct{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:10px;}
.sc-msg{font-size:13px;color:#fcd34d;font-weight:500;}

.action-btns{display:flex;gap:10px;display:none;}
.act-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);transition:all 0.2s;text-decoration:none;text-align:center;}
.act-btn.primary{background:var(--fr);color:#fff;border-color:var(--fr);}
.act-btn.primary:hover{background:var(--fr-dark);}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.4s ease forwards;}
</style>
</head>
<body>

<nav>
  <a href="../../index.html" class="nav-logo">
    <div class="nav-lm">LW</div>
    <span class="nav-lt">LinguaWalk</span>
  </a>
  <div class="nav-sep"></div>
  <span class="nav-page" data-ko="General 프랑스어 · 듣기" data-fr="Français Général · Écoute">General 프랑스어 · 듣기</span>
  <div class="nav-space"></div>
  <a href="../../index.html" class="nav-back" data-ko="← General 홈" data-fr="← Accueil">← General 홈</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('ko')" id="btn-ko">한국어</button>
    <button class="lbtn" onclick="setLang('fr')" id="btn-fr">Français</button>
  </div>
</nav>

<div class="main">
  <div class="hero fade-in">
    <div class="hero-tag" data-ko="GENERAL 프랑스어 · 듣기" data-fr="FRANÇAIS GÉNÉRAL · ÉCOUTE">GENERAL 프랑스어 · 듣기</div>
    <div class="hero-title" data-ko="🎧 프랑스어 듣기 연습" data-fr="🎧 Exercices de compréhension orale">🎧 프랑스어 듣기 연습</div>
    <div class="hero-desc" data-ko="사진 묘사, 대화, 독백 — AI가 생성한 프랑스어 듣기 문제로 실력을 키우세요." data-fr="Description d'image, dialogue, monologue — Entraînez-vous avec des exercices de compréhension orale générés par IA.">사진 묘사, 대화, 독백 — AI 생성 프랑스어 듣기 문제.</div>
    <div class="hero-badges">
      <span class="hero-badge" data-ko="Partie 1 — 사진 묘사" data-fr="Partie 1 — Description">Partie 1 — 사진 묘사</span>
      <span class="hero-badge" data-ko="Partie 2 — 대화 응답" data-fr="Partie 2 — Dialogue">Partie 2 — 대화</span>
      <span class="hero-badge" data-ko="Partie 3 — 독백" data-fr="Partie 3 — Monologue">Partie 3 — 독백</span>
      <span class="hero-badge">🤖 AI</span>
    </div>
  </div>

  <div class="part-tabs fade-in">
    <button class="ptab act" onclick="selectPart('p1',this)" data-ko="📸 Partie 1" data-fr="📸 Partie 1">📸 Partie 1</button>
    <button class="ptab" onclick="selectPart('p2',this)" data-ko="💬 Partie 2" data-fr="💬 Partie 2">💬 Partie 2</button>
    <button class="ptab" onclick="selectPart('p3',this)" data-ko="🗣️ Partie 3" data-fr="🗣️ Partie 3">🗣️ Partie 3</button>
  </div>

  <div class="settings-row fade-in">
    <div class="setting-item">
      <div class="si-label" data-ko="레벨" data-fr="Niveau">레벨</div>
      <select class="si-select" id="sel-level">
        <option value="A1">A1 — 입문 (Débutant)</option>
        <option value="A2" selected>A2 — 초급 (Élémentaire)</option>
        <option value="B1">B1 — 중급 (Intermédiaire)</option>
        <option value="B2">B2 — 중상급 (Avancé)</option>
        <option value="C1">C1 — 고급 (Maîtrise)</option>
        <option value="C2">C2 — 최고급 (Maîtrise complète)</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-ko="주제" data-fr="Thème">주제</div>
      <select class="si-select" id="sel-topic">
        <option value="vie quotidienne">일상생활 / Vie quotidienne</option>
        <option value="voyages et transports">여행·교통 / Voyages</option>
        <option value="travail et études">직장·학업 / Travail</option>
        <option value="culture et loisirs">문화·여가 / Culture</option>
        <option value="santé et alimentation">건강·음식 / Santé</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-ko="음성 속도" data-fr="Vitesse">음성 속도</div>
      <select class="si-select" id="sel-speed">
        <option value="0.7" data-ko="느리게 (0.7x)" data-fr="Lent (0.7x)">느리게 (0.7x)</option>
        <option value="0.9" selected data-ko="보통 (0.9x)" data-fr="Normal (0.9x)">보통 (0.9x)</option>
        <option value="1.1" data-ko="빠르게 (1.1x)" data-fr="Rapide (1.1x)">빠르게 (1.1x)</option>
      </select>
    </div>
  </div>

  <button class="gen-btn fade-in" id="gen-btn" onclick="generate()">
    🤖 <span data-ko="프랑스어 듣기 생성" data-fr="Générer un exercice d'écoute">프랑스어 듣기 생성</span>
  </button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div id="loading-text" style="font-size:14px;color:var(--text-muted);">생성 중...</div>
  </div>

  <div id="content-area"></div>

  <div class="score-card" id="score-card">
    <div class="sc-score" id="sc-score"></div>
    <div class="sc-pct" id="sc-pct"></div>
    <div class="sc-msg" id="sc-msg"></div>
  </div>

  <div class="action-btns" id="action-btns">
    <button class="act-btn primary" onclick="generate()" data-ko="🔄 새 문제" data-fr="🔄 Nouvel exercice">🔄 새 문제</button>
    <a href="../../index.html" class="act-btn" data-ko="← General 홈" data-fr="← Accueil">← General 홈</a>
  </div>
</div>

<script>
let lang='ko', currentPart='p1', currentData=null;
let isLoading=false, ttsActive=false;
let correct=0, answered=0, total=0;
const SPEEDS=[0.7,0.8,0.9,1.0,1.1,1.2];
const LETTERS=['A','B','C','D'];

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-ko][data-fr]').forEach(el=>{
    const t=l==='ko'?el.getAttribute('data-ko'):el.getAttribute('data-fr');
    if(t) el.innerHTML=t;
  });
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  document.getElementById('btn-fr').classList.toggle('act',l==='fr');
}

function selectPart(id,btn){
  stopTTS(); currentPart=id;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('act'));
  btn.classList.add('act');
  resetContent();
}

function resetContent(){
  stopTTS();
  document.getElementById('content-area').innerHTML='';
  document.getElementById('score-card').style.display='none';
  document.getElementById('action-btns').style.display='none';
  correct=0; answered=0; total=0; currentData=null;
}

async function callClaude(prompt,maxTok){
  const r=await fetch('/api/claude',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:maxTok||1000,
      messages:[{role:'user',content:prompt}]})});
  const d=await r.json();
  const raw=d.content?.[0]?.text||'';
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

async function loadImage(id,prompt){
  const img=document.getElementById('img-'+id);
  const ld=document.getElementById('imgl-'+id);
  if(!img) return;
  function show(url){
    img.onload=()=>{img.style.opacity=1;if(ld)ld.classList.add('hidden');};
    img.onerror=()=>{img.onerror=null;img.src='https://picsum.photos/1200/675?random='+id;img.onload=()=>{img.style.opacity=1;if(ld)ld.classList.add('hidden');};};
    img.src=url;
  }
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),20000);
    const r=await fetch('/api/generate-image',{method:'POST',signal:ctrl.signal,
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt,aspectRatio:'16:9'})});
    clearTimeout(timer);
    const d=await r.json();
    if(d.imageUrl){show(d.imageUrl);return;}
  }catch(e){}
  show('https://picsum.photos/1200/675?random='+id);
}

async function generate(){
  if(isLoading) return;
  isLoading=true; resetContent();
  document.getElementById('gen-btn').disabled=true;
  document.getElementById('loading').style.display='block';
  const level=document.getElementById('sel-level').value;
  const topic=document.getElementById('sel-topic').value;
  const speed=parseFloat(document.getElementById('sel-speed').value);
  const lt=document.getElementById('loading-text');

  try{
    if(currentPart==='p1'){
      lt.textContent=lang==='ko'?'🤖 문제 생성 중…':'🤖 Génération en cours…';
      const item=await callClaude(promptP1(level,topic),800);
      item.id=1; total=1;
      document.getElementById('loading').style.display='none';
      document.getElementById('content-area').appendChild(makeP1Card(item,speed));
      loadImage(1,item.imagePrompt);
    } else if(currentPart==='p2'){
      lt.textContent=lang==='ko'?'🤖 대화 생성 중…':'🤖 Génération du dialogue…';
      currentData=await callClaude(promptP2(level,topic),1200);
      total=currentData.items.length;
      document.getElementById('loading').style.display='none';
      document.getElementById('content-area').appendChild(makeP2Block(currentData.items,speed));
    } else {
      lt.textContent=lang==='ko'?'🤖 독백 생성 중…':'🤖 Génération du monologue…';
      currentData=await callClaude(promptP3(level,topic),1500);
      total=currentData.questions.length;
      document.getElementById('loading').style.display='none';
      document.getElementById('content-area').appendChild(makeP3Card(currentData,speed));
    }
    document.getElementById('action-btns').style.display='flex';
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('content-area').innerHTML=`<div style="padding:24px;text-align:center;color:var(--red)">⚠️ ${lang==='ko'?'생성 실패':'Échec de génération'}<br><small>${e.message}</small></div>`;
    console.error(e);
  }
  isLoading=false;
  document.getElementById('gen-btn').disabled=false;
}

// ── Partie 1 카드 ────────────────────────────────────────────────────
function makeP1Card(item,speed){

  hint.setAttribute('data-fr','🔊 Écoutez d\'abord, puis choisissez');

function playP1(item,speed){
  const btn=document.getElementById('pbtn-1');
  const fill=document.getElementById('pfill-1');
  const spd=parseFloat(document.getElementById('pspd-1')?.textContent)||speed;
  stopTTS();
  btn.innerHTML='<svg viewBox="0 0 24 24" fill="#fff"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  const choicesEl=document.getElementById('p1choices-1');
  const hintEl=document.getElementById('hint-1');
  if(choicesEl) choicesEl.classList.remove('choices-locked');
  if(hintEl) hintEl.style.display='none';
  const queue=item.choices.map((c,i)=>LETTERS[i]+'. '+c);
  const vs=speechSynthesis.getVoices();
  const frv=vs.find(v=>v.lang.startsWith('fr'))||vs.find(v=>v.lang.startsWith('en'));
  let qi=0; ttsActive=true;
  function playNext(){
    if(!ttsActive||qi>=queue.length){
      btn.innerHTML='<svg viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
      fill.style.width='100%'; ttsActive=false;
      if(choicesEl) choicesEl.querySelectorAll('.p1-btn').forEach(b=>b.classList.remove('playing'));
      return;
    }
    fill.style.width=(qi/queue.length*100)+'%';
    if(choicesEl) choicesEl.querySelectorAll('.p1-btn').forEach((b,i)=>b.classList.toggle('playing',i===qi));
    const text=queue[qi];
    const u=new SpeechSynthesisUtterance(text); u.lang='fr-FR'; u.rate=spd;
    if(frv) u.voice=frv;
    qi++;
    let done=false;
    function next(){if(done)return;done=true;playNext();}
    u.onend=next;
    setTimeout(next,Math.ceil(text.length*500/spd)+1500);
    speechSynthesis.speak(u);
  }
  playNext();
}

function ansP1(idx,btn,item){
  const opts=document.getElementById('p1choices-1')?.querySelectorAll('.p1-btn'); if(!opts) return;
  opts.forEach(b=>{b.disabled=true;b.classList.remove('playing');});
  opts[item.answer].classList.add('correct');
  if(idx!==item.answer) btn.classList.add('wrong');
  const fb=document.getElementById('p1fb-1');
  const ct=item.choices[item.answer]||'';
  fb.innerHTML=(idx===item.answer
    ?`✅ ${lang==='ko'?'정답':'Correct'}! <strong>${LETTERS[item.answer]}.</strong> ${ct}<br><small>${item.explanation_ko}</small>`
    :`❌ ${lang==='ko'?'오답. 정답:':'Incorrect. Réponse:'} <strong>${LETTERS[item.answer]}.</strong> ${ct}<br><small>${item.explanation_ko}</small>`);
  fb.className='q-feedback show '+(idx===item.answer?'correct':'wrong');
  answered++; if(idx===item.answer) correct++;
  checkDone();
}

      const btn=document.createElement('button'); btn.className='q-opt';

function playP2(item,speed){
  const fill=document.getElementById('p2fill-'+item.id);
  const spd=parseFloat(document.getElementById('p2spd-'+item.id)?.textContent)||speed;
  stopTTS();
  const u=new SpeechSynthesisUtterance(item.question); u.lang='fr-FR'; u.rate=spd;
  const vs=speechSynthesis.getVoices(); const frv=vs.find(v=>v.lang.startsWith('fr'))||vs.find(v=>v.lang.startsWith('en'));
  if(frv) u.voice=frv;
  u.onboundary=e=>{if(e.name==='word'&&fill) fill.style.width=Math.min(100,e.charIndex/item.question.length*100)+'%';};
  u.onend=()=>{ttsActive=false;if(fill)fill.style.width='100%';};
  speechSynthesis.speak(u); ttsActive=true;
}

// ── Partie 3 카드 ────────────────────────────────────────────────────
function makeP3Card(data,speed){
  const isDialogue=data.type==='dialogue';
  const lines=isDialogue?data.dialogue:[{speaker:data.talkType||'Narrateur',line:data.script}];
  const wrap=document.createElement('div'); wrap.className='audio-card fade-in';
  const hdr=document.createElement('div'); hdr.className='ac-header';
  const ttl=document.createElement('div'); ttl.className='ac-title';
  ttl.innerHTML=(isDialogue?'🗣️ ':'📢 ')+(lang==='ko'?(isDialogue?'대화':'독백'):(isDialogue?'Dialogue':'Monologue'))+'&nbsp;<span class="ac-badge">'+(isDialogue?'Dialogue':'Monologue')+'</span>';
  const togBtn=document.createElement('button'); togBtn.className='script-toggle';
  togBtn.textContent=lang==='ko'?'📄 스크립트 보기':'📄 Voir le script';
  togBtn.addEventListener('click',function(){
    const sc=document.getElementById('script-p3');
    const open=sc.classList.toggle('open');
    togBtn.textContent=open?(lang==='ko'?'🙈 숨기기':'🙈 Masquer'):(lang==='ko'?'📄 스크립트 보기':'📄 Voir le script');
  });
  hdr.append(ttl,togBtn);
  const pr=document.createElement('div'); pr.className='player-row';
  const pbtn=document.createElement('button'); pbtn.className='play-btn'; pbtn.style.cssText='width:36px;height:36px;';
  pbtn.innerHTML='<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  pbtn.addEventListener('click',()=>playP3(data,speed));
  const pInfo=document.createElement('div'); pInfo.className='player-info';
  pInfo.innerHTML=`<div class="player-label">${isDialogue?(data.context||'dialogue'):(lang==='ko'?'독백을 들으세요':'Écoutez le monologue')}</div><div class="player-bar"><div class="player-fill" id="p3fill"></div></div>`;
  const spdBtn=document.createElement('button'); spdBtn.className='speed-btn'; spdBtn.id='p3spd'; spdBtn.textContent=speed+'x';
  spdBtn.addEventListener('click',()=>cycleSpeed('p3spd'));
  pr.append(pbtn,pInfo,spdBtn);
  const scriptWrap=document.createElement('div'); scriptWrap.className='script-wrap'; scriptWrap.id='script-p3';
  lines.forEach((l,i)=>{
    const row=document.createElement('div'); row.className='script-line'; row.id='sl-p3-'+i;
    row.innerHTML=`<span class="sl-spk">${l.speaker}</span><span class="sl-txt">${l.line}</span>`;
    row.addEventListener('click',()=>{stopTTS();playDlg(lines,i,speed);});
    scriptWrap.appendChild(row);
  });
  const qSec=document.createElement('div'); qSec.style.marginTop='14px';
  data.questions.forEach(q=>{
    const qDiv=document.createElement('div'); qDiv.className='q-item';

    const qTxt=document.createElement('div'); qTxt.className='q-text'; qTxt.textContent=q.text;

    q.choices.forEach((c,i)=>{
      const btn=document.createElement('button'); btn.className='q-opt';
      btn.innerHTML=`<span class="q-opt-ltr">${LETTERS[i]}</span><span>${c}</span>`;
      btn.addEventListener('click',()=>ansQ(q.id,i,btn,q.answer,q.explanation_ko,opts));
      opts.appendChild(btn);
    });
    const fb=document.createElement('div'); fb.className='q-feedback'; fb.id='fb-p3-'+q.id;
    qDiv.append(qNum,qTxt,opts,fb);
    qSec.appendChild(qDiv);
  });
  wrap.append(hdr,pr,scriptWrap,qSec);
  return wrap;
}

function playP3(data,speed){
  const spd=parseFloat(document.getElementById('p3spd')?.textContent)||speed;
  stopTTS();
  if(data.type==='dialogue') playDlg(data.dialogue,0,spd);
  else playMono(data.script,spd);
}
function playDlg(lines,idx,spd){
  if(idx>=lines.length){ttsActive=false;hlLine(-1);return;}
  hlLine(idx);
  const fill=document.getElementById('p3fill');
  if(fill) fill.style.width=(idx/lines.length*100)+'%';
  const vs=speechSynthesis.getVoices();
  const frvs=vs.filter(v=>v.lang.startsWith('fr'));
  const u=new SpeechSynthesisUtterance(lines[idx].line); u.lang='fr-FR'; u.rate=spd;
  if(frvs.length>1) u.voice=frvs[idx%frvs.length]; else if(frvs.length) u.voice=frvs[0];
  u.onend=()=>{if(ttsActive) playDlg(lines,idx+1,spd);};
  speechSynthesis.speak(u); ttsActive=true;
}
function playMono(script,spd){
  hlLine(0);
  const fill=document.getElementById('p3fill');
  const u=new SpeechSynthesisUtterance(script); u.lang='fr-FR'; u.rate=spd;
  const vs=speechSynthesis.getVoices(); const frv=vs.find(v=>v.lang.startsWith('fr'))||vs.find(v=>v.lang.startsWith('en'));
  if(frv) u.voice=frv;
  u.onboundary=e=>{if(e.name==='word'&&fill) fill.style.width=Math.min(100,e.charIndex/script.length*100)+'%';};
  u.onend=()=>{ttsActive=false;hlLine(-1);if(fill)fill.style.width='100%';};
  speechSynthesis.speak(u); ttsActive=true;
}
function hlLine(idx){
  document.querySelectorAll('[id^="sl-p3-"]').forEach(e=>e.classList.remove('act'));
  if(idx>=0){const e=document.getElementById('sl-p3-'+idx);if(e)e.classList.add('act');}
}

function ansQ(qId,idx,btn,answer,expl,optsEl){
  const opts=optsEl?.querySelectorAll('.q-opt'); if(!opts||opts[0]?.disabled) return;
  opts.forEach(b=>b.disabled=true);
  opts[answer].classList.add('correct');
  if(idx!==answer) btn.classList.add('wrong');
  const qItem=btn.closest('.q-item');
  const fb=qItem?.querySelector('.q-feedback');
  if(fb){fb.textContent=expl||'';fb.className='q-feedback show '+(idx===answer?'correct':'wrong');}
  answered++; if(idx===answer) correct++;
  checkDone();
}

function stopTTS(){speechSynthesis.cancel();ttsActive=false;}
function cycleSpeed(btnId){
  const btn=document.getElementById(btnId); if(!btn) return;
  const cur=parseFloat(btn.textContent);
  const i=SPEEDS.indexOf(cur);
  btn.textContent=SPEEDS[(i+1)%SPEEDS.length]+'x';
}
function checkDone(){
  if(answered<total) return;
  const pct=Math.round(correct/total*100);
  const sc=document.getElementById('score-card'); sc.style.display='block';
  document.getElementById('sc-score').textContent=`${correct}/${total}`;
  document.getElementById('sc-pct').textContent=`${pct}%`;
  document.getElementById('sc-msg').textContent=
    pct>=80?(lang==='ko'?'🎉 훌륭합니다!':'🎉 Excellent !'):
    pct>=60?(lang==='ko'?'👍 잘 하셨습니다!':'👍 Bien joué !'):
    (lang==='ko'?'💪 계속 연습!':'💪 Continuez à pratiquer !');
  sc.scrollIntoView({behavior:'smooth',block:'center'});
}
