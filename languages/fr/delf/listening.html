<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — DELF/DALF Compréhension de l'oral</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --fr:#1a4fa3;--fr-dark:#0d2d6b;--fr-light:#e8eef8;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --green:#16a34a;--green-light:#dcfce7;
  --red:#e24b4a;--red-light:#fee2e2;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:820px;margin:0 auto;padding:28px 5% 80px;}

.hero{background:linear-gradient(135deg,var(--fr-dark) 0%,var(--fr) 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}

.ex-tabs{display:flex;background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:4px;margin-bottom:16px;gap:3px;overflow-x:auto;}
.etab{flex:1;padding:9px 8px;border-radius:9px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-family:inherit;transition:all 0.2s;text-align:center;white-space:nowrap;min-width:80px;}
.etab:hover{color:var(--fr);}
.etab.act{background:var(--fr);color:#fff;}

.ex-info{background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px;}
.ei-title{font-size:13px;font-weight:600;color:var(--fr);margin-bottom:6px;}
.ei-desc{font-size:12px;color:var(--text-muted);line-height:1.65;}
.ei-tip{margin-top:8px;padding:8px 12px;background:var(--fr-light);border-radius:8px;font-size:12px;color:var(--fr);}

.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:120px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}

.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--fr);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:var(--fr-dark);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}

.loading{padding:40px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:16px;display:none;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--fr);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

.audio-card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:14px;}
.ac-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px;}
.ac-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.ac-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--fr-light);color:var(--fr);font-weight:600;}
.player-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border-radius:10px;border:0.5px solid var(--border);}
.play-btn{width:40px;height:40px;border-radius:50%;background:var(--fr);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.play-btn:hover{background:var(--fr-dark);}
.play-btn svg{width:16px;height:16px;fill:#fff;}
.player-info{flex:1;}
.player-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
.player-bar{height:5px;background:var(--border);border-radius:5px;overflow:hidden;}
.player-fill{height:100%;background:linear-gradient(90deg,var(--fr-dark),var(--fr));border-radius:5px;width:0%;transition:width 0.1s;}
.speed-btn{padding:3px 9px;border-radius:7px;border:0.5px solid var(--border-md);background:transparent;font-size:11px;font-weight:600;color:var(--text-muted);cursor:pointer;font-family:inherit;flex-shrink:0;}
.speed-btn:hover{background:var(--fr-light);color:var(--fr);border-color:var(--fr);}

.script-toggle{font-size:11px;color:var(--fr);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600;padding:6px 0;display:block;}
.script-wrap{display:none;margin-top:8px;padding:12px 14px;background:var(--bg);border-radius:8px;font-size:13px;color:var(--text);line-height:1.8;font-style:italic;}
.script-wrap.open{display:block;}

.q-section{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:14px;}
.q-item{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px;}
.q-item:last-child{margin-bottom:0;}
.q-num{font-size:10px;font-weight:700;color:var(--fr);letter-spacing:.5px;margin-bottom:6px;}
.q-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.6;}
.q-opts{display:flex;flex-direction:column;gap:6px;}
.q-opt{padding:9px 14px;border-radius:8px;border:1.5px solid var(--border-md);background:var(--white);cursor:pointer;font-size:13px;color:var(--text);transition:all 0.2s;text-align:left;font-family:inherit;display:flex;align-items:center;gap:10px;line-height:1.5;}
.q-opt:hover:not(:disabled){border-color:var(--fr);background:var(--fr-light);}
.q-opt.correct{border-color:var(--green);background:var(--green-light);color:#166534;font-weight:500;}
.q-opt.wrong{border-color:var(--red);background:var(--red-light);color:#991b1b;}
.q-opt-ltr{width:24px;height:24px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-muted);flex-shrink:0;}
.q-opt.correct .q-opt-ltr{background:var(--green);color:#fff;}
.q-opt.wrong .q-opt-ltr{background:var(--red);color:#fff;}
.q-feedback{margin-top:8px;font-size:12px;padding:8px 12px;border-radius:7px;display:none;line-height:1.5;}
.q-feedback.show.correct{display:block;background:var(--green-light);color:#166534;}
.q-feedback.show.wrong{display:block;background:var(--red-light);color:#991b1b;}

.score-bar{display:flex;align-items:center;gap:12px;background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:none;}
.sb-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--fr);}
.sb-bar{flex:1;height:6px;background:var(--bg);border-radius:6px;overflow:hidden;}
.sb-fill{height:100%;background:linear-gradient(90deg,var(--fr-dark),var(--fr));border-radius:6px;transition:width 0.3s;}
.score-card{background:linear-gradient(135deg,var(--fr-dark),var(--fr));border-radius:14px;padding:24px;text-align:center;margin-bottom:20px;display:none;color:#fff;}
.sc-score{font-family:'DM Serif Display',serif;font-size:52px;line-height:1;margin-bottom:6px;}
.sc-pct{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:10px;}
.sc-msg{font-size:13px;color:#fcd34d;font-weight:500;}
.action-btns{display:flex;gap:10px;display:none;}
.act-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);transition:all 0.2s;text-decoration:none;text-align:center;}
.act-btn.primary{background:var(--fr);color:#fff;border-color:var(--fr);}
.act-btn.primary:hover{background:var(--fr-dark);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.4s ease forwards;}
</style>
</head>
<body>
<nav>
  <a href="../../index.html" class="nav-logo"><div class="nav-lm">LW</div><span class="nav-lt">LinguaWalk</span></a>
  <div class="nav-sep"></div>
  <span class="nav-page">📝 DELF/DALF — Compréhension orale</span>
  <div class="nav-space"></div>
  <a href="index.html" class="nav-back" data-ko="← DELF/DALF" data-fr="← DELF/DALF">← DELF/DALF</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('ko')" id="btn-ko">한국어</button>
    <button class="lbtn" onclick="setLang('fr')" id="btn-fr">Français</button>
  </div>
</nav>

<div class="main fade-in">
  <div class="hero">
    <div class="hero-tag" data-ko="DELF/DALF · 듣기 연습" data-fr="DELF/DALF · Compréhension de l'oral">DELF/DALF · 듣기 연습</div>
    <div class="hero-title" data-ko="🎧 Compréhension de l'oral" data-fr="🎧 Compréhension de l'oral">🎧 Compréhension de l'oral</div>
    <div class="hero-desc" data-ko="DELF/DALF 실제 형식 — 대화·방송·발표를 듣고 이해도 문제에 답하세요." data-fr="Format réel DELF/DALF — Écoutez des dialogues, émissions et exposés, puis répondez aux questions.">DELF/DALF 실제 형식 — 대화·방송·발표 이해.</div>
    <div class="hero-badges">
      <span class="hero-badge">DELF A1~B2 / DALF C1~C2</span>
      <span class="hero-badge" data-ko="Exercice 1 — 대화" data-fr="Exercice 1 — Dialogue">Exercice 1 — 대화</span>
      <span class="hero-badge" data-ko="Exercice 2 — 방송" data-fr="Exercice 2 — Émission">Exercice 2 — 방송</span>
      <span class="hero-badge" data-ko="Exercice 3 — 발표" data-fr="Exercice 3 — Exposé">Exercice 3 — 발표</span>
    </div>
  </div>

  <div class="ex-tabs">
    <button class="etab act" onclick="selectEx('ex1',this)" data-ko="Exercice 1 대화" data-fr="Exercice 1 Dialogue">Exercice 1</button>
    <button class="etab" onclick="selectEx('ex2',this)" data-ko="Exercice 2 방송" data-fr="Exercice 2 Émission">Exercice 2</button>
    <button class="etab" onclick="selectEx('ex3',this)" data-ko="Exercice 3 발표" data-fr="Exercice 3 Exposé">Exercice 3</button>
  </div>

  <div class="ex-info" id="ex-info"></div>

  <div class="settings-row">
    <div class="setting-item">
      <div class="si-label" data-ko="레벨" data-fr="Niveau">레벨</div>
      <select class="si-select" id="sel-level">
        <option value="A1">DELF A1</option>
        <option value="A2">DELF A2</option>
        <option value="B1" selected>DELF B1</option>
        <option value="B2">DELF B2</option>
        <option value="C1">DALF C1</option>
        <option value="C2">DALF C2</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-ko="음성 속도" data-fr="Vitesse">음성 속도</div>
      <select class="si-select" id="sel-speed">
        <option value="0.7" data-ko="느리게 (0.7x)" data-fr="Lent (0.7x)">느리게 (0.7x)</option>
        <option value="0.9" selected data-ko="보통 (0.9x)" data-fr="Normal (0.9x)">보통 (0.9x)</option>
        <option value="1.1" data-ko="빠르게 (1.1x)" data-fr="Rapide (1.1x)">빠르게 (1.1x)</option>
      </select>
    </div>
  </div>

  <button class="gen-btn" id="gen-btn" onclick="generate()">
    🤖 <span data-ko="DELF/DALF 듣기 문제 생성" data-fr="Générer un exercice d'écoute DELF/DALF">DELF/DALF 듣기 문제 생성</span>
  </button>

  <div class="loading" id="loading"><div class="spinner"></div><div id="loading-text" style="font-size:14px;color:var(--text-muted);">생성 중...</div></div>

  <div class="score-bar" id="score-bar">
    <div><div class="sb-num" id="sb-num">0 / 0</div><div style="font-size:11px;color:var(--text-muted);" data-ko="정답" data-fr="Correct">정답</div></div>
    <div class="sb-bar"><div class="sb-fill" id="sb-fill" style="width:0%"></div></div>
  </div>

  <div id="content-area"></div>

  <div class="score-card" id="score-card">
    <div class="sc-score" id="sc-score"></div>
    <div class="sc-pct" id="sc-pct"></div>
    <div class="sc-msg" id="sc-msg"></div>
  </div>

  <div class="action-btns" id="action-btns">
    <button class="act-btn primary" onclick="generate()" data-ko="🔄 새 문제" data-fr="🔄 Nouvel exercice">🔄 새 문제</button>
    <a href="index.html" class="act-btn" data-ko="← DELF 홈" data-fr="← Accueil DELF">← DELF 홈</a>
  </div>
</div>

<script>
let lang='ko', currentEx='ex1';
let isLoading=false, ttsActive=false;
let correct=0, answered=0, total=0;
const SPEEDS=[0.7,0.8,0.9,1.0,1.1,1.2];
const LETTERS=['A','B','C','D'];

const EX_INFO={
  ex1:{
    ko:'Exercice 1 — Dialogue/Interview: 두 사람의 대화나 인터뷰를 듣고 질문에 답합니다. 일상적 상황이나 인터뷰 형식입니다.',
    fr:'Exercice 1 — Dialogue/Interview: Écoutez un dialogue ou une interview, puis répondez aux questions. Situations quotidiennes ou interviews.',
    tipKo:'💡 화자의 의견·감정·목적에 집중하세요. 두 번 들을 수 있습니다.',
    tipFr:'💡 Concentrez-vous sur les opinions, émotions et intentions des locuteurs. Vous pouvez écouter deux fois.'
  },
  ex2:{
    ko:'Exercice 2 — Émission/Annonce: 라디오 방송·공지·광고를 듣고 핵심 정보를 파악합니다.',
    fr:'Exercice 2 — Émission/Annonce: Écoutez une émission de radio, une annonce ou une publicité et identifiez les informations clés.',
    tipKo:'💡 날짜·장소·가격·시간 등 구체적 정보에 집중하세요.',
    tipFr:'💡 Concentrez-vous sur les informations concrètes: dates, lieux, prix, horaires.'
  },
  ex3:{
    ko:'Exercice 3 — Exposé/Conférence: 발표나 강의를 듣고 주제·논점·결론을 파악합니다. B2 이상에서 출제됩니다.',
    fr:'Exercice 3 — Exposé/Conférence: Écoutez un exposé ou une conférence et identifiez le thème, les arguments et la conclusion. À partir de B2.',
    tipKo:'💡 질문을 먼저 읽고 무엇을 들어야 할지 파악하세요. 화자의 핵심 논점이 중요합니다.',
    tipFr:'💡 Lisez d\'abord les questions pour savoir quoi écouter. Les arguments principaux du locuteur sont essentiels.'
  }
};

function selectEx(id, btn){
  stopTTS(); currentEx=id;
  document.querySelectorAll('.etab').forEach(t=>t.classList.remove('act'));
  btn.classList.add('act');
  renderExInfo();
  resetContent();
}

function renderExInfo(){
  const info=EX_INFO[currentEx];
  document.getElementById('ex-info').innerHTML=`
    <div class="ei-title">${lang==='ko'?info.ko.split(':')[0]:info.fr.split(':')[0]}</div>
    <div class="ei-desc">${lang==='ko'?info.ko.split(':').slice(1).join(':'):info.fr.split(':').slice(1).join(':')}</div>
    <div class="ei-tip">${lang==='ko'?info.tipKo:info.tipFr}</div>`;
}

function resetContent(){
  stopTTS();
  document.getElementById('content-area').innerHTML='';
  document.getElementById('score-card').style.display='none';
  document.getElementById('action-btns').style.display='none';
  document.getElementById('score-bar').style.display='none';
  correct=0; answered=0; total=0;
}

async function callClaude(prompt, maxTok){
  const r=await fetch('/api/claude',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:maxTok||1500,
      messages:[{role:'user',content:prompt}]})});
  const d=await r.json();
  const raw=d.content?.[0]?.text||'';
  var s=raw.replace(/```json|```/g,'').trim();
  var first=s.indexOf('{'); var last=s.lastIndexOf('}');
  if(first!==-1&&last!==-1) s=s.slice(first,last+1);
  return JSON.parse(s);
}

async function generate(){
  if(isLoading) return;
  isLoading=true; resetContent();
  document.getElementById('gen-btn').disabled=true;
  document.getElementById('loading').style.display='block';
  document.getElementById('loading-text').textContent=lang==='ko'?'🤖 문제 생성 중…':'🤖 Génération en cours…';
  const level=document.getElementById('sel-level').value;
  const speed=parseFloat(document.getElementById('sel-speed').value);
  const exam=(['C1','C2'].includes(level)?'DALF ':'DELF ')+level;

  try{
    const data=await callClaude(buildPrompt(currentEx,level,exam),1500);
    total=data.questions.length;
    document.getElementById('loading').style.display='none';
    document.getElementById('content-area').appendChild(makeCard(data,speed,exam));
    document.getElementById('score-bar').style.display='flex';
    document.getElementById('action-btns').style.display='flex';
    updateScore();
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('content-area').innerHTML=`<div style="padding:24px;text-align:center;color:var(--red)">⚠️ ${lang==='ko'?'생성 실패':'Échec de génération'}<br><small>${e.message}</small></div>`;
    console.error(e);
  }
  isLoading=false;
  document.getElementById('gen-btn').disabled=false;
}

function buildPrompt(ex, level, exam){
  const exTypes={
    ex1:`dialogue or interview between 2 people (${exam} level)`,
    ex2:`radio broadcast, announcement or advertisement (${exam} level)`,
    ex3:`academic lecture or formal presentation (${exam} level, longer and more complex)`
  };
  const qCount={ex1:3,ex2:3,ex3:4}[ex]||3;
  return `Generate a ${exam} French listening comprehension exercise.
Type: ${exTypes[ex]}

Return ONLY valid JSON object (no markdown, no backticks, single-line strings):
{"type":"${ex}","exam":"${exam}","context":"Brief situation description in French","script":[{"speaker":"A","line":"French dialogue line"},{"speaker":"B","line":"French response"}],"questions":[{"id":1,"text":"Question en francais?","choices":["A. Option","B. Option","C. Option","D. Option"],"answer":0,"explanation_ko":"Korean explanation"}]}
Rules:
- script: natural French at ${exam} level, 4-6 exchanges minimum
- questions: ${qCount} questions, answers 0-based index, vary positions
- Use simple words without apostrophes where possible (use il ne instead of il n, de le instead of du if simpler)
- ALL strings single-line
- Return only the JSON object`;
}

function makeCard(data, speed, exam){
  const wrap=document.createElement('div');

  // 오디오 카드
  const ac=document.createElement('div'); ac.className='audio-card fade-in';
  const acHead=document.createElement('div'); acHead.className='ac-header';
  acHead.innerHTML=`<div class="ac-title">🎧 <span>${exam}</span> <span class="ac-badge">${{ex1:'Dialogue',ex2:'Émission',ex3:'Exposé'}[data.type]||'Audio'}</span></div>
    <div style="font-size:11px;color:var(--text-muted);">${data.context||''}</div>`;

  const pr=document.createElement('div'); pr.className='player-row';
  const pbtn=document.createElement('button'); pbtn.className='play-btn'; pbtn.id='pbtn-main';
  pbtn.innerHTML='<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  pbtn.addEventListener('click',()=>playScript(data.script,speed));
  const pInfo=document.createElement('div'); pInfo.className='player-info';
  pInfo.innerHTML=`<div class="player-label" data-ko="▶ 버튼을 눌러 음성을 들으세요" data-fr="▶ Cliquez pour écouter">${lang==='ko'?'▶ 버튼을 눌러 음성을 들으세요':'▶ Cliquez pour écouter'}</div><div class="player-bar"><div class="player-fill" id="pfill-main"></div></div>`;
  const spdBtn=document.createElement('button'); spdBtn.className='speed-btn'; spdBtn.id='pspd-main'; spdBtn.textContent=speed+'x';
  spdBtn.addEventListener('click',()=>cycleSpeed('pspd-main'));
  pr.append(pbtn,pInfo,spdBtn);

  // 스크립트 토글
  const togBtn=document.createElement('button'); togBtn.className='script-toggle';
  togBtn.textContent=lang==='ko'?'📄 스크립트 보기':'📄 Voir le script';
  const scriptWrap=document.createElement('div'); scriptWrap.className='script-wrap'; scriptWrap.id='script-main';
  (data.script||[]).forEach((l,i)=>{
    const line=document.createElement('div');
    line.style.cssText='margin-bottom:6px;cursor:pointer;padding:4px 6px;border-radius:4px;';
    line.id='sl-'+i;
    line.innerHTML=`<strong style="color:var(--fr);margin-right:6px;">${l.speaker}:</strong>${l.line}`;
    line.addEventListener('mouseover',()=>line.style.background='var(--fr-light)');
    line.addEventListener('mouseout',()=>line.style.background='');
    line.addEventListener('click',()=>{ stopTTS(); playScript(data.script.slice(i),speed); });
    scriptWrap.appendChild(line);
  });
  togBtn.addEventListener('click',function(){
    const open=scriptWrap.classList.toggle('open');
    togBtn.textContent=open?(lang==='ko'?'🙈 숨기기':'🙈 Masquer'):(lang==='ko'?'📄 스크립트 보기':'📄 Voir le script');
  });
  ac.append(acHead,pr,togBtn,scriptWrap);

  // 문제 섹션
  const qSec=document.createElement('div'); qSec.className='q-section fade-in';
  (data.questions||[]).forEach(q=>{
    const qDiv=document.createElement('div'); qDiv.className='q-item';
    const qNum=document.createElement('div'); qNum.className='q-num'; qNum.textContent='Question '+q.id;
    const qTxt=document.createElement('div'); qTxt.className='q-text'; qTxt.textContent=q.text;
    const opts=document.createElement('div'); opts.className='q-opts';
    (q.choices||[]).forEach((c,i)=>{
      const btn=document.createElement('button'); btn.className='q-opt';
      btn.innerHTML=`<span class="q-opt-ltr">${LETTERS[i]}</span><span>${c}</span>`;
      btn.addEventListener('click',()=>answerQ(q.id,i,btn,q.answer,q.explanation_ko,opts));
      opts.appendChild(btn);
    });
    const fb=document.createElement('div'); fb.className='q-feedback'; fb.id='fb-'+q.id;
    qDiv.append(qNum,qTxt,opts,fb);
    qSec.appendChild(qDiv);
  });

  wrap.append(ac,qSec);
  return wrap;
}

function playScript(lines, speed){
  stopTTS();
  const spd=parseFloat(document.getElementById('pspd-main')?.textContent)||speed;
  const pbtn=document.getElementById('pbtn-main');
  if(pbtn) pbtn.innerHTML='<svg viewBox="0 0 24 24" fill="#fff"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  playLine(lines,0,spd);
}

function playLine(lines,idx,spd){
  if(idx>=lines.length){
    ttsActive=false;
    const pbtn=document.getElementById('pbtn-main');
    if(pbtn) pbtn.innerHTML='<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
    const fill=document.getElementById('pfill-main');
    if(fill) fill.style.width='100%';
    return;
  }
  const fill=document.getElementById('pfill-main');
  if(fill) fill.style.width=(idx/lines.length*100)+'%';
  const vs=speechSynthesis.getVoices();
  const frvs=vs.filter(v=>v.lang.startsWith('fr'));
  const u=new SpeechSynthesisUtterance(lines[idx].line); u.lang='fr-FR'; u.rate=spd;
  if(frvs.length>1) u.voice=frvs[idx%frvs.length]; else if(frvs.length) u.voice=frvs[0];
  u.onend=()=>{ if(ttsActive) playLine(lines,idx+1,spd); };
  speechSynthesis.speak(u); ttsActive=true;
}

function answerQ(qId,idx,btn,answer,expl,optsEl){
  const opts=optsEl?.querySelectorAll('.q-opt'); if(!opts||opts[0]?.disabled) return;
  opts.forEach(b=>b.disabled=true);
  opts[answer].classList.add('correct');
  if(idx!==answer) btn.classList.add('wrong');
  const qItem=btn.closest('.q-item');
  const fb=qItem?.querySelector('.q-feedback');
  if(fb){ fb.textContent=expl||''; fb.className='q-feedback show '+(idx===answer?'correct':'wrong'); }
  answered++; if(idx===answer) correct++;
  updateScore();
  if(answered>=total) setTimeout(showResult,600);
}

function stopTTS(){ speechSynthesis.cancel(); ttsActive=false; }
function cycleSpeed(btnId){
  const btn=document.getElementById(btnId); if(!btn) return;
  const cur=parseFloat(btn.textContent);
  const i=SPEEDS.indexOf(cur);
  btn.textContent=SPEEDS[(i+1)%SPEEDS.length]+'x';
}
function updateScore(){
  const fill=document.getElementById('sb-fill');
  const num=document.getElementById('sb-num');
  if(fill) fill.style.width=`${total>0?(answered/total)*100:0}%`;
  if(num) num.textContent=`${correct} / ${total}`;
}
function showResult(){
  const pct=Math.round(correct/total*100);
  const sc=document.getElementById('score-card'); sc.style.display='block';
  document.getElementById('sc-score').textContent=`${correct}/${total}`;
  document.getElementById('sc-pct').textContent=`${pct}%`;
  document.getElementById('sc-msg').textContent=
    pct>=80?(lang==='ko'?'🎉 훌륭합니다!':'🎉 Excellent !'):
    pct>=60?(lang==='ko'?'👍 잘 하셨습니다!':'👍 Bien joué !'):
    (lang==='ko'?'💪 계속 연습!':'💪 Continuez !');
  sc.scrollIntoView({behavior:'smooth',block:'center'});
}

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-ko][data-fr]').forEach(el=>{
    const t=l==='ko'?el.getAttribute('data-ko'):el.getAttribute('data-fr');
    if(t) el.innerHTML=t;
  });
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  document.getElementById('btn-fr').classList.toggle('act',l==='fr');
  renderExInfo();
}

(function(){
  setLang('ko');
  renderExInfo();
  const lv=new URLSearchParams(location.search).get('level');
  if(lv) document.getElementById('sel-level').value=lv;
})();
</script>
