<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — DELF/DALF Compréhension des écrits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --fr:#1a4fa3;--fr-dark:#0d2d6b;--fr-light:#e8eef8;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --green:#16a34a;--green-light:#dcfce7;
  --red:#e24b4a;--red-light:#fee2e2;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:860px;margin:0 auto;padding:28px 5% 80px;}

.hero{background:linear-gradient(135deg,var(--fr-dark) 0%,var(--fr) 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}

.ex-tabs{display:flex;background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:4px;margin-bottom:16px;gap:3px;}
.etab{flex:1;padding:9px 8px;border-radius:9px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-family:inherit;transition:all 0.2s;text-align:center;white-space:nowrap;}
.etab:hover{color:var(--fr);}
.etab.act{background:var(--fr);color:#fff;}

.ex-info{background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px;}
.ei-title{font-size:13px;font-weight:600;color:var(--fr);margin-bottom:6px;}
.ei-desc{font-size:12px;color:var(--text-muted);line-height:1.65;}
.ei-tip{margin-top:8px;padding:8px 12px;background:var(--fr-light);border-radius:8px;font-size:12px;color:var(--fr);}

.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:120px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}

.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--fr);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:var(--fr-dark);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}

.loading{padding:40px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:16px;display:none;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--fr);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

.card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.card-head{padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-title{font-size:13px;font-weight:600;color:var(--text);}
.card-body{padding:20px;}

.pm-badge{font-size:11px;padding:3px 10px;border-radius:8px;font-weight:600;}
.pm-level{background:var(--fr-light);color:var(--fr);}
.pm-type{background:var(--teal-light);color:var(--teal-mid);}
.pm-words{background:var(--bg);color:var(--text-muted);border:0.5px solid var(--border);}

.passage-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin-bottom:12px;line-height:1.4;}
.passage-body{font-size:15px;line-height:2.0;color:var(--text);white-space:pre-line;}

/* vrai/faux 문제 */
.vf-item{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px;}
.vf-item:last-child{margin-bottom:0;}
.vf-stmt{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.6;}
.vf-btns{display:flex;gap:10px;}
.vf-btn{flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--border-md);background:var(--white);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all 0.2s;}
.vf-btn:hover:not(:disabled){border-color:var(--fr);background:var(--fr-light);color:var(--fr);}
.vf-btn.vrai{color:#27ae60;}
.vf-btn.faux{color:var(--red);}
.vf-btn.correct{border-color:var(--green);background:var(--green-light);color:var(--green);}
.vf-btn.wrong{border-color:var(--red);background:var(--red-light);color:var(--red);}

.q-item{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px;}
.q-item:last-child{margin-bottom:0;}
.q-num{font-size:10px;font-weight:700;color:var(--fr);letter-spacing:.5px;margin-bottom:6px;}
.q-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.6;}
.q-opts{display:flex;flex-direction:column;gap:6px;}
.q-opt{padding:9px 14px;border-radius:8px;border:1.5px solid var(--border-md);background:var(--white);cursor:pointer;font-size:13px;color:var(--text);transition:all 0.2s;text-align:left;font-family:inherit;display:flex;align-items:center;gap:10px;line-height:1.5;}
.q-opt:hover:not(:disabled){border-color:var(--fr);background:var(--fr-light);}
.q-opt.correct{border-color:var(--green);background:var(--green-light);color:#166534;font-weight:500;}
.q-opt.wrong{border-color:var(--red);background:var(--red-light);color:#991b1b;}
.q-opt-ltr{width:24px;height:24px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-muted);flex-shrink:0;}
.q-opt.correct .q-opt-ltr{background:var(--green);color:#fff;}
.q-opt.wrong .q-opt-ltr{background:var(--red);color:#fff;}
.q-feedback{margin-top:8px;font-size:12px;padding:8px 12px;border-radius:7px;display:none;line-height:1.5;}
.q-feedback.show.correct{display:block;background:var(--green-light);color:#166534;}
.q-feedback.show.wrong{display:block;background:var(--red-light);color:#991b1b;}

.score-bar{display:flex;align-items:center;gap:12px;background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:none;}
.sb-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--fr);}
.sb-bar{flex:1;height:6px;background:var(--bg);border-radius:6px;overflow:hidden;}
.sb-fill{height:100%;background:linear-gradient(90deg,var(--fr-dark),var(--fr));border-radius:6px;transition:width 0.3s;}
.score-card{background:linear-gradient(135deg,var(--fr-dark),var(--fr));border-radius:14px;padding:24px;text-align:center;margin-bottom:20px;display:none;color:#fff;}
.sc-score{font-family:'DM Serif Display',serif;font-size:52px;line-height:1;margin-bottom:6px;}
.sc-pct{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:10px;}
.sc-msg{font-size:13px;color:#fcd34d;font-weight:500;}
.action-btns{display:flex;gap:10px;display:none;}
.act-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);transition:all 0.2s;text-decoration:none;text-align:center;}
.act-btn.primary{background:var(--fr);color:#fff;border-color:var(--fr);}
.act-btn.primary:hover{background:var(--fr-dark);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.4s ease forwards;}
</style>
</head>
<body>

<nav>
  <a href="../../index.html" class="nav-logo"><div class="nav-lm">LW</div><span class="nav-lt">LinguaWalk</span></a>
  <div class="nav-sep"></div>
  <span class="nav-page">📝 DELF/DALF — Compréhension des écrits</span>
  <div class="nav-space"></div>
  <a href="index.html" class="nav-back" data-ko="← DELF/DALF" data-fr="← DELF/DALF">← DELF/DALF</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('ko')" id="btn-ko">한국어</button>
    <button class="lbtn" onclick="setLang('fr')" id="btn-fr">Français</button>
  </div>
</nav>

<div class="main fade-in">
  <div class="hero">
    <div class="hero-tag" data-ko="DELF/DALF · 읽기 연습" data-fr="DELF/DALF · Compréhension des écrits">DELF/DALF · 읽기 연습</div>
    <div class="hero-title" data-ko="📖 Compréhension des écrits" data-fr="📖 Compréhension des écrits">📖 Compréhension des écrits</div>
    <div class="hero-desc" data-ko="DELF/DALF 실제 형식 — 실용 문서·기사·에세이를 읽고 이해도 문제에 답하세요." data-fr="Format réel DELF/DALF — Lisez des documents pratiques, articles et essais, puis répondez aux questions.">DELF/DALF 실제 형식 — 실용 문서·기사·에세이 이해.</div>
    <div class="hero-badges">
      <span class="hero-badge">DELF A1~B2 / DALF C1~C2</span>
      <span class="hero-badge" data-ko="Exercice 1 — 실용 문서" data-fr="Exercice 1 — Document pratique">Exercice 1 — 실용</span>
      <span class="hero-badge" data-ko="Exercice 2 — 기사" data-fr="Exercice 2 — Article">Exercice 2 — 기사</span>
      <span class="hero-badge" data-ko="Exercice 3 — 에세이" data-fr="Exercice 3 — Essai">Exercice 3 — 에세이</span>
    </div>
  </div>

  <div class="ex-tabs">
    <button class="etab act" onclick="selectEx('ex1',this)" data-ko="Exercice 1 실용문서" data-fr="Exercice 1 Document">Exercice 1</button>
    <button class="etab" onclick="selectEx('ex2',this)" data-ko="Exercice 2 기사" data-fr="Exercice 2 Article">Exercice 2</button>
    <button class="etab" onclick="selectEx('ex3',this)" data-ko="Exercice 3 에세이" data-fr="Exercice 3 Essai">Exercice 3</button>
  </div>

  <div class="ex-info" id="ex-info"></div>

  <div class="settings-row">
    <div class="setting-item">
      <div class="si-label" data-ko="레벨" data-fr="Niveau">레벨</div>
      <select class="si-select" id="sel-level">
        <option value="A1">DELF A1</option>
        <option value="A2">DELF A2</option>
        <option value="B1" selected>DELF B1</option>
        <option value="B2">DELF B2</option>
        <option value="C1">DALF C1</option>
        <option value="C2">DALF C2</option>
      </select>
    </div>
  </div>

  <button class="gen-btn" id="gen-btn" onclick="generate()">
    🤖 <span data-ko="DELF/DALF 읽기 문제 생성" data-fr="Générer un exercice de lecture DELF/DALF">DELF/DALF 읽기 문제 생성</span>
  </button>

  <div class="loading" id="loading"><div class="spinner"></div><div id="loading-text" style="font-size:14px;color:var(--text-muted);">생성 중...</div></div>

  <div class="score-bar" id="score-bar">
    <div><div class="sb-num" id="sb-num">0 / 0</div><div style="font-size:11px;color:var(--text-muted);" data-ko="정답" data-fr="Correct">정답</div></div>
    <div class="sb-bar"><div class="sb-fill" id="sb-fill" style="width:0%"></div></div>
  </div>

  <div id="content-area"></div>

  <div class="score-card" id="score-card">
    <div class="sc-score" id="sc-score"></div>
    <div class="sc-pct" id="sc-pct"></div>
    <div class="sc-msg" id="sc-msg"></div>
  </div>

  <div class="action-btns" id="action-btns">
    <button class="act-btn primary" onclick="generate()" data-ko="🔄 새 문제" data-fr="🔄 Nouvel exercice">🔄 새 문제</button>
    <a href="index.html" class="act-btn" data-ko="← DELF 홈" data-fr="← Accueil DELF">← DELF 홈</a>
  </div>
</div>

<script>
let lang='ko', currentEx='ex1';
let isLoading=false, correct=0, answered=0, total=0;
const LETTERS=['A','B','C','D'];

const EX_INFO={
  ex1:{
    ko:'Exercice 1 — Document pratique: 광고·공지·안내문·일정표 등 실용 문서를 읽고 특정 정보를 찾습니다.',
    fr:'Exercice 1 — Document pratique: Lisez des publicités, annonces, notices ou tableaux pour trouver des informations spécifiques.',
    tipKo:'💡 전체를 읽지 말고 질문에서 요구하는 정보만 찾으세요 (skimming/scanning).',
    tipFr:'💡 Ne lisez pas tout. Cherchez uniquement les informations demandées dans les questions (skimming/scanning).'
  },
  ex2:{
    ko:'Exercice 2 — Article de presse: 신문·잡지 기사를 읽고 주제·내용·필자 의견을 파악합니다.',
    fr:'Exercice 2 — Article de presse: Lisez un article de journal ou de magazine. Identifiez le thème, les faits et l\'opinion de l\'auteur.',
    tipKo:'💡 첫 문단과 마지막 문단에 핵심 내용이 있습니다. 필자의 논조(찬성/반대)를 파악하세요.',
    tipFr:'💡 Le premier et le dernier paragraphe contiennent les idées clés. Identifiez la prise de position de l\'auteur.'
  },
  ex3:{
    ko:'Exercice 3 — Texte argumentatif: 논설문이나 에세이를 읽고 논점·증거·결론을 분석합니다. B2 이상.',
    fr:'Exercice 3 — Texte argumentatif: Analysez un essai ou texte d\'opinion: arguments, preuves, conclusion. À partir de B2.',
    tipKo:'💡 각 단락의 논점을 파악하고, 필자의 결론과 그 근거를 정리하세요.',
    tipFr:'💡 Identifiez l\'argument de chaque paragraphe et résumez la conclusion de l\'auteur ainsi que ses justifications.'
  }
};

function selectEx(id,btn){
  currentEx=id;
  document.querySelectorAll('.etab').forEach(t=>t.classList.remove('act'));
  btn.classList.add('act');
  renderExInfo();
  resetContent();
}

function renderExInfo(){
  const info=EX_INFO[currentEx];
  document.getElementById('ex-info').innerHTML=`
    <div class="ei-title">${lang==='ko'?info.ko.split(':')[0]:info.fr.split(':')[0]}</div>
    <div class="ei-desc">${lang==='ko'?info.ko.split(':').slice(1).join(':'):info.fr.split(':').slice(1).join(':')}</div>
    <div class="ei-tip">${lang==='ko'?info.tipKo:info.tipFr}</div>`;
}

function resetContent(){
  document.getElementById('content-area').innerHTML='';
  document.getElementById('score-card').style.display='none';
  document.getElementById('action-btns').style.display='none';
  document.getElementById('score-bar').style.display='none';
  correct=0; answered=0; total=0;
}

async function callClaude(prompt, maxTok){
  const r=await fetch('/api/claude',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:maxTok||2000,
      messages:[{role:'user',content:prompt}]})});
  const d=await r.json();
  const raw=d.content?.[0]?.text||'';
  var s=raw.replace(/```json|```/g,'').trim();
  var first=s.indexOf('{'); var last=s.lastIndexOf('}');
  if(first!==-1&&last!==-1) s=s.slice(first,last+1);
  return JSON.parse(s);
}

async function generate(){
  if(isLoading) return;
  isLoading=true; resetContent();
  document.getElementById('gen-btn').disabled=true;
  document.getElementById('loading').style.display='block';
  document.getElementById('loading-text').textContent=lang==='ko'?'🤖 문제 생성 중…':'🤖 Génération en cours…';
  const level=document.getElementById('sel-level').value;
  const exam=(['C1','C2'].includes(level)?'DALF ':'DELF ')+level;

  try{
    const data=await callClaude(buildPrompt(currentEx,level,exam),2000);
    total=(data.questions||[]).length+(data.vrai_faux||[]).length;
    document.getElementById('loading').style.display='none';
    renderReading(data,exam);
    document.getElementById('score-bar').style.display='flex';
    document.getElementById('action-btns').style.display='flex';
    updateScore();
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('content-area').innerHTML=`<div style="padding:24px;text-align:center;color:var(--red)">⚠️ ${lang==='ko'?'생성 실패':'Échec'}<br><small>${e.message}</small></div>`;
    console.error(e);
  }
  isLoading=false;
  document.getElementById('gen-btn').disabled=false;
}

function buildPrompt(ex, level, exam){
  var docTypes={
    ex1:{type:'practical document (advertisement, notice, schedule or flyer)',words:'80-150'},
    ex2:{type:'press article or magazine feature',words:'150-280'},
    ex3:{type:'argumentative essay or opinion piece',words:'250-450'}
  };
  var d=docTypes[ex];
  var hasVF=(ex==='ex3');
  var vfPart=hasVF?',"vrai_faux":[{"id":1,"statement":"Affirmation en francais.","answer":true,"explanation_ko":"Korean explanation"},{"id":2,"statement":"Autre affirmation.","answer":false,"explanation_ko":"Korean explanation"}]}':'}}';
  var prompt='Generate a '+exam+' French reading comprehension exercise.\n'
    +'Document type: '+d.type+' at '+exam+' level\n'
    +'Word count: '+d.words+' words\n\n'
    +'Return ONLY valid JSON object (no markdown, no backticks, single-line strings):\n'
    +'{"exam":"'+exam+'","doc_type":"'+d.type+'","title":"Document title in French","word_count":150,'
    +'"passage":"Full French text single line",'
    +'"questions":[{"id":1,"text":"Question en francais?","choices":["A. Option","B. Option","C. Option","D. Option"],"answer":0,"explanation_ko":"Korean explanation"}]'
    +vfPart+'\n'
    +'Rules:\n'
    +'- passage: natural French at '+exam+' level, keep as single-line string\n'
    +'- questions: 3-4 questions, answers 0-based, vary positions\n'
    +'- Avoid apostrophes where possible\n'
    +'- ALL strings single-line\n'
    +'- Return only the JSON object';
  return prompt;
}

function renderReading(data, exam){
  const area=document.getElementById('content-area');

  // 지문 카드
  const passCard=document.createElement('div'); passCard.className='card fade-in';
  const pHead=document.createElement('div'); pHead.className='card-head';
  pHead.innerHTML=`
    <span class="card-title" data-ko="읽기 지문" data-fr="Texte">${lang==='ko'?'읽기 지문':'Texte'}</span>
    <div style="display:flex;gap:6px;align-items:center;">
      <span class="pm-badge pm-level">${exam}</span>
      <span class="pm-badge pm-type">${data.doc_type||''}</span>
      <span class="pm-badge pm-words">~${data.word_count||'?'} mots</span>
    </div>`;
  const pBody=document.createElement('div'); pBody.className='card-body';
  const titleEl=document.createElement('div'); titleEl.className='passage-title'; titleEl.textContent=data.title||'';
  const passEl=document.createElement('div'); passEl.className='passage-body'; passEl.textContent=data.passage||'';
  pBody.append(titleEl,passEl);
  passCard.append(pHead,pBody);

  // 문제 카드
  const qCard=document.createElement('div'); qCard.className='card fade-in';
  const qHead=document.createElement('div'); qHead.className='card-head';
  const qCount=(data.questions||[]).length+(data.vrai_faux||[]).length;
  qHead.innerHTML=`<span class="card-title" data-ko="이해도 문제" data-fr="Questions">${lang==='ko'?'이해도 문제':'Questions de compréhension'} (${qCount})</span>`;
  const qBody=document.createElement('div'); qBody.className='card-body';

  // 4지선다 문제
  (data.questions||[]).forEach(q=>{
    const qDiv=document.createElement('div'); qDiv.className='q-item';
    const qNum=document.createElement('div'); qNum.className='q-num'; qNum.textContent='Question '+q.id;
    const qTxt=document.createElement('div'); qTxt.className='q-text'; qTxt.textContent=q.text;
    const opts=document.createElement('div'); opts.className='q-opts';
    (q.choices||[]).forEach((c,i)=>{
      const btn=document.createElement('button'); btn.className='q-opt';
      btn.innerHTML=`<span class="q-opt-ltr">${LETTERS[i]}</span><span>${c}</span>`;
      btn.addEventListener('click',()=>answerQ(q.id,i,btn,q.answer,q.explanation_ko,opts));
      opts.appendChild(btn);
    });
    const fb=document.createElement('div'); fb.className='q-feedback'; fb.id='fb-q-'+q.id;
    qDiv.append(qNum,qTxt,opts,fb);
    qBody.appendChild(qDiv);
  });

  // Vrai/Faux 문제
  if((data.vrai_faux||[]).length>0){
    const vfLabel=document.createElement('div');
    vfLabel.style.cssText='font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin:14px 0 8px;';
    vfLabel.textContent='Vrai ou Faux ?';
    qBody.appendChild(vfLabel);
    (data.vrai_faux||[]).forEach(vf=>{
      const vfDiv=document.createElement('div'); vfDiv.className='vf-item';
      const stmt=document.createElement('div'); stmt.className='vf-stmt'; stmt.textContent=vf.statement;
      const btns=document.createElement('div'); btns.className='vf-btns';
      const vraiBtn=document.createElement('button'); vraiBtn.className='vf-btn vrai'; vraiBtn.textContent='✓ Vrai';
      const fauxBtn=document.createElement('button'); fauxBtn.className='vf-btn faux'; fauxBtn.textContent='✗ Faux';
      function handleVF(chosen){
        [vraiBtn,fauxBtn].forEach(b=>b.disabled=true);
        const isCorrect=(chosen===vf.answer);
        if(chosen){vraiBtn.classList.add(isCorrect?'correct':'wrong');fauxBtn.classList.add(isCorrect?'':'correct');}
        else{fauxBtn.classList.add(isCorrect?'correct':'wrong');vraiBtn.classList.add(isCorrect?'':'correct');}
        const fb=document.getElementById('fb-vf-'+vf.id);
        if(fb){fb.textContent=vf.explanation_ko||'';fb.className='q-feedback show '+(isCorrect?'correct':'wrong');}
        answered++; if(isCorrect) correct++;
        updateScore();
        if(answered>=total) setTimeout(showResult,600);
      }
      vraiBtn.addEventListener('click',()=>handleVF(true));
      fauxBtn.addEventListener('click',()=>handleVF(false));
      btns.append(vraiBtn,fauxBtn);
      const fb=document.createElement('div'); fb.className='q-feedback'; fb.id='fb-vf-'+vf.id;
      vfDiv.append(stmt,btns,fb);
      qBody.appendChild(vfDiv);
    });
  }

  qCard.append(qHead,qBody);
  area.append(passCard,qCard);
}

function answerQ(qId,idx,btn,answer,expl,optsEl){
  const opts=optsEl?.querySelectorAll('.q-opt'); if(!opts||opts[0]?.disabled) return;
  opts.forEach(b=>b.disabled=true);
  opts[answer].classList.add('correct');
  if(idx!==answer) btn.classList.add('wrong');
  const qItem=btn.closest('.q-item');
  const fb=qItem?.querySelector('.q-feedback');
  if(fb){fb.textContent=expl||'';fb.className='q-feedback show '+(idx===answer?'correct':'wrong');}
  answered++; if(idx===answer) correct++;
  updateScore();
  if(answered>=total) setTimeout(showResult,600);
}

function updateScore(){
  const fill=document.getElementById('sb-fill');
  const num=document.getElementById('sb-num');
  if(fill) fill.style.width=`${total>0?(answered/total)*100:0}%`;
  if(num) num.textContent=`${correct} / ${total}`;
}
function showResult(){
  const pct=Math.round(correct/total*100);
  const sc=document.getElementById('score-card'); sc.style.display='block';
  document.getElementById('sc-score').textContent=`${correct}/${total}`;
  document.getElementById('sc-pct').textContent=`${pct}%`;
  document.getElementById('sc-msg').textContent=
    pct>=80?(lang==='ko'?'🎉 훌륭합니다!':'🎉 Excellent !'):
    pct>=60?(lang==='ko'?'👍 잘 하셨습니다!':'👍 Bien joué !'):
    (lang==='ko'?'💪 계속 연습!':'💪 Continuez !');
  sc.scrollIntoView({behavior:'smooth',block:'center'});
}

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-ko][data-fr]').forEach(el=>{
    const t=l==='ko'?el.getAttribute('data-ko'):el.getAttribute('data-fr');
    if(t) el.innerHTML=t;
  });
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  document.getElementById('btn-fr').classList.toggle('act',l==='fr');
  renderExInfo();
}

(function(){
  setLang('ko');
  renderExInfo();
  const lv=new URLSearchParams(location.search).get('level');
  if(lv) document.getElementById('sel-level').value=lv;
})();
</script>
</body>
</html>
