<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — General English — Listening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --orange:#f97316;--orange-light:#fff7ed;--orange-dark:#7c2d12;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --green:#16a34a;--green-light:#dcfce7;
  --red:#e24b4a;--red-light:#fee2e2;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:860px;margin:0 auto;padding:28px 5% 80px;}
.hero{background:linear-gradient(135deg,#7c2d12 0%,var(--orange) 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}
.hero-badge.free{background:rgba(255,255,255,0.25);font-weight:700;}
.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:130px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}
.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--orange);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:#ea6c0a;}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}
.card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.card-head{padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:600;color:var(--text);}
.card-body{padding:18px;}
/* Audio Player */
.audio-player{background:linear-gradient(135deg,#7c2d12,var(--orange));border-radius:14px;padding:20px 24px;margin-bottom:16px;color:#fff;}
.ap-title{font-size:13px;font-weight:600;margin-bottom:4px;opacity:.8;}
.ap-text{font-size:15px;line-height:1.7;margin-bottom:16px;}
.ap-controls{display:flex;gap:10px;align-items:center;}
.play-btn{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
.play-btn:hover{background:rgba(255,255,255,0.3);}
.ap-info{font-size:12px;opacity:.7;}
.ap-speed{padding:4px 12px;border-radius:20px;background:rgba(255,255,255,0.15);border:0.5px solid rgba(255,255,255,0.3);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
/* Questions */
.q-list{display:flex;flex-direction:column;gap:14px;}
.q-item{background:var(--bg);border-radius:10px;padding:14px;}
.q-text{font-size:14px;color:var(--text);margin-bottom:10px;font-weight:500;}
.q-options{display:flex;flex-direction:column;gap:6px;}
.opt-btn{padding:10px 14px;border-radius:8px;font-size:13px;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);cursor:pointer;font-family:inherit;transition:all 0.2s;text-align:left;}
.opt-btn:hover:not(:disabled){border-color:var(--orange);color:var(--orange);}
.opt-btn.correct{background:var(--green-light);border-color:var(--green);color:var(--green);}
.opt-btn.wrong{background:var(--red-light);border-color:var(--red);color:var(--red);}
.opt-btn:disabled{cursor:default;}
.feedback{font-size:12px;margin-top:6px;padding:8px 10px;border-radius:6px;display:none;}
.score-bar{display:flex;align-items:center;gap:12px;background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;}
.score-num{font-family:'DM Serif Display',serif;font-size:24px;color:var(--orange);}
.score-label{font-size:12px;color:var(--text-muted);}
.progress-bar{flex:1;height:8px;background:var(--bg);border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),#fb923c);border-radius:10px;transition:width 0.3s;}
.result-box{text-align:center;padding:24px;background:var(--white);border:0.5px solid var(--border);border-radius:14px;display:none;}
.rb-btn{padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;background:var(--orange);color:#fff;border:none;cursor:pointer;font-family:inherit;}
/* Transcript */
.transcript{background:var(--orange-light);border:0.5px solid rgba(249,115,22,0.2);border-radius:10px;padding:14px;margin-top:12px;font-size:13px;color:var(--text);line-height:1.7;display:none;}
.show-transcript-btn{font-size:12px;color:var(--orange);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600;margin-top:8px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.3s ease forwards;}
</style>
</head>
<body>
<nav>
  <a href="../../index.html" class="nav-logo">
    <div class="nav-lm">LW</div>
    <span class="nav-lt">LinguaWalk</span>
  </a>
  <div class="nav-sep"></div>
  <span class="nav-page" data-en="General · Listening" data-ko="General · 듣기">General · Listening</span>
  <div class="nav-space"></div>
  <a href="../../index.html" class="nav-back" data-en="← English" data-ko="← 영어">← English</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lbtn" onclick="setLang('ko')" id="btn-ko">한국어</button>
  </div>
</nav>

<div class="main">
  <div class="hero fade-in">
    <div class="hero-tag">GENERAL ENGLISH</div>
    <div class="hero-title" data-en="🎧 Listening" data-ko="🎧 듣기">🎧 Listening</div>
    <div class="hero-desc" data-en="Listen to AI-generated dialogues and passages, then answer comprehension questions." data-ko="AI가 생성한 대화와 지문을 듣고 이해도 질문에 답하세요.">Listen to AI-generated dialogues and answer comprehension questions.</div>
    <div class="hero-badges">
      <span class="hero-badge free">✓ 100% Free</span>
      <span class="hero-badge">A1 → C2</span>
      <span class="hero-badge">🔊 TTS Audio</span>
      <span class="hero-badge">Comprehension Quiz</span>
    </div>
  </div>

  <div class="settings-row fade-in">
    <div class="setting-item">
      <div class="si-label" data-en="Level" data-ko="레벨">Level</div>
      <select class="si-select" id="sel-level">
        <option value="A1">A1 — Beginner</option>
        <option value="A2">A2 — Elementary</option>
        <option value="B1" selected>B1 — Intermediate</option>
        <option value="B2">B2 — Upper-Intermediate</option>
        <option value="C1">C1 — Advanced</option>
        <option value="C2">C2 — Mastery</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-en="Type" data-ko="유형">Type</div>
      <select class="si-select" id="sel-type">
        <option value="dialogue">Dialogue (2 people)</option>
        <option value="monologue">Monologue / Story</option>
        <option value="announcement">Announcement</option>
        <option value="interview">Interview</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-en="Topic" data-ko="주제">Topic</div>
      <select class="si-select" id="sel-topic">
        <option value="daily life">Daily Life</option>
        <option value="travel">Travel</option>
        <option value="work">Work</option>
        <option value="health">Health</option>
        <option value="education">Education</option>
        <option value="technology">Technology</option>
      </select>
    </div>
  </div>

  <button class="gen-btn fade-in" id="gen-btn" onclick="generate()">
    🤖 <span data-en="Generate Listening" data-ko="듣기 생성">Generate Listening</span>
  </button>

  <div class="score-bar" id="score-bar" style="display:none;">
    <div>
      <div class="score-num" id="score-num">0 / 0</div>
      <div class="score-label" data-en="Correct" data-ko="정답">Correct</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="content-area"></div>

  <div class="result-box fade-in" id="result-box">
    <div style="font-size:48px;margin-bottom:12px;" id="rb-icon">🎉</div>
    <div style="font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:6px;" id="rb-title">완료!</div>
    <div style="font-size:16px;color:var(--orange);font-weight:600;margin-bottom:16px;" id="rb-score"></div>
    <button class="rb-btn" onclick="generate()" data-en="🔄 New Listening" data-ko="🔄 새 듣기">🔄 New Listening</button>
  </div>
</div>

<script>
let lang=localStorage.getItem('lw-lang')||'ko';
let currentData=null;
let score=0,answered=0,totalQ=0;
let ttsSpeed=1.0;

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-en][data-ko]').forEach(el=>el.innerHTML=l==='ko'?el.dataset.ko:el.dataset.en);
  document.getElementById('btn-en').classList.toggle('act',l==='en');
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  localStorage.setItem('lw-lang',l);
}
setLang(lang);

async function generate(){
  const level=document.getElementById('sel-level').value;
  const type=document.getElementById('sel-type').value;
  const topic=document.getElementById('sel-topic').value;
  const btn=document.getElementById('gen-btn');
  btn.disabled=true;
  btn.innerHTML='⏳ <span>'+(lang==='ko'?'생성 중...':'Generating...')+'</span>';
  document.getElementById('content-area').innerHTML='';
  document.getElementById('result-box').style.display='none';
  document.getElementById('score-bar').style.display='none';
  score=0;answered=0;

  const prompt=`Create a ${level} level English ${type} about "${topic}" for listening practice.
Return ONLY valid JSON, no markdown:
{
  "title": "Title of the listening",
  "script": "The full text to be read aloud (2-4 paragraphs for ${level} level)",
  "speakers": ["Speaker A name", "Speaker B name"],
  "questions": [
    {
      "question": "Comprehension question",
      "options": ["A", "B", "C", "D"],
      "answer": "correct option text",
      "explanation": "Why this is correct"
    }
  ],
  "vocabulary": [
    {"word": "word", "definition": "meaning"}
  ],
  "summary_korean": "한국어로 내용 요약"
}
Include 4 comprehension questions. Script should be appropriate for ${level} level.`;

  try {
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:2000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=data.content[0].text;
    const clean=text.replace(/```json|```/g,'').trim();
    currentData=JSON.parse(clean);
    totalQ=currentData.questions.length;
    renderListening();
  } catch(e){
    document.getElementById('content-area').innerHTML=`<div style="text-align:center;padding:24px;color:var(--red);">❌ ${lang==='ko'?'생성 실패':'Generation failed'}</div>`;
  }
  btn.disabled=false;
  btn.innerHTML='🔄 <span>'+(lang==='ko'?'새로 생성':'Regenerate')+'</span>';
}

function renderListening(){
  const d=currentData;
  document.getElementById('score-bar').style.display='flex';
  updateScore();
  const area=document.getElementById('content-area');
  area.innerHTML=`
    <div class="audio-player fade-in">
      <div class="ap-title">🎧 ${d.title}</div>
      <div class="ap-text" id="script-preview">${d.script.substring(0,100)}...</div>
      <div class="ap-controls">
        <button class="play-btn" id="play-btn" onclick="playAudio()">▶</button>
        <div style="flex:1;">
          <div class="ap-info" id="play-status">${lang==='ko'?'클릭하여 재생':'Click to play'}</div>
          <div style="display:flex;gap:6px;margin-top:6px;">
            <button class="ap-speed" onclick="setSpeed(0.8)">0.8x</button>
            <button class="ap-speed" onclick="setSpeed(1.0)">1.0x</button>
            <button class="ap-speed" onclick="setSpeed(1.2)">1.2x</button>
          </div>
        </div>
      </div>
      <button class="show-transcript-btn" onclick="toggleTranscript()">${lang==='ko'?'📄 스크립트 보기':'📄 Show Transcript'}</button>
      <div class="transcript" id="transcript">${d.script}</div>
    </div>

    ${d.summary_korean?`<div style="background:#fef3c7;border:0.5px solid #f59e0b;border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;color:#92400e;">🇰🇷 ${d.summary_korean}</div>`:''}

    <div class="card fade-in">
      <div class="card-head"><span class="card-title">${lang==='ko'?'이해도 문제':'Comprehension Questions'} (${d.questions.length})</span></div>
      <div class="card-body">
        <div class="q-list">
          ${d.questions.map((q,i)=>`
            <div class="q-item" id="q-${i}">
              <div class="q-text">${i+1}. ${q.question}</div>
              <div class="q-options">
                ${q.options.map(o=>`<button class="opt-btn" onclick="checkAnswer(this,'${o.replace(/'/g,"\\'")}','${q.answer.replace(/'/g,"\\'")}','${q.explanation.replace(/'/g,"\\'")}',${i})">${o}</button>`).join('')}
              </div>
              <div class="feedback" id="fb-${i}"></div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    ${d.vocabulary&&d.vocabulary.length?`
    <div class="card fade-in">
      <div class="card-head"><span class="card-title">${lang==='ko'?'핵심 어휘':'Key Vocabulary'}</span></div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;">
          ${d.vocabulary.map(v=>`<div style="background:var(--bg);border-radius:8px;padding:10px;"><div style="font-weight:600;color:var(--text);margin-bottom:2px;">${v.word}</div><div style="font-size:12px;color:var(--text-muted);">${v.definition}</div></div>`).join('')}
        </div>
      </div>
    </div>`:''}`;
}

function playAudio(){
  if(!currentData) return;
  const btn=document.getElementById('play-btn');
  const status=document.getElementById('play-status');
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(currentData.script);
  utt.lang='en-US';
  utt.rate=ttsSpeed;
  const voices=window.speechSynthesis.getVoices();
  const en=voices.find(v=>v.lang==='en-US'&&v.name.includes('Female'))||voices.find(v=>v.lang.startsWith('en'));
  if(en) utt.voice=en;
  utt.onstart=()=>{btn.textContent='⏸';status.textContent=lang==='ko'?'재생 중...':'Playing...';};
  utt.onend=()=>{btn.textContent='🔄';status.textContent=lang==='ko'?'완료. 다시 듣기':'Done. Play again';};
  utt.onerror=()=>{btn.textContent='▶';status.textContent=lang==='ko'?'오류 발생':'Error occurred';};
  window.speechSynthesis.speak(utt);
}

function setSpeed(s){ttsSpeed=s;}
function toggleTranscript(){
  const t=document.getElementById('transcript');
  t.style.display=t.style.display==='block'?'none':'block';
}

function checkAnswer(btn,chosen,correct,explanation,idx){
  const container=document.getElementById(`q-${idx}`);
  container.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById(`fb-${idx}`);
  if(chosen===correct){
    btn.classList.add('correct');
    fb.style.cssText='display:block;background:var(--green-light);color:var(--green);padding:8px 10px;border-radius:6px;font-size:12px;';
    fb.textContent='✓ '+explanation;
    score++;
  } else {
    btn.classList.add('wrong');
    container.querySelectorAll('.opt-btn').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});
    fb.style.cssText='display:block;background:var(--red-light);color:var(--red);padding:8px 10px;border-radius:6px;font-size:12px;';
    fb.textContent='✗ '+explanation;
  }
  answered++;
  updateScore();
  if(answered===totalQ) setTimeout(showResult,1000);
}

function updateScore(){
  const fill=document.getElementById('progress-fill');
  const num=document.getElementById('score-num');
  if(fill) fill.style.width=`${(answered/totalQ)*100}%`;
  if(num) num.textContent=`${score} / ${totalQ}`;
}

function showResult(){
  const pct=Math.round(score/totalQ*100);
  const box=document.getElementById('result-box');
  box.style.display='block';
  document.getElementById('rb-icon').textContent=pct>=80?'🎉':pct>=60?'👍':'💪';
  document.getElementById('rb-title').textContent=pct>=80?(lang==='ko'?'훌륭해요!':'Excellent!'):(pct>=60?(lang==='ko'?'잘했어요!':'Good job!'):(lang==='ko'?'계속 연습!':'Keep going!'));
  document.getElementById('rb-score').textContent=`${score} / ${totalQ} (${pct}%)`;
}
</script>
</body>
</html>
