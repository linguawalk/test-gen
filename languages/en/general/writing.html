<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — General English — Writing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --amber:#d97706;--amber-light:#fef3c7;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --green:#16a34a;--green-light:#dcfce7;
  --red:#e24b4a;--red-light:#fee2e2;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:860px;margin:0 auto;padding:28px 5% 80px;}
.hero{background:linear-gradient(135deg,#78350f 0%,var(--amber) 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}
.hero-badge.free{background:rgba(255,255,255,0.25);font-weight:700;}
.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:130px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}
.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--amber);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:#b45309;}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}
.card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.card-head{padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:600;color:var(--text);}
.card-body{padding:18px;}
/* Prompt */
.prompt-box{background:linear-gradient(135deg,#78350f,var(--amber));border-radius:14px;padding:20px 24px;margin-bottom:16px;}
.pb-label{font-size:11px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.pb-title{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;margin-bottom:8px;}
.pb-instruction{font-size:13px;color:rgba(255,255,255,0.85);line-height:1.6;margin-bottom:10px;}
.pb-meta{display:flex;gap:10px;flex-wrap:wrap;}
.pb-meta-item{font-size:11px;padding:3px 10px;border-radius:10px;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.85);}
/* Writing Area */
.writing-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.word-count{font-size:12px;color:var(--text-muted);}
.word-count span{font-weight:700;color:var(--amber);}
.writing-textarea{width:100%;min-height:220px;padding:14px;border:0.5px solid var(--border-md);border-radius:10px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;resize:vertical;line-height:1.75;transition:border-color 0.2s;}
.writing-textarea:focus{border-color:var(--amber);background:var(--white);}
.submit-btn{width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:600;background:var(--amber);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-top:10px;}
.submit-btn:hover{background:#b45309;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}
/* Tips */
.tips-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.tip-item{background:var(--bg);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--text-muted);border-left:3px solid var(--amber);}
/* Feedback */
.feedback-section{display:none;}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.score-item{text-align:center;background:var(--bg);border-radius:10px;padding:12px;}
.score-num{font-family:'DM Serif Display',serif;font-size:28px;color:var(--amber);line-height:1;}
.score-label{font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:.3px;margin-top:2px;}
.fb-section{margin-bottom:12px;}
.fb-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);margin-bottom:6px;}
.fb-content{font-size:13px;color:var(--text);line-height:1.65;background:var(--bg);padding:12px;border-radius:8px;}
.improved-text{font-size:14px;color:var(--text);line-height:1.8;background:var(--green-light);padding:14px;border-radius:8px;border-left:3px solid var(--green);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.3s ease forwards;}
</style>
</head>
<body>
<nav>
  <a href="../../index.html" class="nav-logo">
    <div class="nav-lm">LW</div>
    <span class="nav-lt">LinguaWalk</span>
  </a>
  <div class="nav-sep"></div>
  <span class="nav-page" data-en="General · Writing" data-ko="General · 쓰기">General · Writing</span>
  <div class="nav-space"></div>
  <a href="../../index.html" class="nav-back" data-en="← English" data-ko="← 영어">← English</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lbtn" onclick="setLang('ko')" id="btn-ko">한국어</button>
  </div>
</nav>

<div class="main">
  <div class="hero fade-in">
    <div class="hero-tag">GENERAL ENGLISH</div>
    <div class="hero-title" data-en="✍️ Writing" data-ko="✍️ 쓰기">✍️ Writing</div>
    <div class="hero-desc" data-en="Practice writing with AI-generated prompts. Get detailed feedback on grammar, vocabulary, structure, and style." data-ko="AI가 생성한 주제로 쓰기를 연습하세요. 문법, 어휘, 구조, 스타일에 대한 세부 피드백을 받으세요.">Practice writing and get detailed AI feedback on grammar, vocabulary, and style.</div>
    <div class="hero-badges">
      <span class="hero-badge free">✓ 100% Free</span>
      <span class="hero-badge">A1 → C2</span>
      <span class="hero-badge">🤖 AI Scoring</span>
      <span class="hero-badge">Detailed Feedback</span>
    </div>
  </div>

  <div class="settings-row fade-in">
    <div class="setting-item">
      <div class="si-label" data-en="Level" data-ko="레벨">Level</div>
      <select class="si-select" id="sel-level">
        <option value="A1">A1 — Beginner</option>
        <option value="A2">A2 — Elementary</option>
        <option value="B1" selected>B1 — Intermediate</option>
        <option value="B2">B2 — Upper-Intermediate</option>
        <option value="C1">C1 — Advanced</option>
        <option value="C2">C2 — Mastery</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-en="Type" data-ko="유형">Type</div>
      <select class="si-select" id="sel-type">
        <option value="opinion essay">Opinion Essay</option>
        <option value="descriptive paragraph">Descriptive Paragraph</option>
        <option value="email or letter">Email / Letter</option>
        <option value="story">Short Story</option>
        <option value="report">Report</option>
        <option value="discussion essay">Discussion Essay</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-en="Words" data-ko="단어 수">Words</div>
      <select class="si-select" id="sel-words">
        <option value="50-80">50-80 (Short)</option>
        <option value="100-150" selected>100-150 (Medium)</option>
        <option value="150-250">150-250 (Long)</option>
        <option value="250-350">250-350 (Extended)</option>
      </select>
    </div>
  </div>

  <button class="gen-btn fade-in" id="gen-btn" onclick="generate()">
    🤖 <span data-en="Generate Writing Prompt" data-ko="쓰기 주제 생성">Generate Writing Prompt</span>
  </button>

  <div id="content-area"></div>
</div>

<script>
let lang=localStorage.getItem('lw-lang')||'ko';
let currentPrompt=null;

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-en][data-ko]').forEach(el=>el.innerHTML=l==='ko'?el.dataset.ko:el.dataset.en);
  document.getElementById('btn-en').classList.toggle('act',l==='en');
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  localStorage.setItem('lw-lang',l);
}
setLang(lang);

async function generate(){
  const level=document.getElementById('sel-level').value;
  const type=document.getElementById('sel-type').value;
  const words=document.getElementById('sel-words').value;
  const btn=document.getElementById('gen-btn');
  btn.disabled=true;
  btn.innerHTML='⏳ <span>'+(lang==='ko'?'생성 중...':'Generating...')+'</span>';
  document.getElementById('content-area').innerHTML='';

  const prompt=`Create a ${level} level English ${type} writing prompt.
Return ONLY valid JSON, no markdown:
{
  "title": "Writing task title",
  "instruction": "Clear writing instruction for the student",
  "word_limit": "${words} words",
  "time_limit": "15-20 minutes",
  "tips": ["tip 1", "tip 2", "tip 3", "tip 4"],
  "useful_phrases": ["phrase 1", "phrase 2", "phrase 3"],
  "sample_outline": ["Introduction point", "Body point 1", "Body point 2", "Conclusion point"]
}`;

  try {
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:800,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    currentPrompt=JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    currentPrompt.level=level;
    currentPrompt.type=type;
    renderWriting();
  } catch(e){
    document.getElementById('content-area').innerHTML=`<div style="text-align:center;padding:24px;color:var(--red);">❌ ${lang==='ko'?'생성 실패':'Generation failed'}</div>`;
  }
  btn.disabled=false;
  btn.innerHTML='🔄 <span>'+(lang==='ko'?'새 주제':'New Prompt')+'</span>';
}

function renderWriting(){
  const p=currentPrompt;
  const area=document.getElementById('content-area');
  area.innerHTML=`
    <div class="prompt-box fade-in">
      <div class="pb-label">${lang==='ko'?'쓰기 주제':'Writing Task'}</div>
      <div class="pb-title">${p.title}</div>
      <div class="pb-instruction">${p.instruction}</div>
      <div class="pb-meta">
        <span class="pb-meta-item">📝 ${p.word_limit}</span>
        <span class="pb-meta-item">⏱ ${p.time_limit}</span>
        <span class="pb-meta-item">📊 ${p.level}</span>
      </div>
    </div>

    <div class="card fade-in">
      <div class="card-head">
        <span class="card-title">${lang==='ko'?'내 답변 작성':'Write Your Response'}</span>
        <div class="word-count">${lang==='ko'?'단어 수:':'Words:'} <span id="wc">0</span></div>
      </div>
      <div class="card-body">
        <textarea class="writing-textarea" id="writing-area" placeholder="${lang==='ko'?'여기에 답변을 작성하세요...':'Write your response here...'}" oninput="countWords()"></textarea>
        <button class="submit-btn" onclick="submitWriting()" data-en="✓ Submit & Get AI Feedback" data-ko="✓ 제출하고 AI 피드백 받기">✓ 제출하고 AI 피드백 받기</button>
      </div>
    </div>

    <div class="card fade-in">
      <div class="card-head"><span class="card-title">${lang==='ko'?'도움말':'Writing Tips'}</span></div>
      <div class="card-body">
        <div class="tips-grid">
          ${p.tips.map(t=>`<div class="tip-item">💡 ${t}</div>`).join('')}
        </div>
        <div style="margin-top:12px;">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-light);margin-bottom:8px;">${lang==='ko'?'유용한 표현':'Useful Phrases'}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${p.useful_phrases.map(ph=>`<span style="font-size:12px;padding:4px 10px;border-radius:8px;background:var(--amber-light);color:var(--amber);">${ph}</span>`).join('')}
          </div>
        </div>
        ${p.sample_outline?`<div style="margin-top:12px;">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-light);margin-bottom:8px;">${lang==='ko'?'개요 예시':'Sample Outline'}</div>
          ${p.sample_outline.map((s,i)=>`<div style="display:flex;gap:8px;margin-bottom:4px;font-size:13px;"><span style="color:var(--amber);font-weight:700;">${i+1}.</span><span>${s}</span></div>`).join('')}
        </div>`:''}
      </div>
    </div>

    <div class="feedback-section" id="feedback-section"></div>`;
}

function countWords(){
  const txt=document.getElementById('writing-area').value.trim();
  const count=txt?txt.split(/\s+/).length:0;
  document.getElementById('wc').textContent=count;
}

async function submitWriting(){
  const text=document.getElementById('writing-area').value.trim();
  if(text.split(/\s+/).length<10){
    alert(lang==='ko'?'최소 10단어 이상 작성해 주세요.':'Please write at least 10 words.');
    return;
  }
  const submitBtn=document.querySelector('.submit-btn');
  submitBtn.disabled=true;
  submitBtn.textContent=lang==='ko'?'⏳ AI 피드백 생성 중...':'⏳ Generating AI feedback...';

  const fb=document.getElementById('feedback-section');
  fb.style.display='block';
  fb.innerHTML=`<div style="text-align:center;padding:24px;background:var(--white);border:0.5px solid var(--border);border-radius:14px;"><div style="font-size:24px;margin-bottom:8px;">⏳</div><div>${lang==='ko'?'AI 피드백 생성 중...':'Generating feedback...'}</div></div>`;

  const prompt=`You are an English writing teacher. Evaluate this student's writing.

Task: "${currentPrompt.title}"
Instruction: "${currentPrompt.instruction}"
Level: ${currentPrompt.level}
Student's writing: "${text}"

Return ONLY valid JSON, no markdown:
{
  "overall_score": 7,
  "grammar_score": 7,
  "vocabulary_score": 7,
  "structure_score": 7,
  "content_score": 7,
  "strengths": "What the student did well (2-3 sentences)",
  "grammar_issues": "Grammar mistakes found and corrections",
  "vocabulary_feedback": "Vocabulary usage feedback",
  "structure_feedback": "Organization and structure feedback",
  "improved_version": "A polished version of their writing",
  "korean_summary": "한국어로 전반적인 피드백 요약"
}
Scores are out of 10. Be constructive and encouraging.`;

  try {
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1200,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const result=JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    fb.innerHTML=`
      <div class="card fade-in">
        <div class="card-head"><span class="card-title">🤖 AI ${lang==='ko'?'피드백':'Feedback'}</span></div>
        <div class="card-body">
          <div class="score-grid">
            <div class="score-item"><div class="score-num">${result.overall_score}</div><div class="score-label">Overall</div></div>
            <div class="score-item"><div class="score-num">${result.grammar_score}</div><div class="score-label">Grammar</div></div>
            <div class="score-item"><div class="score-num">${result.vocabulary_score}</div><div class="score-label">Vocabulary</div></div>
            <div class="score-item"><div class="score-num">${result.structure_score}</div><div class="score-label">Structure</div></div>
          </div>
          ${result.korean_summary?`<div class="fb-section"><div class="fb-label">🇰🇷 ${lang==='ko'?'전반적 피드백':'Overall'}</div><div class="fb-content">${result.korean_summary}</div></div>`:''}
          <div class="fb-section"><div class="fb-label">✓ ${lang==='ko'?'잘한 점':'Strengths'}</div><div class="fb-content">${result.strengths}</div></div>
          <div class="fb-section"><div class="fb-label">📝 ${lang==='ko'?'문법':'Grammar'}</div><div class="fb-content">${result.grammar_issues}</div></div>
          <div class="fb-section"><div class="fb-label">📚 ${lang==='ko'?'어휘':'Vocabulary'}</div><div class="fb-content">${result.vocabulary_feedback}</div></div>
          <div class="fb-section"><div class="fb-label">🏗 ${lang==='ko'?'구조':'Structure'}</div><div class="fb-content">${result.structure_feedback}</div></div>
          <div class="fb-section"><div class="fb-label">✨ ${lang==='ko'?'개선된 버전':'Improved Version'}</div><div class="improved-text">${result.improved_version}</div></div>
          <button onclick="generate()" style="margin-top:16px;width:100%;padding:12px;border-radius:10px;background:var(--amber);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;">🔄 ${lang==='ko'?'새 주제로 연습':'New Writing Task'}</button>
        </div>
      </div>`;
  } catch(e){
    fb.innerHTML=`<div style="padding:16px;color:var(--red);">❌ ${lang==='ko'?'피드백 생성 실패':'Feedback generation failed'}</div>`;
  }
  submitBtn.disabled=false;
  submitBtn.textContent=lang==='ko'?'✓ 제출하고 AI 피드백 받기':'✓ Submit & Get AI Feedback';
}
</script>
</body>
</html>
