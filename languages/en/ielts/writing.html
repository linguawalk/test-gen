<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — IELTS — Writing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --accent:#7c3aed;--accent-light:#ede9fe;--accent-dark:#4c1d95;
  --green:#16a34a;--green-light:#dcfce7;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all .2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all .2s;}
.lbtn.act{background:var(--accent);color:#fff;}
.main{max-width:860px;margin:0 auto;padding:28px 5% 80px;}
.hero{background:linear-gradient(135deg,var(--accent-dark),var(--accent));border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(20px,4vw,28px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}
.task-tabs{display:flex;background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:4px;margin-bottom:16px;gap:4px;}
.task-tab{flex:1;padding:12px 8px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-family:inherit;transition:all .2s;text-align:center;}
.task-tab.act{background:var(--accent);color:#fff;}
.info-box{background:var(--accent-light);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--accent);line-height:1.6;}
.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:130px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}
.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:20px;}
.gen-btn:hover{background:var(--accent-dark);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}
.loading-overlay{padding:48px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:20px;display:none;}
.loading-spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text-muted);}
.prompt-card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;}
.prompt-hdr{padding:12px 18px;background:var(--accent-light);border-bottom:0.5px solid var(--border);}
.prompt-hdr-title{font-size:13px;font-weight:600;color:var(--accent-dark);margin-bottom:3px;}
.prompt-timer{font-size:11px;color:var(--text-muted);}
.prompt-body{padding:18px 20px;}
.chart-box{background:var(--white);border-radius:12px;padding:20px;margin-bottom:14px;border:1px solid var(--border);}
.chart-title{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);margin-bottom:4px;}
.chart-subtitle{font-size:13px;color:var(--text-muted);margin-bottom:16px;line-height:1.5;}
.chart-canvas-wrap{position:relative;width:100%;max-height:340px;}
.chart-table{width:100%;border-collapse:collapse;font-size:13px;}
.chart-table th{background:var(--accent-light);color:var(--accent);font-weight:600;padding:8px 12px;text-align:left;border:1px solid var(--border);}
.chart-table td{padding:8px 12px;border:1px solid var(--border);color:var(--text);}
.chart-table tr:nth-child(even) td{background:var(--bg);}
.chart-note{font-size:11px;color:var(--text-light);margin-top:10px;text-align:center;}
.essay-q{font-size:15px;font-weight:500;color:var(--text);line-height:1.65;padding:14px 16px;background:var(--bg);border-radius:10px;border-left:4px solid var(--accent);margin-bottom:12px;}
.word-target{font-size:12px;color:var(--text-muted);margin-bottom:12px;}
.writing-wrap{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.writing-hdr{padding:10px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.writing-hdr-title{font-size:13px;font-weight:600;}
.wc-label{font-size:12px;color:var(--text-muted);}
.writing-area{width:100%;min-height:200px;padding:16px 18px;border:none;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--white);outline:none;resize:vertical;line-height:1.75;}
.writing-area::placeholder{color:var(--text-light);}
.submit-btn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:600;background:var(--teal-mid);color:#fff;border:none;cursor:pointer;font-family:inherit;margin-bottom:20px;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}
.fb-card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;display:none;}
.fb-hdr{padding:12px 16px;background:var(--green-light);border-bottom:0.5px solid var(--border);font-size:13px;font-weight:600;color:var(--green);}
.score-chips{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;border-bottom:0.5px solid var(--border);}
.sc-chip{background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center;flex:1;min-width:80px;}
.sc-chip-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:3px;}
.sc-chip-val{font-family:'DM Serif Display',serif;font-size:22px;color:var(--accent);}
.sc-chip-max{font-size:10px;color:var(--text-light);}
.fb-body{padding:14px 16px;}
.fb-sec{margin-bottom:12px;}
.fb-sec:last-child{margin-bottom:0;}
.fb-sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:5px;}
.fb-sec-text{font-size:13px;color:var(--text);line-height:1.7;}
.sample-resp{background:var(--accent-light);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--text);line-height:1.75;border-left:3px solid var(--accent);}
.tutor-wrap{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;display:none;}
.tutor-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--accent-light);border-bottom:0.5px solid var(--border);}
.tutor-av{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;}
.tutor-name{font-size:13px;font-weight:600;color:var(--accent);}
.tutor-msgs{padding:14px 16px;min-height:70px;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;align-items:flex-start;}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px;}
.msg-av.ai{background:var(--accent);color:#fff;}
.msg-av.user{background:var(--navy);color:#fff;}
.msg-bub{max-width:80%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.6;}
.msg.ai .msg-bub{background:var(--bg);border-radius:4px 12px 12px 12px;}
.msg.user .msg-bub{background:var(--navy);color:#fff;border-radius:12px 4px 12px 12px;}
.typing{display:flex;gap:4px;align-items:center;padding:9px 13px;background:var(--bg);border-radius:4px 12px 12px 12px;width:fit-content;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--text-light);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.quick-wrap{padding:0 16px 10px;display:flex;gap:6px;flex-wrap:wrap;}
.quick-btn{padding:4px 10px;border-radius:14px;font-size:12px;border:0.5px solid var(--border-md);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;}
.quick-btn:hover{border-color:var(--accent);color:var(--accent);}
.tutor-inp-wrap{display:flex;gap:8px;padding:10px 16px;border-top:0.5px solid var(--border);}
.tutor-inp{flex:1;padding:8px 12px;border:0.5px solid var(--border-md);border-radius:8px;font-size:13px;font-family:inherit;background:var(--bg);outline:none;}
.tutor-inp:focus{border-color:var(--accent);}
.send-btn{width:34px;height:34px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;}
.send-btn:disabled{background:var(--border-md);cursor:not-allowed;}
.act-row{display:none;gap:10px;margin-bottom:20px;}
.act-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);text-decoration:none;text-align:center;display:block;}
.act-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .3s ease forwards;}
</style>
</head>
<body>
<nav>
  <a href="/languages/en/index.html" class="nav-logo"><div class="nav-lm">LW</div><span class="nav-lt">LinguaWalk</span></a>
  <div class="nav-sep"></div><span class="nav-page">✍️ IELTS Writing</span>
  <div class="nav-space"></div>
  <a href="index.html" class="nav-back">← IELTS</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lbtn" onclick="setLang('ko')" id="btn-ko">한국어</button>
  </div>
</nav>
<div class="main fade-in">
  <div class="hero">
    <div class="hero-tag">✍️ IELTS · WRITING</div>
    <div class="hero-title" data-en="IELTS Writing Practice" data-ko="IELTS 쓰기 연습">IELTS Writing Practice</div>
    <div class="hero-desc" data-en="Practice Task 1 (graph/chart) and Task 2 (essay). Get AI band score feedback on all 4 criteria." data-ko="Task 1 (그래프/도표)과 Task 2 (에세이)를 연습하세요. 4가지 기준으로 AI 밴드 점수 피드백을 받으세요.">AI feedback on all 4 criteria: TA, CC, LR, GRA.</div>
    <div class="hero-badges"><span class="hero-badge">Task 1 · Graph/Chart</span><span class="hero-badge">Task 2 · Essay</span><span class="hero-badge">🤖 Band Score</span></div>
  </div>
  <div class="task-tabs">
    <button class="task-tab act" onclick="selTask('t1',this)">📊 Task 1 · Graph/Chart</button>
    <button class="task-tab" onclick="selTask('t2',this)">✍️ Task 2 · Essay</button>
  </div>
  <div class="info-box" id="info-box"></div>
  <div class="settings-row">
    <div class="setting-item">
      <div class="si-label" data-en="Topic" data-ko="주제">Topic</div>
      <select class="si-select" id="sel-topic">
        <option value="technology and society">Technology & Society</option>
        <option value="environment and climate">Environment</option>
        <option value="education">Education</option>
        <option value="health and medicine">Health</option>
        <option value="urban development">Urban Development</option>
        <option value="economics and employment">Economics</option>
        <option value="culture and globalisation">Culture</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-en="Target Band" data-ko="목표 밴드">Target Band</div>
      <select class="si-select" id="sel-band">
        <option value="Band 5-6">Band 5–6</option>
        <option value="Band 6-7" selected>Band 6–7</option>
        <option value="Band 7-8">Band 7–8</option>
        <option value="Band 8-9">Band 8–9</option>
      </select>
    </div>
  </div>
  <button class="gen-btn" id="gen-btn" onclick="generateTask()">✍️ <span data-en="Generate Writing Task" data-ko="쓰기 과제 생성">Generate Writing Task</span></button>
  <div class="loading-overlay" id="loading-overlay"><div class="loading-spinner"></div><div class="loading-text" data-en="AI is generating your task..." data-ko="AI가 과제를 생성하고 있습니다...">AI is generating your task...</div></div>
  <div id="content-area"></div>
  <div class="tutor-wrap" id="tutor-wrap">
    <div class="tutor-hdr"><div class="tutor-av">🤖</div><div><div class="tutor-name">AI Writing Coach</div></div></div>
    <div class="tutor-msgs" id="tutor-msgs"></div>
    <div class="quick-wrap" id="quick-wrap"></div>
    <div class="tutor-inp-wrap">
      <input class="tutor-inp" id="tutor-inp" placeholder="Ask for writing help..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
  <div class="act-row" id="act-row">
    <button class="act-btn primary" onclick="generateTask()" data-en="🔄 New Task" data-ko="🔄 새 과제">🔄 New Task</button>
    <a href="index.html" class="act-btn" data-en="← IELTS Home" data-ko="← IELTS 홈">← IELTS Home</a>
  </div>
</div>
<script>
const TASKS={
  t1:{en:'Task 1 — Graph/Chart/Diagram',ko:'Task 1 — 그래프/도표/다이어그램',words:150,time:20,
    info:{en:'📊 Describe and summarise a graph, chart, table, or diagram. Write at least 150 words in 20 minutes. Do NOT give opinions — just describe the data.',ko:'📊 그래프, 도표, 표 또는 다이어그램을 설명·요약하세요. 20분 내에 최소 150단어를 쓰세요. 의견은 쓰지 말고 데이터만 묘사하세요.'}},
  t2:{en:'Task 2 — Argumentative Essay',ko:'Task 2 — 논증 에세이',words:250,time:40,
    info:{en:'✍️ Write an essay responding to an argument, problem, or viewpoint. Write at least 250 words in 40 minutes. Give your opinion with well-developed arguments.',ko:'✍️ 주장, 문제, 관점에 답하는 에세이를 쓰세요. 40분 내에 최소 250단어를 쓰세요. 충분히 발전된 논거와 함께 의견을 제시하세요.'}}
};
let lang='en', task='t1', data=null, isLoading=false, msgs=[];
let activeChart=null;

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-en][data-ko]').forEach(el=>{const t=l==='ko'?el.dataset.ko:el.dataset.en;if(t)el.innerHTML=t;});
  document.getElementById('btn-en').classList.toggle('act',l==='en');
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  renderInfo();
  try{localStorage.setItem('lw-lang',l);}catch(e){}
}
function selTask(t,btn){
  task=t;
  document.querySelectorAll('.task-tab').forEach(b=>b.classList.remove('act')); btn.classList.add('act');
  renderInfo(); reset();
}
function renderInfo(){
  const t=TASKS[task];
  document.getElementById('info-box').innerHTML=`<strong>${lang==='ko'?t.ko:t.en}</strong> · ⏱ ${t.time} ${lang==='ko'?'분':'min'} · ${lang==='ko'?'최소':'min'} ${t.words} ${lang==='ko'?'단어':'words'}<br>${lang==='ko'?t.info.ko:t.info.en}`;
}
function reset(){
  if(activeChart){activeChart.destroy();activeChart=null;}
  isLoading=false;
  document.getElementById('loading-overlay').style.display='none';
  document.getElementById('gen-btn').disabled=false;
  document.getElementById('content-area').innerHTML='';
  document.getElementById('tutor-wrap').style.display='none';
  document.getElementById('act-row').style.display='none';
  data=null; msgs=[];
}
function doneLoading(){
  document.getElementById('loading-overlay').style.display='none';
  isLoading=false; document.getElementById('gen-btn').disabled=false;
}
function showErr(e){
  doneLoading();
  document.getElementById('content-area').innerHTML=`<div style="padding:32px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;color:var(--text-muted)">⚠️ ${lang==='ko'?'생성 실패. 다시 시도해 주세요.':'Generation failed. Please try again.'}<br><small style="color:var(--text-light);margin-top:6px;display:block;">${e.message||''}</small></div>`;
  console.error(e);
}
async function callAPI(prompt,maxTokens){
  const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:maxTokens||1500,messages:[{role:'user',content:prompt}]})});
  const d=await r.json();
  if(d.error) throw new Error(JSON.stringify(d.error));
  const txt=d.content[0].text;
  const s=txt.indexOf('{'),e=txt.lastIndexOf('}');
  if(s===-1) throw new Error('No JSON in response');
  return JSON.parse(txt.slice(s,e+1));
}

async function generateTask(){
  if(isLoading) return;
  reset();
  isLoading=true;
  document.getElementById('gen-btn').disabled=true;
  document.getElementById('loading-overlay').style.display='block';
  const topic=document.getElementById('sel-topic').value;
  const band=document.getElementById('sel-band').value;
  try{
    let prompt='';
    if(task==='t1'){
      prompt=`Create an IELTS Academic Writing Task 1 about ${topic}. Target band: ${band}.
Choose one chart type randomly from: bar chart, line graph, pie chart, table.
Return a JSON object with these exact fields:
- chartType: one of "bar", "line", "pie", "table"
- title: descriptive chart title string (include year if relevant)
- xLabel: x-axis label string (for bar/line only, e.g. "Year" or "Country")
- yLabel: y-axis label string (for bar/line only, e.g. "Percentage (%)" or "Million tonnes")
- labels: array of 5-6 strings (categories or x-axis values)
- datasets: array of 1-3 objects, each with name (string) and values (array of numbers matching labels length)
- tableHeaders: array of strings (for table type only, column headers)
- tableRows: array of arrays of strings (for table type only, row data)
- writingPrompt: the full IELTS task instruction string
- sampleResponse: 170-word Band 7 sample response string
- sampleResponse_ko: Korean strategy tip string

For bar chart example: labels=["UK","USA","Australia","Canada","India"], datasets=[{name:"2020",values:[45,38,62,29,71]},{name:"2023",values:[52,41,68,33,79]}]
For line graph example: labels=["2018","2019","2020","2021","2022"], datasets=[{name:"Electric vehicles",values:[2.1,3.4,4.8,7.2,10.5]},{name:"Hybrid vehicles",values:[8.3,9.1,8.7,9.4,10.1]}]
For pie chart example: labels=["Social media","Online news","TV","Radio","Newspapers"], datasets=[{name:"News consumption",values:[35,28,20,10,7]}]
All values must be actual numbers (not strings). Make the data realistic and interesting for IELTS practice.`;
    } else {
      prompt=`Create an IELTS Academic Writing Task 2 (argumentative essay) about ${topic}. Target band: ${band}.
Return a JSON object with: essayType (string e.g. "Opinion", "Discussion", "Problem-Solution", "Advantages-Disadvantages"), writingPrompt (string, the full IELTS essay question), outline (object with introduction (string), body1 (string), body2 (string), conclusion (string)), sampleResponse (string, a 270-word Band 7 essay), sampleResponse_ko (Korean strategy tip)`;
    }
    data=await callAPI(prompt,1800);
    doneLoading(); renderTask(); initTutor();
    document.getElementById('act-row').style.display='flex';
  } catch(e){showErr(e);}
}

function renderTask(){
  const area=document.getElementById('content-area'); area.innerHTML='';
  const t=TASKS[task];

  const pc=document.createElement('div'); pc.className='prompt-card';
  const ph=document.createElement('div'); ph.className='prompt-hdr';
  ph.innerHTML=`<div class="prompt-hdr-title">${lang==='ko'?t.ko:t.en}</div><div class="prompt-timer">⏱ ${t.time} ${lang==='ko'?'분':'min'} · ${lang==='ko'?'최소':'min'} ${t.words} ${lang==='ko'?'단어':'words'}</div>`;
  const pb=document.createElement('div'); pb.className='prompt-body';

  if(task==='t1'){
    pb.innerHTML=`<div class="chart-box">
      <div class="chart-title">📊 ${(data.chartType||'chart').toUpperCase()} — ${data.title||''}</div>
      <div class="chart-subtitle">${data.xLabel||''} ${data.yLabel?'/ '+data.yLabel:''}</div>
      <div class="chart-canvas-wrap" id="chart-canvas-wrap"></div>
      <div class="chart-note" id="chart-note"></div>
    </div>
    <div class="essay-q">${data.writingPrompt||''}</div>`;
    setTimeout(()=>renderChart(data),50);
  } else {
    const types={Opinion:lang==='ko'?'의견형':'Opinion',Discussion:lang==='ko'?'토론형':'Discussion','Problem-Solution':lang==='ko'?'문제-해결':'Problem-Solution','Advantages-Disadvantages':lang==='ko'?'장단점':'Advantages-Disadvantages'};
    pb.innerHTML=`<div style="display:inline-block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);background:var(--accent-light);padding:3px 10px;border-radius:10px;margin-bottom:10px;">${types[data.essayType]||data.essayType}</div>
    <div class="essay-q">${data.writingPrompt||''}</div>`;
    if(data.outline){
      pb.innerHTML+=`<div style="background:var(--bg);border-radius:10px;padding:12px 14px;margin-top:10px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;">💡 ${lang==='ko'?'구조 힌트':'Structure Hint'}</div>
        ${Object.entries(data.outline).map(([k,v])=>`<div style="font-size:12px;color:var(--text-muted);margin-bottom:5px;"><strong style="color:var(--text);text-transform:capitalize;">${k}:</strong> ${v}</div>`).join('')}
      </div>`;
    }
  }
  pc.append(ph,pb); area.appendChild(pc);

  // Writing area
  const ww=document.createElement('div'); ww.className='writing-wrap';
  ww.innerHTML=`<div class="writing-hdr"><div class="writing-hdr-title">✏️ ${lang==='ko'?'내 답변 작성':'Your Response'}</div><div class="wc-label" id="wc-label">0 words</div></div>
    <textarea class="writing-area" id="writing-area" placeholder="${lang==='ko'?'여기에 답변을 작성하세요...':'Write your response here...'}" oninput="updateWC()"></textarea>`;
  area.appendChild(ww);

  const sb=document.createElement('button'); sb.className='submit-btn'; sb.id='submit-btn';
  sb.textContent=`🤖 ${lang==='ko'?'AI 채점 받기':'Get AI Scoring'}`;
  sb.onclick=submitWriting; area.appendChild(sb);

  if(data.sampleResponse){
    const scard=document.createElement('div');
    scard.style.cssText='background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;';
    const showBtn=document.createElement('button');
    showBtn.style.cssText='width:100%;padding:12px 16px;background:transparent;border:none;font-size:13px;font-weight:600;color:var(--accent);cursor:pointer;text-align:left;font-family:inherit;';
    showBtn.textContent=`📝 ${lang==='ko'?'고득점 예시 답변 보기':'Show Sample High-Band Response'}`;
    const sDiv=document.createElement('div'); sDiv.style.display='none';
    sDiv.innerHTML=`<div style="padding:14px 16px;"><div class="sample-resp">${data.sampleResponse}</div>${data.sampleResponse_ko?`<div style="font-size:12px;color:var(--text-muted);margin-top:8px;padding:8px 10px;background:var(--bg);border-radius:6px;">💡 ${data.sampleResponse_ko}</div>`:''}`;
    showBtn.onclick=function(){const open=sDiv.style.display==='block';sDiv.style.display=open?'none':'block';this.textContent=open?`📝 ${lang==='ko'?'고득점 예시 답변 보기':'Show Sample High-Band Response'}`:(lang==='ko'?'숨기기':'Hide');};
    scard.append(showBtn,sDiv); area.appendChild(scard);
  }
}

function renderChart(d){
  const wrap=document.getElementById('chart-canvas-wrap'); if(!wrap) return;
  if(activeChart){activeChart.destroy();activeChart=null;}
  wrap.innerHTML='';

  const type=d.chartType||'bar';
  const labels=d.labels||[];
  const datasets=d.datasets||[];
  const COLORS=['#7c3aed','#2563eb','#16a34a','#d97706','#e24b4a','#0891b2'];
  const COLORS_LIGHT=['rgba(124,58,237,0.15)','rgba(37,99,235,0.15)','rgba(22,163,74,0.15)','rgba(217,119,6,0.15)','rgba(226,75,74,0.15)','rgba(8,145,178,0.15)'];

  if(type==='table'){
    // 표 형식 렌더링
    const headers=d.tableHeaders||[];
    const rows=d.tableRows||[];
    if(!headers.length&&datasets.length){
      // datasets에서 테이블 구성
      const tbl=document.createElement('table'); tbl.className='chart-table';
      const thead=document.createElement('thead');
      thead.innerHTML=`<tr><th>${d.xLabel||'Category'}</th>${datasets.map(ds=>`<th>${ds.name}</th>`).join('')}</tr>`;
      const tbody=document.createElement('tbody');
      labels.forEach((lbl,i)=>{
        tbody.innerHTML+=`<tr><td><strong>${lbl}</strong></td>${datasets.map(ds=>`<td>${ds.values[i]!==undefined?ds.values[i]:'-'}</td>`).join('')}</tr>`;
      });
      tbl.append(thead,tbody); wrap.appendChild(tbl);
    } else {
      const tbl=document.createElement('table'); tbl.className='chart-table';
      const thead=document.createElement('thead');
      thead.innerHTML=`<tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr>`;
      const tbody=document.createElement('tbody');
      rows.forEach(row=>{tbody.innerHTML+=`<tr>${row.map((c,i)=>`<td>${i===0?`<strong>${c}</strong>`:c}</td>`).join('')}</tr>`;});
      tbl.append(thead,tbody); wrap.appendChild(tbl);
    }
    document.getElementById('chart-note').textContent=lang==='ko'?'📋 위 표를 분석하여 주요 특징을 요약하세요.':'📋 Analyse the table above and summarise the key features.';
    return;
  }

  if(type==='pie'||type==='doughnut'){
    const canvas=document.createElement('canvas'); canvas.style.maxHeight='320px';
    wrap.appendChild(canvas);
    const vals=datasets[0]?.values||[];
    activeChart=new Chart(canvas,{
      type:'doughnut',
      data:{labels,datasets:[{data:vals,backgroundColor:COLORS.slice(0,labels.length),borderColor:'#fff',borderWidth:2,hoverOffset:8}]},
      options:{responsive:true,maintainAspectRatio:true,plugins:{
        legend:{position:'right',labels:{font:{family:"'DM Sans',sans-serif",size:12},padding:14,boxWidth:14}},
        tooltip:{callbacks:{label:function(ctx){const v=ctx.parsed;const total=vals.reduce((a,b)=>a+b,0);return ` ${ctx.label}: ${v} (${Math.round(v/total*100)}%)`;}}}
      }}
    });
    document.getElementById('chart-note').textContent=lang==='ko'?`📊 위 도넛 차트는 ${d.title}을 보여줍니다.`:`📊 The chart above shows ${d.title}.`;
    return;
  }

  // bar 또는 line
  const canvas=document.createElement('canvas'); canvas.style.maxHeight='320px';
  wrap.appendChild(canvas);
  const isLine=type==='line';
  const chartDatasets=datasets.map((ds,i)=>({
    label:ds.name,
    data:ds.values,
    backgroundColor:isLine?COLORS_LIGHT[i%COLORS.length]:COLORS[i%COLORS.length],
    borderColor:COLORS[i%COLORS.length],
    borderWidth:isLine?2.5:0,
    borderRadius:isLine?0:5,
    fill:isLine,
    tension:isLine?0.35:0,
    pointBackgroundColor:isLine?COLORS[i%COLORS.length]:'transparent',
    pointRadius:isLine?4:0,
    pointHoverRadius:isLine?6:0
  }));
  activeChart=new Chart(canvas,{
    type:isLine?'line':'bar',
    data:{labels,datasets:chartDatasets},
    options:{
      responsive:true,maintainAspectRatio:true,
      plugins:{
        legend:{display:datasets.length>1,position:'top',labels:{font:{family:"'DM Sans',sans-serif",size:12},padding:12,boxWidth:12}},
        tooltip:{mode:'index',intersect:false}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{family:"'DM Sans',sans-serif",size:11}},title:{display:!!d.xLabel,text:d.xLabel||'',font:{size:11}}},
        y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{font:{family:"'DM Sans',sans-serif",size:11}},title:{display:!!d.yLabel,text:d.yLabel||'',font:{size:11}},beginAtZero:true}
      }
    }
  });
  document.getElementById('chart-note').textContent=lang==='ko'?`📊 위 ${isLine?'꺾은선 그래프':'막대 그래프'}는 ${d.title}을 보여줍니다.`:`📊 The ${isLine?'line graph':'bar chart'} above shows ${d.title}.`;
}


  const ta=document.getElementById('writing-area'); if(!ta) return;
  const wc=ta.value.trim().split(/\s+/).filter(w=>w).length;
  const el=document.getElementById('wc-label'); if(el) el.textContent=wc+' words';
}

async function submitWriting(){
  const ta=document.getElementById('writing-area'); if(!ta) return;
  const txt=ta.value.trim();
  const wc=txt.split(/\s+/).filter(w=>w).length;
  if(wc<30){alert(lang==='ko'?'최소 30단어 이상 작성해 주세요.':'Please write at least 30 words.');return;}
  const btn=document.getElementById('submit-btn'); btn.disabled=true;
  btn.textContent=lang==='ko'?'⏳ AI 채점 중...':'⏳ AI scoring...';
  const t=TASKS[task];
  try{
    const fb=await callAPI(`You are an IELTS Writing examiner. Score this ${lang==='ko'?t.ko:t.en} response.
Task prompt: ${data?.writingPrompt||''}
Student response (${wc} words): ${txt}

Return a JSON object with: scores (object with task_achievement, coherence_cohesion, lexical_resource, grammatical_range each having score (number with .5 increments, 1-9) and comment (string)), overall_band (number with .5 increments), strengths (string), improvements (string), strengths_ko (Korean string), improvements_ko (Korean string)`,1200);
    renderFeedback(fb);
  }catch(e){
    btn.disabled=false; btn.textContent=`🤖 ${lang==='ko'?'AI 채점 받기':'Get AI Scoring'}`;
    alert(lang==='ko'?'오류가 발생했습니다.':'Error occurred.');
  }
}

function renderFeedback(fb){
  const exist=document.getElementById('fb-card'); if(exist)exist.remove();
  const fc=document.createElement('div'); fc.className='fb-card'; fc.id='fb-card';
  const scores=fb.scores||{};
  fc.innerHTML=`<div class="fb-hdr">🤖 ${lang==='ko'?'AI 채점 완료':'AI Scoring Complete'} · Overall Band ${fb.overall_band}</div>
    <div class="score-chips">${Object.entries(scores).map(([k,v])=>`<div class="sc-chip"><div class="sc-chip-name">${k.replace(/_/g,' ')}</div><div class="sc-chip-val">${v.score}</div><div class="sc-chip-max">/ 9</div></div>`).join('')}</div>
    <div class="fb-body">
      <div class="fb-sec"><div class="fb-sec-title">✅ ${lang==='ko'?'강점':'Strengths'}</div><div class="fb-sec-text">${lang==='ko'?(fb.strengths_ko||fb.strengths):fb.strengths}</div></div>
      <div class="fb-sec"><div class="fb-sec-title">📈 ${lang==='ko'?'개선점':'Improve'}</div><div class="fb-sec-text">${lang==='ko'?(fb.improvements_ko||fb.improvements):fb.improvements}</div></div>
    </div>`;
  fc.style.display='block';
  document.getElementById('content-area').appendChild(fc);
  fc.scrollIntoView({behavior:'smooth',block:'start'});
  const btn=document.getElementById('submit-btn');if(btn){btn.disabled=false;btn.textContent=lang==='ko'?'🔄 다시 제출':'🔄 Resubmit';}
}

function initTutor(){
  msgs=[]; document.getElementById('tutor-msgs').innerHTML='';
  const t=TASKS[task];
  addMsg('ai',lang==='ko'?`✍️ **${t.ko}** 준비!\n\n${t.info.ko}`:`✍️ **${t.en}** ready!\n\n${t.info.en}`);
  const qs=lang==='ko'
    ?task==='t1'?['도표 묘사 팁','유용한 표현','구조 도움','고득점 전략']:['에세이 구조','논점 제안','고득점 어휘','밴드 향상 팁']
    :task==='t1'?['Chart description tips','Useful phrases','Structure help','High-band strategies']:['Essay structure','Argument ideas','High-band vocabulary','Band improvement'];
  document.getElementById('quick-wrap').innerHTML=qs.map(q=>`<button class="quick-btn" onclick="document.getElementById('tutor-inp').value='${q}';sendMsg()">${q}</button>`).join('');
  document.getElementById('tutor-wrap').style.display='block';
}
async function sendMsg(){
  const inp=document.getElementById('tutor-inp'); const txt=inp.value.trim(); if(!txt) return;
  inp.value=''; addMsg('user',txt); msgs.push({role:'user',content:txt});
  document.getElementById('send-btn').disabled=true; const tid=showTyping();
  const t=TASKS[task];
  try{
    const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:400,system:lang==='ko'?`IELTS 쓰기 전문 코치. 과제: ${t.ko}. 한국어로 간결하게 답하세요.`:`IELTS Writing coach. Task: ${t.en}. Be concise.`,messages:msgs.slice(-6)})});
    const d=await r.json(); removeTyping(tid);
    const rep=d.content[0].text; msgs.push({role:'assistant',content:rep}); addMsg('ai',rep);
  }catch(e){removeTyping(tid);addMsg('ai','⚠️ Error');}
  document.getElementById('send-btn').disabled=false;
}
function addMsg(role,txt){
  const w=document.getElementById('tutor-msgs'); const d=document.createElement('div'); d.className='msg '+role;
  d.innerHTML=`<div class="msg-av ${role}">${role==='ai'?'🤖':'👤'}</div><div class="msg-bub">${txt.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight;
}
function showTyping(){
  const w=document.getElementById('tutor-msgs'); const id='t'+Date.now(); const d=document.createElement('div'); d.className='msg ai'; d.id=id;
  d.innerHTML=`<div class="msg-av ai">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight; return id;
}
function removeTyping(id){const e=document.getElementById(id);if(e)e.remove();}
(function(){let s;try{s=localStorage.getItem('lw-lang');}catch(e){}setLang(s||((navigator.language||'').startsWith('ko')?'ko':'en'));renderInfo();})();
</script>
</body>
