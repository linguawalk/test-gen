<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — IELTS — Listening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --accent:#7c3aed;--accent-light:#ede9fe;--accent-dark:#4c1d95;
  --green:#16a34a;--green-light:#dcfce7;--red:#e24b4a;--red-light:#fee2e2;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all .2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all .2s;}
.lbtn.act{background:var(--accent);color:#fff;}
.main{max-width:820px;margin:0 auto;padding:28px 5% 80px;}
.hero{background:linear-gradient(135deg,var(--accent-dark),var(--accent));border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(20px,4vw,28px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}
.part-tabs{display:flex;background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:4px;margin-bottom:16px;gap:4px;overflow-x:auto;}
.part-tab{flex:1;padding:9px 6px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-family:inherit;transition:all .2s;text-align:center;white-space:nowrap;}
.part-tab.act{background:var(--accent);color:#fff;}
.info-box{background:var(--accent-light);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--accent);line-height:1.6;}
.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:130px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}
.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:20px;}
.gen-btn:hover{background:var(--accent-dark);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}
.loading-overlay{padding:48px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:20px;display:none;}
.loading-spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text-muted);}
.script-card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;}
.script-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--accent-light);border-bottom:0.5px solid var(--border);flex-wrap:wrap;gap:8px;}
.script-title{font-size:13px;font-weight:600;color:var(--accent);}
.tog-btn{padding:4px 12px;border-radius:8px;border:0.5px solid var(--accent);background:transparent;color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
.tog-btn:hover{background:var(--accent);color:#fff;}
.play-row{padding:12px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;}
.play-btn{width:38px;height:38px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.play-btn:hover{background:var(--accent-dark);transform:scale(1.05);}
.play-btn svg{width:14px;height:14px;fill:#fff;}
.player-info{flex:1;}
.player-lbl{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
.player-bar{height:5px;background:var(--bg);border-radius:5px;overflow:hidden;}
.player-fill{height:100%;background:linear-gradient(90deg,var(--accent-dark),var(--accent));border-radius:5px;width:0%;transition:width .1s;}
.spd-btn{padding:3px 9px;border-radius:7px;border:0.5px solid var(--border-md);background:transparent;font-size:11px;font-weight:600;color:var(--text-muted);cursor:pointer;font-family:inherit;}
.spd-btn:hover{background:var(--accent-light);color:var(--accent);}
.script-lines{padding:12px 16px;display:none;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;}
.script-lines.open{display:flex;}
.sl{display:flex;gap:10px;padding:6px 10px;border-radius:8px;cursor:pointer;}
.sl:hover{background:var(--accent-light);}
.sl.active{background:var(--accent-light);border-left:3px solid var(--accent);}
.sl-spk{font-size:10px;font-weight:700;color:var(--accent);min-width:80px;padding-top:2px;}
.sl-txt{font-size:13px;color:var(--text);line-height:1.6;flex:1;}
.qs-wrap{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
.qs-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;}
.q-item{margin-bottom:14px;padding:14px;background:var(--bg);border-radius:10px;}
.q-item:last-child{margin-bottom:0;}
.q-num{font-size:10px;font-weight:600;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.q-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.5;}
.q-opts{display:flex;flex-direction:column;gap:7px;}
.q-opt{padding:10px 14px;border-radius:8px;border:1.5px solid var(--border-md);background:var(--white);cursor:pointer;font-size:13px;color:var(--text);transition:all .2s;text-align:left;font-family:inherit;display:flex;align-items:center;gap:10px;}
.q-opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-light);}
.q-opt.correct{border-color:var(--green);background:var(--green-light);color:var(--green);font-weight:500;}
.q-opt.wrong{border-color:var(--red);background:var(--red-light);color:var(--red);}
.q-opt:disabled{cursor:default;}
.q-ltr{width:24px;height:24px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-muted);flex-shrink:0;}
.q-opt.correct .q-ltr{background:var(--green);color:#fff;}
.q-opt.wrong .q-ltr{background:var(--red);color:#fff;}
.q-fb{margin-top:8px;font-size:12px;padding:8px 12px;border-radius:7px;display:none;line-height:1.5;}
.q-fb.show{display:block;}
.q-fb.correct{background:var(--green-light);color:var(--green);}
.q-fb.wrong{background:var(--red-light);color:var(--red);}
.score-card{background:linear-gradient(135deg,var(--accent-dark),var(--accent));border-radius:14px;padding:24px;text-align:center;margin-bottom:20px;display:none;}
.sc-num{font-family:'DM Serif Display',serif;font-size:52px;color:#fff;line-height:1;}
.sc-sub{font-size:14px;color:rgba(255,255,255,0.7);margin:6px 0 10px;}
.sc-msg{font-size:13px;color:#c4b5fd;font-weight:500;}
.tutor-wrap{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;display:none;}
.tutor-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--accent-light);border-bottom:0.5px solid var(--border);}
.tutor-av{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;}
.tutor-name{font-size:13px;font-weight:600;color:var(--accent);}
.tutor-msgs{padding:14px 16px;min-height:70px;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;align-items:flex-start;}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px;}
.msg-av.ai{background:var(--accent);color:#fff;}
.msg-av.user{background:var(--navy);color:#fff;}
.msg-bub{max-width:80%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.6;}
.msg.ai .msg-bub{background:var(--bg);border-radius:4px 12px 12px 12px;}
.msg.user .msg-bub{background:var(--navy);color:#fff;border-radius:12px 4px 12px 12px;}
.typing{display:flex;gap:4px;align-items:center;padding:9px 13px;background:var(--bg);border-radius:4px 12px 12px 12px;width:fit-content;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--text-light);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.quick-wrap{padding:0 16px 10px;display:flex;gap:6px;flex-wrap:wrap;}
.quick-btn{padding:4px 10px;border-radius:14px;font-size:12px;border:0.5px solid var(--border-md);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;}
.quick-btn:hover{border-color:var(--accent);color:var(--accent);}
.tutor-inp-wrap{display:flex;gap:8px;padding:10px 16px;border-top:0.5px solid var(--border);}
.tutor-inp{flex:1;padding:8px 12px;border:0.5px solid var(--border-md);border-radius:8px;font-size:13px;font-family:inherit;background:var(--bg);outline:none;}
.tutor-inp:focus{border-color:var(--accent);}
.send-btn{width:34px;height:34px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;}
.send-btn:disabled{background:var(--border-md);cursor:not-allowed;}
.act-row{display:none;gap:10px;margin-bottom:20px;}
.act-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);text-decoration:none;text-align:center;display:block;}
.act-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .3s ease forwards;}
</style>
</head>
<body>
<nav>
  <a href="/languages/en/index.html" class="nav-logo"><div class="nav-lm">LW</div><span class="nav-lt">LinguaWalk</span></a>
  <div class="nav-sep"></div><span class="nav-page">🎧 IELTS Listening</span>
  <div class="nav-space"></div>
  <a href="index.html" class="nav-back">← IELTS</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lbtn" onclick="setLang('ko')" id="btn-ko">한국어</button>
  </div>
</nav>
<div class="main fade-in">
  <div class="hero">
    <div class="hero-tag">🎧 IELTS · LISTENING</div>
    <div class="hero-title" data-en="IELTS Listening Practice" data-ko="IELTS 듣기 연습">IELTS Listening Practice</div>
    <div class="hero-desc" data-en="Practice all 4 IELTS sections with AI-generated audio scripts and questions." data-ko="AI가 생성한 스크립트와 문제로 IELTS 4개 섹션을 연습하세요.">Practice all 4 IELTS sections.</div>
    <div class="hero-badges"><span class="hero-badge">Section 1–4</span><span class="hero-badge">MCQ · Matching · Fill-in</span><span class="hero-badge">🤖 AI Tutor</span></div>
  </div>
  <div class="part-tabs">
    <button class="part-tab act" onclick="selPart('s1',this)">Section 1<br><small>Social Convo</small></button>
    <button class="part-tab" onclick="selPart('s2',this)">Section 2<br><small>Monologue</small></button>
    <button class="part-tab" onclick="selPart('s3',this)">Section 3<br><small>Academic</small></button>
    <button class="part-tab" onclick="selPart('s4',this)">Section 4<br><small>Lecture</small></button>
  </div>
  <div class="info-box" id="info-box"></div>
  <div class="settings-row">
    <div class="setting-item">
      <div class="si-label" data-en="Topic" data-ko="주제">Topic</div>
      <select class="si-select" id="sel-topic">
        <option value="accommodation and housing">Housing</option>
        <option value="travel and tourism">Travel</option>
        <option value="education">Education</option>
        <option value="health and medicine">Health</option>
        <option value="environment">Environment</option>
        <option value="technology">Technology</option>
        <option value="work and employment">Work</option>
        <option value="culture and society">Culture</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-en="Difficulty" data-ko="난이도">Difficulty</div>
      <select class="si-select" id="sel-diff">
        <option value="Band 5-6">Band 5–6</option>
        <option value="Band 6-7" selected>Band 6–7</option>
        <option value="Band 7-8">Band 7–8</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-en="Speed" data-ko="속도">Speed</div>
      <select class="si-select" id="sel-spd">
        <option value="0.85">Slow</option>
        <option value="1.0" selected>Normal</option>
        <option value="1.15">Fast</option>
      </select>
    </div>
  </div>
  <button class="gen-btn" id="gen-btn" onclick="generate()">🎧 <span data-en="Generate IELTS Listening" data-ko="IELTS 듣기 생성">Generate IELTS Listening</span></button>
  <div class="loading-overlay" id="loading-overlay"><div class="loading-spinner"></div><div class="loading-text" data-en="AI is generating content..." data-ko="AI가 콘텐츠를 생성하고 있습니다...">AI is generating content...</div></div>
  <div id="content-area"></div>
  <div class="score-card" id="score-card">
    <div style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:6px;" data-en="Your Score" data-ko="점수">Your Score</div>
    <div class="sc-num" id="sc-num"></div><div class="sc-sub" id="sc-sub"></div><div class="sc-msg" id="sc-msg"></div>
  </div>
  <div class="tutor-wrap" id="tutor-wrap">
    <div class="tutor-hdr"><div class="tutor-av">🤖</div><div><div class="tutor-name">AI Tutor</div></div></div>
    <div class="tutor-msgs" id="tutor-msgs"></div>
    <div class="quick-wrap" id="quick-wrap"></div>
    <div class="tutor-inp-wrap">
      <input class="tutor-inp" id="tutor-inp" placeholder="Ask about this section..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
  <div class="act-row" id="act-row">
    <button class="act-btn primary" onclick="generate()" data-en="🔄 New Content" data-ko="🔄 새 콘텐츠">🔄 New Content</button>
    <a href="index.html" class="act-btn" data-en="← IELTS Home" data-ko="← IELTS 홈">← IELTS Home</a>
  </div>
</div>
<script>
const PARTS={
  s1:{en:'Section 1 — Everyday Social Conversation',ko:'Section 1 — 일상 대화',
    tip:{en:'💡 Two speakers in an everyday social context (e.g. booking, enquiry). Listen for specific details: names, numbers, dates. 10 questions.',ko:'💡 일상적인 상황(예약, 문의 등)의 두 화자 대화. 이름, 숫자, 날짜 같은 구체적 세부 정보에 집중. 10문항.'}},
  s2:{en:'Section 2 — Social Monologue',ko:'Section 2 — 사회적 독백',
    tip:{en:'💡 One speaker on a social topic (e.g. local facilities, events). Note the overall structure and key facts. 10 questions.',ko:'💡 사회적 주제(지역 시설, 행사 등)에 관한 1인 독백. 전체 구조와 핵심 사실을 파악하세요. 10문항.'}},
  s3:{en:'Section 3 — Academic Discussion',ko:'Section 3 — 학문적 토론',
    tip:{en:'💡 2–4 speakers in an academic context (seminar, tutorial). Follow the discussion flow and speakers\' attitudes. 10 questions.',ko:'💡 학문적 맥락(세미나, 튜토리얼)의 2~4인 대화. 토론 흐름과 화자의 태도를 파악하세요. 10문항.'}},
  s4:{en:'Section 4 — Academic Lecture',ko:'Section 4 — 학문적 강의',
    tip:{en:'💡 One speaker — an academic lecture. The most challenging section. Focus on main points and supporting details. 10 questions.',ko:'💡 1인 학문적 강의. 가장 어려운 섹션. 주요 논점과 뒷받침 세부 사항에 집중하세요. 10문항.'}}
};
const SPEEDS=[0.7,0.85,1.0,1.15,1.3];
let lang='en', part='s1', data=null, isLoading=false, ttsOn=false;
let correct=0, answered=0, total=0, msgs=[];

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-en][data-ko]').forEach(el=>{const t=l==='ko'?el.dataset.ko:el.dataset.en;if(t)el.innerHTML=t;});
  document.getElementById('btn-en').classList.toggle('act',l==='en');
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  renderInfo();
  try{localStorage.setItem('lw-lang',l);}catch(e){}
}
function selPart(p,btn){
  part=p; stopTTS();
  document.querySelectorAll('.part-tab').forEach(t=>t.classList.remove('act')); btn.classList.add('act');
  renderInfo(); reset();
}
function renderInfo(){
  const p=PARTS[part];
  document.getElementById('info-box').innerHTML=`<strong>${lang==='ko'?p.ko:p.en}</strong><br>${lang==='ko'?p.tip.ko:p.tip.en}`;
}
function reset(){
  stopTTS();
  document.getElementById('content-area').innerHTML='';
  document.getElementById('score-card').style.display='none';
  document.getElementById('tutor-wrap').style.display='none';
  document.getElementById('act-row').style.display='none';
  correct=0; answered=0; total=0; data=null; msgs=[];
}
function doneLoading(){
  document.getElementById('loading-overlay').style.display='none';
  isLoading=false; document.getElementById('gen-btn').disabled=false;
}
function showErr(e){
  doneLoading();
  document.getElementById('content-area').innerHTML=`<div style="padding:32px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;color:var(--text-muted)">⚠️ ${lang==='ko'?'생성 실패. 다시 시도해 주세요.':'Generation failed. Please try again.'}<br><small style="color:var(--text-light);margin-top:6px;display:block;">${e.message||''}</small></div>`;
  console.error(e);
}
async function callAPI(prompt,maxTokens){
  const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:maxTokens||3000,messages:[{role:'user',content:prompt}]})});
  const d=await r.json();
  if(d.error) throw new Error(JSON.stringify(d.error));
  const txt=d.content[0].text;
  const s=txt.indexOf('{'),e=txt.lastIndexOf('}');
  if(s===-1) throw new Error('No JSON in response');
  return JSON.parse(txt.slice(s,e+1));
}

async function generate(){
  if(isLoading) return;
  isLoading=true; reset();
  document.getElementById('gen-btn').disabled=true;
  document.getElementById('loading-overlay').style.display='block';
  const topic=document.getElementById('sel-topic').value;
  const diff=document.getElementById('sel-diff').value;
  const spd=parseFloat(document.getElementById('sel-spd').value);
  const p=PARTS[part];
  try{
    data=await callAPI(`Generate an IELTS Listening ${lang==='ko'?p.ko:p.en} about ${topic}. Target band: ${diff}.
Return a JSON object with:
- section: "${part}"
- title: short descriptive title string
- context: one sentence setting the scene
- script: array of 8 objects, each with speaker (string) and line (string). ${part==='s2'||part==='s4'?'Use one speaker named Narrator.':'Use two or more speakers.'}
- questions: array of exactly 10 objects, each with id (1-10), text (question string), choices (array of 4 strings), answer (integer 0-3), explanation (English), explanation_ko (Korean)
Mix question types across the 10 questions: multiple choice, identifying information, matching.`,4500);
    total=data.questions.length;
    doneLoading(); buildCard(spd); initTutor();
    document.getElementById('act-row').style.display='flex';
  } catch(e){showErr(e);}
}

function buildCard(spd){
  const area=document.getElementById('content-area'); area.innerHTML='';
  const sc=document.createElement('div'); sc.className='script-card';
  const hdr=document.createElement('div'); hdr.className='script-hdr';
  hdr.innerHTML=`<span class="script-title">🎧 ${data.title||PARTS[part].en} <small style="font-weight:400;color:var(--text-muted)"> — ${data.context||''}</small></span>`;
  const tog=document.createElement('button'); tog.className='tog-btn';
  tog.textContent=lang==='ko'?'스크립트 보기':'Show Script';
  tog.onclick=function(){
    const el=document.getElementById('slines');
    const open=el.classList.toggle('open');
    this.textContent=open?(lang==='ko'?'숨기기':'Hide'):(lang==='ko'?'스크립트 보기':'Show Script');
  };
  hdr.appendChild(tog); sc.appendChild(hdr);
  const pr=document.createElement('div'); pr.className='play-row';
  const pb=document.createElement('button'); pb.className='play-btn'; pb.id='playbtn';
  pb.innerHTML='<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  pb.onclick=()=>playFrom(0,parseFloat(document.getElementById('spdbtn')?.textContent)||spd);
  const pi=document.createElement('div'); pi.className='player-info';
  pi.innerHTML=`<div class="player-lbl">${lang==='ko'?'▶ 재생하여 듣기':'▶ Press play to listen'}</div><div class="player-bar"><div class="player-fill" id="pfill"></div></div>`;
  const sb=document.createElement('button'); sb.className='spd-btn'; sb.id='spdbtn'; sb.textContent=spd+'x';
  sb.onclick=function(){const cur=parseFloat(this.textContent);const i=SPEEDS.indexOf(cur);this.textContent=SPEEDS[(i+1)%SPEEDS.length]+'x';};
  pr.append(pb,pi,sb); sc.appendChild(pr);
  const lines=document.createElement('div'); lines.className='script-lines'; lines.id='slines';
  (data.script||[]).forEach((l,i)=>{
    const sl=document.createElement('div'); sl.className='sl'; sl.id='sl'+i;
    sl.innerHTML=`<span class="sl-spk">${l.speaker}</span><span class="sl-txt">${l.line}</span>`;
    sl.onclick=()=>playFrom(i,parseFloat(document.getElementById('spdbtn')?.textContent)||spd);
    lines.appendChild(sl);
  });
  sc.appendChild(lines); area.appendChild(sc);
  const qw=document.createElement('div'); qw.className='qs-wrap';
  qw.innerHTML=`<div class="qs-title">✏️ ${lang==='ko'?'문제':'Questions'} (${total})</div>`;
  (data.questions||[]).forEach(q=>{
    const qi=document.createElement('div'); qi.className='q-item';
    const qn=document.createElement('div'); qn.className='q-num'; qn.textContent='Question '+q.id;
    const qt=document.createElement('div'); qt.className='q-text'; qt.textContent=q.text;
    const qo=document.createElement('div'); qo.className='q-opts'; qo.id='qo'+q.id;
    (q.choices||[]).forEach((c,i)=>{
      const b=document.createElement('button'); b.className='q-opt';
      b.innerHTML=`<span class="q-ltr">${'ABCD'[i]}</span><span>${c}</span>`;
      b.onclick=()=>ansQ(q.id,i,b,q.answer,lang==='ko'?(q.explanation_ko||q.explanation):q.explanation);
      qo.appendChild(b);
    });
    const fb=document.createElement('div'); fb.className='q-fb'; fb.id='qf'+q.id;
    qi.append(qn,qt,qo,fb); qw.appendChild(qi);
  });
  area.appendChild(qw);
}

function playFrom(idx,spd){
  if(!data||idx>=data.script.length){stopTTS();hlLine(-1);return;}
  stopTTS();
  const btn=document.getElementById('playbtn');
  if(btn) btn.innerHTML='<svg viewBox="0 0 24 24" fill="#fff"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  hlLine(idx);
  const fill=document.getElementById('pfill'); if(fill) fill.style.width=(idx/data.script.length*100)+'%';
  const l=data.script[idx];
  const u=new SpeechSynthesisUtterance(l.line); u.lang='en-GB'; u.rate=spd;
  const vs=speechSynthesis.getVoices();
  const brit=vs.find(v=>v.lang==='en-GB')||vs.find(v=>v.lang.startsWith('en'));
  if(brit) u.voice=brit;
  ttsOn=true; u.onend=()=>{if(ttsOn)playFrom(idx+1,spd);};
  speechSynthesis.speak(u);
}
function stopTTS(){
  speechSynthesis.cancel(); ttsOn=false;
  const btn=document.getElementById('playbtn');
  if(btn) btn.innerHTML='<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
}
function hlLine(idx){
  document.querySelectorAll('[id^="sl"]').forEach(el=>el.classList.remove('active'));
  if(idx>=0){const el=document.getElementById('sl'+idx);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}}
}
function ansQ(qId,idx,btn,answer,expl){
  const opts=document.getElementById('qo'+qId)?.querySelectorAll('.q-opt'); if(!opts||opts[0]?.disabled) return;
  opts.forEach(b=>b.disabled=true);
  opts[answer].classList.add('correct');
  if(idx!==answer) btn.classList.add('wrong');
  const fb=document.getElementById('qf'+qId);
  if(fb){fb.innerHTML=(idx===answer?`✅ ${lang==='ko'?'정답!':'Correct!'} `:`❌ ${lang==='ko'?`오답. 정답: ${'ABCD'[answer]}.`:`Wrong. Answer: ${'ABCD'[answer]}.`} `)+expl;fb.className='q-fb show '+(idx===answer?'correct':'wrong');}
  answered++; if(idx===answer) correct++;
  if(answered>=total) showScore();
}
function showScore(){
  const pct=Math.round(correct/total*100);
  const band=pct>=90?9:pct>=80?8:pct>=70?7:pct>=60?6:pct>=50?5:4;
  const sc=document.getElementById('score-card'); sc.style.display='block';
  document.getElementById('sc-num').textContent=`${correct}/${total}`;
  document.getElementById('sc-sub').textContent=`${pct}% · ${lang==='ko'?'예상 밴드':'Est. Band'} ${band}`;
  document.getElementById('sc-msg').textContent=band>=7?(lang==='ko'?'🎉 훌륭합니다!':'🎉 Excellent!'):band>=6?(lang==='ko'?'👍 좋습니다!':'👍 Good!'):(lang==='ko'?'💪 계속 연습하세요!':'💪 Keep practicing!');
  sc.scrollIntoView({behavior:'smooth',block:'center'});
}
function initTutor(){
  msgs=[]; document.getElementById('tutor-msgs').innerHTML='';
  const p=PARTS[part];
  addMsg('ai',lang==='ko'?`🎧 **${p.ko}** 준비 완료!\n\n${p.tip.ko}`:`🎧 **${p.en}** ready!\n\n${p.tip.en}`);
  const qs=lang==='ko'?['내용 설명','어휘 도움','문제 해설','IELTS 듣기 팁']:['Explain content','Vocabulary help','Explain a question','IELTS listening tips'];
  document.getElementById('quick-wrap').innerHTML=qs.map(q=>`<button class="quick-btn" onclick="document.getElementById('tutor-inp').value='${q}';sendMsg()">${q}</button>`).join('');
  document.getElementById('tutor-wrap').style.display='block';
}
async function sendMsg(){
  const inp=document.getElementById('tutor-inp'); const txt=inp.value.trim(); if(!txt) return;
  inp.value=''; addMsg('user',txt); msgs.push({role:'user',content:txt});
  document.getElementById('send-btn').disabled=true; const tid=showTyping();
  try{
    const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:400,system:lang==='ko'?'IELTS 듣기 전문 튜터. 한국어로 간결하게 답하세요.':'IELTS Listening tutor. Be concise.',messages:msgs.slice(-6)})});
    const d=await r.json(); removeTyping(tid);
    const rep=d.content[0].text; msgs.push({role:'assistant',content:rep}); addMsg('ai',rep);
  }catch(e){removeTyping(tid);addMsg('ai','⚠️ Error');}
  document.getElementById('send-btn').disabled=false;
}
function addMsg(role,txt){
  const w=document.getElementById('tutor-msgs'); const d=document.createElement('div'); d.className='msg '+role;
  d.innerHTML=`<div class="msg-av ${role}">${role==='ai'?'🤖':'👤'}</div><div class="msg-bub">${txt.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight;
}
function showTyping(){
  const w=document.getElementById('tutor-msgs'); const id='t'+Date.now(); const d=document.createElement('div'); d.className='msg ai'; d.id=id;
  d.innerHTML=`<div class="msg-av ai">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight; return id;
}
function removeTyping(id){const e=document.getElementById(id);if(e)e.remove();}
(function(){let s;try{s=localStorage.getItem('lw-lang');}catch(e){}setLang(s||((navigator.language||'').startsWith('ko')?'ko':'en'));renderInfo();})();
</script>
