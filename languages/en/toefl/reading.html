<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — TOEFL — Reading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --accent:#2563eb;--accent-light:#dbeafe;--accent-dark:#1e3a8a;
  --green:#16a34a;--green-light:#dcfce7;--red:#e24b4a;--red-light:#fee2e2;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--accent);color:#fff;}
.main{max-width:860px;margin:0 auto;padding:28px 5% 80px;}
.hero{background:linear-gradient(135deg,var(--accent-dark),var(--accent));border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(20px,4vw,28px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}
.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:130px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}
.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:var(--accent-dark);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}
.loading-overlay{padding:48px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:20px;display:none;}
.loading-spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text-muted);}
.passage-card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;}
.pass-hdr{padding:14px 20px;background:var(--accent-light);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.pass-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--accent-dark);}
.pass-meta{font-size:11px;color:var(--text-muted);}
.pass-body{padding:22px 24px;font-size:15px;line-height:1.85;color:var(--text);}
.pass-body p{margin-bottom:14px;}
.pass-body p:last-child{margin-bottom:0;}
.prog-row{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.prog-bar{flex:1;height:6px;background:var(--bg);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent-dark),var(--accent));border-radius:10px;transition:width 0.3s;}
.prog-lbl{font-size:12px;color:var(--text-muted);white-space:nowrap;}
.qs-wrap{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
.qs-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;}
.q-item{margin-bottom:14px;padding:14px;background:var(--bg);border-radius:10px;}
.q-item:last-child{margin-bottom:0;}
.q-num{font-size:10px;font-weight:600;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.q-type-tag{display:inline-block;font-size:10px;background:var(--accent-light);color:var(--accent);padding:2px 8px;border-radius:8px;margin-left:6px;font-weight:600;}
.q-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.5;}
.q-ref{font-size:12px;color:var(--text-muted);font-style:italic;padding:6px 10px;background:var(--accent-light);border-radius:6px;border-left:3px solid var(--accent);margin-bottom:10px;}
.q-opts{display:flex;flex-direction:column;gap:7px;}
.q-opt{padding:10px 14px;border-radius:8px;border:1.5px solid var(--border-md);background:var(--white);cursor:pointer;font-size:13px;color:var(--text);transition:all 0.2s;text-align:left;font-family:inherit;display:flex;align-items:flex-start;gap:10px;line-height:1.5;}
.q-opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-light);}
.q-opt.correct{border-color:var(--green);background:var(--green-light);color:var(--green);font-weight:500;}
.q-opt.wrong{border-color:var(--red);background:var(--red-light);color:var(--red);}
.q-opt:disabled{cursor:default;}
.q-ltr{width:24px;height:24px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-muted);flex-shrink:0;margin-top:1px;}
.q-opt.correct .q-ltr{background:var(--green);color:#fff;}
.q-opt.wrong .q-ltr{background:var(--red);color:#fff;}
.q-fb{margin-top:8px;font-size:12px;padding:8px 12px;border-radius:7px;display:none;line-height:1.5;}
.q-fb.show{display:block;}
.q-fb.correct{background:var(--green-light);color:var(--green);}
.q-fb.wrong{background:var(--red-light);color:var(--red);}
.score-card{background:linear-gradient(135deg,var(--accent-dark),var(--accent));border-radius:14px;padding:24px;text-align:center;margin-bottom:20px;display:none;}
.sc-num{font-family:'DM Serif Display',serif;font-size:52px;color:#fff;line-height:1;}
.sc-pct{font-size:14px;color:rgba(255,255,255,0.7);margin:6px 0 10px;}
.sc-msg{font-size:13px;color:#93c5fd;font-weight:500;}
.tutor-wrap{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;display:none;}
.tutor-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--accent-light);border-bottom:0.5px solid var(--border);}
.tutor-av{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;}
.tutor-name{font-size:13px;font-weight:600;color:var(--accent);}
.tutor-msgs{padding:14px 16px;min-height:70px;max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;align-items:flex-start;}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px;}
.msg-av.ai{background:var(--accent);color:#fff;}
.msg-av.user{background:var(--navy);color:#fff;}
.msg-bub{max-width:80%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.6;}
.msg.ai .msg-bub{background:var(--bg);border-radius:4px 12px 12px 12px;}
.msg.user .msg-bub{background:var(--navy);color:#fff;border-radius:12px 4px 12px 12px;}
.typing{display:flex;gap:4px;align-items:center;padding:9px 13px;background:var(--bg);border-radius:4px 12px 12px 12px;width:fit-content;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--text-light);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.quick-wrap{padding:0 16px 10px;display:flex;gap:6px;flex-wrap:wrap;}
.quick-btn{padding:4px 10px;border-radius:14px;font-size:12px;border:0.5px solid var(--border-md);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;}
.quick-btn:hover{border-color:var(--accent);color:var(--accent);}
.tutor-inp-wrap{display:flex;gap:8px;padding:10px 16px;border-top:0.5px solid var(--border);}
.tutor-inp{flex:1;padding:8px 12px;border:0.5px solid var(--border-md);border-radius:8px;font-size:13px;font-family:inherit;background:var(--bg);outline:none;}
.tutor-inp:focus{border-color:var(--accent);}
.send-btn{width:34px;height:34px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;color:#fff;font-size:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.send-btn:disabled{background:var(--border-md);cursor:not-allowed;}
.act-row{display:none;gap:10px;margin-bottom:20px;}
.act-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);text-decoration:none;text-align:center;display:block;}
.act-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.3s ease forwards;}
</style>
</head>
<body>
<nav>
  <a href="/languages/en/index.html" class="nav-logo"><div class="nav-lm">LW</div><span class="nav-lt">LinguaWalk</span></a>
  <div class="nav-sep"></div>
  <span class="nav-page">📖 TOEFL Reading</span>
  <div class="nav-space"></div>
  <a href="index.html" class="nav-back">← TOEFL</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lbtn" onclick="setLang('ko')" id="btn-ko">한국어</button>
  </div>
</nav>
<div class="main fade-in">
  <div class="hero">
    <div class="hero-tag">📖 TOEFL iBT · READING</div>
    <div class="hero-title" data-en="TOEFL Reading Practice" data-ko="TOEFL 읽기 연습">TOEFL Reading Practice</div>
    <div class="hero-desc" data-en="AI-generated academic passages with TOEFL-style questions." data-ko="AI가 생성한 학문적 지문과 TOEFL 형식 문제를 연습하세요.">AI-generated academic passages with TOEFL-style questions.</div>
    <div class="hero-badges"><span class="hero-badge">Factual</span><span class="hero-badge">Inference</span><span class="hero-badge">Vocabulary</span><span class="hero-badge">Rhetorical</span><span class="hero-badge">🤖 AI Tutor</span></div>
  </div>
  <div class="settings-row">
    <div class="setting-item">
      <div class="si-label" data-en="Topic" data-ko="주제">Topic</div>
      <select class="si-select" id="sel-topic">
        <option value="climate change and ecosystems">Climate Change</option>
        <option value="ancient civilizations">Ancient Civilizations</option>
        <option value="cognitive psychology">Cognitive Psychology</option>
        <option value="astronomy and space">Astronomy</option>
        <option value="evolution">Evolution</option>
        <option value="economics and trade">Economics</option>
        <option value="architecture">Architecture</option>
        <option value="linguistics">Linguistics</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-en="Difficulty" data-ko="난이도">Difficulty</div>
      <select class="si-select" id="sel-diff">
        <option value="Easy">Easy</option>
        <option value="Medium" selected>Medium</option>
        <option value="Hard">Hard</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-en="Questions" data-ko="문항 수">Questions</div>
      <select class="si-select" id="sel-qcount">
        <option value="6">6</option>
        <option value="10" selected>10</option>
      </select>
    </div>
  </div>
  <button class="gen-btn" id="gen-btn" onclick="generate()">📖 <span data-en="Generate Reading Passage" data-ko="읽기 지문 생성">Generate Reading Passage</span></button>
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text" data-en="AI is writing your passage..." data-ko="AI가 지문을 작성하고 있습니다...">AI is writing your passage...</div>
  </div>
  <div id="content-area"></div>
  <div class="score-card" id="score-card">
    <div style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:6px;" data-en="Your Score" data-ko="내 점수">Your Score</div>
    <div class="sc-num" id="sc-num"></div>
    <div class="sc-pct" id="sc-pct"></div>
    <div class="sc-msg" id="sc-msg"></div>
  </div>
  <div class="tutor-wrap" id="tutor-wrap">
    <div class="tutor-hdr"><div class="tutor-av">🤖</div><div><div class="tutor-name">AI Tutor</div></div></div>
    <div class="tutor-msgs" id="tutor-msgs"></div>
    <div class="quick-wrap" id="quick-wrap"></div>
    <div class="tutor-inp-wrap">
      <input class="tutor-inp" id="tutor-inp" placeholder="Ask about this passage..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
  <div class="act-row" id="act-row">
    <button class="act-btn primary" onclick="generate()" data-en="🔄 New Passage" data-ko="🔄 새 지문">🔄 New Passage</button>
    <a href="index.html" class="act-btn" data-en="← TOEFL Home" data-ko="← TOEFL 홈">← TOEFL Home</a>
  </div>
</div>
<script>
let lang='en', data=null, isLoading=false, msgs=[];
let correct=0, answered=0, total=0;

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-en][data-ko]').forEach(el=>{const t=l==='ko'?el.dataset.ko:el.dataset.en;if(t)el.innerHTML=t;});
  document.getElementById('btn-en').classList.toggle('act',l==='en');
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  try{localStorage.setItem('lw-lang',l);}catch(e){}
}
function reset(){
  document.getElementById('content-area').innerHTML='';
  document.getElementById('score-card').style.display='none';
  document.getElementById('tutor-wrap').style.display='none';
  document.getElementById('act-row').style.display='none';
  correct=0; answered=0; total=0; data=null; msgs=[];
}
function doneLoading(){
  document.getElementById('loading-overlay').style.display='none';
  isLoading=false;
  document.getElementById('gen-btn').disabled=false;
}
function showErr(e){
  doneLoading();
  document.getElementById('content-area').innerHTML=`<div style="padding:32px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;color:var(--text-muted)">⚠️ ${lang==='ko'?'생성 실패. 다시 시도해 주세요.':'Generation failed. Please try again.'}<br><small style="color:var(--text-light);margin-top:6px;display:block;">${e.message||''}</small></div>`;
  console.error(e);
}
async function callAPI(prompt, maxTokens){
  const r=await fetch('/api/claude',{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:maxTokens||2000,messages:[{role:'user',content:prompt}]})
  });
  const d=await r.json();
  if(d.error) throw new Error(JSON.stringify(d.error));
  const txt=d.content[0].text;
  const s=txt.indexOf('{'), e2=txt.lastIndexOf('}');
  if(s===-1) throw new Error('No JSON in response');
  return JSON.parse(txt.slice(s,e2+1));
}

async function generate(){
  if(isLoading) return;
  isLoading=true; reset();
  document.getElementById('gen-btn').disabled=true;
  document.getElementById('loading-overlay').style.display='block';
  const topic=document.getElementById('sel-topic').value;
  const diff=document.getElementById('sel-diff').value;
  const qcount=parseInt(document.getElementById('sel-qcount').value);
  try{
    data=await callAPI(`Write a TOEFL iBT Reading passage about ${topic}. Difficulty: ${diff}.
Return a JSON object with these fields:
- title: passage title string
- topic: topic string
- paragraphs: array of 4 strings, each 100 to 120 words in academic style
- questions: array of exactly ${qcount} question objects

Each question object needs: id (1 to ${qcount}), type (one of factual, inference, vocabulary, rhetorical), text (question string), reference (which paragraph), choices (array of 4 strings), answer (integer 0 to 3), explanation (English string), explanation_ko (Korean string)

Mix question types: about ${Math.ceil(qcount*0.4)} factual, ${Math.ceil(qcount*0.2)} inference, ${Math.floor(qcount*0.2)} vocabulary, ${Math.floor(qcount*0.2)} rhetorical.`,3000);
    total=data.questions.length;
    doneLoading();
    renderPassage();
    initTutor();
    document.getElementById('act-row').style.display='flex';
  } catch(e){ showErr(e); }
}

function renderPassage(){
  const area=document.getElementById('content-area'); area.innerHTML='';

  // Passage
  const pc=document.createElement('div'); pc.className='passage-card';
  const ph=document.createElement('div'); ph.className='pass-hdr';
  ph.innerHTML=`<div class="pass-title">${data.title||data.topic}</div><div class="pass-meta">📚 ${data.topic} · ~${data.paragraphs?.reduce((s,p)=>s+p.split(' ').length,0)||420} words</div>`;
  const pb=document.createElement('div'); pb.className='pass-body';
  pb.innerHTML=(data.paragraphs||[]).map((p,i)=>`<p><strong style="color:var(--accent);font-size:11px;text-transform:uppercase;letter-spacing:.5px;">¶${i+1}</strong> ${p}</p>`).join('');
  pc.append(ph,pb); area.appendChild(pc);

  // Progress
  const pr=document.createElement('div'); pr.className='prog-row';
  pr.innerHTML=`<span class="prog-lbl" id="prog-lbl">${lang==='ko'?`0 / ${total} 완료`:`0 / ${total} answered`}</span><div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>`;
  area.appendChild(pr);

  // Questions
  const qw=document.createElement('div'); qw.className='qs-wrap';
  qw.innerHTML=`<div class="qs-title">✏️ ${lang==='ko'?'문제':'Questions'} (${total})</div>`;
  const typeNames={factual:lang==='ko'?'사실':'Factual',inference:lang==='ko'?'추론':'Inference',vocabulary:lang==='ko'?'어휘':'Vocabulary',rhetorical:lang==='ko'?'수사적 목적':'Rhetorical'};
  (data.questions||[]).forEach(q=>{
    const qi=document.createElement('div'); qi.className='q-item';
    const qn=document.createElement('div'); qn.className='q-num';
    qn.innerHTML=`Question ${q.id}<span class="q-type-tag">${typeNames[q.type]||q.type}</span>`;
    const qt=document.createElement('div'); qt.className='q-text'; qt.textContent=q.text;
    const qo=document.createElement('div'); qo.className='q-opts'; qo.id='qo'+q.id;
    (q.choices||[]).forEach((c,i)=>{
      const b=document.createElement('button'); b.className='q-opt';
      b.innerHTML=`<span class="q-ltr">${'ABCD'[i]}</span><span>${c}</span>`;
      b.onclick=()=>ansQ(q.id,i,b,q.answer,lang==='ko'?(q.explanation_ko||q.explanation):q.explanation);
      qo.appendChild(b);
    });
    const fb=document.createElement('div'); fb.className='q-fb'; fb.id='qf'+q.id;
    qi.append(qn,qt);
    if(q.reference){const ref=document.createElement('div');ref.className='q-ref';ref.textContent=q.reference;qi.appendChild(ref);}
    qi.append(qo,fb); qw.appendChild(qi);
  });
  area.appendChild(qw);
}

function ansQ(qId,idx,btn,answer,expl){
  const opts=document.getElementById('qo'+qId)?.querySelectorAll('.q-opt'); if(!opts||opts[0]?.disabled) return;
  opts.forEach(b=>b.disabled=true);
  opts[answer].classList.add('correct');
  if(idx!==answer) btn.classList.add('wrong');
  const fb=document.getElementById('qf'+qId);
  if(fb){fb.innerHTML=(idx===answer?`✅ ${lang==='ko'?'정답!':'Correct!'} `:`❌ ${lang==='ko'?`오답. 정답: ${'ABCD'[answer]}.`:`Wrong. Answer: ${'ABCD'[answer]}.`} `)+expl;fb.className='q-fb show '+(idx===answer?'correct':'wrong');}
  answered++; if(idx===answer) correct++;
  const pf=document.getElementById('prog-fill'); if(pf) pf.style.width=(answered/total*100)+'%';
  const pl=document.getElementById('prog-lbl'); if(pl) pl.textContent=lang==='ko'?`${answered} / ${total} 완료`:`${answered} / ${total} answered`;
  if(answered>=total) showScore();
}
function showScore(){
  const pct=Math.round(correct/total*100);
  const sc=document.getElementById('score-card'); sc.style.display='block';
  document.getElementById('sc-num').textContent=`${correct}/${total}`;
  document.getElementById('sc-pct').textContent=`${pct}%`;
  document.getElementById('sc-msg').textContent=pct>=80?(lang==='ko'?'🎉 훌륭합니다!':'🎉 Excellent!'):pct>=60?(lang==='ko'?'👍 잘 하셨습니다!':'👍 Good job!'):(lang==='ko'?'💪 계속 연습하세요!':'💪 Keep practicing!');
  sc.scrollIntoView({behavior:'smooth',block:'center'});
}
function initTutor(){
  msgs=[]; document.getElementById('tutor-msgs').innerHTML='';
  addMsg('ai',lang==='ko'?`📖 **${data.title}** 지문 준비 완료! 💡 팁: 문단별 주제문을 파악하고, 세부사항은 문제 풀 때 다시 찾으세요.`:`📖 **${data.title}** ready! 💡 Tip: Identify the topic sentence of each paragraph first; look up details only when answering questions.`);
  const qs=lang==='ko'?['지문 요약','어휘 설명','추론 도움','읽기 전략']:['Summarize passage','Vocabulary help','Help with inference','Reading strategies'];
  document.getElementById('quick-wrap').innerHTML=qs.map(q=>`<button class="quick-btn" onclick="document.getElementById('tutor-inp').value='${q}';sendMsg()">${q}</button>`).join('');
  document.getElementById('tutor-wrap').style.display='block';
}
async function sendMsg(){
  const inp=document.getElementById('tutor-inp');
  const txt=inp.value.trim(); if(!txt) return;
  inp.value=''; addMsg('user',txt); msgs.push({role:'user',content:txt});
  document.getElementById('send-btn').disabled=true;
  const tid=showTyping();
  try{
    const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:400,
        system:lang==='ko'?`TOEFL iBT 읽기 전문 튜터. 지문: "${data?.title}". 한국어로 간결하게 답하세요.`:`TOEFL iBT Reading tutor. Passage: "${data?.title}". Be concise.`,
        messages:msgs.slice(-6)})});
    const d=await r.json(); removeTyping(tid);
    const rep=d.content[0].text; msgs.push({role:'assistant',content:rep}); addMsg('ai',rep);
  }catch(e){removeTyping(tid);addMsg('ai','⚠️ Error');}
  document.getElementById('send-btn').disabled=false;
}
function addMsg(role,txt){
  const w=document.getElementById('tutor-msgs');
  const d=document.createElement('div'); d.className='msg '+role;
  d.innerHTML=`<div class="msg-av ${role}">${role==='ai'?'🤖':'👤'}</div><div class="msg-bub">${txt.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight;
}
function showTyping(){
  const w=document.getElementById('tutor-msgs');
  const id='t'+Date.now(); const d=document.createElement('div'); d.className='msg ai'; d.id=id;
  d.innerHTML=`<div class="msg-av ai">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight; return id;
}
function removeTyping(id){const e=document.getElementById(id);if(e)e.remove();}

(function(){
  let s; try{s=localStorage.getItem('lw-lang');}catch(e){}
  setLang(s||((navigator.language||'').startsWith('ko')?'ko':'en'));
})();
</script>
