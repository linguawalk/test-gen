<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — OPIc — Speaking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --accent:#dc2626;--accent-light:#fee2e2;--accent-dark:#7f1d1d;
  --green:#16a34a;--green-light:#dcfce7;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all .2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all .2s;}
.lbtn.act{background:var(--accent);color:#fff;}
.main{max-width:820px;margin:0 auto;padding:28px 5% 80px;}
.hero{background:linear-gradient(135deg,var(--accent-dark),var(--accent));border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(20px,4vw,26px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}
/* Grade chips */
.grade-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.grade-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border-md);background:var(--white);color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .2s;}
.grade-chip.act{background:var(--accent);color:#fff;border-color:var(--accent);}
.info-box{background:var(--accent-light);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--accent);line-height:1.65;}
.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:140px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}
.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:20px;}
.gen-btn:hover{background:var(--accent-dark);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}
.loading-overlay{padding:48px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:20px;display:none;}
.loading-spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text-muted);}
/* Question cards */
.q-card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;}
.q-card-hdr{padding:12px 18px;background:var(--accent-light);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.q-card-title{font-size:13px;font-weight:600;color:var(--accent);}
.q-card-num{font-size:11px;color:var(--text-muted);}
.q-card-body{padding:18px 20px;}
.q-text{font-size:16px;font-weight:500;color:var(--text);line-height:1.65;margin-bottom:16px;}
.q-context{font-size:12px;color:var(--text-muted);padding:8px 12px;background:var(--bg);border-radius:8px;border-left:3px solid var(--accent);margin-bottom:14px;line-height:1.6;}
/* Timer */
.timer-wrap{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg);border-radius:10px;margin-bottom:14px;}
.timer-num{font-family:'DM Serif Display',serif;font-size:40px;color:var(--accent);line-height:1;min-width:70px;}
.timer-num.warn{color:#dc2626;}
.timer-info{flex:1;}
.timer-phase{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:4px;}
.timer-bar{height:5px;background:var(--border-md);border-radius:5px;overflow:hidden;}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--accent-dark),var(--accent));border-radius:5px;transition:width .5s;}
.timer-fill.warn{background:linear-gradient(90deg,#991b1b,#dc2626);}
.start-timer-btn{padding:8px 16px;border-radius:8px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;white-space:nowrap;}
/* Record */
.rec-wrap{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
.rec-btn{width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.rec-btn.idle{background:var(--accent);color:#fff;}
.rec-btn.recording{background:#dc2626;color:#fff;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.transcript-box{background:var(--bg);border-radius:10px;padding:12px;margin-top:12px;min-height:70px;font-size:13px;color:var(--text);line-height:1.7;display:none;border:1px solid var(--border);}
/* Sample answer toggle */
.sample-toggle{width:100%;padding:10px 16px;border-radius:10px;border:1.5px solid var(--accent);background:transparent;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:12px;text-align:left;display:flex;align-items:center;justify-content:space-between;}
.sample-box{display:none;background:var(--accent-light);border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:13px;color:var(--text);line-height:1.75;border-left:3px solid var(--accent);}
.sample-box.open{display:block;}
.strategy-box{font-size:12px;color:var(--text-muted);padding:8px 12px;background:var(--bg);border-radius:8px;margin-top:8px;line-height:1.6;}
/* Submit & Feedback */
.submit-btn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:600;background:var(--teal-mid);color:#fff;border:none;cursor:pointer;font-family:inherit;margin-bottom:14px;display:none;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}
.fb-card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;display:none;}
.fb-hdr{padding:12px 16px;background:var(--green-light);border-bottom:0.5px solid var(--border);font-size:13px;font-weight:600;color:var(--green);}
.score-chips{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;border-bottom:0.5px solid var(--border);}
.sc-chip{background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center;flex:1;min-width:70px;}
.sc-chip-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:3px;}
.sc-chip-val{font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent);}
.fb-body{padding:14px 16px;}
.fb-sec{margin-bottom:12px;}
.fb-sec:last-child{margin-bottom:0;}
.fb-sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:5px;}
.fb-sec-text{font-size:13px;color:var(--text);line-height:1.7;}
.fb-sample{background:var(--accent-light);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--text);line-height:1.7;border-left:3px solid var(--accent);}
/* Tutor */
.tutor-wrap{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;display:none;}
.tutor-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--accent-light);border-bottom:0.5px solid var(--border);}
.tutor-av{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;}
.tutor-name{font-size:13px;font-weight:600;color:var(--accent);}
.tutor-msgs{padding:14px 16px;min-height:70px;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;align-items:flex-start;}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px;}
.msg-av.ai{background:var(--accent);color:#fff;}
.msg-av.user{background:var(--navy);color:#fff;}
.msg-bub{max-width:80%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.6;}
.msg.ai .msg-bub{background:var(--bg);border-radius:4px 12px 12px 12px;}
.msg.user .msg-bub{background:var(--navy);color:#fff;border-radius:12px 4px 12px 12px;}
.typing{display:flex;gap:4px;align-items:center;padding:9px 13px;background:var(--bg);border-radius:4px 12px 12px 12px;width:fit-content;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--text-light);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.quick-wrap{padding:0 16px 10px;display:flex;gap:6px;flex-wrap:wrap;}
.quick-btn{padding:4px 10px;border-radius:14px;font-size:12px;border:0.5px solid var(--border-md);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;}
.quick-btn:hover{border-color:var(--accent);color:var(--accent);}
.tutor-inp-wrap{display:flex;gap:8px;padding:10px 16px;border-top:0.5px solid var(--border);}
.tutor-inp{flex:1;padding:8px 12px;border:0.5px solid var(--border-md);border-radius:8px;font-size:13px;font-family:inherit;background:var(--bg);outline:none;}
.tutor-inp:focus{border-color:var(--accent);}
.send-btn{width:34px;height:34px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;}
.send-btn:disabled{background:var(--border-md);cursor:not-allowed;}
.act-row{display:none;gap:10px;margin-bottom:20px;}
.act-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);text-decoration:none;text-align:center;display:block;}
.act-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .3s ease forwards;}
</style>
</head>
<body>
<nav>
  <a href="/languages/en/index.html" class="nav-logo"><div class="nav-lm">LW</div><span class="nav-lt">LinguaWalk</span></a>
  <div class="nav-sep"></div>
  <span class="nav-page" id="nav-page">🎤 OPIc Speaking</span>
  <div class="nav-space"></div>
  <a href="index.html" class="nav-back">← OPIc</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lbtn" onclick="setLang('ko')" id="btn-ko">한국어</button>
  </div>
</nav>

<div class="main fade-in">
  <div class="hero" id="hero">
    <div class="hero-tag" id="hero-tag">🎤 OPIC · SPEAKING</div>
    <div class="hero-title" id="hero-title">OPIc Speaking Practice</div>
    <div class="hero-desc" id="hero-desc">Practice with AI-generated prompts and get detailed feedback.</div>
    <div class="hero-badges" id="hero-badges"></div>
  </div>

  <!-- Target Grade -->
  <div style="font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:8px;" data-en="TARGET GRADE" data-ko="목표 등급">TARGET GRADE</div>
  <div class="grade-row" id="grade-row">
    <button class="grade-chip" onclick="setGrade('IM1',this)">IM1</button>
    <button class="grade-chip act" onclick="setGrade('IM2',this)">IM2</button>
    <button class="grade-chip" onclick="setGrade('IM3',this)">IM3</button>
    <button class="grade-chip" onclick="setGrade('IH',this)">IH</button>
    <button class="grade-chip" onclick="setGrade('AL',this)">AL</button>
  </div>

  <div class="info-box" id="info-box"></div>

  <div class="settings-row">
    <div class="setting-item">
      <div class="si-label" data-en="Topic" data-ko="주제">Topic</div>
      <select class="si-select" id="sel-topic">
        <option value="daily routine and hobbies">Daily Routine & Hobbies</option>
        <option value="travel and vacations">Travel & Vacations</option>
        <option value="technology and internet">Technology</option>
        <option value="health and exercise">Health & Exercise</option>
        <option value="work and workplace">Work & Workplace</option>
        <option value="music and movies">Music & Movies</option>
        <option value="shopping and fashion">Shopping</option>
        <option value="food and restaurants">Food & Restaurants</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-en="Questions" data-ko="문항 수">Questions</div>
      <select class="si-select" id="sel-count">
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
      </select>
    </div>
  </div>

  <button class="gen-btn" id="gen-btn" onclick="generate()">🎤 <span data-en="Generate OPIc Questions" data-ko="OPIc 문제 생성">Generate OPIc Questions</span></button>
  <div class="loading-overlay" id="loading-overlay"><div class="loading-spinner"></div><div class="loading-text" data-en="AI is generating your questions..." data-ko="AI가 문제를 생성하고 있습니다...">AI is generating your questions...</div></div>

  <div id="content-area"></div>

  <div class="tutor-wrap" id="tutor-wrap">
    <div class="tutor-hdr"><div class="tutor-av">🤖</div><div><div class="tutor-name">AI OPIc Coach</div></div></div>
    <div class="tutor-msgs" id="tutor-msgs"></div>
    <div class="quick-wrap" id="quick-wrap"></div>
    <div class="tutor-inp-wrap">
      <input class="tutor-inp" id="tutor-inp" placeholder="Ask for speaking advice..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>

  <div class="act-row" id="act-row">
    <button class="act-btn primary" onclick="generate()" data-en="🔄 New Questions" data-ko="🔄 새 문제">🔄 New Questions</button>
    <a href="index.html" class="act-btn" data-en="← OPIc Home" data-ko="← OPIc 홈">← OPIc Home</a>
  </div>
</div>

<script>
// ── 유형 설정 ──────────────────────────────────────────────
const TYPES = {
  intro: {
    en: 'Self Introduction & Background Survey',
    ko: '자기소개 & 배경 설문',
    icon: '👤',
    desc: { en: 'Practice introducing yourself naturally. Cover hobbies, job, daily life.', ko: '자신을 자연스럽게 소개하는 연습. 취미, 직업, 일상을 다루세요.' },
    badges: ['Personal Intro', 'Hobbies', 'Daily Routine'],
    tip: { en: '💡 Speak naturally for 30–60 seconds per question. Use filler expressions like "Well...", "Actually..." to sound fluent.', ko: '💡 질문당 30~60초 자연스럽게 말하세요. "Well...", "Actually..."같은 표현으로 유창하게 들리세요.' },
    respSec: 60
  },
  describe: {
    en: 'Describe a Place / Person / Thing',
    ko: '장소 / 사람 / 사물 묘사',
    icon: '🏠',
    desc: { en: 'Describe in vivid detail. Use sensory language and specific examples.', ko: '생생하게 묘사하세요. 감각적 언어와 구체적인 예시를 사용하세요.' },
    badges: ['Favorite Place', 'Memorable Person', 'Familiar Object'],
    tip: { en: '💡 Use descriptive adjectives and "There is/are..." structures. Paint a picture with words.', ko: '💡 묘사적 형용사와 "There is/are..." 구조를 활용하세요. 말로 그림을 그리듯 표현하세요.' },
    respSec: 60
  },
  experience: {
    en: 'Past Experience Narration',
    ko: '과거 경험 이야기',
    icon: '📖',
    desc: { en: 'Tell stories about past experiences using past tenses correctly.', ko: '과거 시제를 정확하게 사용하여 경험을 이야기하세요.' },
    badges: ['Memorable Experience', 'First Time', 'Problem & Solution'],
    tip: { en: '💡 Use past tenses consistently. Structure: When → Where → What happened → How you felt. Use "At that time...", "Eventually..."', ko: '💡 과거 시제를 일관되게 사용하세요. 구조: 언제→어디서→무슨 일→감정. "At that time...", "Eventually..." 활용.' },
    respSec: 90
  },
  roleplay: {
    en: 'Role Play & Comparison',
    ko: '롤플레이 & 비교',
    icon: '🔄',
    desc: { en: 'Handle real-life role play situations and compare past vs. present.', ko: '롤플레이 상황을 해결하고 과거와 현재를 비교하세요.' },
    badges: ['Role Play', 'Problem Solving', 'Past vs Present'],
    tip: { en: '💡 For role play: ask 3+ questions clearly. For comparison: use "In the past...", "These days/Nowadays...", "However..."', ko: '💡 롤플레이: 3개 이상 질문을 명확히 하세요. 비교: "In the past...", "Nowadays...", "However..." 활용.' },
    respSec: 90
  }
};

const GRADES = {
  IM1: { en: 'Intermediate Mid 1', ko: 'IM1 — 중간 단계', color: '#6b7280' },
  IM2: { en: 'Intermediate Mid 2', ko: 'IM2 — 중간 단계', color: '#2563eb' },
  IM3: { en: 'Intermediate Mid 3', ko: 'IM3 — 중상 단계', color: '#7c3aed' },
  IH:  { en: 'Intermediate High',  ko: 'IH — 고급 단계',  color: '#dc2626' },
  AL:  { en: 'Advanced Low',       ko: 'AL — 최고 단계',  color: '#16a34a' }
};

let lang = 'en', type = 'intro', grade = 'IM2';
let isLoading = false, data = null, msgs = [];
let timerInt = null, mediaRec = null, audioChunks = [];
let currentQIdx = 0;

// ── 초기화 ──────────────────────────────────────────────
function init() {
  // URL 파라미터에서 type 읽기
  const params = new URLSearchParams(window.location.search);
  const t = params.get('type');
  if (t && TYPES[t]) type = t;

  let s; try { s = localStorage.getItem('lw-lang'); } catch(e) {}
  setLang(s || ((navigator.language || '').startsWith('ko') ? 'ko' : 'en'));
  updateHero();
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('[data-en][data-ko]').forEach(el => {
    const t = l === 'ko' ? el.dataset.ko : el.dataset.en;
    if (t) el.innerHTML = t;
  });
  document.getElementById('btn-en').classList.toggle('act', l === 'en');
  document.getElementById('btn-ko').classList.toggle('act', l === 'ko');
  updateHero();
  try { localStorage.setItem('lw-lang', l); } catch(e) {}
}

function setGrade(g, btn) {
  grade = g;
  document.querySelectorAll('.grade-chip').forEach(b => b.classList.remove('act'));
  btn.classList.add('act');
}

function updateHero() {
  const T = TYPES[type];
  document.getElementById('nav-page').textContent = `${T.icon} OPIc · ${lang === 'ko' ? T.ko : T.en}`;
  document.getElementById('hero-title').textContent = `${T.icon} ${lang === 'ko' ? T.ko : T.en}`;
  document.getElementById('hero-desc').textContent = lang === 'ko' ? T.desc.ko : T.desc.en;
  document.getElementById('hero-badges').innerHTML = T.badges.map(b => `<span class="hero-badge">${b}</span>`).join('') + `<span class="hero-badge">🤖 AI Feedback</span>`;
  document.getElementById('info-box').innerHTML = lang === 'ko' ? T.tip.ko : T.tip.en;
}

// ── API ──────────────────────────────────────────────────
function reset() {
  isLoading = false;
  document.getElementById('loading-overlay').style.display = 'none';
  document.getElementById('gen-btn').disabled = false;
  document.getElementById('content-area').innerHTML = '';
  document.getElementById('tutor-wrap').style.display = 'none';
  document.getElementById('act-row').style.display = 'none';
  data = null; msgs = []; currentQIdx = 0;
  stopTimer();
  if (mediaRec && mediaRec.state === 'recording') { mediaRec.stop(); mediaRec.stream?.getTracks().forEach(t => t.stop()); }
}

function doneLoading() {
  document.getElementById('loading-overlay').style.display = 'none';
  isLoading = false;
  document.getElementById('gen-btn').disabled = false;
}

function showErr(e) {
  doneLoading();
  document.getElementById('content-area').innerHTML = `<div style="padding:32px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;color:var(--text-muted)">⚠️ ${lang === 'ko' ? '생성 실패. 다시 시도해 주세요.' : 'Generation failed. Please try again.'}<br><small style="color:var(--text-light);margin-top:6px;display:block;">${e.message || ''}</small></div>`;
  console.error(e);
}

async function callAPI(prompt, maxTokens) {
  const r = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: maxTokens || 2000, messages: [{ role: 'user', content: prompt }] })
  });
  const d = await r.json();
  if (d.error) throw new Error(JSON.stringify(d.error));
  const txt = d.content[0].text;
  const s = txt.indexOf('{'), e = txt.lastIndexOf('}');
  if (s === -1) throw new Error('No JSON in response');
  return JSON.parse(txt.slice(s, e + 1));
}

async function generate() {
  if (isLoading) return;
  reset();
  isLoading = true;
  document.getElementById('gen-btn').disabled = true;
  document.getElementById('loading-overlay').style.display = 'block';

  const topic = document.getElementById('sel-topic').value;
  const count = parseInt(document.getElementById('sel-count').value);
  const T = TYPES[type];
  const G = GRADES[grade];

  let typePrompt = '';
  if (type === 'intro') {
    typePrompt = `Generate ${count} OPIc Self Introduction questions about ${topic}.
Questions should ask the person to introduce themselves, describe their hobbies, daily routine, or personal background.
For each question include: a direct personal question, a brief context string, and speaking time of 60 seconds.`;
  } else if (type === 'describe') {
    typePrompt = `Generate ${count} OPIc Describe questions about ${topic}.
Questions should ask the person to describe a specific place, person, or thing related to ${topic}.
Start questions with "Please describe..." or "Tell me about...". Include vivid description prompts.`;
  } else if (type === 'experience') {
    typePrompt = `Generate ${count} OPIc Past Experience questions about ${topic}.
Questions should ask about a specific memorable experience, first-time experience, or a problem that occurred.
Start with "Tell me about a time when...", "Have you ever...", or "Describe the most memorable...". 
Include follow-up like "How did you feel?" or "What did you learn?".`;
  } else {
    typePrompt = `Generate ${count} OPIc Role Play and Comparison questions about ${topic}.
Mix types: some questions should be role play scenarios (asking the student to play a role and ask 3 questions),
some should compare past vs present related to ${topic}.
For role play: "I'd like you to act as... Ask 3 questions about..."
For comparison: "How has [topic] changed compared to the past? Describe both."`;
  }

  const prompt = `${typePrompt}

Target OPIc grade: ${lang === 'ko' ? G.ko : G.en} (${grade})

Return a JSON object with:
- questions: array of exactly ${count} objects, each with:
  - id: number (1 to ${count})
  - question: the OPIc question string in English
  - context: optional brief situation setup string (1 sentence, or empty string)
  - type: one of "intro", "describe", "experience", "roleplay", "comparison"
  - sampleAnswer: a ${grade}-level sample spoken answer (60-90 words, natural spoken English)
  - sampleAnswer_ko: Korean translation/explanation of the sample answer strategy
  - keyExpressions: array of 3-4 useful English expressions or phrases for this question`;

  try {
    data = await callAPI(prompt, 2500);
    doneLoading();
    renderQuestions();
    initTutor();
    document.getElementById('act-row').style.display = 'flex';
  } catch(e) { showErr(e); }
}

// ── 질문 렌더링 ──────────────────────────────────────────
function renderQuestions() {
  const area = document.getElementById('content-area'); area.innerHTML = '';
  const qs = data.questions || [];

  qs.forEach((q, idx) => {
    const card = document.createElement('div'); card.className = 'q-card'; card.id = 'qcard-' + q.id;

    // Header
    const hdr = document.createElement('div'); hdr.className = 'q-card-hdr';
    const typeLabels = { intro: '👤 Self Intro', describe: '🏠 Describe', experience: '📖 Experience', roleplay: '🔄 Role Play', comparison: '🔄 Comparison' };
    hdr.innerHTML = `<span class="q-card-title">${typeLabels[q.type] || '🎤 Speaking'}</span><span class="q-card-num">Q${q.id} / ${qs.length}</span>`;

    const bod = document.createElement('div'); bod.className = 'q-card-body';

    // Question text
    const qt = document.createElement('div'); qt.className = 'q-text'; qt.textContent = q.question;
    bod.appendChild(qt);

    // Context
    if (q.context) {
      const ctx = document.createElement('div'); ctx.className = 'q-context';
      ctx.textContent = '📋 ' + q.context;
      bod.appendChild(ctx);
    }

    // Key expressions
    if (q.keyExpressions && q.keyExpressions.length) {
      const kx = document.createElement('div');
      kx.style.cssText = 'margin-bottom:14px;';
      kx.innerHTML = `<div style="font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;">${lang === 'ko' ? '핵심 표현' : 'KEY EXPRESSIONS'}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">${q.keyExpressions.map(e => `<span style="padding:4px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:500;">${e}</span>`).join('')}</div>`;
      bod.appendChild(kx);
    }

    // Timer
    const T = TYPES[type];
    const timerDiv = document.createElement('div'); timerDiv.className = 'timer-wrap';
    timerDiv.innerHTML = `
      <div>
        <div class="timer-num" id="tnum-${q.id}">${T.respSec}</div>
      </div>
      <div class="timer-info">
        <div class="timer-phase" id="tphase-${q.id}">${lang === 'ko' ? '준비 완료' : 'Ready'}</div>
        <div class="timer-bar"><div class="timer-fill" id="tfill-${q.id}" style="width:100%"></div></div>
      </div>
      <button class="start-timer-btn" id="tbtn-${q.id}" onclick="startQTimer(${q.id},${T.respSec})">${lang === 'ko' ? '⏱ 시작' : '⏱ Start'}</button>`;
    bod.appendChild(timerDiv);

    // Record
    const recDiv = document.createElement('div'); recDiv.className = 'rec-wrap';
    recDiv.innerHTML = `<button class="rec-btn idle" id="recbtn-${q.id}" onclick="toggleRec(${q.id})">🎙 ${lang === 'ko' ? '녹음 시작' : 'Start Recording'}</button>
      <div class="transcript-box" id="tbox-${q.id}" contenteditable="true">${lang === 'ko' ? '여기에 말씀하신 내용을 입력하세요...' : 'Type what you said here...'}</div>`;
    bod.appendChild(recDiv);

    // Submit feedback button
    const subBtn = document.createElement('button'); subBtn.className = 'submit-btn'; subBtn.id = 'subbtn-' + q.id;
    subBtn.textContent = `🤖 ${lang === 'ko' ? 'AI 피드백 받기' : 'Get AI Feedback'}`;
    subBtn.onclick = () => submitFeedback(q.id, q.question, q.sampleAnswer);
    bod.appendChild(subBtn);

    // Sample answer toggle
    const samBtn = document.createElement('button'); samBtn.className = 'sample-toggle';
    samBtn.innerHTML = `📝 ${lang === 'ko' ? '예시 답변 보기' : 'Show Sample Answer'} <span>▼</span>`;
    samBtn.onclick = function() {
      const box = document.getElementById('sample-' + q.id);
      const open = box.classList.toggle('open');
      this.innerHTML = `📝 ${open ? (lang === 'ko' ? '예시 답변 숨기기' : 'Hide Sample Answer') : (lang === 'ko' ? '예시 답변 보기' : 'Show Sample Answer')} <span>${open ? '▲' : '▼'}</span>`;
    };
    const samBox = document.createElement('div'); samBox.className = 'sample-box'; samBox.id = 'sample-' + q.id;
    samBox.innerHTML = `${q.sampleAnswer || ''}${q.sampleAnswer_ko ? `<div class="strategy-box">💡 ${q.sampleAnswer_ko}</div>` : ''}`;
    bod.appendChild(subBtn);
    bod.appendChild(samBtn);
    bod.appendChild(samBox);

    // Feedback area placeholder
    const fbDiv = document.createElement('div'); fbDiv.id = 'fb-' + q.id;
    bod.appendChild(fbDiv);

    card.append(hdr, bod); area.appendChild(card);
  });
}

// ── 타이머 ───────────────────────────────────────────────
const activeTimers = {};
function startQTimer(qId, sec) {
  const btn = document.getElementById('tbtn-' + qId);
  const num = document.getElementById('tnum-' + qId);
  const fill = document.getElementById('tfill-' + qId);
  const phase = document.getElementById('tphase-' + qId);
  if (btn) btn.style.display = 'none';
  if (phase) phase.textContent = lang === 'ko' ? '🗣 지금 말하세요!' : '🗣 Speak Now!';
  let rem = sec;
  if (activeTimers[qId]) clearInterval(activeTimers[qId]);
  activeTimers[qId] = setInterval(() => {
    rem--;
    if (num) { num.textContent = rem; num.className = 'timer-num' + (rem <= 5 ? ' warn' : ''); }
    if (fill) { fill.style.width = (rem / sec * 100) + '%'; if (rem <= 5) fill.classList.add('warn'); }
    if (rem <= 0) {
      clearInterval(activeTimers[qId]);
      if (phase) phase.textContent = lang === 'ko' ? '⏰ 시간 종료!' : '⏰ Time\'s Up!';
      // 녹음 중이면 자동 중지
      if (mediaRec && mediaRec.state === 'recording') stopRecForQ(qId);
    }
  }, 1000);
}
function stopTimer() { Object.keys(activeTimers).forEach(k => clearInterval(activeTimers[k])); }

// ── 녹음 ─────────────────────────────────────────────────
let currentRecQId = null;
async function toggleRec(qId) {
  if (mediaRec && mediaRec.state === 'recording') { stopRecForQ(qId); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = []; currentRecQId = qId;
    mediaRec = new MediaRecorder(stream);
    mediaRec.ondataavailable = e => audioChunks.push(e.data);
    mediaRec.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const tb = document.getElementById('tbox-' + qId); if (tb) tb.style.display = 'block';
      const sb = document.getElementById('subbtn-' + qId); if (sb) sb.style.display = 'block';
    };
    mediaRec.start();
    const btn = document.getElementById('recbtn-' + qId);
    if (btn) { btn.className = 'rec-btn recording'; btn.textContent = `⏹ ${lang === 'ko' ? '녹음 중지' : 'Stop Recording'}`; }
    const tb = document.getElementById('tbox-' + qId); if (tb) tb.style.display = 'none';
  } catch(e) { alert(lang === 'ko' ? '마이크 접근 권한이 필요합니다.' : 'Microphone access required.'); }
}
function stopRecForQ(qId) {
  if (mediaRec && mediaRec.state === 'recording') mediaRec.stop();
  const btn = document.getElementById('recbtn-' + qId);
  if (btn) { btn.className = 'rec-btn idle'; btn.textContent = `🎙 ${lang === 'ko' ? '다시 녹음' : 'Re-record'}`; }
  const tb = document.getElementById('tbox-' + qId); if (tb) tb.style.display = 'block';
  const sb = document.getElementById('subbtn-' + qId); if (sb) sb.style.display = 'block';
}

// ── AI 피드백 ─────────────────────────────────────────────
async function submitFeedback(qId, question, sample) {
  const tb = document.getElementById('tbox-' + qId);
  const transcript = (tb?.innerText || '').trim();
  const btn = document.getElementById('subbtn-' + qId);
  btn.disabled = true; btn.textContent = lang === 'ko' ? '⏳ AI 분석 중...' : '⏳ AI analyzing...';

  try {
    const fb = await callAPI(`You are an OPIc speaking examiner. Evaluate this response for ${grade} target grade.
Question: ${question}
Student response: ${transcript || '(no transcript provided)'}
Target grade: ${grade}

Return a JSON object with: scores (object with content, fluency, vocabulary, grammar each having score (integer 1-5) and comment (string)), overall_grade (string like "IM2" or "IH"), achieved (boolean, whether they reached ${grade} level), strengths (string), improvements (string), strengths_ko (Korean string), improvements_ko (Korean string)`, 1000);
    renderFeedback(qId, fb, sample);
  } catch(e) {
    btn.disabled = false; btn.textContent = `🤖 ${lang === 'ko' ? 'AI 피드백 받기' : 'Get AI Feedback'}`;
    alert(lang === 'ko' ? '오류가 발생했습니다.' : 'Error occurred.');
  }
}

function renderFeedback(qId, fb, sample) {
  const area = document.getElementById('fb-' + qId); if (!area) return;
  const scores = fb.scores || {};
  const achieved = fb.achieved;
  area.innerHTML = `<div class="fb-card" style="display:block;">
    <div class="fb-hdr">${achieved ? '🎉' : '💪'} ${lang === 'ko' ? 'AI 채점 완료' : 'AI Scoring Complete'} · ${lang === 'ko' ? '예상 등급' : 'Est. Grade'}: ${fb.overall_grade || grade} ${achieved ? `✅ ${lang === 'ko' ? '목표 달성!' : 'Target reached!'}` : `⚠️ ${lang === 'ko' ? '조금 더 연습하세요' : 'Keep practicing'}`}</div>
    <div class="score-chips">${Object.entries(scores).map(([k, v]) => `<div class="sc-chip"><div class="sc-chip-name">${k}</div><div class="sc-chip-val">${v.score}</div><div style="font-size:10px;color:var(--text-light)">/ 5</div></div>`).join('')}</div>
    <div class="fb-body">
      <div class="fb-sec"><div class="fb-sec-title">✅ ${lang === 'ko' ? '강점' : 'Strengths'}</div><div class="fb-sec-text">${lang === 'ko' ? (fb.strengths_ko || fb.strengths) : fb.strengths}</div></div>
      <div class="fb-sec"><div class="fb-sec-title">📈 ${lang === 'ko' ? '개선점' : 'Improve'}</div><div class="fb-sec-text">${lang === 'ko' ? (fb.improvements_ko || fb.improvements) : fb.improvements}</div></div>
    </div>
  </div>`;
  const btn = document.getElementById('subbtn-' + qId);
  if (btn) { btn.disabled = false; btn.textContent = lang === 'ko' ? '🔄 다시 제출' : '🔄 Resubmit'; }
  area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── AI 튜터 ──────────────────────────────────────────────
function initTutor() {
  msgs = []; document.getElementById('tutor-msgs').innerHTML = '';
  const T = TYPES[type];
  addMsg('ai', lang === 'ko'
    ? `🎤 **${T.ko}** 준비 완료!\n\n${T.tip.ko}\n\n연습 중 궁금한 점은 언제든 질문하세요!`
    : `🎤 **${T.en}** ready!\n\n${T.tip.en}\n\nAsk me anything while practicing!`);
  const qs = lang === 'ko'
    ? ['답변 아이디어', '고급 표현 알려줘', '등급 향상 전략', '발음 팁']
    : ['Give me ideas', 'Advanced expressions', 'Grade-up strategy', 'Pronunciation tips'];
  document.getElementById('quick-wrap').innerHTML = qs.map(q => `<button class="quick-btn" onclick="document.getElementById('tutor-inp').value='${q}';sendMsg()">${q}</button>`).join('');
  document.getElementById('tutor-wrap').style.display = 'block';
}

async function sendMsg() {
  const inp = document.getElementById('tutor-inp'); const txt = inp.value.trim(); if (!txt) return;
  inp.value = ''; addMsg('user', txt); msgs.push({ role: 'user', content: txt });
  document.getElementById('send-btn').disabled = true; const tid = showTyping();
  const T = TYPES[type];
  try {
    const r = await fetch('/api/claude', { method: 'POST', headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 400,
        system: lang === 'ko'
          ? `OPIc 말하기 코치. 유형: ${T.ko}. 목표 등급: ${grade}. 한국어로 간결하게 답하세요.`
          : `OPIc speaking coach. Type: ${T.en}. Target: ${grade}. Be concise.`,
        messages: msgs.slice(-6) }) });
    const d = await r.json(); removeTyping(tid);
    const rep = d.content[0].text; msgs.push({ role: 'assistant', content: rep }); addMsg('ai', rep);
  } catch(e) { removeTyping(tid); addMsg('ai', '⚠️ Error'); }
  document.getElementById('send-btn').disabled = false;
}

function addMsg(role, txt) {
  const w = document.getElementById('tutor-msgs'); const d = document.createElement('div'); d.className = 'msg ' + role;
  d.innerHTML = `<div class="msg-av ${role}">${role === 'ai' ? '🤖' : '👤'}</div><div class="msg-bub">${txt.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>')}</div>`;
  w.appendChild(d); w.scrollTop = w.scrollHeight;
}
function showTyping() {
  const w = document.getElementById('tutor-msgs'); const id = 't' + Date.now(); const d = document.createElement('div'); d.className = 'msg ai'; d.id = id;
  d.innerHTML = `<div class="msg-av ai">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
  w.appendChild(d); w.scrollTop = w.scrollHeight; return id;
}
function removeTyping(id) { const e = document.getElementById(id); if (e) e.remove(); }

init();
</script>
