<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — TOEIC — Listening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:#1C2B45; --teal:#2A7F6F; --teal-light:#E1F5EE; --teal-mid:#1D9E75;
    --bg:#F8F7F4; --white:#fff; --text:#1C2B45; --text-muted:#5a6a82; --text-light:#94a3b8;
    --border:rgba(28,43,69,0.1); --border-md:rgba(28,43,69,0.18);
    --toeic:#ba7517; --toeic-light:#faeeda; --toeic-dark:#3d1f00;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  nav { background:rgba(28,43,69,0.97); height:56px; display:flex; align-items:center; padding:0 5%; border-bottom:0.5px solid rgba(255,255,255,0.08); position:sticky; top:0; z-index:100; }
  .nav-logo { display:flex; align-items:center; gap:8px; text-decoration:none; }
  .nav-lm { width:28px; height:28px; background:var(--teal); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; }
  .nav-lt { font-size:16px; font-weight:600; color:#fff; }
  .nav-sep { width:1px; height:18px; background:rgba(255,255,255,0.15); margin:0 12px; }
  .nav-page { font-size:13px; color:rgba(255,255,255,0.6); }
  .nav-space { flex:1; }
  .lang-sw { display:flex; background:rgba(255,255,255,0.08); border-radius:7px; padding:2px; gap:2px; }
  .lbtn { padding:4px 10px; border-radius:5px; font-size:11px; font-weight:500; border:none; background:transparent; color:rgba(255,255,255,0.5); cursor:pointer; font-family:inherit; transition:all 0.2s; }
  .lbtn.act { background:var(--teal); color:#fff; }
  .nav-back { font-size:13px; color:rgba(255,255,255,0.6); text-decoration:none; padding:6px 10px; border-radius:7px; margin-right:6px; transition:all 0.2s; }
  .nav-back:hover { background:rgba(255,255,255,0.08); color:#fff; }

  .main { max-width:820px; margin:0 auto; padding:28px 5% 80px; }

  /* HERO */
  .hero { background:linear-gradient(135deg,var(--toeic-dark) 0%,var(--toeic) 100%); border-radius:14px; padding:24px 28px; margin-bottom:20px; position:relative; overflow:hidden; }
  .hero::before { content:''; position:absolute; right:-20px; top:-20px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,0.07); pointer-events:none; }
  .hero-tag { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:#fcd34d; margin-bottom:6px; }
  .hero-title { font-family:'DM Serif Display',serif; font-size:clamp(22px,4vw,32px); color:#fff; margin-bottom:6px; }
  .hero-desc { font-size:13px; color:rgba(255,255,255,0.65); line-height:1.6; }
  .hero-badges { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .hero-badge { font-size:11px; padding:3px 12px; border-radius:20px; background:rgba(255,255,255,0.15); color:rgba(255,255,255,0.85); border:0.5px solid rgba(255,255,255,0.2); }

  /* PART TABS */
  .part-tabs { display:flex; background:var(--white); border:0.5px solid var(--border); border-radius:14px; padding:4px; margin-bottom:16px; overflow-x:auto; gap:0; }
  .part-tab { flex:1; padding:10px 14px; border-radius:10px; font-size:13px; font-weight:500; cursor:pointer; border:none; background:transparent; color:var(--text-muted); font-family:inherit; transition:all 0.2s; white-space:nowrap; text-align:center; }
  .part-tab:hover { color:var(--toeic); }
  .part-tab.act { background:var(--toeic); color:#fff; }

  /* PART INFO */
  .part-info { background:var(--white); border:0.5px solid var(--border); border-radius:14px; padding:16px 18px; margin-bottom:16px; }
  .pi-row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
  .pi-stat { text-align:center; flex-shrink:0; }
  .pi-num { font-family:'DM Serif Display',serif; font-size:22px; color:var(--toeic); line-height:1; }
  .pi-key { font-size:10px; color:var(--text-light); text-transform:uppercase; letter-spacing:.4px; margin-top:2px; }
  .pi-divider { width:1px; height:36px; background:var(--border); flex-shrink:0; }
  .pi-desc { font-size:12px; color:var(--text-muted); line-height:1.65; flex:1; min-width:180px; }
  .pi-tip { display:flex; align-items:flex-start; gap:8px; padding:10px 12px; background:var(--toeic-light); border-radius:8px; font-size:12px; color:var(--toeic); line-height:1.55; }

  /* SETTINGS */
  .settings-row { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .setting-item { background:var(--white); border:0.5px solid var(--border); border-radius:10px; padding:12px 16px; flex:1; min-width:130px; }
  .si-label { font-size:10px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; color:var(--text-light); margin-bottom:6px; }
  .si-select { width:100%; border:none; background:transparent; font-size:13px; font-weight:500; color:var(--text); font-family:inherit; cursor:pointer; outline:none; }

  /* LOADING */
  .loading-overlay { padding:48px; text-align:center; background:var(--white); border:0.5px solid var(--border); border-radius:14px; margin-bottom:20px; display:none; }
  .loading-spinner { width:44px; height:44px; border:3px solid var(--border); border-top-color:var(--toeic); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-size:14px; color:var(--text-muted); line-height:1.6; }

  /* PHOTO CARD (Part 1) */
  .photo-card { background:var(--white); border:0.5px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:14px; }
  .photo-wrap { position:relative; width:100%; aspect-ratio:16/9; background:#dde3ee; overflow:hidden; }
  .photo-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
  .photo-loading { position:absolute; inset:0; background:rgba(28,43,69,0.55); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:#fff; font-size:12px; }
  .photo-loading.hidden { display:none; }
  .photo-spinner { width:32px; height:32px; border:3px solid rgba(255,255,255,0.25); border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; }
  .photo-caption { padding:9px 16px; background:var(--toeic-light); font-size:12px; color:var(--toeic); display:flex; align-items:center; gap:6px; }

  /* AUDIO PLAYER */
  .audio-card { background:var(--white); border:0.5px solid var(--border); border-radius:14px; padding:16px 18px; margin-bottom:14px; }
  .ac-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:6px; }
  .ac-title { font-size:13px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:8px; }
  .ac-badge { font-size:10px; padding:2px 8px; border-radius:10px; background:var(--toeic-light); color:var(--toeic); font-weight:600; }
  .ac-note { font-size:11px; color:var(--text-muted); }
  .player-row { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg); border-radius:10px; border:0.5px solid var(--border); }
  .play-btn { width:40px; height:40px; border-radius:50%; background:var(--toeic); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; }
  .play-btn:hover { background:#9a6010; transform:scale(1.05); }
  .play-btn svg { width:16px; height:16px; fill:#fff; }
  .player-info { flex:1; min-width:0; }
  .player-label { font-size:11px; color:var(--text-muted); margin-bottom:4px; }
  .player-bar { height:5px; background:var(--border); border-radius:5px; overflow:hidden; cursor:pointer; }
  .player-fill { height:100%; background:linear-gradient(90deg,var(--toeic-dark),var(--toeic)); border-radius:5px; width:0%; transition:width 0.1s; }
  .speed-btn { padding:3px 9px; border-radius:7px; border:0.5px solid var(--border-md); background:transparent; font-size:11px; font-weight:600; color:var(--text-muted); cursor:pointer; font-family:inherit; transition:all 0.2s; flex-shrink:0; }
  .speed-btn:hover, .speed-btn.act { background:var(--toeic-light); color:var(--toeic); border-color:var(--toeic); }

  /* SCRIPT BLOCK (Part 3/4) */
  .script-card { background:var(--white); border:0.5px solid var(--border); border-radius:14px; margin-bottom:14px; overflow:hidden; }
  .script-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--toeic-light); border-bottom:0.5px solid var(--border); flex-wrap:wrap; gap:8px; }
  .script-title { font-size:13px; font-weight:600; color:var(--toeic); display:flex; align-items:center; gap:8px; }
  .script-toggle { padding:4px 12px; border-radius:8px; border:0.5px solid var(--toeic); background:transparent; color:var(--toeic); font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; }
  .script-toggle:hover { background:var(--toeic); color:#fff; }
  .script-player-row { padding:12px 16px; border-bottom:0.5px solid var(--border); display:flex; align-items:center; gap:10px; }
  .script-lines { padding:12px 16px; display:none; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; }
  .script-lines.open { display:flex; }
  .sl { display:flex; gap:10px; padding:6px 10px; border-radius:8px; cursor:pointer; transition:background 0.15s; }
  .sl:hover { background:rgba(186,117,23,0.07); }
  .sl.active { background:var(--toeic-light); }
  .sl-spk { font-size:10px; font-weight:700; color:var(--toeic); min-width:50px; padding-top:2px; text-transform:uppercase; }
  .sl-txt { font-size:13px; color:var(--text); line-height:1.6; flex:1; }

  /* QUESTIONS */
  .questions-section { background:var(--white); border:0.5px solid var(--border); border-radius:14px; padding:18px; margin-bottom:20px; }
  .qs-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .qs-title { font-size:13px; font-weight:600; color:var(--text); }
  .qs-note { font-size:11px; color:var(--text-muted); }
  .q-item { margin-bottom:14px; padding:14px; background:var(--bg); border-radius:10px; }
  .q-item:last-child { margin-bottom:0; }
  .q-num { font-size:10px; font-weight:600; color:var(--toeic); letter-spacing:.5px; text-transform:uppercase; margin-bottom:6px; }
  .q-text { font-size:14px; font-weight:500; color:var(--text); margin-bottom:10px; line-height:1.5; }
  .q-opts { display:flex; flex-direction:column; gap:7px; }
  .q-opt { padding:9px 14px; border-radius:8px; border:1.5px solid var(--border-md); background:var(--white); cursor:pointer; font-size:13px; color:var(--text); transition:all 0.2s; text-align:left; font-family:inherit; display:flex; align-items:center; gap:10px; }
  .q-opt:hover:not(:disabled) { border-color:var(--toeic); background:var(--toeic-light); }
  .q-opt.correct { border-color:var(--teal-mid); background:#eaf3de; color:#3b6d11; font-weight:500; }
  .q-opt.wrong   { border-color:#e24b4a; background:#fcebeb; color:#a32d2d; }
  .q-opt-ltr { width:24px; height:24px; border-radius:50%; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:var(--text-muted); flex-shrink:0; }
  .q-opt.correct .q-opt-ltr { background:var(--teal-mid); color:#fff; }
  .q-opt.wrong   .q-opt-ltr { background:#e24b4a; color:#fff; }
  .q-feedback { margin-top:8px; font-size:12px; padding:8px 12px; border-radius:7px; display:none; line-height:1.5; }
  .q-feedback.show { display:block; }
  .q-feedback.correct { background:#eaf3de; color:#3b6d11; }
  .q-feedback.wrong   { background:#fcebeb; color:#a32d2d; }

  /* Part 1: 선택지 잠금 (재생 전) */
  .choices-locked { opacity:0.3; pointer-events:none; filter:blur(2px); transition:all 0.4s; }
  .choices-locked.unlocked { opacity:1; pointer-events:auto; filter:none; }
  .listen-hint { padding:9px 14px; background:var(--toeic-light); border-radius:8px; font-size:12px; color:var(--toeic); text-align:center; margin-bottom:10px; }

  /* Part 1 A/B/C/D 버튼 (텍스트 없음) */
  .p1-choice-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .p1-choice-btn {
    height:56px; border-radius:12px; border:2px solid var(--border-md);
    background:var(--white); cursor:pointer; font-family:'DM Serif Display',serif;
    font-size:22px; font-weight:700; color:var(--text-muted);
    transition:all 0.2s; display:flex; align-items:center; justify-content:center;
  }
  .p1-choice-btn:hover:not(:disabled) { border-color:var(--toeic); background:var(--toeic-light); color:var(--toeic); }
  .p1-choice-btn.playing { border-color:var(--toeic); background:var(--toeic-light); color:var(--toeic); animation:pulse-btn 0.6s infinite alternate; }
  .p1-choice-btn.correct { border-color:var(--teal-mid); background:#eaf3de; color:var(--teal-mid); }
  .p1-choice-btn.wrong   { border-color:#e24b4a; background:#fcebeb; color:#e24b4a; }
  @keyframes pulse-btn { from{transform:scale(1)} to{transform:scale(1.06)} }

  /* SCORE */
  .score-card { background:linear-gradient(135deg,var(--toeic-dark) 0%,var(--toeic) 100%); border-radius:14px; padding:24px; text-align:center; margin-bottom:20px; display:none; }
  .sc-label { font-size:13px; color:rgba(255,255,255,0.6); margin-bottom:6px; }
  .sc-score { font-family:'DM Serif Display',serif; font-size:52px; color:#fff; line-height:1; margin-bottom:6px; }
  .sc-pct { font-size:14px; color:rgba(255,255,255,0.7); margin-bottom:10px; }
  .sc-msg { font-size:13px; color:#fcd34d; font-weight:500; }

  /* AI TUTOR */
  .tutor-section { background:var(--white); border:0.5px solid var(--border); border-radius:14px; margin-bottom:20px; overflow:hidden; display:none; }
  .tutor-header { display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:0.5px solid var(--border); background:var(--toeic-light); }
  .tutor-avatar { width:32px; height:32px; border-radius:50%; background:var(--toeic); display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
  .tutor-name { font-size:13px; font-weight:600; color:var(--toeic); }
  .tutor-status { font-size:11px; color:var(--text-muted); }
  .tutor-messages { padding:16px 18px; min-height:80px; max-height:280px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
  .msg { display:flex; gap:10px; align-items:flex-start; }
  .msg.user { flex-direction:row-reverse; }
  .msg-av { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; margin-top:2px; }
  .msg-av.ai { background:var(--toeic); color:#fff; }
  .msg-av.user { background:var(--navy); color:#fff; }
  .msg-bub { max-width:78%; padding:10px 14px; border-radius:12px; font-size:13px; line-height:1.6; }
  .msg.ai   .msg-bub { background:var(--bg); color:var(--text); border-radius:4px 12px 12px 12px; }
  .msg.user .msg-bub { background:var(--navy); color:#fff; border-radius:12px 4px 12px 12px; }
  .typing { display:flex; gap:4px; align-items:center; padding:10px 14px; background:var(--bg); border-radius:4px 12px 12px 12px; width:fit-content; }
  .typing span { width:6px; height:6px; border-radius:50%; background:var(--text-light); animation:bounce 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:0.2s} .typing span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .quick-wrap { padding:0 18px 12px; display:flex; gap:6px; flex-wrap:wrap; }
  .quick-btn { padding:5px 12px; border-radius:16px; font-size:12px; border:0.5px solid var(--border-md); background:transparent; color:var(--text-muted); cursor:pointer; font-family:inherit; transition:all 0.2s; }
  .quick-btn:hover { border-color:var(--toeic); color:var(--toeic); background:var(--toeic-light); }
  .tutor-input-wrap { display:flex; gap:8px; padding:12px 18px; border-top:0.5px solid var(--border); }
  .tutor-input { flex:1; padding:9px 14px; border:0.5px solid var(--border-md); border-radius:8px; font-size:13px; font-family:inherit; color:var(--text); background:var(--bg); outline:none; }
  .tutor-input:focus { border-color:var(--toeic); }
  .send-btn { width:36px; height:36px; border-radius:8px; background:var(--toeic); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; flex-shrink:0; }
  .send-btn:hover { background:#9a6010; }
  .send-btn:disabled { background:var(--border-md); cursor:not-allowed; }

  .action-btns { display:flex; gap:10px; display:none; }
  .act-btn { flex:1; padding:12px; border-radius:10px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; border:0.5px solid var(--border-md); background:var(--white); color:var(--text); transition:all 0.2s; text-decoration:none; text-align:center; display:block; }
  .act-btn:hover { background:var(--bg); }
  .act-btn.primary { background:var(--toeic); color:#fff; border-color:var(--toeic); }
  .act-btn.primary:hover { background:#9a6010; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .fade-in { animation:fadeUp 0.4s ease forwards; }
</style>
</head>
<body>

<nav>
  <a href="/languages/en/index.html" class="nav-logo">
    <div class="nav-lm">LW</div>
    <span class="nav-lt">LinguaWalk</span>
  </a>
  <div class="nav-sep"></div>
  <span class="nav-page">🎧 TOEIC Listening</span>
  <div class="nav-space"></div>
  <a href="index.html" class="nav-back" data-en="← TOEIC" data-ko="← TOEIC">← TOEIC</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lbtn" onclick="setLang('ko')" id="btn-ko">한국어</button>
  </div>
</nav>

<div class="main fade-in" id="main-content">

  <div class="hero">
    <div class="hero-tag">🎧 TOEIC · LISTENING COMPREHENSION (LC)</div>
    <h1 class="hero-title" data-en="TOEIC Listening Practice" data-ko="TOEIC 듣기 연습">TOEIC Listening Practice</h1>
    <p class="hero-desc" data-en="AI-generated Part 1–4 content with audio. Photos, Q&A, conversations and talks." data-ko="AI가 생성한 Part 1~4 콘텐츠. 사진, 질의응답, 대화, 담화를 오디오로 연습하세요."></p>
    <div class="hero-badges">
      <span class="hero-badge">Part 1 Photographs</span>
      <span class="hero-badge">Part 2 Q&amp;A</span>
      <span class="hero-badge">Part 3 Conversations</span>
      <span class="hero-badge">Part 4 Talks</span>
      <span class="hero-badge">🤖 AI Tutor</span>
    </div>
  </div>

  <div class="part-tabs">
    <button class="part-tab act" onclick="selectPart('p1',this)">📸 Part 1</button>
    <button class="part-tab" onclick="selectPart('p2',this)">💬 Part 2</button>
    <button class="part-tab" onclick="selectPart('p3',this)">🗣️ Part 3</button>
    <button class="part-tab" onclick="selectPart('p4',this)">📢 Part 4</button>
  </div>

  <div class="part-info" id="part-info-box"></div>

  <div class="settings-row">
    <div class="setting-item">
      <div class="si-label" data-en="Difficulty" data-ko="난이도">Difficulty</div>
      <select class="si-select" id="diff-select">
        <option value="Easy" data-en="Easy" data-ko="쉬움">Easy</option>
        <option value="Medium" selected data-en="Medium" data-ko="보통">Medium</option>
        <option value="Hard" data-en="Hard" data-ko="어려움">Hard</option>
      </select>
    </div>
    <div class="setting-item" id="q-count-wrap" style="display:none;">
      <div class="si-label" data-en="Questions" data-ko="문제 수">Questions</div>
      <select class="si-select" id="q-count">
        <option value="1" selected>1</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-en="Voice Speed" data-ko="음성 속도">Voice Speed</div>
      <select class="si-select" id="speed-select">
        <option value="0.8" data-en="Slow (0.8x)" data-ko="느리게 (0.8x)">Slow (0.8x)</option>
        <option value="1.0" selected data-en="Normal (1.0x)" data-ko="보통 (1.0x)">Normal (1.0x)</option>
        <option value="1.2" data-en="Fast (1.2x)" data-ko="빠르게 (1.2x)">Fast (1.2x)</option>
      </select>
    </div>
  </div>

<script>
// ── 상수 ──────────────────────────────────────────────────────────────────
const PARTS = {
  p1:{ en:'Part 1 — Photographs', ko:'Part 1 — 사진 묘사', total:6,  range:'Q1–6',
       descEn:'Choose the statement that best describes the photograph.',
       descKo:'사진을 가장 잘 묘사하는 문장을 고르세요.',
       tipEn:'💡 Focus on subject, action, and location. Watch for subtle differences between choices.',
       tipKo:'💡 주어, 동작, 위치에 집중하세요. 선택지의 미묘한 차이를 놓치지 마세요.' },
  p2:{ en:'Part 2 — Question-Response', ko:'Part 2 — 질의응답', total:25, range:'Q7–31',
       descEn:'Listen to a question and choose the best response from three options.',
       descKo:'질문을 듣고 세 가지 응답 중 가장 적절한 것을 고르세요.',
       tipEn:'💡 Identify the question word (Who/What/When/Where/Why/How) first.',
       tipKo:'💡 의문사(Who/What/When/Where/Why/How)를 먼저 파악하세요.' },
  p3:{ en:'Part 3 — Conversations', ko:'Part 3 — 짧은 대화', total:39, range:'Q32–70',
       descEn:'Listen to a conversation and answer 3 questions per set.',
       descKo:'대화를 듣고 세트당 3개의 문제에 답하세요.',
       tipEn:'💡 Read the questions before listening. Focus on topic, relationship, and purpose.',
       tipKo:'💡 듣기 전 문제를 먼저 읽으세요. 주제, 화자 관계, 목적을 파악하세요.' },
  p4:{ en:'Part 4 — Talks', ko:'Part 4 — 짧은 담화', total:30, range:'Q71–100',
       descEn:'Listen to a monologue (announcement, ad, voicemail) and answer 3 questions.',
       descKo:'안내·광고·메시지 등의 담화를 듣고 세트당 3개의 문제에 답하세요.',
       tipEn:'💡 Identify the talk type and purpose from the first sentence.',

};
const SPEEDS = [0.7, 0.8, 1.0, 1.2, 1.5];

// ── 상태 ──────────────────────────────────────────────────────────────────
let lang='en', currentPart='p1', currentData=null;
let isLoading=false, messages=[];
let correct=0, answered=0, total=0;

// ── 언어 ──────────────────────────────────────────────────────────────────

// ── 파트 선택 ──────────────────────────────────────────────────────────────
function selectPart(id, btn){

// ── Claude API 호출 ────────────────────────────────────────────────────────
async function callClaude(prompt, maxTokens){
  const r=await fetch('/api/claude',{method:'POST',
    headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:maxTokens||1500,
      messages:[{role:'user',content:prompt}]})});
  const d=await r.json();
  const raw=d.content?.[0]?.text||'';
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

// ── 이미지 생성 (Stability AI → Unsplash 폴백) ────────────────────────────
async function loadImage(itemId, imagePrompt){
  const img=document.getElementById('img-'+itemId);
  const ld=document.getElementById('imgl-'+itemId);
  if(!img) return;

  function showImg(src){
    img.onload=()=>{ img.style.opacity=1; if(ld) ld.classList.add('hidden'); };
    img.onerror=()=>{ loadUnsplash(); }; // src 실패 시 Unsplash로
    img.src=src;
  }

  function loadUnsplash(){
    const kw=encodeURIComponent((imagePrompt||'office').split(',')[0].trim());
    const url=`https://images.unsplash.com/random/1200x675/?${kw}&sig=${Date.now()}`;
    img.onload=()=>{ img.style.opacity=1; if(ld) ld.classList.add('hidden'); };
    img.onerror=()=>{ if(ld) ld.innerHTML='<span style="font-size:11px;color:rgba(255,255,255,0.6)">이미지 없음</span>'; };
    img.src=url;
  }

  // 1차: Stability AI
  try{
    const ctrl=new AbortController();
    setTimeout(()=>ctrl.abort(), 15000); // 15초 타임아웃
    const r=await fetch('/api/generate-image',{method:'POST',signal:ctrl.signal,
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:imagePrompt,aspectRatio:'16:9'})});
    const d=await r.json();
    if(r.ok && d.imageUrl){ showImg(d.imageUrl); return; }
    console.warn('Stability AI returned error:', d.error);
  }catch(e){ console.warn('Stability AI failed:', e.message); }

  // 2차: Unsplash 폴백 (반드시 표시)
  loadUnsplash();
}

// ── 생성 ──────────────────────────────────────────────────────────────────
async function generate(){
  if(isLoading) return;
  isLoading=true;
  resetContent();
  document.getElementById('gen-btn').disabled=true;
  document.getElementById('loading-overlay').style.display='block';
  const lt=document.getElementById('loading-text');
  const diff=document.getElementById('diff-select').value;
  const qc=currentPart==='p1' ? 1 : parseInt(document.getElementById('q-count').value);
  const spd=parseFloat(document.getElementById('speed-select').value);
  const area=document.getElementById('content-area');

  try{
    if(currentPart==='p1'){
      // Part 1: 1문제씩 순차 생성
      currentData={part:'Part 1',items:[]};
      for(let i=1;i<=qc;i++){
        lt.textContent=lang==='ko'?`🤖 문제 ${i}/${qc} 생성 중…`:`🤖 Generating question ${i} of ${qc}…`;
        const item=await callClaude(promptP1One(i,diff),700);
        item.id=i;
        // audioScript: 정답 보기 텍스트에서 자동 생성 (별도 노출 안 함)
        if(!item.audioScript) item.audioScript=item.choices?.[item.answer]||'';
        currentData.items.push(item);
        total=i;
        if(i===1) document.getElementById('loading-overlay').style.display='none';
        area.appendChild(makeP1Card(item, spd));
        loadImage(i, item.imagePrompt); // 이미지는 비동기 독립 로드
      }
    } else {
      lt.textContent=lang==='ko'?'🤖 AI가 문제를 생성하고 있습니다…':'🤖 Generating listening content…';
      if(currentPart==='p2'){
        currentData=await callClaude(promptP2(qc,diff),2000);
        total=currentData.items.length;
      } else {
        currentData=await callClaude(currentPart==='p3'?promptP3(qc,diff):promptP4(qc,diff),2500);
        total=currentData.sets.reduce((s,set)=>s+(set.questions?.length||0),0);
      }
      document.getElementById('loading-overlay').style.display='none';
      if(currentPart==='p2') area.appendChild(makeP2Block(currentData.items, spd));
      else currentData.sets.forEach(set=>area.appendChild(makeConvCard(set,currentPart,spd)));
    }
    initTutor();
    document.getElementById('action-btns').style.display='flex';
  }catch(e){
    document.getElementById('loading-overlay').style.display='none';
    area.innerHTML=`<div style="padding:32px;text-align:center;color:var(--text-muted)">⚠️ ${lang==='ko'?'생성 실패. 다시 시도해주세요.':'Generation failed. Please try again.'}<br><small>${e.message||''}</small></div>`;
    console.error(e);
  }
  isLoading=false;
  document.getElementById('gen-btn').disabled=false;
}

// ── 프롬프트 ──────────────────────────────────────────────────────────────
function promptP1One(id,diff){
  const answerPos=Math.floor(Math.random()*4); // 정답 위치 랜덤 (0~3)
  return `Generate exactly 1 TOEIC Part 1 Photograph question. Difficulty: ${diff}.
The correct answer MUST be at index ${answerPos} (0=A, 1=B, 2=C, 3=D).
Return ONLY a JSON object (no markdown):
{"id":${id},"imagePrompt":"vivid realistic TOEIC photo scene for image generation (e.g. two people at office desk, chef cooking in kitchen, passengers at bus stop)","choices":["(A) description...","(B) description...","(C) description...","(D) description..."],"answer":${answerPos},"explanation":"${lang==='ko'?'정답 해설 한국어로 (왜 정답이고 나머지는 왜 오답인지)':'Explain why the correct answer is right and others are wrong'}"}
CRITICAL RULES:
- "answer" field MUST be exactly ${answerPos}
- choices[${answerPos}] = the ONE correct description of the photo
- other 3 choices = plausible but WRONG descriptions
- NO "audioScript" field needed
- imagePrompt must match the correct choice (choices[${answerPos}])`;}

function promptP2(count,diff){
  return `Generate ${count} TOEIC Part 2 Question-Response items. Difficulty: ${diff}.
Return ONLY JSON (no markdown):
{"part":"Part 2","items":[{"id":1,"question":"Spoken question text","choices":["(A) ...","(B) ...","(C) ..."],"answer":0,"explanation":"${lang==='ko'?'해설 (한국어)':'Explanation'}"}]}
Rules: 3 choices (A/B/C). answer is 0-based index.`;}

function promptP3(count,diff){
  return `Generate ${count} TOEIC Part 3 Conversation set(s). Difficulty: ${diff}. Each set: dialogue (3–5 lines) + exactly 3 questions.
Return ONLY JSON (no markdown):
{"part":"Part 3","sets":[{"id":1,"context":"Brief context","dialogue":[{"speaker":"Man","line":"..."},{"speaker":"Woman","line":"..."}],"questions":[{"id":1,"text":"...","choices":["(A)...","(B)...","(C)...","(D)..."],"answer":0,"explanation":"${lang==='ko'?'해설':'Explanation'}"}]}]}`;}

function promptP4(count,diff){
  return `Generate ${count} TOEIC Part 4 Talk set(s). Difficulty: ${diff}. Each set: monologue (3–5 sentences) + exactly 3 questions.
Return ONLY JSON (no markdown):
{"part":"Part 4","sets":[{"id":1,"talkType":"Announcement","script":"Full monologue text...","questions":[{"id":1,"text":"...","choices":["(A)...","(B)...","(C)...","(D)..."],"answer":0,"explanation":"${lang==='ko'?'해설':'Explanation'}"}]}]}`;}

// ── Part 1 카드 ──────────────────────────────────────────────────────────
function makeP1Card(item, spd){
  const div=document.createElement('div');
  div.innerHTML=`
    <div class="photo-card">
      <div class="photo-wrap">
        <img id="img-${item.id}" src="" alt="" style="opacity:0;transition:opacity 0.4s;" onload="this.style.opacity=1">
        <div class="photo-loading" id="imgl-${item.id}"><div class="photo-spinner"></div><span>${lang==='ko'?'이미지 로딩 중…':'Loading image…'}</span></div>
      </div>
      <div class="photo-caption">📸 ${lang==='ko'?'사진을 보고 올바른 묘사를 고르세요':'Look at the photo and choose the best description'}</div>
    </div>
    <div class="audio-card">
      <div class="ac-header">
        <div class="ac-title">🎧 <span>Question ${item.id}</span> <span class="ac-badge">Part 1</span></div>
        <div class="ac-note">${lang==='ko'?'재생 버튼을 눌러 음성을 들으세요':'Press play to listen'}</div>
      </div>
      <div class="player-row">
        <button class="play-btn" id="pbtn-${item.id}" onclick="playP1(${item.id})">
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <div class="player-info">
          <div class="player-label">${lang==='ko'?'▶ 버튼을 눌러 음성을 들으세요':'▶ Press play to listen'}</div>
          <div class="player-bar"><div class="player-fill" id="pfill-${item.id}"></div></div>
        </div>
        <button class="speed-btn" id="pspd-${item.id}" onclick="cycleSpd('pspd-${item.id}')">${spd}x</button>
      </div>
    </div>
    <div class="questions-section">
      <div class="qs-header">
        <div class="qs-title">✏️ ${lang==='ko'?'선택지':'Choices'}</div>
        <div class="qs-note" id="p1hint-${item.id}">${lang==='ko'?'▶ 재생 후 선택 가능':'▶ Unlocks after playing'}</div>
      </div>
      <div id="p1choices-${item.id}" class="choices-locked p1-choice-grid">
        ${item.choices.map((c,i)=>`
          <button class="p1-choice-btn" onclick="ansP1(${item.id},${i},this,${item.answer},'${esc(item.explanation)}')" data-text="${c}">
            ${'ABCD'[i]}
          </button>`).join('')}
      </div>
      <div class="q-feedback" id="p1fb-${item.id}"></div>
    </div>`;
  return div;
}

function playP1(id){
  const item=currentData?.items?.find(i=>i.id===id); if(!item) return;
  const btn=document.getElementById('pbtn-'+id);
  const fill=document.getElementById('pfill-'+id);
  const spd=parseFloat(document.getElementById('pspd-'+id)?.textContent)||1.0;

  // 전역 TTS 중지
  stopTTS();

  btn.innerHTML='<svg viewBox="0 0 24 24" fill="#fff"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';

  // A→B→C→D 순서로 읽기 (정답 노출 없음)
  const letters=['A','B','C','D'];
  const queue=item.choices.map((c,i)=>letters[i]+'. '+c);
  const vs=speechSynthesis.getVoices();
  const ev=vs.find(v=>v.lang.startsWith('en-US'))||vs.find(v=>v.lang.startsWith('en'));

  // 각 문제 독립 플래그 (전역 ttsActive 충돌 방지)
  let active=true;
  ttsActive=true;

  function done(){
    active=false; ttsActive=false;
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
    fill.style.width='100%';
    unlockP1(id);
  }

  function speak(qi){
    if(!active || qi>=queue.length){ done(); return; }
    fill.style.width=(qi/queue.length*100)+'%';

    // 현재 재생 중 버튼 강조
    const choicesEl=document.getElementById('p1choices-'+id);
    if(choicesEl) choicesEl.querySelectorAll('.p1-choice-btn').forEach((b,i)=>b.classList.toggle('playing',i===qi));

    const u=new SpeechSynthesisUtterance(queue[qi]);
    u.lang='en-US'; u.rate=spd;
    if(ev) u.voice=ev;

    // onend 대신 setTimeout 폴백 포함 (Chrome onend 버그 대비)
    let ended=false;
    function next(){ if(ended) return; ended=true; speak(qi+1); }
    u.onend=next;
    // 최대 대기 시간: 텍스트 길이 * 700ms / rate (여유 2배)
    const maxWait=Math.ceil(queue[qi].length/5*700/spd)*2+1500;
    setTimeout(next, maxWait);

    speechSynthesis.speak(u);
  }
  speak(0);
}

function unlockP1(id){
  const el=document.getElementById('p1choices-'+id);
  const hint=document.getElementById('p1hint-'+id);
  if(el){
    el.classList.remove('choices-locked');
    // opacity/pointer-events 직접 설정 (클래스 방식 보완)
    el.style.opacity='1';
    el.style.pointerEvents='auto';
    el.style.filter='none';
    el.querySelectorAll('.p1-choice-btn').forEach(b=>b.classList.remove('playing'));
  }
  if(hint) hint.style.display='none';
}

function ansP1(id,idx,btn,answer,expl){
  const opts=document.getElementById('p1choices-'+id)?.querySelectorAll('.p1-choice-btn'); if(!opts) return;
  opts.forEach(b=>{b.disabled=true; b.classList.remove('playing');});
  opts[answer].classList.add('correct');
  if(idx!==answer) btn.classList.add('wrong');
  const fb=document.getElementById('p1fb-'+id);
  // 정답/오답 피드백에 실제 텍스트 표시
  const correctText=opts[answer].getAttribute('data-text')||'';
  fb.innerHTML=(idx===answer
    ? `✅ 정답! <strong>${'ABCD'[answer]}.</strong> ${correctText}<br><small>${expl}</small>`
    : `❌ 오답. 정답은 <strong>${'ABCD'[answer]}.</strong> ${correctText}<br><small>${expl}</small>`);
  fb.className='q-feedback show '+(idx===answer?'correct':'wrong');
  answered++; if(idx===answer) correct++;
  checkDone();
}

// ── Part 2 카드 ──────────────────────────────────────────────────────────
function makeP2Block(items, spd){
  const wrap=document.createElement('div');
  wrap.innerHTML=`<div class="audio-card" style="margin-bottom:0;">
    <div class="ac-header"><div class="ac-title">💬 Part 2 — Question-Response <span class="ac-badge">${items.length} ${lang==='ko'?'문제':'Questions'}</span></div></div>
    <div id="p2list"></div></div>`;
  const list=wrap.querySelector('#p2list');
  items.forEach(item=>{
    const d=document.createElement('div');
    d.className='q-item';
    d.style.marginBottom='14px';

    // 플레이어 행
    const playerRow=document.createElement('div');
    playerRow.className='player-row'; playerRow.style.marginBottom='10px';
    const playBtnEl=document.createElement('button');
    playBtnEl.className='play-btn'; playBtnEl.style.cssText='width:36px;height:36px;';
    playBtnEl.id='p2btn-'+item.id;
    playBtnEl.innerHTML='<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
    playBtnEl.addEventListener('click',()=>playP2(item.id));
    const infoDiv=document.createElement('div'); infoDiv.className='player-info';
    infoDiv.innerHTML=`<div class="player-label">${lang==='ko'?'질문을 듣고 응답을 고르세요':'Listen and choose the best response'}</div><div class="player-bar"><div class="player-fill" id="p2fill-${item.id}"></div></div>`;
    const spdBtn=document.createElement('button'); spdBtn.className='speed-btn';
    spdBtn.id='p2spd-'+item.id; spdBtn.textContent=spd+'x';
    spdBtn.addEventListener('click',()=>cycleSpd('p2spd-'+item.id));
    playerRow.append(playBtnEl, infoDiv, spdBtn);

    // 번호
    const qNum=document.createElement('div'); qNum.className='q-num';
    qNum.textContent='Question '+item.id;

    // 선택지 — addEventListener로 안전하게
    const optsDiv=document.createElement('div'); optsDiv.className='q-opts'; optsDiv.id='p2opts-'+item.id;
    item.choices.forEach((c,i)=>{
      const btn=document.createElement('button'); btn.className='q-opt';
      btn.innerHTML=`<span class="q-opt-ltr">${'ABC'[i]}</span><span>${c}</span>`;
      btn.addEventListener('click',()=>ansP2(item.id,i,btn,item.answer,item.explanation));
      optsDiv.appendChild(btn);
    });

    const fb=document.createElement('div'); fb.className='q-feedback'; fb.id='p2fb-'+item.id;
    d.append(qNum, playerRow, optsDiv, fb);
    list.appendChild(d);
  });
  return wrap;
}

function playP2(id){
  const item=currentData?.items?.find(i=>i.id===id); if(!item) return;
  const btn=document.getElementById('p2btn-'+id), fill=document.getElementById('p2fill-'+id);
  const spd=parseFloat(document.getElementById('p2spd-'+id)?.textContent)||1.0;
  stopTTS();
  btn.innerHTML='<svg viewBox="0 0 24 24" fill="#fff"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  const u=new SpeechSynthesisUtterance(item.question); u.lang='en-US'; u.rate=spd;
  const vs=speechSynthesis.getVoices(), ev=vs.find(v=>v.lang.startsWith('en-US'))||vs.find(v=>v.lang.startsWith('en'));
  if(ev) u.voice=ev;
  u.onboundary=e=>{ if(e.name==='word') fill.style.width=Math.min(100,e.charIndex/item.question.length*100)+'%'; };
  u.onend=()=>{ btn.innerHTML='<svg viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg>'; fill.style.width='100%'; ttsActive=false; };
  speechSynthesis.speak(u); ttsActive=true;
}

function ansP2(id,idx,btn,answer,expl){
  const opts=document.getElementById('p2opts-'+id)?.querySelectorAll('.q-opt'); if(!opts) return;
  opts.forEach(b=>b.disabled=true);
  opts[answer].classList.add('correct');
  if(idx!==answer) btn.classList.add('wrong');
  const fb=document.getElementById('p2fb-'+id);
  fb.textContent=expl; fb.className='q-feedback show '+(idx===answer?'correct':'wrong');
  answered++; if(idx===answer) correct++;
  checkDone();
}

// ── Part 3 / 4 카드 ───────────────────────────────────────────────────────
function makeConvCard(set, partKey, spd){
  const isP3=partKey==='p3';
  const lines=isP3 ? set.dialogue : [{speaker:set.talkType||'Narrator',line:set.script}];
  const scriptHtml=lines.map((l,i)=>`
    <div class="sl" id="sl-${set.id}-${i}" onclick="playFrom(${set.id},'${partKey}',${i})">
      <span class="sl-spk">${l.speaker}</span>
      <span class="sl-txt">${l.line}</span>
    </div>`).join('');
  // Part 3/4 선택지: addEventListener로 안전하게 (특수문자 onclick 깨짐 방지)
  function buildQItems(container){
    set.questions.forEach(q=>{
      const qDiv=document.createElement('div'); qDiv.className='q-item';
      const qNum=document.createElement('div'); qNum.className='q-num'; qNum.textContent='Q'+q.id;
      const qText=document.createElement('div'); qText.className='q-text'; qText.textContent=q.text;
      const optsDiv=document.createElement('div'); optsDiv.className='q-opts'; optsDiv.id='qopts-'+set.id+'-'+q.id;
      q.choices.forEach((c,i)=>{
        const btn=document.createElement('button'); btn.className='q-opt';
        btn.innerHTML='<span class="q-opt-ltr">'+('ABCD'[i])+'</span><span>'+c+'</span>';
        btn.addEventListener('click',()=>ansConv(set.id,q.id,i,btn,q.answer,q.explanation));
        optsDiv.appendChild(btn);
      });
      const fb=document.createElement('div'); fb.className='q-feedback'; fb.id='cfb-'+set.id+'-'+q.id;
      qDiv.append(qNum, qText, optsDiv, fb);
      container.appendChild(qDiv);
    });
  }
  const qHtml=''; // 더미 (아래 div.appendChild 후 buildQItems 호출)

  // 카드 전체를 createElement로 구성 (onclick 문자열 사용 안 함)
  const div=document.createElement('div');

  // 스크립트 카드
  const scriptCard=document.createElement('div'); scriptCard.className='script-card';
  const hdr=document.createElement('div'); hdr.className='script-header';
  const ttl=document.createElement('div'); ttl.className='script-title';
  ttl.innerHTML=(isP3?'🗣️':'📢')+' '+(isP3?(lang==='ko'?'대화 '+set.id:'Conversation '+set.id):((set.talkType||'Talk')+' '+set.id))+' <span class="ac-badge">'+(isP3?'Part 3':'Part 4')+'</span>';
  const togBtn=document.createElement('button'); togBtn.className='script-toggle';
  togBtn.textContent=lang==='ko'?'스크립트 보기':'Show Script';
  togBtn.addEventListener('click',function(){ toggleScript('slines-'+set.id,this); });
  hdr.append(ttl, togBtn);

  const playerRow=document.createElement('div'); playerRow.className='script-player-row';
  const playBtn=document.createElement('button'); playBtn.className='play-btn'; playBtn.style.cssText='width:36px;height:36px;';
  playBtn.id='scbtn-'+set.id;
  playBtn.innerHTML='<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  playBtn.addEventListener('click',()=>playSet(set.id,partKey));
  const pInfo=document.createElement('div'); pInfo.className='player-info';
  pInfo.innerHTML='<div class="player-label">'+(isP3?(lang==='ko'?set.context||'대화를 들으세요':set.context||'Listen'):(lang==='ko'?'담화를 들으세요':'Listen to the talk'))+'</div><div class="player-bar"><div class="player-fill" id="scfill-'+set.id+'"></div></div>';
  const spdBtn=document.createElement('button'); spdBtn.className='speed-btn'; spdBtn.id='scspd-'+set.id; spdBtn.textContent=spd+'x';
  spdBtn.addEventListener('click',()=>cycleSpd('scspd-'+set.id));
  playerRow.append(playBtn, pInfo, spdBtn);

  const linesDiv=document.createElement('div'); linesDiv.className='script-lines'; linesDiv.id='slines-'+set.id;
  linesDiv.innerHTML=scriptHtml;
  scriptCard.append(hdr, playerRow, linesDiv);

  // 문제 섹션
  const qSection=document.createElement('div'); qSection.className='questions-section';
  buildQItems(qSection);

  div.append(scriptCard, qSection);
  return div;
}

function toggleScript(id, btn){
  const el=document.getElementById(id); if(!el) return;
  const open=el.classList.toggle('open');
  btn.textContent=open?(lang==='ko'?'스크립트 숨기기':'Hide Script'):(lang==='ko'?'스크립트 보기':'Show Script');
}

function playSet(setId, partKey){
  const sets=currentData?.sets; if(!sets) return;
  const set=sets.find(s=>s.id===setId||s.id==setId); if(!set) return;
  const spd=parseFloat(document.getElementById('scspd-'+setId)?.textContent)||1.0;
  stopTTS();
  if(set.dialogue) playDialogue(set, 0, spd);
  else playMonologue(set, spd);
}

function playFrom(setId, partKey, lineIdx){
  const sets=currentData?.sets; if(!sets) return;
  const set=sets.find(s=>s.id===setId||s.id==setId); if(!set||!set.dialogue) return;
  const spd=parseFloat(document.getElementById('scspd-'+setId)?.textContent)||1.0;
  stopTTS();
  playDialogue(set, lineIdx, spd);
}

function playDialogue(set, idx, spd){
  if(idx>=set.dialogue.length){ ttsActive=false; hlLine(set.id,-1); return; }
  hlLine(set.id, idx);
  const fill=document.getElementById('scfill-'+set.id);
  if(fill) fill.style.width=(idx/set.dialogue.length*100)+'%';
  const line=set.dialogue[idx];
  const u=new SpeechSynthesisUtterance(line.line); u.lang='en-US'; u.rate=spd;
  const vs=speechSynthesis.getVoices();
  const fv=vs.find(v=>v.lang.startsWith('en')&&(v.name.includes('Female')||v.name.includes('Samantha')||v.name.includes('Karen')));
  const mv=vs.find(v=>v.lang.startsWith('en')&&(v.name.includes('Male')||v.name.includes('Daniel')||v.name.includes('David')));
  const ev=vs.find(v=>v.lang.startsWith('en'));
  if(line.speaker==='Woman'&&fv) u.voice=fv;
  else if(line.speaker==='Man'&&mv) u.voice=mv;
  else if(ev) u.voice=ev;
  u.onend=()=>{ if(ttsActive) playDialogue(set, idx+1, spd); };
  speechSynthesis.speak(u); ttsActive=true;
}

function playMonologue(set, spd){
  const fill=document.getElementById('scfill-'+set.id);
  hlLine(set.id, 0);
  const u=new SpeechSynthesisUtterance(set.script||''); u.lang='en-US'; u.rate=spd;
  const vs=speechSynthesis.getVoices(), ev=vs.find(v=>v.lang.startsWith('en-US'))||vs.find(v=>v.lang.startsWith('en'));
  if(ev) u.voice=ev;
  u.onboundary=e=>{ if(e.name==='word'&&fill) fill.style.width=Math.min(100,e.charIndex/(set.script||'').length*100)+'%'; };
  u.onend=()=>{ ttsActive=false; hlLine(set.id,-1); if(fill) fill.style.width='100%'; };
  speechSynthesis.speak(u); ttsActive=true;
}

function hlLine(setId, idx){
  document.querySelectorAll(`[id^="sl-${setId}-"]`).forEach(el=>el.classList.remove('active'));
  if(idx>=0){ const el=document.getElementById(`sl-${setId}-${idx}`); if(el) el.classList.add('active'); }
}

function ansConv(setId, qId, idx, btn, answer, expl){
  const key=setId+'-'+qId;
  const opts=document.getElementById('qopts-'+key)?.querySelectorAll('.q-opt'); if(!opts) return;
  if(opts[0]?.disabled) return; // 이미 답변됨
  opts.forEach(b=>b.disabled=true);
  opts[answer].classList.add('correct');
  if(idx!==answer) btn.classList.add('wrong');
  const fb=document.getElementById('cfb-'+key);
  if(fb){ fb.textContent=expl; fb.className='q-feedback show '+(idx===answer?'correct':'wrong'); }
  answered++; if(idx===answer) correct++;
  checkDone();
}

// ── TTS 유틸 ─────────────────────────────────────────────────────────────
function stopTTS(){ speechSynthesis.cancel(); ttsActive=false; }
function cycleSpd(btnId){
  const btn=document.getElementById(btnId); if(!btn) return;
  const cur=parseFloat(btn.textContent);
  const i=SPEEDS.indexOf(cur);
  btn.textContent=SPEEDS[(i+1)%SPEEDS.length]+'x';
}

// ── 점수 ─────────────────────────────────────────────────────────────────
function checkDone(){
  if(answered<total) return;
  const pct=Math.round(correct/total*100);
  const sc=document.getElementById('score-card');
  sc.style.display='block';
  document.getElementById('sc-score').textContent=`${correct}/${total}`;
  document.getElementById('sc-pct').textContent=`${pct}%`;
  document.getElementById('sc-msg').textContent=
    pct>=80?(lang==='ko'?'🎉 훌륭합니다!':'🎉 Excellent!'):
    pct>=60?(lang==='ko'?'👍 잘 하셨습니다!':'👍 Good job!'):
    (lang==='ko'?'💪 다시 도전해보세요!':'💪 Keep practicing!');
  sc.scrollIntoView({behavior:'smooth',block:'center'});
}

// ── AI 튜터 ───────────────────────────────────────────────────────────────
function initTutor(){
  messages=[];
  document.getElementById('tutor-messages').innerHTML='';
  const p=PARTS[currentPart];
  addMsg('ai', lang==='ko'
    ?`안녕하세요! 👋 **${p.ko}** 준비 완료!\n\n${p.tipKo}\n\n모르는 내용은 언제든 질문하세요!`
    :`Hi! 👋 **${p.en}** is ready!\n\n${p.tipEn}\n\nAsk me anything about this content!`);
  const qs=lang==='ko'
    ?['이 문제 해설해줘','발음 팁 알려줘','어휘 설명해줘']
    :['Explain this question','Pronunciation tips','Explain vocabulary'];
  document.getElementById('quick-questions').innerHTML=qs.map(q=>`<button class="quick-btn" onclick="askQ(this)">${q}</button>`).join('');
  document.getElementById('tutor-section').style.display='block';
}
function askQ(btn){ document.getElementById('user-input').value=btn.textContent; sendMsg(); }
async function sendMsg(){
  if(isLoading) return;
  const inp=document.getElementById('user-input');
  const text=inp.value.trim(); if(!text) return;
  inp.value=''; addMsg('user',text); messages.push({role:'user',content:text});
  document.getElementById('send-btn').disabled=true;
  document.getElementById('tutor-status').textContent=lang==='ko'?'답변 작성 중...':'Typing...';
  const tid=showTyping();
  const sys=lang==='ko'
    ?`당신은 TOEIC 듣기 전문 튜터입니다. 현재: ${PARTS[currentPart].ko}. 한국어로 간결하게 답하세요.`
    :`You are a TOEIC Listening expert tutor. Current: ${PARTS[currentPart].en}. Be concise and helpful.`;
  try{
    const r=await fetch('/api/claude',{method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:500,system:sys,messages:messages.slice(-6)})});
    const d=await r.json(); removeTyping(tid);
    if(d.content?.[0]){ const rep=d.content[0].text; messages.push({role:'assistant',content:rep}); addMsg('ai',rep); }
  }catch(e){ removeTyping(tid); addMsg('ai','⚠️ Error'); }
  document.getElementById('send-btn').disabled=false;
  document.getElementById('tutor-status').textContent=lang==='ko'?'도움 준비 완료':'Ready to help';
}
function addMsg(role,text){
  const wrap=document.getElementById('tutor-messages');
  const d=document.createElement('div'); d.className=`msg ${role}`;
  d.innerHTML=`<div class="msg-av ${role}">${role==='ai'?'🤖':'👤'}</div><div class="msg-bub">${text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>`;
  wrap.appendChild(d); wrap.scrollTop=wrap.scrollHeight;
}
function showTyping(){
  const wrap=document.getElementById('tutor-messages');
  const id='t'+Date.now(); const d=document.createElement('div'); d.className='msg ai'; d.id=id;
  d.innerHTML=`<div class="msg-av ai">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
  wrap.appendChild(d); wrap.scrollTop=wrap.scrollHeight; return id;
}
function removeTyping(id){ const e=document.getElementById(id); if(e) e.remove(); }

function esc(s){ return (s||'').replace(/'/g,"&#39;").replace(/"/g,'&quot;').slice(0,300); }

// ── Init ──────────────────────────────────────────────────────────────────
(function(){
  let saved; try{saved=localStorage.getItem('lw-lang');}catch(e){}
  setLang(saved||((navigator.language||'').startsWith('ko')?'ko':'en'));
  renderPartInfo();
})();
</script>
