<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — General Deutsch — Lesen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --de-blue:#003b8e;--de-blue-light:#e8edf8;--de-gold:#f5c400;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --green:#16a34a;--green-light:#dcfce7;
  --red:#e24b4a;--red-light:#fee2e2;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:860px;margin:0 auto;padding:28px 5% 80px;}

.hero{background:linear-gradient(135deg,#1a1a1a 0%,#3d3d3d 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.06);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.6);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}

.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:130px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}

.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--de-blue);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:#002a6e;}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}

.loading{padding:40px;text-align:center;background:var(--white);border:0.5px solid var(--border);border-radius:14px;margin-bottom:16px;display:none;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--de-blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

.card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.card-head{padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-title{font-size:13px;font-weight:600;color:var(--text);}
.card-body{padding:20px;}

.pm-badge{font-size:11px;padding:3px 10px;border-radius:8px;font-weight:600;}
.pm-level{background:var(--de-blue-light);color:var(--de-blue);}
.pm-type{background:var(--teal-light);color:var(--teal-mid);}
.pm-words{background:var(--bg);color:var(--text-muted);border:0.5px solid var(--border);}

.passage-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin-bottom:12px;line-height:1.4;}
.passage-body{font-size:15px;line-height:2.0;color:var(--text);white-space:pre-line;}

/* AI 튜터 */
.tutor-box{background:var(--de-blue-light);border:0.5px solid rgba(0,59,142,0.2);border-radius:10px;padding:14px;margin-top:14px;}
.tutor-label{font-size:12px;font-weight:700;color:var(--de-blue);margin-bottom:8px;}
.quick-asks{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.qa-btn{padding:5px 12px;border-radius:16px;font-size:11px;border:0.5px solid rgba(0,59,142,0.25);background:transparent;color:var(--de-blue);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.qa-btn:hover{background:var(--de-blue);color:#fff;}
.tutor-input{display:flex;gap:8px;margin-bottom:8px;}
.tutor-input input{flex:1;padding:8px 12px;border:0.5px solid var(--border-md);border-radius:8px;font-size:13px;font-family:inherit;outline:none;}
.tutor-input input:focus{border-color:var(--de-blue);}
.tutor-input button{padding:8px 16px;border-radius:8px;background:var(--de-blue);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;}
.tutor-response{font-size:13px;color:var(--text);line-height:1.65;background:var(--white);padding:10px 12px;border-radius:8px;display:none;}

/* 어휘 */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.vocab-item{background:var(--bg);border-radius:8px;padding:10px;cursor:pointer;transition:all 0.2s;border:0.5px solid var(--border);}
.vocab-item:hover{border-color:var(--de-blue);}
.vocab-word{font-weight:700;font-size:15px;color:var(--text);margin-bottom:2px;}
.vocab-article{font-size:11px;color:var(--de-blue);font-weight:600;margin-bottom:2px;}
.vocab-pos{font-size:11px;color:var(--text-light);font-style:italic;}
.vocab-ko{font-size:12px;color:var(--de-blue);font-weight:600;margin-top:4px;}

/* 문제 */
.q-item{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px;}
.q-item:last-child{margin-bottom:0;}
.q-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.6;}
.q-options{display:flex;flex-direction:column;gap:6px;}
.opt-btn{padding:10px 14px;border-radius:8px;font-size:13px;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);cursor:pointer;font-family:inherit;transition:all 0.2s;text-align:left;line-height:1.5;}
.opt-btn:hover:not(:disabled){border-color:var(--de-blue);color:var(--de-blue);}
.opt-btn.correct{background:var(--green-light);border-color:var(--green);color:var(--green);}
.opt-btn.wrong{background:var(--red-light);border-color:var(--red);color:var(--red);}
.feedback{font-size:12px;padding:8px 10px;border-radius:6px;display:none;margin-top:6px;line-height:1.5;}
.feedback.show.correct{display:block;background:var(--green-light);color:#166534;}
.feedback.show.wrong{display:block;background:var(--red-light);color:#991b1b;}

.score-bar{display:flex;align-items:center;gap:12px;background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:none;}
.sb-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--de-blue);}
.sb-bar{flex:1;height:6px;background:var(--bg);border-radius:6px;overflow:hidden;}
.sb-fill{height:100%;background:linear-gradient(90deg,#002a6e,var(--de-blue));border-radius:6px;transition:width 0.3s;}
.result-box{background:var(--white);border:0.5px solid var(--border);border-radius:14px;padding:28px;text-align:center;display:none;margin-bottom:16px;}
.action-btns{display:flex;gap:10px;}
.act-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-md);background:var(--white);color:var(--text);transition:all 0.2s;text-decoration:none;text-align:center;}
.act-btn.primary{background:var(--de-blue);color:#fff;border-color:var(--de-blue);}
.act-btn.primary:hover{background:#002a6e;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.3s ease forwards;}
</style>
</head>
<body>
<nav>
  <a href="../../index.html" class="nav-logo"><div class="nav-lm">LW</div><span class="nav-lt">LinguaWalk</span></a>
  <div class="nav-sep"></div>
  <span class="nav-page" data-ko="General 독일어 · 읽기" data-de="Allgemeines Deutsch · Lesen">General 독일어 · 읽기</span>
  <div class="nav-space"></div>
  <a href="../../index.html" class="nav-back" data-ko="← General 홈" data-de="← Startseite">← General 홈</a>
  <div class="lang-sw">
    <button class="lbtn act" onclick="setLang('ko')" id="btn-ko">한국어</button>
    <button class="lbtn" onclick="setLang('de')" id="btn-de">Deutsch</button>
  </div>
</nav>

<div class="main">
  <div class="hero fade-in">
    <div class="hero-tag" data-ko="GENERAL 독일어 · 읽기" data-de="ALLGEMEINES DEUTSCH · LESEN">GENERAL 독일어 · 읽기</div>
    <div class="hero-title" data-ko="📖 독일어 읽기 연습" data-de="📖 Deutsches Leseverständnis">📖 독일어 읽기 연습</div>
    <div class="hero-desc" data-ko="AI가 생성한 독일어 지문을 읽고 이해도 문제에 답하세요. AI 튜터에게 독일어 문법과 표현을 물어보세요." data-de="Lesen Sie KI-generierte deutsche Texte und beantworten Sie Verständnisfragen. Fragen Sie den KI-Tutor zur Grammatik.">AI가 생성한 독일어 지문 읽기 · AI 튜터 · 핵심 어휘.</div>
    <div class="hero-badges">
      <span class="hero-badge">A1 ~ C2</span>
      <span class="hero-badge" data-ko="다양한 텍스트 유형" data-de="Verschiedene Textsorten">다양한 텍스트</span>
      <span class="hero-badge">🤖 KI-Tutor</span>
      <span class="hero-badge" data-ko="이해도 퀴즈" data-de="Verständnisquiz">퀴즈 4문제</span>
    </div>
  </div>

  <div class="settings-row fade-in">
    <div class="setting-item">
      <div class="si-label" data-ko="레벨" data-de="Niveau">레벨</div>
      <select class="si-select" id="sel-level">
        <option value="A1">A1 (Anfänger)</option>
        <option value="A2" selected>A2 (Grundkenntnisse)</option>
        <option value="B1">B1 (Mittelstufe)</option>
        <option value="B2">B2 (Gute Mittelstufe)</option>
        <option value="C1">C1 (Fortgeschritten)</option>
        <option value="C2">C2 (Meisterschaft)</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-ko="텍스트 유형" data-de="Textsorte">텍스트 유형</div>
      <select class="si-select" id="sel-type">
        <option value="Zeitungsartikel">기사 / Artikel</option>
        <option value="E-Mail oder Brief">이메일·편지 / E-Mail</option>
        <option value="Informationstext">설명문 / Informationstext</option>
        <option value="Tagebucheintrag oder Essay">일기·에세이 / Tagebuch</option>
        <option value="Anzeige oder Bekanntmachung">공지·광고 / Anzeige</option>
      </select>
    </div>
    <div class="setting-item">
      <div class="si-label" data-ko="주제" data-de="Thema">주제</div>
      <select class="si-select" id="sel-topic">
        <option value="Alltag und Familie">일상·가족 / Alltag</option>
        <option value="Arbeit und Beruf">직장 / Beruf</option>
        <option value="Reisen und Verkehr">여행 / Reisen</option>
        <option value="Kultur und Gesellschaft">문화·사회 / Kultur</option>
        <option value="Umwelt und Natur">환경 / Umwelt</option>
        <option value="Technologie">기술 / Technologie</option>
      </select>
    </div>
  </div>

  <button class="gen-btn fade-in" id="gen-btn" onclick="generate()">
    🤖 <span data-ko="독일어 읽기 지문 생성" data-de="Deutschen Lesetext generieren">독일어 읽기 지문 생성</span>
  </button>

  <div class="loading" id="loading"><div class="spinner"></div>
    <div id="loading-text" style="font-size:14px;color:var(--text-muted);">생성 중...</div>
  </div>

  <div class="score-bar" id="score-bar">
    <div><div class="sb-num" id="sb-num">0 / 0</div><div style="font-size:12px;color:var(--text-muted);" data-ko="정답" data-de="Richtig">정답</div></div>
    <div class="sb-bar"><div class="sb-fill" id="sb-fill" style="width:0%"></div></div>
  </div>

  <div id="content-area"></div>

  <div class="result-box fade-in" id="result-box">
    <div style="font-size:48px;margin-bottom:12px;" id="rb-icon">🎉</div>
    <div style="font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:6px;" id="rb-title"></div>
    <div style="font-size:16px;color:var(--de-blue);font-weight:600;" id="rb-score"></div>
  </div>

  <div class="action-btns" id="action-btns" style="display:none;">
    <button class="act-btn primary" onclick="generate()" data-ko="🔄 새 지문" data-de="🔄 Neuer Text">🔄 새 지문</button>
    <a href="../../index.html" class="act-btn" data-ko="← General 홈" data-de="← Startseite">← General 홈</a>
  </div>
</div>

<script>
var lang='ko', passageData=null;
var score=0, answered=0, totalQ=0;

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-ko][data-de]').forEach(function(el){
    var t=l==='ko'?el.getAttribute('data-ko'):el.getAttribute('data-de');
    if(t) el.innerHTML=t;
  });
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  document.getElementById('btn-de').classList.toggle('act',l==='de');
}

async function generate(){
  var level=document.getElementById('sel-level').value;
  var type=document.getElementById('sel-type').value;
  var topic=document.getElementById('sel-topic').value;
  var btn=document.getElementById('gen-btn');
  btn.disabled=true;
  document.getElementById('content-area').innerHTML='';
  document.getElementById('result-box').style.display='none';
  document.getElementById('score-bar').style.display='none';
  document.getElementById('action-btns').style.display='none';
  document.getElementById('loading').style.display='block';
  score=0; answered=0;

  var charCounts={A1:'60-100',A2:'100-160',B1:'160-240',B2:'240-360',C1:'360-500',C2:'500-700'};
  var wordCount=charCounts[level]||'150-250';
  var goethe='Goethe-Zertifikat '+level;

  var prompt='Generate a German reading comprehension text for level '+level+' CEFR ('+goethe+').\n'
    +'Text type: '+type+' / Topic: '+topic+' / Length: '+wordCount+' words\n\n'
    +'Return ONLY valid JSON object (no markdown, no backticks, single-line strings):\n'
    +'{"title":"Titel auf Deutsch","type":"'+type+'","level":"'+level+'","word_count":150,'
    +'"passage":"Vollstaendiger Text auf Deutsch (eine Zeile, keine Zeilenumbrueche)",'
    +'"questions":[{"question":"Frage auf Deutsch?","options":["A. Option","B. Option","C. Option","D. Option"],"answer":0,"explanation_ko":"한국어 해설"}],'
    +'"vocabulary":[{"word":"Wort","article":"der/die/das","pos":"Nomen","meaning_ko":"한국어 뜻"}]}\n'
    +'Rules: 4 comprehension questions, answers 0-based varying, 5 vocabulary items with article for nouns. All German in German. Single-line strings.';

  try{
    var res=await fetch('/api/claude',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:2500,
        messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var raw=data.content?.[0]?.text||'';
    var s=raw.replace(/```json|```/g,'').trim();
    var fi=s.indexOf('{'); var li=s.lastIndexOf('}');
    if(fi!==-1&&li!==-1) s=s.slice(fi,li+1);
    passageData=JSON.parse(s);
    totalQ=passageData.questions.length;
    document.getElementById('loading').style.display='none';
    renderReading();
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('content-area').innerHTML='<div style="text-align:center;padding:24px;color:var(--red)">⚠️ '+(lang==='ko'?'생성 실패':'Fehler')+'<br><small>'+e.message+'</small></div>';
    console.error(e);
  }
  btn.disabled=false;
}

function renderReading(){
  var d=passageData;
  document.getElementById('score-bar').style.display='flex';
  updateScore();
  var area=document.getElementById('content-area');
  var goethe='Goethe-Zertifikat '+(d.level||'');

  // 지문 카드
  var passCard=document.createElement('div'); passCard.className='card fade-in';
  var pHead=document.createElement('div'); pHead.className='card-head';
  pHead.innerHTML='<span class="card-title" data-ko="읽기 지문" data-de="Lesetext">'+(lang==='ko'?'읽기 지문':'Lesetext')+'</span>'
    +'<div style="display:flex;gap:6px;align-items:center;">'
    +'<span class="pm-badge pm-level">'+goethe+'</span>'
    +'<span class="pm-badge pm-type">'+(d.type||'')+'</span>'
    +'<span class="pm-badge pm-words">~'+(d.word_count||'?')+' Wörter</span></div>';
  var pBody=document.createElement('div'); pBody.className='card-body';
  var titleEl=document.createElement('div'); titleEl.className='passage-title'; titleEl.textContent=d.title||'';
  var passEl=document.createElement('div'); passEl.className='passage-body'; passEl.textContent=d.passage||'';

  // AI 튜터
  var tutorBox=document.createElement('div'); tutorBox.className='tutor-box';
  tutorBox.innerHTML='<div class="tutor-label">🤖 KI-Tutor — '+(lang==='ko'?'모르는 단어나 문법을 물어보세요':'Fragen Sie zur Grammatik und zu unbekannten Wörtern')+'</div>'
    +'<div class="quick-asks">'
    +'<button class="qa-btn" id="qa1">'+(lang==='ko'?'📝 요약':'📝 Zusammenfassung')+'</button>'
    +'<button class="qa-btn" id="qa2">'+(lang==='ko'?'📚 핵심 문법':'📚 Grammatik')+'</button>'
    +'<button class="qa-btn" id="qa3">'+(lang==='ko'?'🔤 핵심 표현':'🔤 Ausdrücke')+'</button>'
    +'</div>'
    +'<div class="tutor-input">'
    +'<input type="text" id="tutor-q" placeholder="'+(lang==='ko'?'예: "Konjunktiv"는 어떻게 쓰나요?':'z.B. Wie verwendet man den Konjunktiv?')+'">'
    +'<button onclick="askTutor()">'+(lang==='ko'?'질문':'Fragen')+'</button>'
    +'</div>'
    +'<div class="tutor-response" id="tutor-resp"></div>';

  // 빠른 버튼 이벤트
  tutorBox.querySelector('#qa1').addEventListener('click',function(){
    document.getElementById('tutor-q').value=lang==='ko'?'이 지문 요약해줘':'Fasse diesen Text zusammen';
    askTutor();
  });
  tutorBox.querySelector('#qa2').addEventListener('click',function(){
    document.getElementById('tutor-q').value=lang==='ko'?'어려운 문법 설명해줘':'Erklaere die schwierigen Grammatikpunkte';
    askTutor();
  });
  tutorBox.querySelector('#qa3').addEventListener('click',function(){
    document.getElementById('tutor-q').value=lang==='ko'?'핵심 표현 알려줘':'Welche Ausdruecke sind wichtig';
    askTutor();
  });

  pBody.append(titleEl,passEl,tutorBox);
  passCard.append(pHead,pBody);

  // 문제 카드
  var qCard=document.createElement('div'); qCard.className='card fade-in';
  var qHead=document.createElement('div'); qHead.className='card-head';
  qHead.innerHTML='<span class="card-title" data-ko="이해도 문제" data-de="Verstaendnisfragen">'+(lang==='ko'?'이해도 문제':'Verständnisfragen')+' ('+d.questions.length+')</span>';
  var qBody=document.createElement('div'); qBody.className='card-body';
  d.questions.forEach(function(q,i){
    var qDiv=document.createElement('div'); qDiv.className='q-item';
    var qTxt=document.createElement('div'); qTxt.className='q-text'; qTxt.textContent=(i+1)+'. '+q.question;
    var opts=document.createElement('div'); opts.className='q-options';
    q.options.forEach(function(o,oi){
      var btn=document.createElement('button'); btn.className='opt-btn'; btn.textContent=o;
      btn.addEventListener('click',function(){checkAnswer(btn,oi,q.answer,q.explanation_ko,i);});
      opts.appendChild(btn);
    });
    var fb=document.createElement('div'); fb.className='feedback'; fb.id='fb-'+i;
    qDiv.append(qTxt,opts,fb); qBody.appendChild(qDiv);
  });
  qCard.append(qHead,qBody);

  // 어휘 카드 (독일어 관사 포함)
  var vocabCard=document.createElement('div'); vocabCard.className='card fade-in';
  vocabCard.innerHTML='<div class="card-head"><span class="card-title" data-ko="핵심 어휘" data-de="Schluesselwoerter">'+(lang==='ko'?'핵심 어휘':'Schlüsselwörter')+'</span></div>'
    +'<div class="card-body"><div class="vocab-grid">'
    +(d.vocabulary||[]).map(function(v){
      return '<div class="vocab-item"><div class="vocab-word">'+v.word+'</div>'
        +(v.article?'<div class="vocab-article">'+v.article+'</div>':'')
        +'<div class="vocab-pos">'+(v.pos||'')+'</div>'
        +'<div class="vocab-ko">'+v.meaning_ko+'</div></div>';
    }).join('')
    +'</div></div>';

  area.append(passCard,qCard,vocabCard);
  document.getElementById('action-btns').style.display='flex';
}

function checkAnswer(btn,chosenIdx,answerIdx,explanation,qIdx){
  var container=btn.closest('.q-item');
  var allBtns=container.querySelectorAll('.opt-btn');
  if(allBtns[0]?.disabled) return;
  allBtns.forEach(function(b){b.disabled=true;});
  allBtns[answerIdx].classList.add('correct');
  var fb=document.getElementById('fb-'+qIdx);
  if(chosenIdx===answerIdx){
    btn.classList.add('correct');
    if(fb){fb.className='feedback show correct';fb.textContent='✓ '+explanation;}
    score++;
  } else {
    btn.classList.add('wrong');
    if(fb){fb.className='feedback show wrong';fb.textContent='✗ '+explanation;}
  }
  answered++; updateScore();
  if(answered===totalQ) setTimeout(showResult,800);
}

async function askTutor(){
  var q=document.getElementById('tutor-q').value.trim();
  if(!q||!passageData) return;
  var resp=document.getElementById('tutor-resp');
  resp.style.display='block';
  resp.textContent=lang==='ko'?'답변 생성 중...':'Antwort wird generiert...';
  try{
    var ctx=passageData.passage.substring(0,400);
    var sys=lang==='ko'
      ?'당신은 독일어 학습 AI 튜터입니다. 다음 독일어 지문에 대해 한국어로 친절하게 설명해주세요:\n\n"'+ctx+'"'
      :'Du bist ein KI-Tutor fuer Deutsch als Fremdsprache. Erklaere einfach auf Deutsch:\n\n"'+ctx+'"';
    var res=await fetch('/api/claude',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:500,
        messages:[{role:'user',content:sys+'\n\nFrage: '+q}]})});
    var data=await res.json();
    resp.textContent=data.content?.[0]?.text||'';
    document.getElementById('tutor-q').value='';
  }catch(e){
    resp.textContent=lang==='ko'?'답변 실패. 다시 시도해주세요.':'Fehler. Bitte erneut versuchen.';
  }
}

function updateScore(){
  var fill=document.getElementById('sb-fill');
  var num=document.getElementById('sb-num');
  if(fill) fill.style.width=`${totalQ>0?(answered/totalQ)*100:0}%`;
  if(num) num.textContent=score+' / '+totalQ;
}
function showResult(){
  var pct=Math.round(score/totalQ*100);
  var box=document.getElementById('result-box'); box.style.display='block';
  document.getElementById('rb-icon').textContent=pct>=80?'🎉':pct>=60?'👍':'💪';
  document.getElementById('rb-title').textContent=pct>=80?(lang==='ko'?'Ausgezeichnet!':'Ausgezeichnet!'):pct>=60?(lang==='ko'?'Gut gemacht!':'Gut gemacht!'):(lang==='ko'?'Weiter üben!':'Weiter üben!');
  document.getElementById('rb-score').textContent=score+' / '+totalQ+' ('+pct+'%)';
  box.scrollIntoView({behavior:'smooth',block:'center'});
}

(function(){ setLang('ko'); })();
</script>
</body>
</html>
