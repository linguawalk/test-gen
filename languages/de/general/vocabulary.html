<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — General Deutsch — Wortschatz & Grammatik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --de-blue:#003b8e;--de-blue-light:#e8edf8;--de-gold:#f5c400;
  --indigo:#4f46e5;--indigo-light:#eef2ff;
  --green:#16a34a;--green-light:#dcfce7;--green-dark:#14532d;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --red:#e24b4a;--red-light:#fee2e2;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:820px;margin:0 auto;padding:28px 5% 80px;}

.hero{background:linear-gradient(135deg,#1e1b4b 0%,var(--indigo) 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}

.mode-tabs{display:flex;background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:4px;margin-bottom:16px;gap:4px;}
.mode-tab{flex:1;padding:10px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-family:inherit;transition:all 0.2s;text-align:center;}
.mode-tab.act{background:var(--indigo);color:#fff;}
.mode-tab:hover:not(.act){color:var(--indigo);}

.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:120px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}

.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--indigo);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:#4338ca;}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}

.score-bar{display:flex;align-items:center;gap:12px;background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:none;}
.sb-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--indigo);}
.sb-bar{flex:1;height:6px;background:var(--bg);border-radius:6px;overflow:hidden;}
.sb-fill{height:100%;background:linear-gradient(90deg,#1e1b4b,var(--indigo));border-radius:6px;transition:width 0.3s;}

/* 플래시카드 */
.fc-wrap{perspective:1000px;margin-bottom:14px;}
.flashcard{width:100%;min-height:240px;position:relative;transform-style:preserve-3d;transition:transform 0.5s;cursor:pointer;border-radius:14px;}
.flashcard.flipped{transform:rotateY(180deg);}
.fc-front,.fc-back{position:absolute;inset:0;border-radius:14px;padding:28px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.fc-front{background:linear-gradient(135deg,#1e1b4b,var(--indigo));color:#fff;}
.fc-back{background:var(--white);border:0.5px solid var(--border);transform:rotateY(180deg);}
.fc-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:.6;margin-bottom:10px;}
.fc-word{font-family:'DM Serif Display',serif;font-size:38px;margin-bottom:4px;line-height:1.2;}
.fc-article{font-size:16px;color:var(--de-gold);font-weight:700;margin-bottom:4px;}
.fc-pos{font-size:12px;padding:3px 10px;border-radius:10px;background:rgba(255,255,255,0.2);display:inline-block;margin-bottom:12px;}
.fc-hint{font-size:12px;opacity:.55;margin-top:auto;}
.fc-def{font-size:15px;color:var(--text);margin-bottom:6px;line-height:1.5;font-weight:600;}
.fc-ko{font-size:15px;color:var(--indigo);font-weight:600;margin-bottom:8px;}
.fc-example{font-size:12px;color:var(--text-muted);line-height:1.65;background:var(--bg);padding:8px 12px;border-radius:8px;width:100%;text-align:left;font-style:italic;}
.fc-plural{font-size:11px;color:var(--de-blue);margin-top:6px;}
.nav-btns{display:flex;gap:10px;margin-top:8px;}
.nav-btn{flex:1;padding:12px;border-radius:10px;border:0.5px solid var(--border-md);background:var(--white);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.nav-btn:disabled{opacity:.4;cursor:default;}
.nav-btn.primary{background:var(--indigo);color:#fff;border-color:var(--indigo);}
.nav-btn.primary:hover{background:#4338ca;}

/* 퀴즈 */
.quiz-word{background:linear-gradient(135deg,#1e1b4b,var(--indigo));border-radius:14px;padding:28px;text-align:center;margin-bottom:14px;color:#fff;}
.qw-word{font-family:'DM Serif Display',serif;font-size:38px;margin-bottom:4px;line-height:1.2;}
.qw-article{font-size:14px;color:var(--de-gold);font-weight:700;margin-bottom:4px;}
.qw-pos{font-size:12px;padding:3px 10px;border-radius:10px;background:rgba(255,255,255,0.2);display:inline-block;margin-bottom:8px;}
.qw-label{font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.opt-btn{padding:12px 16px;border-radius:10px;border:1.5px solid var(--border-md);background:var(--white);font-size:13px;color:var(--text);cursor:pointer;font-family:inherit;transition:all 0.2s;text-align:left;line-height:1.5;}
.opt-btn:hover:not(:disabled){border-color:var(--indigo);background:var(--indigo-light);}
.opt-btn.correct{border-color:var(--green);background:var(--green-light);color:var(--green-dark);font-weight:500;}
.opt-btn.wrong{border-color:var(--red);background:var(--red-light);color:#991b1b;}

/* 단어 목록 */
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
.word-item{background:var(--bg);border-radius:10px;padding:12px;cursor:pointer;transition:all 0.2s;border:0.5px solid var(--border);}
.word-item:hover{border-color:var(--indigo);background:var(--indigo-light);}
.wi-word{font-size:16px;font-weight:700;color:var(--text);}
.wi-article{font-size:11px;color:var(--de-blue);font-weight:700;margin-bottom:2px;}
.wi-pos{font-size:11px;color:var(--text-light);font-style:italic;}
.wi-ko{font-size:12px;color:var(--indigo);font-weight:600;margin-top:4px;}

/* 문법 카드 */
.grammar-card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.gc-header{background:linear-gradient(135deg,#1e1b4b,var(--indigo));padding:20px 22px;color:#fff;}
.gc-pattern{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:4px;}
.gc-name{font-size:13px;opacity:.75;}
.gc-body{padding:18px;}
.gc-meaning{font-size:14px;color:var(--text);line-height:1.65;margin-bottom:14px;padding:10px 14px;background:var(--indigo-light);border-radius:8px;border-left:3px solid var(--indigo);}
.gc-meaning-ko{font-size:12px;color:var(--text-muted);margin-top:4px;}
.gc-examples-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:8px;}
.gc-example{display:flex;flex-direction:column;gap:3px;padding:8px 12px;background:var(--bg);border-radius:8px;margin-bottom:6px;}
.gc-ex-de{font-size:14px;color:var(--text);line-height:1.65;font-style:italic;}
.gc-ex-ko{font-size:12px;color:var(--text-muted);}

/* 문법 퀴즈 */
.gq-sentence{background:linear-gradient(135deg,#1e1b4b,var(--indigo));border-radius:14px;padding:24px;text-align:center;margin-bottom:14px;color:#fff;}
.gq-label{font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.gq-text{font-size:18px;line-height:1.9;margin-bottom:8px;}
.gq-ko{font-size:13px;opacity:.65;}
.blank{display:inline-block;width:72px;border-bottom:2px solid rgba(255,255,255,0.6);text-align:center;vertical-align:middle;}

.result-box{background:linear-gradient(135deg,#1e1b4b,var(--indigo));border-radius:14px;padding:32px;text-align:center;display:none;color:#fff;margin-top:16px;}
.rb-icon{font-size:48px;margin-bottom:12px;}
.rb-title{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:6px;}
.rb-score{font-size:18px;opacity:.8;margin-bottom:16px;}
.rb-btn{padding:12px 28px;border-radius:10px;background:rgba(255,255,255,0.15);color:#fff;border:0.5px solid rgba(255,255,255,0.3);cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;}

.card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.card-head{padding:14px 18px;border-bottom:0.5px solid var(--border);}
.card-title{font-size:13px;font-weight:600;color:var(--text);}
.card-body{padding:18px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.3s ease forwards;}
</style>
</head>
<body>
<nav>
  <a href="../../index.html" class="nav-logo"><div class="nav-lm">LW</div><span class="nav-lt">LinguaWalk</span></a>
  <div class="nav-sep"></div>
  <span class="nav-page" data-ko="General 독일어 · 어휘·문법" data-de="Allgemeines Deutsch · Wortschatz & Grammatik">General 독일어 · 어휘·문법</span>
  <div class="nav-space"></div>
  <a href="../../index.html" class="nav-back" data-ko="← General 홈" data-de="← Startseite">← General 홈</a>

<div class="main">
  <div class="hero fade-in">
    <div class="hero-tag" data-ko="GENERAL 독일어 · 어휘·문법" data-de="ALLGEMEINES DEUTSCH · WORTSCHATZ & GRAMMATIK">GENERAL 독일어 · 어휘·문법</div>
    <div class="hero-title" data-ko="📚 어휘·문법 학습" data-de="📚 Wortschatz & Grammatik">📚 어휘·문법 학습</div>
    <div class="hero-desc" data-ko="주제별 독일어 어휘(관사 포함)를 플래시카드로 외우고, 격변화·동사변화 등 핵심 문법을 학습하세요." data-de="Lernen Sie deutschen Wortschatz (mit Artikeln) mit Karteikarten und üben Sie Deklination, Konjugation und mehr.">주제별 어휘(관사) + 격변화·동사변화 문법 패턴.</div>
    <div class="hero-badges">
      <span class="hero-badge">A1 ~ C2</span>
      <span class="hero-badge" data-ko="🃏 플래시카드" data-de="🃏 Karteikarten">🃏 플래시카드</span>
      <span class="hero-badge" data-ko="📝 퀴즈" data-de="📝 Quiz">📝 퀴즈</span>
      <span class="hero-badge" data-ko="관사 포함" data-de="Mit Artikeln">관사 포함</span>
      <span class="hero-badge" data-ko="격변화·동사변화" data-de="Deklination · Konjugation">격변화·동사변화</span>
    </div>
  </div>

  <div class="mode-tabs fade-in">
    <button class="mode-tab act" onclick="setSection('vocab',this)" data-ko="📚 어휘" data-de="📚 Wortschatz">📚 어휘</button>
    <button class="mode-tab" onclick="setSection('grammar',this)" data-ko="📐 문법·구문" data-de="📐 Grammatik">📐 문법·구문</button>
  </div>

  <!-- 어휘 설정 -->
  <div id="vocab-settings">
    <div class="settings-row fade-in">
      <div class="setting-item">
        <div class="si-label" data-ko="레벨" data-de="Niveau">레벨</div>
        <select class="si-select" id="v-level">
          <option value="A1">A1</option>
          <option value="A2" selected>A2</option>
          <option value="B1">B1</option>
          <option value="B2">B2</option>
          <option value="C1">C1</option>
          <option value="C2">C2</option>
        </select>
      </div>
      <div class="setting-item">
        <div class="si-label" data-ko="주제" data-de="Thema">주제</div>
        <select class="si-select" id="v-topic">
          <option value="Alltag und Familie">일상·가족 / Alltag</option>
          <option value="Arbeit und Beruf">직장·직업 / Beruf</option>
          <option value="Reisen und Verkehr">여행·교통 / Reisen</option>

          <option value="Kultur und Freizeit">문화·여가 / Freizeit</option>
          <option value="Natur und Umwelt">자연·환경 / Natur</option>
          <option value="Technologie und Medien">기술·미디어 / Technologie</option>
          <option value="Gefuehle und Beziehungen">감정·관계 / Gefuehle</option>
        </select>
      </div>
      <div class="setting-item">
        <div class="si-label" data-ko="단어 수" data-de="Anzahl">단어 수</div>
        <select class="si-select" id="v-count">
          <option value="5">5</option>
          <option value="8" selected>8</option>
          <option value="10">10</option>
        </select>
      </div>
      <div class="setting-item">
        <div class="si-label" data-ko="학습 모드" data-de="Lernmodus">학습 모드</div>
        <select class="si-select" id="v-mode">
          <option value="flashcard" data-ko="🃏 플래시카드" data-de="🃏 Karteikarten">🃏 플래시카드</option>
          <option value="quiz" data-ko="📝 퀴즈" data-de="📝 Quiz">📝 퀴즈</option>
          <option value="list" data-ko="📋 단어 목록" data-de="📋 Wortliste">📋 목록</option>

    <button class="gen-btn fade-in" id="v-gen-btn" onclick="generateVocab()">
      🤖 <span data-ko="어휘 생성" data-de="Wortschatz generieren">어휘 생성</span>

  </div>

  <!-- 문법 설정 -->
  <div id="grammar-settings" style="display:none;">
    <div class="settings-row fade-in">

        <div class="si-label" data-ko="레벨" data-de="Niveau">레벨</div>
        <select class="si-select" id="g-level">
          <option value="A1">A1</option>
          <option value="A2" selected>A2</option>

          <option value="Deklination und Kasus">격변화 / Deklination</option>

<script>
var lang='ko', section='vocab';
var words=[], grammars=[];
var currentIdx=0, score=0, answered=0;
var lastGenFn=null;

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-ko][data-de]').forEach(function(el){
    var t=l==='ko'?el.getAttribute('data-ko'):el.getAttribute('data-de');
    if(t) el.innerHTML=t;
  });
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  document.getElementById('btn-de').classList.toggle('act',l==='de');
}

function setSection(s,btn){
  section=s;
  document.querySelectorAll('.mode-tab').forEach(function(b){b.classList.remove('act');});
  btn.classList.add('act');
  document.getElementById('vocab-settings').style.display=s==='vocab'?'block':'none';
  document.getElementById('grammar-settings').style.display=s==='grammar'?'block':'none';
  document.getElementById('content-area').innerHTML='';
  document.getElementById('result-box').style.display='none';
  document.getElementById('score-bar').style.display='none';
  words=[]; grammars=[]; currentIdx=0; score=0; answered=0;
}

function reGenerate(){if(lastGenFn) lastGenFn();}

function safeParseJSON(raw){
  var s=raw.replace(/```json|```/g,'').trim();
  var first=s.indexOf('['); var last=s.lastIndexOf(']');
  if(first!==-1&&last!==-1) s=s.slice(first,last+1);
  try{return JSON.parse(s);}catch(e1){}
  var clean='';
  for(var i=0;i<s.length;i++){
    var c=s.charCodeAt(i);
    if(c===10||c===13||c===9) clean+=' ';
    else if(c>=32) clean+=s[i];
  }
  try{return JSON.parse(clean);}catch(e2){}
  throw new Error('JSON parse failed');
}

/* ── 어휘 생성 ─────────────────────────────────────────────────── */
async function generateVocab(){
  lastGenFn=generateVocab;
  var level=document.getElementById('v-level').value;
  var topic=document.getElementById('v-topic').value;
  var count=document.getElementById('v-count').value;
  var mode=document.getElementById('v-mode').value;
  var btn=document.getElementById('v-gen-btn');
  btn.disabled=true;
  btn.innerHTML='⏳ <span>'+(lang==='ko'?'생성 중...':'Generierung...')+'</span>';
  document.getElementById('content-area').innerHTML='';
  document.getElementById('result-box').style.display='none';
  document.getElementById('score-bar').style.display='none';
  words=[]; currentIdx=0; score=0; answered=0;

  var goethe='Goethe-Zertifikat '+level;
  var prompt='Generate '+count+' German vocabulary words for level '+level+' ('+goethe+'). Topic: '+topic+'.\n'
    +'Return ONLY valid JSON array (no markdown, no backticks, single-line strings):\n'
    +'[{"word":"Wort","article":"der/die/das or empty","plural":"Plural form or empty","pos":"Nomen/Verb/Adjektiv/etc","meaning_de":"Bedeutung auf Deutsch","meaning_ko":"한국어 뜻","example_de":"Beispielsatz auf Deutsch.","example_ko":"예문 한국어 번역"}]\n'
    +'article: der/die/das for nouns, empty string for others. All German content in German. meaning_ko and example_ko in Korean. Single-line strings. Return only array.';

  try{
    var res=await fetch('/api/claude',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:2000,
        messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var raw=data.content?.[0]?.text||'';
    words=safeParseJSON(raw);
    if(mode==='flashcard') renderFlashcards();
    else if(mode==='quiz') renderVocabQuiz();
    else renderWordList();
  }catch(e){
    document.getElementById('content-area').innerHTML='<div style="text-align:center;padding:24px;color:var(--red)">⚠️ '+(lang==='ko'?'생성 실패':'Fehler')+'<br><small>'+e.message+'</small></div>';
    console.error(e);
  }
  btn.disabled=false;
  btn.innerHTML='🔄 <span>'+(lang==='ko'?'새로 생성':'Neu generieren')+'</span>';
}

/* 플래시카드 */
function renderFlashcards(){
  document.getElementById('score-bar').style.display='flex';
  showFlashcard(0);
}
function showFlashcard(idx){
  currentIdx=idx;
  var w=words[idx];
  var area=document.getElementById('content-area');
  var fc=document.createElement('div'); fc.className='fc-wrap fade-in';
  fc.innerHTML='<div class="flashcard" id="fc" onclick="this.classList.toggle(\'flipped\')">'
    +'<div class="fc-front">'
    +'<div class="fc-label">'+(lang==='ko'?'단어':'Wort')+' '+(idx+1)+' / '+words.length+'</div>'
    +(w.article?'<div class="fc-article">'+w.article+'</div>':'')
    +'<div class="fc-word">'+w.word+'</div>'
    +(w.plural?'<div style="font-size:11px;opacity:.5;margin-top:2px;">Pl: '+w.plural+'</div>':'')
    +'<div class="fc-pos">'+w.pos+'</div>'
    +'<div class="fc-hint">'+(lang==='ko'?'클릭해서 뒤집기 👆':'Klicken zum Umdrehen 👆')+'</div>'
    +'</div>'
    +'<div class="fc-back">'
    +'<div class="fc-label">'+(lang==='ko'?'뜻·예문':'Bedeutung & Beispiel')+'</div>'
    +'<div class="fc-def">'+w.meaning_de+'</div>'
    +'<div class="fc-ko">'+w.meaning_ko+'</div>'
    +'<div class="fc-example">'+w.example_de+'<br><span style="font-size:11px;color:var(--text-light);">'+w.example_ko+'</span></div>'
    +'</div>'
    +'</div>';
  var btns=document.createElement('div'); btns.className='nav-btns';
  var prev=document.createElement('button'); prev.className='nav-btn';
  prev.textContent='← '+(lang==='ko'?'이전':'Zurück');
  if(idx===0) prev.disabled=true;
  prev.addEventListener('click',function(){showFlashcard(idx-1);});
  var next=document.createElement('button'); next.className='nav-btn primary';
  next.textContent=idx===words.length-1?(lang==='ko'?'완료 ✓':'Fertig ✓'):(lang==='ko'?'다음 →':'Weiter →');
  next.addEventListener('click',function(){
    if(idx<words.length-1) showFlashcard(idx+1);
    else showResult(words.length,words.length,'vocab');
  });
  btns.append(prev,next);
  area.innerHTML=''; area.append(fc,btns);
  updateProgress(idx+1,words.length,idx+1,words.length);
}

/* 퀴즈 */
function renderVocabQuiz(){
  document.getElementById('score-bar').style.display='flex';
  showVQuiz(0);
}
function showVQuiz(idx){
  currentIdx=idx;
  var w=words[idx];
  var others=words.filter(function(_,i){return i!==idx;}).sort(function(){return Math.random()-.5;}).slice(0,3).map(function(o){return o.meaning_ko;});
  var opts=[w.meaning_ko].concat(others).sort(function(){return Math.random()-.5;});
  var area=document.getElementById('content-area');
  var qDiv=document.createElement('div'); qDiv.className='quiz-word fade-in';
  qDiv.innerHTML='<div class="qw-label">'+(lang==='ko'?'뜻을 고르세요':'Wählen Sie die richtige Bedeutung')+' ('+(idx+1)+'/'+words.length+')</div>'
    +(w.article?'<div class="qw-article">'+w.article+'</div>':'')
    +'<div class="qw-word">'+w.word+'</div>'
    +'<div class="qw-pos">'+w.pos+'</div>';
  var optsDiv=document.createElement('div'); optsDiv.className='options';
  opts.forEach(function(o,i){
    var btn=document.createElement('button'); btn.className='opt-btn';
    btn.textContent=String.fromCharCode(65+i)+'. '+o;
    btn.addEventListener('click',function(){
      optsDiv.querySelectorAll('.opt-btn').forEach(function(b){b.disabled=true;});
      if(o===w.meaning_ko){btn.classList.add('correct');score++;}
      else{btn.classList.add('wrong');optsDiv.querySelectorAll('.opt-btn').forEach(function(b){if(b.textContent.includes(w.meaning_ko))b.classList.add('correct');});}
      answered++;
      updateProgress(answered,words.length,score,words.length);
      setTimeout(function(){if(idx<words.length-1)showVQuiz(idx+1);else showResult(score,words.length,'vocab');},1200);
    });
    optsDiv.appendChild(btn);
  });
  area.innerHTML=''; area.append(qDiv,optsDiv);
  updateProgress(answered,words.length,score,words.length);
}

/* 단어 목록 */
function renderWordList(){
  var area=document.getElementById('content-area');
  var card=document.createElement('div'); card.className='card fade-in';
  var head=document.createElement('div'); head.className='card-head';
  head.innerHTML='<div class="card-title">'+(lang==='ko'?'단어 목록':'Wortliste')+' ('+words.length+(lang==='ko'?'개':' Wörter')+')</div>';
  var body=document.createElement('div'); body.className='card-body';
  var grid=document.createElement('div'); grid.className='word-grid';
  words.forEach(function(w){
    var item=document.createElement('div'); item.className='word-item';
    item.innerHTML=(w.article?'<div class="wi-article">'+w.article+'</div>':'')
      +'<div class="wi-word">'+w.word+'</div>'
      +'<div class="wi-pos">'+w.pos+'</div>'
      +'<div class="wi-ko">'+w.meaning_ko+'</div>';
    item.addEventListener('click',function(){showWordPopup(w);});
    grid.appendChild(item);
  });
  body.appendChild(grid);
  card.append(head,body);
  area.innerHTML=''; area.appendChild(card);
}

function showWordPopup(w){
  var existing=document.getElementById('word-popup');
  if(existing) existing.remove();
  var popup=document.createElement('div'); popup.id='word-popup';
  popup.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;';
  popup.innerHTML='<div style="background:var(--white);border-radius:14px;padding:28px;max-width:400px;width:100%;">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">'
    +'<div>'
    +(w.article?'<div style="font-size:14px;color:var(--de-blue);font-weight:700;">'+w.article+'</div>':'')
    +'<div style="font-size:30px;font-weight:700;color:var(--text);line-height:1.2;">'+w.word+'</div>'
    +(w.plural?'<div style="font-size:12px;color:var(--text-light);">Pl: '+w.plural+'</div>':'')
    +'<div style="font-size:12px;color:var(--text-light);font-style:italic;">'+w.pos+'</div>'
    +'</div>'
    +'<button onclick="document.getElementById(\'word-popup\').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-light);">✕</button>'
    +'</div>'
    +'<div style="background:var(--indigo-light);border-radius:8px;padding:12px;margin-bottom:12px;">'
    +'<div style="font-size:14px;color:var(--indigo);font-weight:600;margin-bottom:4px;">'+w.meaning_de+'</div>'
    +'<div style="font-size:13px;color:var(--text-muted);">'+w.meaning_ko+'</div>'
    +'</div>'
    +'<div style="font-size:13px;color:var(--text);line-height:1.7;background:var(--bg);padding:10px 12px;border-radius:8px;font-style:italic;">'
    +w.example_de+'<div style="font-size:11px;color:var(--text-light);margin-top:3px;font-style:normal;">'+w.example_ko+'</div>'
    +'</div>'
    +'</div>';
  popup.addEventListener('click',function(e){if(e.target===popup)popup.remove();});
  document.body.appendChild(popup);
}

/* ── 문법 생성 ─────────────────────────────────────────────────── */
async function generateGrammar(){
  lastGenFn=generateGrammar;
  var level=document.getElementById('g-level').value;
  var cat=document.getElementById('g-cat').value;
  var mode=document.getElementById('g-mode').value;
  var btn=document.getElementById('g-gen-btn');
  btn.disabled=true;
  btn.innerHTML='⏳ <span>'+(lang==='ko'?'생성 중...':'Generierung...')+'</span>';
  document.getElementById('content-area').innerHTML='';
  document.getElementById('result-box').style.display='none';
  document.getElementById('score-bar').style.display='none';
  grammars=[]; currentIdx=0; score=0; answered=0;

  var goethe='Goethe-Zertifikat '+level;
  var prompt='Generate 3 German grammar structures for level '+level+' ('+goethe+'). Category: '+cat+'.\n'
    +'Return ONLY valid JSON array (no markdown, no backticks, single-line strings):\n'
    +'[{"pattern":"Grammatikmuster","name":"Name der Struktur","meaning_de":"Erklaerung auf Deutsch","meaning_ko":"한국어 설명","examples":[{"de":"Beispielsatz 1 auf Deutsch.","ko":"예문 1 번역"},{"de":"Beispielsatz 2.","ko":"예문 2 번역"},{"de":"Beispielsatz 3.","ko":"예문 3 번역"}],"quiz_sentence":"Satz mit ___ zur Ermoeglichung.","quiz_answer":"Antwort","quiz_options":["Antwort","Falsche Option 1","Falsche Option 2","Falsche Option 3"]}]\n'
    +'All German content in German. meaning_ko and examples.ko in Korean. Single-line strings. Return only array.';

  try{
    var res=await fetch('/api/claude',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:2000,
        messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var raw=data.content?.[0]?.text||'';
    grammars=safeParseJSON(raw);
    if(mode==='learn') renderGrammarLearn();
    else renderGrammarQuiz(0);
  }catch(e){
    document.getElementById('content-area').innerHTML='<div style="text-align:center;padding:24px;color:var(--red)">⚠️ '+(lang==='ko'?'생성 실패':'Fehler')+'<br><small>'+e.message+'</small></div>';
    console.error(e);
  }
  btn.disabled=false;
  btn.innerHTML='🔄 <span>'+(lang==='ko'?'새로 생성':'Neu generieren')+'</span>';
}

function renderGrammarLearn(){
  var area=document.getElementById('content-area'); area.innerHTML='';
  grammars.forEach(function(g){
    var card=document.createElement('div'); card.className='grammar-card fade-in';
    card.innerHTML='<div class="gc-header"><div class="gc-pattern">'+g.pattern+'</div><div class="gc-name">'+g.name+'</div></div>'
      +'<div class="gc-body">'
      +'<div class="gc-meaning">'+g.meaning_de+'<div class="gc-meaning-ko">'+g.meaning_ko+'</div></div>'
      +'<div class="gc-examples-title">'+(lang==='ko'?'예문':'Beispiele')+'</div>'
      +(g.examples||[]).map(function(ex){
        return '<div class="gc-example"><div class="gc-ex-de">'+ex.de+'</div><div class="gc-ex-ko">'+ex.ko+'</div></div>';
      }).join('')
      +'</div>';
    area.appendChild(card);
  });
}

function renderGrammarQuiz(idx){
  if(idx>=grammars.length){showResult(score,grammars.length,'grammar');return;}
  currentIdx=idx;
  var g=grammars[idx];
  document.getElementById('score-bar').style.display='flex';
  updateProgress(idx,grammars.length,score,grammars.length);
  var area=document.getElementById('content-area');
  var qDiv=document.createElement('div'); qDiv.className='gq-sentence fade-in';
  qDiv.innerHTML='<div class="gq-label">'+(lang==='ko'?'빈칸에 알맞은 것을 고르세요':'Ergaenzen Sie die Luecke')+' ('+(idx+1)+'/'+grammars.length+')</div>'
    +'<div class="gq-text">'+g.quiz_sentence.replace('___','<span class="blank"></span>')+'</div>'
    +'<div class="gq-ko">'+g.meaning_ko+'</div>';
  var optsDiv=document.createElement('div'); optsDiv.className='options';
  var opts=(g.quiz_options||[]).slice().sort(function(){return Math.random()-.5;});
  opts.forEach(function(o,i){
    var btn=document.createElement('button'); btn.className='opt-btn';
    btn.textContent=String.fromCharCode(65+i)+'. '+o;
    btn.addEventListener('click',function(){
      optsDiv.querySelectorAll('.opt-btn').forEach(function(b){b.disabled=true;});
      if(o===g.quiz_answer){btn.classList.add('correct');score++;}
      else{btn.classList.add('wrong');optsDiv.querySelectorAll('.opt-btn').forEach(function(b){if(b.textContent.includes(g.quiz_answer))b.classList.add('correct');});}
      answered++;
      updateProgress(answered,grammars.length,score,grammars.length);
      setTimeout(function(){renderGrammarQuiz(idx+1);},1200);
    });
    optsDiv.appendChild(btn);
  });
  area.innerHTML=''; area.append(qDiv,optsDiv);
}

function updateProgress(curr,total,sc,tot){
  var fill=document.getElementById('sb-fill');
  var num=document.getElementById('sb-num');
  var ctr=document.getElementById('card-counter');
  if(fill) fill.style.width=(total>0?(curr/total)*100:0)+'%';
  if(num) num.textContent=sc+' / '+tot;
  if(ctr) ctr.textContent=curr+' / '+total;
}

function showResult(sc,total,type){
  var pct=Math.round(sc/total*100);
  var box=document.getElementById('result-box'); box.style.display='block';
  document.getElementById('rb-icon').textContent=pct>=80?'🎉':pct>=60?'👍':'💪';
  document.getElementById('rb-title').textContent=pct>=80?(lang==='ko'?'Ausgezeichnet!':'Ausgezeichnet!'):pct>=60?(lang==='ko'?'Gut gemacht!':'Gut gemacht!'):(lang==='ko'?'Weiter üben!':'Weiter üben!');
  document.getElementById('rb-score').textContent=sc+' / '+total+' ('+pct+'%)';
  document.getElementById('rb-btn-label').textContent=type==='vocab'?(lang==='ko'?'새 단어 세트':'Neuer Wortschatz'):(lang==='ko'?'새 문법 세트':'Neue Grammatik');
  box.scrollIntoView({behavior:'smooth',block:'center'});
}
