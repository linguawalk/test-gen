<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaWalk — General 日本語 — 語彙・文法</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B45;--teal:#2A7F6F;--teal-mid:#1D9E75;--teal-light:#e1f5ee;
  --ja:#c0392b;--ja-dark:#8b1a12;--ja-light:#fdf0ef;
  --indigo:#4f46e5;--indigo-light:#eef2ff;
  --green2:#16a34a;--green2-light:#dcfce7;--green2-dark:#14532d;
  --bg:#F8F7F4;--white:#fff;--text:#1C2B45;--text-muted:#5a6a82;--text-light:#94a3b8;
  --border:rgba(28,43,69,0.1);--border-md:rgba(28,43,69,0.18);
  --red:#e24b4a;--red-light:#fee2e2;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(28,43,69,0.97);height:56px;display:flex;align-items:center;padding:0 5%;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-lm{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.nav-lt{font-size:16px;font-weight:600;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 12px;}
.nav-page{font-size:13px;color:rgba(255,255,255,0.6);}
.nav-space{flex:1;}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;padding:6px 10px;border-radius:7px;transition:all 0.2s;}
.nav-back:hover{background:rgba(255,255,255,0.08);color:#fff;}
.lang-sw{display:flex;background:rgba(255,255,255,0.08);border-radius:7px;padding:2px;gap:2px;margin-left:8px;}
.lbtn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.lbtn.act{background:var(--teal-mid);color:#fff;}
.main{max-width:820px;margin:0 auto;padding:28px 5% 80px;}

/* HERO */
.hero{background:linear-gradient(135deg,#1e1b4b 0%,var(--indigo) 100%);border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.hero-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,30px);color:#fff;margin-bottom:6px;}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.hero-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-badge{font-size:11px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:0.5px solid rgba(255,255,255,0.2);}

/* MODE TABS (語彙 / 文法) */
.mode-tabs{display:flex;background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:4px;margin-bottom:16px;gap:4px;}
.mode-tab{flex:1;padding:10px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-family:inherit;transition:all 0.2s;text-align:center;}
.mode-tab.act{background:var(--indigo);color:#fff;}
.mode-tab:hover:not(.act){color:var(--indigo);}

/* SETTINGS */
.settings-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.setting-item{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:120px;}
.si-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.si-select{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;}

/* GEN BTN */
.gen-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;background:var(--indigo);color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:20px;}
.gen-btn:hover{background:#4338ca;}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}

/* SCORE BAR */
.score-bar{display:flex;align-items:center;gap:12px;background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;}
.score-num{font-family:'DM Serif Display',serif;font-size:24px;color:var(--indigo);}
.progress-bar{flex:1;height:8px;background:var(--bg);border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#1e1b4b,var(--indigo));border-radius:10px;transition:width 0.3s;}

/* FLASHCARD */
.flashcard-wrap{perspective:1000px;margin-bottom:14px;}
.flashcard{width:100%;min-height:220px;position:relative;transform-style:preserve-3d;transition:transform 0.5s;cursor:pointer;border-radius:14px;}
.flashcard.flipped{transform:rotateY(180deg);}
.fc-front,.fc-back{position:absolute;inset:0;border-radius:14px;padding:28px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.fc-front{background:linear-gradient(135deg,#1e1b4b,var(--indigo));color:#fff;}
.fc-back{background:var(--white);border:0.5px solid var(--border);transform:rotateY(180deg);}
.fc-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:.6;margin-bottom:12px;}
.fc-word{font-family:'DM Serif Display',serif;font-size:36px;margin-bottom:6px;}
.fc-reading{font-size:16px;opacity:.75;margin-bottom:6px;}
.fc-pos{font-size:12px;padding:3px 10px;border-radius:10px;background:rgba(255,255,255,0.2);display:inline-block;margin-bottom:12px;}
.fc-hint{font-size:12px;opacity:.55;margin-top:auto;}
.fc-def{font-size:17px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.5;}
.fc-ko{font-size:15px;color:var(--indigo);font-weight:600;margin-bottom:10px;}
.fc-example{font-size:12px;color:var(--text-muted);font-style:italic;line-height:1.6;background:var(--bg);padding:8px 12px;border-radius:8px;width:100%;}
.nav-btns{display:flex;gap:10px;margin-top:8px;}
.nav-btn{flex:1;padding:12px;border-radius:10px;border:0.5px solid var(--border-md);background:var(--white);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.nav-btn:disabled{opacity:.4;cursor:default;}
.nav-btn.primary{background:var(--indigo);color:#fff;border-color:var(--indigo);}
.nav-btn.primary:hover{background:#4338ca;}

/* QUIZ */
.quiz-word{background:linear-gradient(135deg,#1e1b4b,var(--indigo));border-radius:14px;padding:28px;text-align:center;margin-bottom:14px;color:#fff;}
.qw-label{font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.qw-word{font-family:'DM Serif Display',serif;font-size:36px;margin-bottom:6px;}
.qw-reading{font-size:16px;opacity:.7;margin-bottom:6px;}
.qw-pos{font-size:12px;padding:3px 10px;border-radius:10px;background:rgba(255,255,255,0.2);display:inline-block;}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.opt-btn{padding:12px 16px;border-radius:10px;border:1.5px solid var(--border-md);background:var(--white);font-size:13px;color:var(--text);cursor:pointer;font-family:inherit;transition:all 0.2s;text-align:left;line-height:1.5;}
.opt-btn:hover:not(:disabled){border-color:var(--indigo);background:var(--indigo-light);}
.opt-btn.correct{border-color:var(--green2);background:var(--green2-light);color:var(--green2-dark);font-weight:500;}
.opt-btn.wrong{border-color:var(--red);background:var(--red-light);color:#991b1b;}
.opt-btn:disabled{cursor:default;}

/* WORD LIST */
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.word-item{background:var(--bg);border-radius:10px;padding:14px;cursor:pointer;transition:all 0.2s;border:0.5px solid var(--border);}
.word-item:hover{border-color:var(--indigo);background:var(--indigo-light);}
.wi-word{font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px;}
.wi-reading{font-size:12px;color:var(--text-light);margin-bottom:3px;}
.wi-pos{font-size:11px;color:var(--text-light);}
.wi-ko{font-size:12px;color:var(--indigo);font-weight:600;margin-top:4px;}

/* GRAMMAR CARD */
.grammar-card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.gc-header{background:linear-gradient(135deg,#1e1b4b,var(--indigo));padding:20px 22px;color:#fff;}
.gc-pattern{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:4px;}
.gc-name{font-size:13px;opacity:.75;}
.gc-body{padding:18px;}
.gc-meaning{font-size:14px;color:var(--text);line-height:1.65;margin-bottom:14px;padding:10px 14px;background:var(--indigo-light);border-radius:8px;border-left:3px solid var(--indigo);}
.gc-examples-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:8px;}
.gc-example{display:flex;flex-direction:column;gap:2px;padding:8px 12px;background:var(--bg);border-radius:8px;margin-bottom:6px;}
.gc-ex-ja{font-size:14px;color:var(--text);line-height:1.65;}
.gc-ex-ko{font-size:12px;color:var(--text-muted);}

/* GRAMMAR QUIZ */
.gq-sentence{background:linear-gradient(135deg,#1e1b4b,var(--indigo));border-radius:14px;padding:24px;text-align:center;margin-bottom:14px;color:#fff;}
.gq-label{font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.gq-text{font-size:20px;line-height:1.7;margin-bottom:8px;}
.gq-blank{display:inline-block;width:80px;height:28px;border-bottom:2px solid rgba(255,255,255,0.6);vertical-align:middle;text-align:center;}
.gq-ko{font-size:13px;opacity:.65;}

/* RESULT */
.result-box{background:linear-gradient(135deg,#1e1b4b,var(--indigo));border-radius:14px;padding:32px;text-align:center;display:none;color:#fff;margin-top:16px;}
.rb-icon{font-size:48px;margin-bottom:12px;}
.rb-title{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:6px;}
.rb-score{font-size:18px;opacity:.8;margin-bottom:16px;}
.rb-btn{padding:12px 28px;border-radius:10px;background:rgba(255,255,255,0.15);color:#fff;border:0.5px solid rgba(255,255,255,0.3);cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;transition:all 0.2s;}
.rb-btn:hover{background:rgba(255,255,255,0.25);}

/* CARD */
.card{background:var(--white);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.card-head{padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:600;color:var(--text);}
.card-body{padding:18px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.3s ease forwards;}
</style>
</head>

    <div class="hero-title" data-ko="📚 어휘·문법 학습" data-ja="📚 語彙・文法学習">📚 어휘·문법 학습</div>

<script>
let lang='ko', section='vocab';
let words=[], grammars=[];
let currentIdx=0, score=0, answered=0;
let lastGenFn=null;

// ── 언어 전환 ─────────────────────────────────────────────────────────
function setLang(l){
  lang=l;
  document.querySelectorAll('[data-ko][data-ja]').forEach(el=>{
    const t=l==='ko'?el.getAttribute('data-ko'):el.getAttribute('data-ja');
    if(t) el.innerHTML=t;
  });
  document.getElementById('btn-ko').classList.toggle('act',l==='ko');
  document.getElementById('btn-ja').classList.toggle('act',l==='ja');
}

// ── 섹션 전환 ─────────────────────────────────────────────────────────
function setSection(s, btn){
  section=s;
  document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  document.getElementById('vocab-settings').style.display=s==='vocab'?'block':'none';
  document.getElementById('grammar-settings').style.display=s==='grammar'?'block':'none';
  document.getElementById('content-area').innerHTML='';
  document.getElementById('result-box').style.display='none';
  document.getElementById('score-bar').style.display='none';
  words=[]; grammars=[]; currentIdx=0; score=0; answered=0;
}

function reGenerate(){ if(lastGenFn) lastGenFn(); }

// ═══════════════════════════════════════════════════════
// 語彙 섹션
// ═══════════════════════════════════════════════════════
async function generateVocab(){
  lastGenFn=generateVocab;
  const level=document.getElementById('v-level').value;
  const topic=document.getElementById('v-topic').value;
  const count=document.getElementById('v-count').value;
  const mode=document.getElementById('v-mode').value;
  const btn=document.getElementById('v-gen-btn');
  btn.disabled=true;
  btn.innerHTML='⏳ <span>'+(lang==='ko'?'생성 중...':'生成中...')+'</span>';
  document.getElementById('content-area').innerHTML='';
  document.getElementById('result-box').style.display='none';
  document.getElementById('score-bar').style.display='none';
  words=[]; currentIdx=0; score=0; answered=0;

  const levelHint={A1:'N5以下',A2:'N5',B1:'N4-N3',B2:'N3-N2',C1:'N2-N1',C2:'N1+'}[level]||level;

  const prompt=`일본어 단어 ${count}개를 생성해주세요.
레벨: ${levelHint} / 주제: ${topic}
ONLY return valid JSON array (no markdown, single-line strings):
[{"word":"単語","reading":"よみかた","pos":"名詞","meaning_ja":"日本語の意味","meaning_ko":"한국어 뜻","example_ja":"例文","example_ko":"예문 한국어 번역","synonyms":["類義語1","類義語2"]}]
Rules: word/reading/pos/example must be Japanese. meaning_ko and example_ko must be Korean.`;

  try{
    const res=await fetch('/api/claude',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:2000,
        messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=data.content?.[0]?.text||'';
    words=JSON.parse(raw.replace(/```json|```/g,'').trim());
    if(mode==='flashcard') renderVocabFlashcards();
    else if(mode==='quiz') renderVocabQuiz();
    else renderWordList();
  }catch(e){
    document.getElementById('content-area').innerHTML=`<div style="text-align:center;padding:24px;color:var(--red)">⚠️ ${lang==='ko'?'생성 실패':'生成失敗'}<br><small>${e.message}</small></div>`;
    console.error(e);
  }
  btn.disabled=false;
  btn.innerHTML='🔄 <span>'+(lang==='ko'?'새로 생성':'再生成')+'</span>';
}

// 플래시카드
function renderVocabFlashcards(){
  document.getElementById('score-bar').style.display='flex';
  showVFlashcard(0);
}

function showVFlashcard(idx){
  currentIdx=idx;
  const w=words[idx];
  const area=document.getElementById('content-area');
  const nav=document.createElement('div');

  const fc=document.createElement('div'); fc.className='flashcard-wrap fade-in';
  fc.innerHTML=`
    <div class="flashcard" id="fc" onclick="this.classList.toggle('flipped')">
      <div class="fc-front">
        <div class="fc-label">${lang==='ko'?'단어':'単語'} ${idx+1} / ${words.length}</div>
        <div class="fc-word">${w.word}</div>
        <div class="fc-reading">${w.reading}</div>
        <div class="fc-pos">${w.pos}</div>
        <div class="fc-hint">${lang==='ko'?'클릭해서 뒤집기 👆':'クリックして裏返す 👆'}</div>
      </div>
      <div class="fc-back">
        <div class="fc-label">${lang==='ko'?'뜻·예문':'意味・例文'}</div>
        <div class="fc-def">${w.meaning_ja}</div>
        <div class="fc-ko">${w.meaning_ko}</div>
        <div class="fc-example">${w.example_ja}<br><span style="color:var(--text-light);font-size:11px;">${w.example_ko}</span></div>
      </div>
    </div>`;

  const btns=document.createElement('div'); btns.className='nav-btns';
  const prev=document.createElement('button'); prev.className='nav-btn'; prev.textContent='← '+(lang==='ko'?'이전':'前へ');
  if(idx===0) prev.disabled=true;
  prev.addEventListener('click',()=>showVFlashcard(idx-1));
  const next=document.createElement('button'); next.className='nav-btn primary';
  next.textContent=idx===words.length-1?(lang==='ko'?'완료 ✓':'完了 ✓'):(lang==='ko'?'다음 →':'次へ →');
  next.addEventListener('click',()=>{ if(idx<words.length-1) showVFlashcard(idx+1); else showResult(words.length,words.length,'vocab'); });
  btns.append(prev,next);

  area.innerHTML=''; area.append(fc,btns);
  updateProgress(idx+1,words.length,idx+1,words.length);
}

// 퀴즈
function renderVocabQuiz(){
  document.getElementById('score-bar').style.display='flex';
  showVQuiz(0);
}

function showVQuiz(idx){
  currentIdx=idx;
  const w=words[idx];
  // 4지선다: 한국어 뜻 맞추기
  const others=words.filter((_,i)=>i!==idx).sort(()=>Math.random()-.5).slice(0,3).map(o=>o.meaning_ko);
  const opts=[w.meaning_ko,...others].sort(()=>Math.random()-.5);
  const area=document.getElementById('content-area');
  const qDiv=document.createElement('div'); qDiv.className='quiz-word fade-in';
  qDiv.innerHTML=`
    <div class="qw-label">${lang==='ko'?'뜻을 고르세요 (한국어)':'意味を選んでください'} (${idx+1}/${words.length})</div>
    <div class="qw-word">${w.word}</div>
    <div class="qw-reading">${w.reading}</div>
    <div class="qw-pos">${w.pos}</div>`;
  const optsDiv=document.createElement('div'); optsDiv.className='options';
  opts.forEach((o,i)=>{
    const btn=document.createElement('button'); btn.className='opt-btn';
    btn.textContent=String.fromCharCode(65+i)+'. '+o;
    btn.addEventListener('click',()=>{
      optsDiv.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
      if(o===w.meaning_ko){ btn.classList.add('correct'); score++; }
      else{ btn.classList.add('wrong'); optsDiv.querySelectorAll('.opt-btn').forEach(b=>{ if(b.textContent.includes(w.meaning_ko)) b.classList.add('correct'); }); }
      answered++;
      updateProgress(answered,words.length,score,words.length);
      setTimeout(()=>{ if(idx<words.length-1) showVQuiz(idx+1); else showResult(score,words.length,'vocab'); },1200);
    });
    optsDiv.appendChild(btn);
  });
  area.innerHTML=''; area.append(qDiv,optsDiv);
  updateProgress(answered,words.length,score,words.length);
}

// 단어 목록
function renderWordList(){
  const area=document.getElementById('content-area');
  const card=document.createElement('div'); card.className='card fade-in';
  const head=document.createElement('div'); head.className='card-head';
  head.innerHTML=`<div class="card-title">${lang==='ko'?'단어 목록':'単語一覧'} (${words.length}${lang==='ko'?'개':'語'})</div>`;
  const body=document.createElement('div'); body.className='card-body';
  const grid=document.createElement('div'); grid.className='word-grid';
  words.forEach(w=>{
    const item=document.createElement('div'); item.className='word-item';
    item.innerHTML=`<div class="wi-word">${w.word}</div><div class="wi-reading">${w.reading}</div><div class="wi-pos">${w.pos}</div><div class="wi-ko">${w.meaning_ko}</div>`;
    item.addEventListener('click',()=>showWordPopup(w));
    grid.appendChild(item);
  });
  body.appendChild(grid);
  card.append(head,body);
  area.innerHTML=''; area.appendChild(card);
}

function showWordPopup(w){
  const existing=document.getElementById('word-popup');
  if(existing) existing.remove();
  const popup=document.createElement('div');
  popup.id='word-popup';
  popup.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;';
  popup.innerHTML=`
    <div style="background:var(--white);border-radius:14px;padding:28px;max-width:400px;width:100%;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
        <div>
          <div style="font-family:'DM Serif Display',serif;font-size:32px;color:var(--text);">${w.word}</div>
          <div style="font-size:15px;color:var(--text-light);">${w.reading} · ${w.pos}</div>
        </div>
        <button onclick="document.getElementById('word-popup').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-light);">✕</button>
      </div>
      <div style="background:var(--indigo-light);border-radius:8px;padding:12px;margin-bottom:12px;">
        <div style="font-size:14px;color:var(--indigo);font-weight:600;margin-bottom:4px;">${w.meaning_ja}</div>
        <div style="font-size:13px;color:var(--text-muted);">${w.meaning_ko}</div>
      </div>
      <div style="font-size:13px;color:var(--text-muted);line-height:1.7;background:var(--bg);padding:10px 12px;border-radius:8px;">
        ${w.example_ja}<br><span style="font-size:11px;color:var(--text-light);">${w.example_ko}</span>
      </div>
      ${w.synonyms?.length?`<div style="margin-top:10px;font-size:12px;color:var(--text-light);">類義語: ${w.synonyms.join('、')}</div>`:''}
    </div>`;
  popup.addEventListener('click',e=>{ if(e.target===popup) popup.remove(); });
  document.body.appendChild(popup);
}

// ═══════════════════════════════════════════════════════
// 文法 섹션
// ═══════════════════════════════════════════════════════
async function generateGrammar(){
  lastGenFn=generateGrammar;
  const level=document.getElementById('g-level').value;
  const cat=document.getElementById('g-cat').value;
  const mode=document.getElementById('g-mode').value;
  const btn=document.getElementById('g-gen-btn');
  btn.disabled=true;
  btn.innerHTML='⏳ <span>'+(lang==='ko'?'생성 중...':'生成中...')+'</span>';
  document.getElementById('content-area').innerHTML='';
  document.getElementById('result-box').style.display='none';
  document.getElementById('score-bar').style.display='none';
  grammars=[]; currentIdx=0; score=0; answered=0;

  const levelHint={A1:'N5以下',A2:'N5',B1:'N4-N3',B2:'N3-N2',C1:'N2-N1',C2:'N1+'}[level]||level;

  const prompt=`일본어 문법 문형 3개를 생성해주세요.
레벨: ${levelHint} / 카테고리: ${cat}
ONLY return valid JSON array (no markdown, single-line strings):
[{"pattern":"〜ています","name":"進行形・状態","meaning_ja":"現在進行中の動作や状態を表す","meaning_ko":"현재 진행 중인 동작이나 상태를 나타낸다","examples":[{"ja":"今、ご飯を食べています。","ko":"지금 밥을 먹고 있습니다."},{"ja":"彼女は駅で働いています。","ko":"그녀는 역에서 일하고 있습니다."},{"ja":"雨が降っています。","ko":"비가 내리고 있습니다."}],"quiz_sentence":"今、勉強___います。","quiz_answer":"して","quiz_options":["して","した","する","している"]}]
Rules: all Japanese content in Japanese, meaning_ko/examples.ko in Korean. Single-line strings only.`;

  try{
    const res=await fetch('/api/claude',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:2000,
        messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=data.content?.[0]?.text||'';
    grammars=JSON.parse(raw.replace(/```json|```/g,'').trim());
    if(mode==='learn') renderGrammarLearn();
    else renderGrammarQuiz(0);
  }catch(e){
    document.getElementById('content-area').innerHTML=`<div style="text-align:center;padding:24px;color:var(--red)">⚠️ ${lang==='ko'?'생성 실패':'生成失敗'}<br><small>${e.message}</small></div>`;
    console.error(e);
  }
  btn.disabled=false;
  btn.innerHTML='🔄 <span>'+(lang==='ko'?'새로 생성':'再生成')+'</span>';
}

function renderGrammarLearn(){
  const area=document.getElementById('content-area');
  area.innerHTML='';
  grammars.forEach(g=>{
    const card=document.createElement('div'); card.className='grammar-card fade-in';
    card.innerHTML=`
      <div class="gc-header">
        <div class="gc-pattern">${g.pattern}</div>
        <div class="gc-name">${g.name}</div>
      </div>
      <div class="gc-body">
        <div class="gc-meaning">${g.meaning_ja}<br><span style="font-size:12px;color:var(--text-muted);margin-top:4px;display:block;">${g.meaning_ko}</span></div>
        <div class="gc-examples-title">${lang==='ko'?'예문':'例文'}</div>
        ${(g.examples||[]).map(ex=>`
          <div class="gc-example">
            <div class="gc-ex-ja">${ex.ja}</div>
            <div class="gc-ex-ko">${ex.ko}</div>
          </div>`).join('')}
      </div>`;
    area.appendChild(card);
  });
}

function renderGrammarQuiz(idx){
  if(idx>=grammars.length){ showResult(score,grammars.length,'grammar'); return; }
  currentIdx=idx;
  const g=grammars[idx];
  document.getElementById('score-bar').style.display='flex';
  updateProgress(idx,grammars.length,score,grammars.length);

  const area=document.getElementById('content-area');
  const qDiv=document.createElement('div'); qDiv.className='gq-sentence fade-in';
  qDiv.innerHTML=`
    <div class="gq-label">${lang==='ko'?'빈칸에 알맞은 것을 고르세요':'空欄に入るものを選んでください'} (${idx+1}/${grammars.length})</div>
    <div class="gq-text">${g.quiz_sentence.replace('___','<span class="gq-blank"></span>')}</div>
    <div class="gq-ko">${g.meaning_ko}</div>`;
  const optsDiv=document.createElement('div'); optsDiv.className='options';
  const opts=(g.quiz_options||[]).sort(()=>Math.random()-.5);
  opts.forEach((o,i)=>{
    const btn=document.createElement('button'); btn.className='opt-btn';
    btn.textContent=String.fromCharCode(65+i)+'. '+o;
    btn.addEventListener('click',()=>{
      optsDiv.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
      if(o===g.quiz_answer){ btn.classList.add('correct'); score++; }
      else{ btn.classList.add('wrong'); optsDiv.querySelectorAll('.opt-btn').forEach(b=>{ if(b.textContent.includes(g.quiz_answer)) b.classList.add('correct'); }); }
      answered++;
      updateProgress(answered,grammars.length,score,grammars.length);
      setTimeout(()=>renderGrammarQuiz(idx+1),1200);
    });
    optsDiv.appendChild(btn);
  });
  area.innerHTML=''; area.append(qDiv,optsDiv);
}

// ── 공통 유틸 ─────────────────────────────────────────────────────────
function updateProgress(curr,total,sc,tot){
  const fill=document.getElementById('progress-fill');
  const num=document.getElementById('score-num');
  const ctr=document.getElementById('card-counter');
  if(fill) fill.style.width=`${(curr/total)*100}%`;
  if(num) num.textContent=`${sc} / ${tot}`;
  if(ctr) ctr.textContent=`${curr} / ${total}`;
}

function showResult(sc,total,type){
  const pct=Math.round(sc/total*100);
  const box=document.getElementById('result-box'); box.style.display='block';
  document.getElementById('rb-icon').textContent=pct>=80?'🎉':pct>=60?'👍':'💪';
  document.getElementById('rb-title').textContent=pct>=80?(lang==='ko'?'훌륭합니다!':'素晴らしい！'):pct>=60?(lang==='ko'?'잘 하셨습니다!':'よくできました！'):(lang==='ko'?'계속 연습!':'練習を続けましょう！');
  document.getElementById('rb-score').textContent=`${sc} / ${total} (${pct}%)`;
  document.getElementById('rb-btn-label').textContent=type==='vocab'?(lang==='ko'?'새 단어 세트':'新しい単語セット'):(lang==='ko'?'새 문법 세트':'新しい文法セット');
  box.scrollIntoView({behavior:'smooth',block:'center'});
}

// ── 초기화 ────────────────────────────────────────────────────────────
(function(){ setLang('ko'); })();
</script>
